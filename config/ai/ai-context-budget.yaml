version: 1

default_profile: production

profiles:
  production:
    warning_lines: 500
    warning_bytes: 61440
    error_lines: 800
    error_bytes: 102400
  temporary_large_production:
    warning_lines: 500
    warning_bytes: 61440
    error_lines: 1800
    error_bytes: 102400
  tests_and_scripts:
    warning_lines: 900
    error_lines: 1400
  spec_yaml:
    warning_lines: 800
    error_lines: 1200
  temporary_large_spec_yaml:
    warning_lines: 800
    error_lines: 1400
  proto_schema:
    warning_lines: 500
    warning_bytes: 61440
    error_lines: 900
    error_bytes: 102400
  generated:
    warning_lines: 2000
    error_lines: 4000

classifiers:
  temporary_large_production:
    - "apps/desktop/src-tauri/src/local_runtime/commands/commands_import_bundle.rs"
    - "apps/desktop/src/runtime/local-runtime/commands.ts"
    - "apps/desktop/src/shell/renderer/features/chat/chat-agent-behavior-resolver.ts"
    - "apps/desktop/src/shell/renderer/features/chat/chat-agent-orchestration.ts"
    - "apps/desktop/src/shell/renderer/features/chat/chat-agent-runtime.ts"
    - "apps/desktop/src/shell/renderer/features/chat/chat-agent-shell-adapter.tsx"
    - "apps/desktop/src/shell/renderer/features/chat/chat-agent-shell-host-actions.ts"
    - "apps/desktop/src/shell/renderer/infra/bootstrap/runtime-bootstrap-host-capabilities.ts"
    - "apps/forge/src/shell/renderer/pages/workbench/workbench-page.tsx"
    - "apps/parentos/mock.json"
    - "apps/parentos/src-tauri/src/sqlite/migrations.rs"
    - "apps/parentos/src/shell/renderer/features/profile/growth-curve-page.tsx"
    - "apps/parentos/src/shell/renderer/features/profile/medical-events-page.tsx"
    - "apps/parentos/src/shell/renderer/features/profile/sleep-page.tsx"
    - "apps/parentos/src/shell/renderer/features/profile/tanner-page.tsx"
    - "apps/video-food-map/src-tauri/src/db.rs"
    - "apps/video-food-map/src-tauri/src/probe.rs"
    - "apps/video-food-map/src/shell/renderer/App.tsx"
    - "nimi-coding/cli/lib/contracts.mjs"
    - "nimi-coding/cli/lib/doctor.mjs"
    - "nimi-coding/cli/lib/validators.mjs"
    - "runtime/internal/managedimagebackend/server.go"
    - "runtime/internal/services/agentcore/hook_lifecycle.go"
    - "runtime/internal/services/agentcore/service.go"
    - "runtime/internal/services/memory/service.go"
    - "sdk/src/internal/world-evolution-selector-read.ts"
    - "sdk/src/runtime/core/method-codecs.ts"
  temporary_large_spec_yaml:
    - "apps/parentos/spec/kernel/tables/reminder-rules.yaml"
    - "spec/runtime/kernel/tables/rule-evidence.rules.yaml"
  proto_schema:
    - "proto/**/*.proto"
  tests_and_scripts:
    - "scripts/**"
    - "**/*.test.js"
    - "**/*.test.ts"
    - "**/*.test.mjs"
    - "**/*.test.tsx"
    - "**/*.spec.js"
    - "**/*.spec.ts"
    - "**/*.spec.mjs"
    - "**/*.spec.tsx"
    - "**/*_test.go"
    - "**/__tests__/**"
  spec_yaml:
    - "spec/**/*.yaml"
    - "spec/**/*.yml"
    - "apps/**/spec/**/*.yaml"
    - "apps/**/spec/**/*.yml"
  generated:
    - "runtime/internal/providerregistry/generated.go"
    - "runtime/catalog/providers/**"
    - "runtime/catalog/generated/**"
    - "runtime/gen/**"
    - "sdk/src/runtime/generated/**"
    - "sdk/src/realm/generated/**"
    - "spec/**/kernel/generated/**"

exclude:
  - "_external/**"
  - ".cache/**"
  - ".iterate/**"
  - "archive/**"
  - "docs/**"
  - ".local/**"
  - "**/generated/**"
  - "**/gen/**"
  - "runtime/**/*.pb.go"
  - "runtime/**/*.binpb"
  - "spec/generated/**"
  - "pnpm-lock.yaml"
  - "**/Cargo.lock"
  - "apps/desktop/src-tauri/gen/**"
  - "**/*.ico"
  - "**/*.icns"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.webp"
  - "**/*.svg"
  - "**/*.wav"
  - "**/*.mp3"
  - "**/*.m4a"
  - "**/*.ogg"
  - "**/*.flac"
  - "**/*.aac"
  - "**/*.mp4"
  - "**/*.mov"
  - "**/*.webm"
  - "**/*.css"
  - "**/locales/en.json"
  - "**/locales/zh.json"

waivers:
  - path: runtime/internal/services/localservice/service_test.go
    until: 2026-09-30
    reason: Large integration coverage suite retained as a single trace narrative.
  - path: runtime/internal/services/ai/live_provider_smoke_test.go
    until: 2026-09-30
    reason: Provider matrix smoke tests retained as one contract matrix file.
  - path: apps/desktop/test/chat-agent-local-mode.test.ts
    until: 2026-07-31
    reason: Desktop local-mode contract coverage remains in one matrix file pending test sharding.
  - path: apps/desktop/test/chat-agent-orchestration-provider.test.ts
    until: 2026-07-31
    reason: Desktop orchestration-provider contract coverage remains in one matrix file pending test sharding.
  - path: nimi-coding/test/nimicoding.test.mjs
    until: 2026-07-31
    reason: NimiCoding end-to-end coverage remains in one matrix file pending suite sharding.
  - path: runtime/internal/services/agentcore/service_test.go
    until: 2026-07-31
    reason: Agentcore service coverage remains in one matrix file pending test sharding.
