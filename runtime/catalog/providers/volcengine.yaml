  - model_id: seedance-1-5-pro
    provider: volcengine
    model_type: video
    updated_at: 2026-03-05
    capabilities:
      - video.generate
    pricing:
      unit: request
      input: unknown
      output: unknown
      currency: CNY
      as_of: 2026-03-05
      notes: Volcengine public pricing varies by account plan and endpoint tier.
    source_ref:
      url: https://www.volcengine.com/docs/82379/1366799?lang=zh
      retrieved_at: 2026-03-05
      note: Volcengine Seedance video generation overview (t2v and i2v).
    video_generation: &a1
      modes:
        - t2v
        - i2v_first_frame
        - i2v_first_last
        - i2v_reference
      input_roles:
        t2v:
          - prompt
        i2v_first_frame:
          - prompt
          - first_frame
        i2v_first_last:
          - prompt
          - first_frame
          - last_frame
        i2v_reference:
          - prompt
          - reference_image
      limits:
        reference_images:
          min: 1
          max: 4
        seed:
          min: -1
          max: 4294967295
        duration_sec:
          min: 1
          max: 10
        fps:
          min: 1
          max: 60
        ratio:
          - 16:9
          - 4:3
          - 1:1
          - 3:4
          - 9:16
          - 21:9
          - adaptive
      options:
        supports:
          - resolution
          - ratio
          - duration_sec
          - frames
          - fps
          - seed
          - camera_fixed
          - watermark
          - generate_audio
          - draft
          - service_tier
          - execution_expires_after_sec
          - return_last_frame
        constraints:
          frames_overrides_duration: true
          camera_fixed_disallowed_in_i2v_reference: true
      outputs:
        video_url: true
        last_frame_url: true
