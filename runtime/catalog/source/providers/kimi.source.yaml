schema_version: 3
provider: kimi
catalog_version: 2026-04-18-kimi-v2
generated_target: runtime/catalog/providers/kimi.yaml
runtime:
  runtime_plane: remote
  managed_connector_supported: true
  inline_supported: true
  default_endpoint: https://api.moonshot.cn/v1
  requires_explicit_endpoint: false
  inventory_mode: dynamic_endpoint
  dynamic_inventory:
    discovery_transport: connector_list_models
    cache_ttl_sec: 300
    selection_mode: pass_through
    failure_policy: use_cache_then_fail_closed
    allowed_capabilities:
      - text.generate
      - text.generate.vision
defaults:
  provider: kimi
  model_type: chat
  capabilities: []
  pricing:
    unit: token
    input: unknown
    output: unknown
    currency: CNY
    as_of: 2026-04-18
    notes: Moonshot publishes a live `GET /v1/models` endpoint for current Kimi inventory, so runtime inventory should be discovered dynamically instead of curated as static source rows.

sources:
  - source_id: kimi_intro_doc
    url: https://platform.kimi.com/docs/introduction
    retrieved_at: 2026-04-18
    note: Kimi API introduction listing supported model families and linking to the live models endpoint.
  - source_id: kimi_models_api_doc
    url: https://platform.kimi.com/docs/api/list-models
    retrieved_at: 2026-04-18
    note: Kimi API reference documenting `GET /v1/models` for live model discovery.
  - source_id: kimi_k2_5_quickstart
    url: https://platform.kimi.com/docs/guide/kimi-k2-5-quickstart
    retrieved_at: 2026-04-18
    note: Kimi K2.5 quickstart showing multimodal text generation with image and video inputs.
