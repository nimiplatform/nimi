sources:
  - source_id: luma_video_generation_doc
    url: https://docs.lumalabs.ai/docs/video-generation
    retrieved_at: 2026-04-18
    note: Luma video generation overview and model capability guide.
  - source_id: luma_create_generation_api_doc
    url: https://docs.lumalabs.ai/reference/creategeneration
    retrieved_at: 2026-04-18
    note: Luma create generation API reference showing the currently admitted model enum set.

models:
  - model_id: ray-2
    model_type: video
    updated_at: 2026-04-18
    capabilities: [video.generate]
    pricing:
      unit: request
      input: unknown
      output: unknown
      currency: USD
      as_of: 2026-04-18
      notes: Luma public docs currently expose model availability and API parameters, but not a stable public per-request price for ray-2.
    source_ids: [luma_video_generation_doc, luma_create_generation_api_doc]
    video_generation:
      modes: [t2v, i2v_first_frame, i2v_first_last]
      input_roles:
        t2v: [prompt]
        i2v_first_frame: [prompt, first_frame]
        i2v_first_last: [prompt, first_frame, last_frame]
      limits:
        resolution: [540p, 720p, 1080p, 4k]
        duration_sec: [5, 9]
        ratio: ["1:1", "16:9", "9:16", "4:3", "3:4", "21:9", "9:21"]
      options:
        supports: [resolution, ratio, duration_sec]
        constraints:
          keyframes_mapped_to_first_last_contract: true
      outputs:
        video_url: true

