schema_version: 3
provider: luma
catalog_version: 2026-04-18-luma-v2
generated_target: runtime/catalog/providers/luma.yaml
runtime:
  runtime_plane: remote
  managed_connector_supported: true
  inline_supported: true
  default_endpoint: null
  requires_explicit_endpoint: true
defaults:
  provider: luma
  model_type: video
  capabilities: []
  pricing:
    unit: request
    input: unknown
    output: unknown
    currency: USD
    as_of: 2026-04-18
