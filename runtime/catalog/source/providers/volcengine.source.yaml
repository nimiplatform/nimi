  - model_id: seedance-1-5-pro
    updated_at: 2026-03-05
    model_type: video
    aliases:
      - seedance-1.5-pro
      - seedance_v1_5_pro
    capabilities: [video.generate]
    source_ids: [volcengine_seedance_video_doc, volcengine_seedance_create_task_api, volcengine_seedance_query_task_api]
    video_generation:
      modes: [t2v, i2v_first_frame, i2v_first_last, i2v_reference]
      input_roles:
        t2v: [prompt]
        i2v_first_frame: [prompt, first_frame]
        i2v_first_last: [prompt, first_frame, last_frame]
        i2v_reference: [prompt, reference_image]
      limits:
        reference_images:
          min: 1
          max: 4
        seed:
          min: -1
          max: 4294967295
        duration_sec:
          min: 1
          max: 10
        fps:
          min: 1
          max: 60
        ratio: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", adaptive]
      options:
        supports:
          - resolution
          - ratio
          - duration_sec
          - frames
          - fps
          - seed
          - camera_fixed
          - watermark
          - generate_audio
          - draft
          - service_tier
          - execution_expires_after_sec
          - return_last_frame
        constraints:
          frames_overrides_duration: true
          camera_fixed_disallowed_in_i2v_reference: true
      outputs:
        video_url: true
        last_frame_url: true

  - model_id: doubao-seedance-2-0-260128
    model_type: video
    updated_at: 2026-04-03
    capabilities: [video.generate]
    source_ids: [volcengine_seedance_video_doc, volcengine_seedance_create_task_api]
    video_generation:
      modes: [t2v, i2v_first_frame, i2v_first_last, i2v_reference]
      input_roles:
        t2v: [prompt, reference_video, reference_audio]
        i2v_first_frame: [prompt, first_frame, reference_video, reference_audio]
        i2v_first_last: [prompt, first_frame, last_frame, reference_video, reference_audio]
        i2v_reference: [prompt, reference_image, reference_video, reference_audio]
      limits:
        reference_videos:
          min: 0
          max: 1
        reference_audios:
          min: 0
          max: 1
        duration_sec:
          min: 1
          max: 11
        ratio: ["16:9", "4:3", "1:1", "3:4", "9:16", "21:9", adaptive]
      options:
        supports:
          - resolution
          - ratio
          - duration_sec
          - seed
          - generate_audio
          - service_tier
          - execution_expires_after_sec
        constraints: {}
      outputs:
        video_url: true
    aliases:
      - seedance-2.0

