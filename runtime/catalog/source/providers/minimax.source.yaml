  - source_id: minimax_image_intro_doc
    url: https://platform.minimax.io/docs/api-reference/image-generation-intro
    retrieved_at: 2026-04-18
    note: MiniMax image generation overview with the current public image model list.
  - source_id: minimax_video_intro_doc
    url: https://platform.minimax.io/docs/api-reference/video-generation-intro
    retrieved_at: 2026-04-18
    note: MiniMax video generation overview with the current Hailuo video model family.
  - source_id: minimax_pricing_paygo
    url: https://platform.minimax.io/docs/guides/pricing-paygo
    retrieved_at: 2026-04-18
    note: MiniMax pay-as-you-go pricing for text, image, and video models.

selection_profiles:
  - profile_id: text.general
    capability: text.generate
    model_id: MiniMax-M2.7
    reviewed_at: 2026-04-18
    freshness_sla_days: 21
    rationale: MiniMax M2.7 is the current flagship text model in the official API docs.

models:
  - model_id: MiniMax-M2.7
    model_type: chat
    updated_at: 2026-04-18
    capabilities: [text.generate]
    pricing:
      unit: token
      input: 0.3
      output: 1.2
      currency: USD
      as_of: 2026-04-18
      notes: Official MiniMax pay-as-you-go pricing for the MiniMax-M2.7 text model.
    source_ids: [minimax_api_overview, minimax_text_openai_api, minimax_pricing_paygo]

  - model_id: MiniMax-Hailuo-2.3
    model_type: video
    updated_at: 2026-04-18
    capabilities: [video.generate]
    pricing:
      unit: request
      input: unknown
      output: unknown
      currency: USD
      as_of: 2026-04-18
      notes: Official pricing page exposes MiniMax-Hailuo-2.3-Fast prices clearly, but the non-fast MiniMax-Hailuo-2.3 row is not machine-readable enough to admit a precise stable price here.
    source_ids: [minimax_api_overview, minimax_video_intro_doc, minimax_pricing_paygo]
    video_generation:
      modes: [t2v, i2v_first_frame, i2v_first_last, i2v_reference]
      input_roles:
        t2v: [prompt]
        i2v_first_frame: [prompt, first_frame]
        i2v_first_last: [prompt, first_frame, last_frame]
        i2v_reference: [prompt, reference_image]
      limits:
        resolution: [720p, 1080p]
        duration_sec: [6, 10]
      options:
        supports: [resolution, ratio, duration_sec]
        constraints: {}
      outputs:
        video_url: true

  - model_id: image-01
    model_type: image
    updated_at: 2026-04-18
    capabilities: [image.generate]
    pricing:
      unit: request
      input: 0.0035
      output: "0"
      currency: USD
      as_of: 2026-04-18
      notes: Official MiniMax pay-as-you-go pricing for image-01.
    source_ids: [minimax_api_overview, minimax_image_intro_doc, minimax_pricing_paygo]
