schema_version: 3
provider: openai
catalog_version: 2026-03-05-openai-v1
generated_target: runtime/catalog/providers/openai.yaml
runtime:
  runtime_plane: remote
  managed_connector_supported: true
  inline_supported: true
  default_endpoint: https://api.openai.com/v1
  requires_explicit_endpoint: false
resolution_mode: model_anchor_v2
defaults:
