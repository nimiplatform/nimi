schema_version: 3
provider: xai
catalog_version: 2026-04-18-xai-v3
generated_target: runtime/catalog/providers/xai.yaml
runtime:
  runtime_plane: remote
  managed_connector_supported: true
  inline_supported: true
  default_endpoint: https://api.x.ai/v1
  requires_explicit_endpoint: false
  inventory_mode: dynamic_endpoint
  dynamic_inventory:
    discovery_transport: connector_list_models
    cache_ttl_sec: 300
    selection_mode: pass_through
    failure_policy: use_cache_then_fail_closed
    allowed_capabilities:
      - text.generate
      - text.generate.vision
      - image.generate
      - video.generate
      - audio.synthesize
      - audio.transcribe
defaults:
  provider: xai
  model_type: chat
  capabilities: []
  pricing:
    unit: token
    input: unknown
    output: unknown
    currency: USD
    as_of: 2026-04-18
    notes: xAI publishes live `GET /v1/models` and modality-specific model-list endpoints, so runtime inventory should be discovered dynamically instead of curated as static source rows.

sources:
