    url: https://docs.x.ai/docs/models
    retrieved_at: 2026-04-18
    note: xAI models and pricing overview linking to the current live catalog.
  - source_id: xai_models_api_doc
    url: https://docs.x.ai/developers/rest-api-reference/inference/models
