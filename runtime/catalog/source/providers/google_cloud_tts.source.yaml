language_profiles:
  short_multilingual_v1: [en, zh, de, it, pt, es, ja, ko, fr, ru]

voice_sets:
  - voice_set_id: chirp3-defaults-v1
    langs_ref: short_multilingual_v1
    source_ids: [google_tts_doc, google_chirp3_hd_doc, google_gemini_tts_doc]
    voices:
      - voice_id: en-US-Chirp3-HD-Charon
        name: Charon
        langs: [en-US]
      - voice_id: en-US-Chirp3-HD-Kore
        name: Kore
        langs: [en-US]
      - voice_id: ja-JP-Chirp3-HD-Leda
        name: Leda
        langs: [ja-JP]
      - voice_id: cmn-CN-Chirp3-HD-Orus
        name: Orus
        langs: [cmn-CN]

models:
  - model_id: chirp-3-hd
    updated_at: 2026-04-18
    source_ids: [google_tts_doc, google_chirp3_hd_doc, google_tts_release_notes, google_tts_pricing, google_tts_endpoints]
    pricing:
      unit: char
      input: "30.00"
      output: "0"
      currency: USD
      as_of: 2026-04-18
      notes: Chirp 3 HD voices are billed at $30 per 1M input characters after the free tier.
    voice:
      discovery_mode: static_catalog
      voice_set_ref: chirp3-defaults-v1
      supports_voice_ref_kinds: [preset_voice_id, provider_voice_ref]
      langs_ref: short_multilingual_v1
      request_options:
        timing_modes: [none]
        audio_formats: [mp3, ogg, wav, mulaw, alaw]
        supports_language: true
    aliases:
