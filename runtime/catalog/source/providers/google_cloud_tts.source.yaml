      output: "10.00"
      currency: USD
      as_of: 2026-04-18
      notes: Gemini 2.5 Flash TTS input text tokens at $0.50 and output audio tokens at $10.00 per 1M tokens.
    voice:
      discovery_mode: static_catalog
      voice_set_ref: chirp3-defaults-v1
      supports_voice_ref_kinds: [preset_voice_id, provider_voice_ref]
      langs_ref: short_multilingual_v1
      request_options:
        timing_modes: [none]
