schema_version: 3
provider: google_cloud_tts
catalog_version: 2026-03-05-google-cloud-tts-v1
generated_target: runtime/catalog/providers/google_cloud_tts.yaml
runtime:
  runtime_plane: remote
  managed_connector_supported: true
  inline_supported: true
  default_endpoint: null
  requires_explicit_endpoint: true
resolution_mode: model_anchor_v2
defaults:
  provider: google_cloud_tts
  model_type: tts
  capabilities: [audio.synthesize]
  pricing:
    unit: request
    input: unknown
    output: unknown
    currency: USD
    as_of: 2026-03-05
    notes: Google Cloud Text-to-Speech pricing varies by voice family and region.

sources:
  - source_id: google_tts_doc
    url: https://cloud.google.com/text-to-speech/docs
    retrieved_at: 2026-03-05
    note: Google Cloud Text-to-Speech documentation.
  - source_id: google_instant_custom_voice_doc
    url: https://cloud.google.com/text-to-speech/docs/chirp3-instant-custom-voice
    retrieved_at: 2026-03-05
    note: Instant Custom Voice is tracked as deferred provider extension in this phase.

language_profiles:
  short_multilingual_v1: [en, zh, de, it, pt, es, ja, ko, fr, ru]

voice_sets:
  - voice_set_id: chirp3-defaults-v1
    langs_ref: short_multilingual_v1
    source_ids: [google_tts_doc]
    voices:
      - voice_id: en-US-Chirp3-HD-Charon
        name: Charon
        langs: [en-US]
      - voice_id: en-US-Chirp3-HD-Kore
        name: Kore
        langs: [en-US]
      - voice_id: ja-JP-Chirp3-HD-Leda
        name: Leda
        langs: [ja-JP]
      - voice_id: cmn-CN-Chirp3-HD-Orus
        name: Orus
        langs: [cmn-CN]

models:
  - model_id: chirp-3-hd
    updated_at: 2026-03-05
    source_ids: [google_tts_doc]
    voice:
      discovery_mode: static_catalog
      voice_set_ref: chirp3-defaults-v1
      supports_voice_ref_kinds: [preset_voice_id, provider_voice_ref]
      langs_ref: short_multilingual_v1

overrides:
  models: []
  voices: []
  voice_workflow_models: []
