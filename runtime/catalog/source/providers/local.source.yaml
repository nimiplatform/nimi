# NOTE: local workflow objects below are not a generic local workflow green
# state. They express only the first admitted family-scoped slice:
# qwen3_tts -> explicit local Qwen3 target roles.
voice_workflow_models:
  - workflow_model_id: qwen3-local-voice-clone
    workflow_type: tts_v2v
    input_contract_ref: local_tts_v2v_input_v1
    output_persistence: session_ephemeral
    request_options:
      text_prompt_mode: optional
      supports_language_hints: false
      supports_preferred_name: true
      reference_audio_uri_input: true
      reference_audio_bytes_input: true
      allowed_reference_audio_mime_types: [audio/wav, audio/mpeg, audio/ogg, audio/flac, audio/mp4, audio/m4a]
    target_model_refs:
      - qwen3-tts-base-local
      - local/qwen3-tts-base
      - speech/qwen3tts-base
      - Qwen/Qwen3-TTS-12Hz-0.6B-Base
    langs_ref: short_v1
    source_ids: [qwen3_tts_base_modelcard]
  - workflow_model_id: qwen3-local-voice-design
    workflow_type: tts_t2v
    input_contract_ref: local_tts_t2v_input_v1
    output_persistence: session_ephemeral
    request_options:
      instruction_text_mode: required
      preview_text_mode: optional
      supports_language: false
      supports_preferred_name: true
    target_model_refs:
      - qwen3-tts-voicedesign-local
      - local/qwen3-tts-voicedesign
      - speech/qwen3tts-design
      - Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign
    langs_ref: short_v1
    source_ids: [qwen3_tts_voicedesign_modelcard]

model_workflow_bindings:
  - model_id: qwen3-tts-local
    workflow_model_refs: [qwen3-local-voice-clone, qwen3-local-voice-design]
