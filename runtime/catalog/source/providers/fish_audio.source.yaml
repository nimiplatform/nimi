models:
  - model_id: s2-pro
    updated_at: 2026-04-18
    pricing:
      unit: request
      input: unknown
      output: unknown
      currency: USD
      as_of: 2026-04-18
      notes: Fish Audio publishes `$15.00 / 1M UTF-8 bytes` for `s2-pro`, but the catalog pricing contract cannot encode byte-metered billing exactly.
    source_ids: [fish_audio_api_doc, fish_audio_models_overview_doc, fish_audio_choosing_model_doc, fish_audio_pricing_doc, fish_audio_changelog_doc]
    voice:
      discovery_mode: static_catalog
      voice_set_ref: default-voices-v1
      supports_voice_ref_kinds: [preset_voice_id, provider_voice_ref, voice_asset_id]
      langs_ref: short_multilingual_v1
      request_options:
        timing_modes: [none]
        audio_formats: [wav, pcm, mp3, opus]
        supports_language: false

  - model_id: s1
    updated_at: 2026-04-18
    pricing:
      unit: request
      input: unknown
      output: unknown
      currency: USD
      as_of: 2026-04-18
      notes: Fish Audio publishes `$15.00 / 1M UTF-8 bytes` for `s1`, but the catalog pricing contract cannot encode byte-metered billing exactly.
    source_ids: [fish_audio_quickstart_doc, fish_audio_api_doc, fish_audio_models_overview_doc, fish_audio_pricing_doc, fish_audio_deprecations_doc]
    voice:
      discovery_mode: static_catalog
      voice_set_ref: default-voices-v1
      supports_voice_ref_kinds: [preset_voice_id, provider_voice_ref, voice_asset_id]
      langs_ref: fish_audio_s1_languages_v1
      request_options:
        timing_modes: [none]
        audio_formats: [wav, pcm, mp3, opus]
        supports_language: false

voice_workflow_models:
  - workflow_model_id: fish-audio-create-model
    workflow_type: tts_v2v
    input_contract_ref: fish_audio_tts_v2v_input_v1
    output_persistence: provider_persistent
    request_options:
      text_prompt_mode: unsupported
      supports_language_hints: false
      supports_preferred_name: true
      reference_audio_uri_input: true
      reference_audio_bytes_input: true
      allowed_reference_audio_mime_types: [audio/wav, audio/mpeg, audio/ogg, audio/flac, audio/mp4, audio/m4a]
    target_model_refs: [s1, s2-pro]
    langs_ref: short_multilingual_v1
    source_ids: [fish_audio_create_model_doc, fish_audio_quickstart_doc]

model_workflow_bindings:
  - model_id: s1
    workflow_model_refs: [fish-audio-create-model]
    workflow_types: [tts_v2v]
  - model_id: s2-pro
    workflow_model_refs: [fish-audio-create-model]
    workflow_types: [tts_v2v]

voice_handle_policies:
  - policy_id: fish_audio_provider_persistent_default
    applies_to_workflow_types: [tts_v2v]
    persistence: provider_persistent
    default_ttl: none
    scope: user_scoped
    delete_semantics: best_effort_provider_delete
    runtime_reconciliation_required: true
    source_ids: [fish_audio_create_model_doc, fish_audio_delete_model_doc]

overrides:
  models: []
  voices: []
  voice_workflow_models: []
