schema_version: 3
provider: fish_audio
catalog_version: 2026-04-18-fish-audio-v3
generated_target: runtime/catalog/providers/fish_audio.yaml
runtime:
  runtime_plane: remote
  managed_connector_supported: true
  inline_supported: true
  default_endpoint: https://api.fish.audio
  requires_explicit_endpoint: false
resolution_mode: model_anchor_v2
defaults:
  provider: fish_audio
  model_type: tts
  capabilities: [audio.synthesize]
  pricing:
    unit: request
    input: unknown
    output: unknown
    currency: USD
    as_of: 2026-04-18
    notes: Fish Audio now publishes stable TTS pricing at $15.00 per 1M UTF-8 bytes for both `s1` and `s2-pro`, but the catalog pricing contract only normalizes token|char|second|request units, so byte-accurate pricing remains descriptive rather than numerically encoded here.

