schema_version: 3
provider: groq
catalog_version: 2026-04-18-groq-v4
generated_target: runtime/catalog/providers/groq.yaml
runtime:
  runtime_plane: remote
  managed_connector_supported: true
  inline_supported: true
  default_endpoint: https://api.groq.com/openai/v1
  requires_explicit_endpoint: false
  inventory_mode: dynamic_endpoint
  dynamic_inventory:
    discovery_transport: connector_list_models
    cache_ttl_sec: 300
    selection_mode: pass_through
    failure_policy: use_cache_then_fail_closed
    allowed_capabilities:
      - text.generate
      - text.generate.vision
      - audio.transcribe
      - audio.synthesize
defaults:
  provider: groq
  model_type: chat
  capabilities: []
  pricing:
    unit: token
    input: unknown
    output: unknown
    currency: USD
    as_of: 2026-04-18
    notes: Groq publishes an active models catalog and a Models API endpoint for enumerating currently available models, so runtime inventory should be discovered dynamically instead of curated as static source rows.

sources:
  - source_id: groq_models_doc
    url: https://console.groq.com/docs/models
    retrieved_at: 2026-04-18
    note: Groq official model catalog documenting production models, preview models, systems, pricing, and the Models API enumeration endpoint.
