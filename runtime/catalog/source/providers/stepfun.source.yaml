schema_version: 3
provider: stepfun
catalog_version: 2026-04-18-stepfun-multifamily-v4
generated_target: runtime/catalog/providers/stepfun.yaml
runtime:
  runtime_plane: remote
  managed_connector_supported: true
  inline_supported: true
  default_endpoint: https://api.stepfun.ai/v1
  requires_explicit_endpoint: false
resolution_mode: model_anchor_v2
defaults:
  provider: stepfun
  default_text_model: step-3.5-flash
  model_type: chat
  capabilities: []
  pricing:
    unit: token
    input: unknown
    output: unknown
    currency: USD
    as_of: 2026-04-18
    notes: StepFun pricing is published per family; current public rates are explicit for reasoning and speech, while other admitted rows remain usage-described without row-level public pricing.

