voice_workflow_models:
  - workflow_model_id: stepfun-voice-clone
    workflow_type: tts_v2v
    input_contract_ref: stepfun_tts_v2v_input_v2
    output_persistence: provider_persistent
    request_options:
      text_prompt_mode: required
      supports_language_hints: false
      supports_preferred_name: false
      reference_audio_uri_input: true
      reference_audio_bytes_input: true
      allowed_reference_audio_mime_types: [audio/wav, audio/mpeg]
    target_model_refs:
      - step-tts-2
    langs_ref: tts_langs_v1
    source_ids: [stepfun_voice_clone_doc, stepfun_file_upload_doc]

model_workflow_bindings:
  - model_id: step-tts-2
    workflow_model_refs: [stepfun-voice-clone]
    workflow_types: [tts_v2v]

voice_handle_policies:
  - policy_id: stepfun_provider_persistent_default
    applies_to_workflow_types: [tts_v2v]
    persistence: provider_persistent
    default_ttl: none
    scope: user_scoped
    delete_semantics: best_effort_provider_delete
    runtime_reconciliation_required: true
    source_ids: [stepfun_voice_clone_doc]

overrides:
  models: []
  voices: []
  voice_workflow_models: []
