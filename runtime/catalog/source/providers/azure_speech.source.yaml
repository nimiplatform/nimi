language_profiles:
  short_multilingual_v1: [en, zh, de, it, pt, es, ja, ko, fr, ru]

voice_sets:
  - voice_set_id: neural-defaults-v1
    langs_ref: short_multilingual_v1
    source_ids: [azure_tts_doc, azure_speech_language_support]
    voices:
      - voice_id: en-US-JennyNeural
        name: Jenny
        langs: [en-US]
      - voice_id: en-US-GuyNeural
        name: Guy
        langs: [en-US]
      - voice_id: zh-CN-XiaoxiaoNeural
        name: Xiaoxiao
        langs: [zh-CN]
      - voice_id: ja-JP-NanamiNeural
        name: Nanami
        langs: [ja-JP]

  - voice_set_id: hd-defaults-v1
    langs_ref: short_multilingual_v1
    source_ids: [azure_speech_hd_doc, azure_speech_language_support, azure_speech_release_notes]
    voices:
      - voice_id: en-US-Ava:DragonHDLatestNeural
        name: Ava DragonHD
        langs: [en-US]
      - voice_id: en-US-Jenny:DragonHDLatestNeural
        name: Jenny DragonHD
        langs: [en-US]
      - voice_id: ja-JP-Nanami:DragonHDLatestNeural
        name: Nanami DragonHD
        langs: [ja-JP]
      - voice_id: zh-CN-Xiaochen:DragonHDLatestNeural
        name: Xiaochen DragonHD
        langs: [zh-CN]
      - voice_id: en-us-ava:DragonHDOmniLatestNeural
        name: Ava DragonHDOmni
        langs: [en-US]

  - voice_set_id: openai-defaults-preview-v1
    langs_ref: short_multilingual_v1
    source_ids: [azure_speech_openai_voices_doc, azure_speech_language_support]
    voices:
      - voice_id: en-US-AlloyMultilingualNeural
        name: Alloy
        langs: [en-US]
      - voice_id: en-US-NovaMultilingualNeural
        name: Nova
        langs: [en-US]
      - voice_id: en-US-AlloyMultilingualNeuralHD
        name: Alloy HD
        langs: [en-US]
      - voice_id: en-US-NovaMultilingualNeuralHD
        name: Nova HD
        langs: [en-US]

models:
  - model_id: azure-neural-tts
    updated_at: 2026-04-18
    source_ids: [azure_tts_doc, azure_speech_language_support, azure_speech_pricing]
    pricing:
      unit: char
      input: unknown
      output: "0"
      currency: USD
      as_of: 2026-04-18
      notes: Azure Speech standard neural voices are billed per character; public price depends on region and plan.
    voice:
      discovery_mode: static_catalog
      voice_set_ref: neural-defaults-v1
      supports_voice_ref_kinds: [preset_voice_id, provider_voice_ref]
      langs_ref: short_multilingual_v1
      request_options:
        timing_modes: [none]
        audio_formats: [mp3, ogg, wav, pcm]
        supports_language: true

  - model_id: azure-hd-tts
    updated_at: 2026-04-18
