syntax = "proto3";

package nimi.runtime.v1;

option go_package = "github.com/nimiplatform/nimi/runtime/gen/runtime/v1;runtimev1";

import "google/protobuf/struct.proto";
import "runtime/v1/common.proto";
import "runtime/v1/local_runtime_engine.proto";
import "runtime/v1/local_runtime_types.proto";

message ListLocalModelsRequest {
  LocalModelStatus status_filter = 1;
  string engine_filter = 2;
  string category_filter = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListLocalModelsResponse {
  repeated LocalModelRecord models = 1;
  string next_page_token = 2;
}

message ListLocalArtifactsRequest {
  LocalArtifactStatus status_filter = 1;
  LocalArtifactKind kind_filter = 2;
  string engine_filter = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListLocalArtifactsResponse {
  repeated LocalArtifactRecord artifacts = 1;
  string next_page_token = 2;
}

message ListVerifiedModelsRequest {
  string category_filter = 1;
  string engine_filter = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListVerifiedModelsResponse {
  repeated LocalVerifiedModelDescriptor models = 1;
  string next_page_token = 2;
}

message ListVerifiedArtifactsRequest {
  LocalArtifactKind kind_filter = 1;
  string engine_filter = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListVerifiedArtifactsResponse {
  repeated LocalVerifiedArtifactDescriptor artifacts = 1;
  string next_page_token = 2;
}

message SearchCatalogModelsRequest {
  string query = 1;
  string capability = 2;
  reserved 3;
  reserved "limit";
  string category_filter = 4;
  string engine_filter = 5;
  int32 page_size = 6;
  string page_token = 7;
}

message SearchCatalogModelsResponse {
  repeated LocalCatalogModelDescriptor items = 1;
  string next_page_token = 2;
}

message ResolveModelInstallPlanRequest {
  string item_id = 1;
  string source = 2;
  string template_id = 3;
  string model_id = 4;
  string repo = 5;
  string revision = 6;
  repeated string capabilities = 7;
  string engine = 8;
  string entry = 9;
  repeated string files = 10;
  string license = 11;
  map<string, string> hashes = 12;
  string endpoint = 13;
  google.protobuf.Struct engine_config = 14;
}

message ResolveModelInstallPlanResponse {
  LocalInstallPlanDescriptor plan = 1;
}

message InstallLocalModelRequest {
  string model_id = 1;
  string repo = 2;
  string revision = 3;
  repeated string capabilities = 4;
  string engine = 5;
  string entry = 6;
  repeated string files = 7;
  string license = 8;
  map<string, string> hashes = 9;
  string endpoint = 10;
  google.protobuf.Struct engine_config = 11;
}

message InstallLocalModelResponse {
  LocalModelRecord model = 1;
}

message InstallVerifiedModelRequest {
  string template_id = 1;
  string endpoint = 2;
}

message InstallVerifiedModelResponse {
  LocalModelRecord model = 1;
}

message InstallVerifiedArtifactRequest {
  string template_id = 1;
}

message InstallVerifiedArtifactResponse {
  LocalArtifactRecord artifact = 1;
}

message ImportLocalModelRequest {
  string manifest_path = 1;
  string endpoint = 2;
  google.protobuf.Struct engine_config = 3;
}

message ImportLocalModelResponse {
  LocalModelRecord model = 1;
}

message ImportLocalArtifactRequest {
  string manifest_path = 1;
}

message ImportLocalArtifactResponse {
  LocalArtifactRecord artifact = 1;
}

message ImportLocalModelFileRequest {
  string file_path = 1;
  string model_name = 2;
  repeated string capabilities = 3;
  string engine = 4;
  string endpoint = 5;
}

message ImportLocalModelFileResponse {
  LocalModelRecord model = 1;
}

message ImportLocalArtifactFileRequest {
  string file_path = 1;
  LocalArtifactKind kind = 2;
  string engine = 3;
}

message ImportLocalArtifactFileResponse {
  LocalArtifactRecord artifact = 1;
}

message LocalUnregisteredAssetDeclaration {
  string asset_class = 1;
  string model_type = 2;
  LocalArtifactKind artifact_kind = 3;
  string engine = 4;
}

message LocalUnregisteredAssetDescriptor {
  string filename = 1;
  string path = 2;
  int64 size_bytes = 3;
  LocalUnregisteredAssetDeclaration declaration = 4;
  string suggestion_source = 5;
  string confidence = 6;
  bool auto_importable = 7;
  bool requires_manual_review = 8;
  string folder_name = 9;
}

message ScanUnregisteredAssetsRequest {}

message ScanUnregisteredAssetsResponse {
  repeated LocalUnregisteredAssetDescriptor items = 1;
}

message ScaffoldOrphanModelRequest {
  string path = 1;
  repeated string capabilities = 2;
  string engine = 3;
  string endpoint = 4;
}

message ScaffoldOrphanModelResponse {
  LocalModelRecord model = 1;
}

message ScaffoldOrphanArtifactRequest {
  string path = 1;
  LocalArtifactKind kind = 2;
  string engine = 3;
}

message ScaffoldOrphanArtifactResponse {
  LocalArtifactRecord artifact = 1;
}

message LocalTransferSessionSummary {
  string install_session_id = 1;
  string model_id = 2;
  string local_model_id = 3;
  string artifact_id = 4;
  string local_artifact_id = 5;
  string session_kind = 6;
  string phase = 7;
  string state = 8;
  int64 bytes_received = 9;
  int64 bytes_total = 10;
  int64 speed_bytes_per_sec = 11;
  int64 eta_seconds = 12;
  string message = 13;
  string reason_code = 14;
  bool retryable = 15;
  string created_at = 16;
  string updated_at = 17;
}

message LocalTransferProgressEvent {
  string install_session_id = 1;
  string model_id = 2;
  string local_model_id = 3;
  string artifact_id = 4;
  string local_artifact_id = 5;
  string session_kind = 6;
  string phase = 7;
  int64 bytes_received = 8;
  int64 bytes_total = 9;
  int64 speed_bytes_per_sec = 10;
  int64 eta_seconds = 11;
  string message = 12;
  string state = 13;
  string reason_code = 14;
  bool retryable = 15;
  bool done = 16;
  bool success = 17;
  string created_at = 18;
  string updated_at = 19;
}

message ListLocalTransfersRequest {}

message ListLocalTransfersResponse {
  repeated LocalTransferSessionSummary transfers = 1;
}

message PauseLocalTransferRequest {
  string install_session_id = 1;
}

message PauseLocalTransferResponse {
  LocalTransferSessionSummary transfer = 1;
}

message ResumeLocalTransferRequest {
  string install_session_id = 1;
}

message ResumeLocalTransferResponse {
  LocalTransferSessionSummary transfer = 1;
}

message CancelLocalTransferRequest {
  string install_session_id = 1;
}

message CancelLocalTransferResponse {
  LocalTransferSessionSummary transfer = 1;
}

message WatchLocalTransfersRequest {}

message RemoveLocalModelRequest {
  string local_model_id = 1;
}

message RemoveLocalModelResponse {
  LocalModelRecord model = 1;
}

message RemoveLocalArtifactRequest {
  string local_artifact_id = 1;
}

message RemoveLocalArtifactResponse {
  LocalArtifactRecord artifact = 1;
}

message StartLocalModelRequest {
  string local_model_id = 1;
}

message StartLocalModelResponse {
  LocalModelRecord model = 1;
}

message StopLocalModelRequest {
  string local_model_id = 1;
}

message StopLocalModelResponse {
  LocalModelRecord model = 1;
}

message CheckLocalModelHealthRequest {
  string local_model_id = 1;
}

message CheckLocalModelHealthResponse {
  repeated LocalModelHealth models = 1;
}

message CollectDeviceProfileRequest {
  repeated int32 extra_ports = 1;
}

message CollectDeviceProfileResponse {
  LocalDeviceProfile profile = 1;
}

message ResolveProfileRequest {
  string mod_id = 1;
  LocalProfileDescriptor profile = 2;
  string capability = 3;
  LocalDeviceProfile device_profile = 4;
}

message ResolveProfileResponse {
  LocalProfileResolutionPlan plan = 1;
}

message ApplyProfileRequest {
  LocalProfileResolutionPlan plan = 1;
}

message ApplyProfileResponse {
  LocalProfileApplyResult result = 1;
}

message ListLocalServicesRequest {
  LocalServiceStatus status_filter = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListLocalServicesResponse {
  repeated LocalServiceDescriptor services = 1;
  string next_page_token = 2;
}

message InstallLocalServiceRequest {
  string service_id = 1;
  string title = 2;
  string engine = 3;
  string endpoint = 4;
  repeated string capabilities = 5;
  string local_model_id = 6;
}

message InstallLocalServiceResponse {
  LocalServiceDescriptor service = 1;
}

message StartLocalServiceRequest {
  string service_id = 1;
}

message StartLocalServiceResponse {
  LocalServiceDescriptor service = 1;
}

message StopLocalServiceRequest {
  string service_id = 1;
}

message StopLocalServiceResponse {
  LocalServiceDescriptor service = 1;
}

message CheckLocalServiceHealthRequest {
  string service_id = 1;
}

message CheckLocalServiceHealthResponse {
  repeated LocalServiceDescriptor services = 1;
}

message RemoveLocalServiceRequest {
  string service_id = 1;
}

message RemoveLocalServiceResponse {
  LocalServiceDescriptor service = 1;
}

message ListNodeCatalogRequest {
  string capability = 1;
  string service_id = 2;
  string provider = 3;
  string type_filter = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListNodeCatalogResponse {
  repeated LocalNodeDescriptor nodes = 1;
  string next_page_token = 2;
}

message ListLocalAuditsRequest {
  reserved 1;
  reserved "limit";
  string event_type = 2;
  repeated string event_types = 3;
  string source = 4;
  string modality = 5;
  string local_model_id = 6;
  string mod_id = 7;
  string reason_code = 8;
  LocalAuditTimeRange time_range = 9;
  int32 page_size = 10;
  string page_token = 11;
  string app_id = 12;
  string subject_user_id = 13;
}

message ListLocalAuditsResponse {
  repeated LocalAuditEvent events = 1;
  string next_page_token = 2;
}

message AppendInferenceAuditRequest {
  string event_type = 1;
  string mod_id = 2;
  string source = 3;
  string provider = 4;
  string modality = 5;
  string adapter = 6;
  string model = 7;
  string local_model_id = 8;
  string endpoint = 9;
  string reason_code = 10;
  string detail = 11;
  google.protobuf.Struct policy_gate = 12;
  google.protobuf.Struct extra = 13;
}

message AppendRuntimeAuditRequest {
  string event_type = 1;
  string model_id = 2;
  string local_model_id = 3;
  google.protobuf.Struct payload = 4;
}

message WarmLocalModelRequest {
  string local_model_id = 1;
  int32 timeout_ms = 2;
}

message WarmLocalModelResponse {
  string local_model_id = 1;
  string model_id = 2;
  string model_resolved = 3;
  string endpoint = 4;
  string engine = 5;
  bool already_warm = 6;
  int64 latency_ms = 7;
  string trace_id = 8;
}

service RuntimeLocalService {
  rpc ListLocalModels(ListLocalModelsRequest) returns (ListLocalModelsResponse);
  rpc ListLocalArtifacts(ListLocalArtifactsRequest) returns (ListLocalArtifactsResponse);
  rpc ListVerifiedModels(ListVerifiedModelsRequest) returns (ListVerifiedModelsResponse);
  rpc ListVerifiedArtifacts(ListVerifiedArtifactsRequest) returns (ListVerifiedArtifactsResponse);
  rpc SearchCatalogModels(SearchCatalogModelsRequest) returns (SearchCatalogModelsResponse);
  rpc ResolveModelInstallPlan(ResolveModelInstallPlanRequest) returns (ResolveModelInstallPlanResponse);
  rpc InstallLocalModel(InstallLocalModelRequest) returns (InstallLocalModelResponse);
  rpc InstallVerifiedModel(InstallVerifiedModelRequest) returns (InstallVerifiedModelResponse);
  rpc InstallVerifiedArtifact(InstallVerifiedArtifactRequest) returns (InstallVerifiedArtifactResponse);
  rpc ImportLocalModel(ImportLocalModelRequest) returns (ImportLocalModelResponse);
  rpc ImportLocalArtifact(ImportLocalArtifactRequest) returns (ImportLocalArtifactResponse);
  rpc ImportLocalModelFile(ImportLocalModelFileRequest) returns (ImportLocalModelFileResponse);
  rpc ImportLocalArtifactFile(ImportLocalArtifactFileRequest) returns (ImportLocalArtifactFileResponse);
  rpc ScanUnregisteredAssets(ScanUnregisteredAssetsRequest) returns (ScanUnregisteredAssetsResponse);
  rpc ScaffoldOrphanModel(ScaffoldOrphanModelRequest) returns (ScaffoldOrphanModelResponse);
  rpc ScaffoldOrphanArtifact(ScaffoldOrphanArtifactRequest) returns (ScaffoldOrphanArtifactResponse);
  rpc ListLocalTransfers(ListLocalTransfersRequest) returns (ListLocalTransfersResponse);
  rpc PauseLocalTransfer(PauseLocalTransferRequest) returns (PauseLocalTransferResponse);
  rpc ResumeLocalTransfer(ResumeLocalTransferRequest) returns (ResumeLocalTransferResponse);
  rpc CancelLocalTransfer(CancelLocalTransferRequest) returns (CancelLocalTransferResponse);
  rpc WatchLocalTransfers(WatchLocalTransfersRequest) returns (stream LocalTransferProgressEvent);
  rpc RemoveLocalModel(RemoveLocalModelRequest) returns (RemoveLocalModelResponse);
  rpc RemoveLocalArtifact(RemoveLocalArtifactRequest) returns (RemoveLocalArtifactResponse);
  rpc StartLocalModel(StartLocalModelRequest) returns (StartLocalModelResponse);
  rpc StopLocalModel(StopLocalModelRequest) returns (StopLocalModelResponse);
  rpc CheckLocalModelHealth(CheckLocalModelHealthRequest) returns (CheckLocalModelHealthResponse);
  rpc WarmLocalModel(WarmLocalModelRequest) returns (WarmLocalModelResponse);
  rpc CollectDeviceProfile(CollectDeviceProfileRequest) returns (CollectDeviceProfileResponse);
  rpc ResolveProfile(ResolveProfileRequest) returns (ResolveProfileResponse);
  rpc ApplyProfile(ApplyProfileRequest) returns (ApplyProfileResponse);
  rpc ListLocalServices(ListLocalServicesRequest) returns (ListLocalServicesResponse);
  rpc InstallLocalService(InstallLocalServiceRequest) returns (InstallLocalServiceResponse);
  rpc StartLocalService(StartLocalServiceRequest) returns (StartLocalServiceResponse);
  rpc StopLocalService(StopLocalServiceRequest) returns (StopLocalServiceResponse);
  rpc CheckLocalServiceHealth(CheckLocalServiceHealthRequest) returns (CheckLocalServiceHealthResponse);
  rpc RemoveLocalService(RemoveLocalServiceRequest) returns (RemoveLocalServiceResponse);
  rpc ListNodeCatalog(ListNodeCatalogRequest) returns (ListNodeCatalogResponse);
  rpc ListLocalAudits(ListLocalAuditsRequest) returns (ListLocalAuditsResponse);
  rpc AppendInferenceAudit(AppendInferenceAuditRequest) returns (Ack);
  rpc AppendRuntimeAudit(AppendRuntimeAuditRequest) returns (Ack);

  // Engine management RPCs (K-LENG-004: SUPERVISED mode)
  rpc ListEngines(ListEnginesRequest) returns (ListEnginesResponse);
  rpc EnsureEngine(EnsureEngineRequest) returns (EnsureEngineResponse);
  rpc StartEngine(StartEngineRequest) returns (StartEngineResponse);
  rpc StopEngine(StopEngineRequest) returns (StopEngineResponse);
  rpc GetEngineStatus(GetEngineStatusRequest) returns (GetEngineStatusResponse);
}
