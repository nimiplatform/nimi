syntax = "proto3";

package nimi.runtime.v1;

option go_package = "github.com/nimiplatform/nimi/runtime/gen/runtime/v1;runtimev1";

import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "runtime/v1/common.proto";
import "runtime/v1/memory.proto";

enum AgentLifecycleStatus {
  AGENT_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  AGENT_LIFECYCLE_STATUS_INITIALIZING = 1;
  AGENT_LIFECYCLE_STATUS_ACTIVE = 2;
  AGENT_LIFECYCLE_STATUS_SUSPENDED = 3;
  AGENT_LIFECYCLE_STATUS_TERMINATING = 4;
  AGENT_LIFECYCLE_STATUS_TERMINATED = 5;
}

enum AgentExecutionState {
  AGENT_EXECUTION_STATE_UNSPECIFIED = 0;
  AGENT_EXECUTION_STATE_IDLE = 1;
  AGENT_EXECUTION_STATE_CHAT_ACTIVE = 2;
  AGENT_EXECUTION_STATE_LIFE_PENDING = 3;
  AGENT_EXECUTION_STATE_LIFE_RUNNING = 4;
  AGENT_EXECUTION_STATE_SUSPENDED = 5;
}

enum AgentTrackType {
  AGENT_TRACK_TYPE_UNSPECIFIED = 0;
  AGENT_TRACK_TYPE_CHAT = 1;
  AGENT_TRACK_TYPE_LIFE = 2;
}

// K-AGCORE-041 HookIntent trigger family is limited to `time` and `event`.
// Non-admitted trigger families (turn_completed, scheduled_time absolute,
// state_condition, world_event, compound) are not part of the mounted
// vocabulary and must not be reintroduced by implementation rename.
enum HookTriggerFamily {
  HOOK_TRIGGER_FAMILY_UNSPECIFIED = 0;
  HOOK_TRIGGER_FAMILY_TIME = 1;
  HOOK_TRIGGER_FAMILY_EVENT = 2;
}

// K-AGCORE-041 admitted effect is limited to `follow-up-turn`. Widening
// beyond this matrix requires a later dedicated runtime rule.
enum HookEffect {
  HOOK_EFFECT_UNSPECIFIED = 0;
  HOOK_EFFECT_FOLLOW_UP_TURN = 1;
}

// K-AGCORE-041 admission states that must remain reconstructable through
// committed runtime truth.
enum HookAdmissionState {
  HOOK_ADMISSION_STATE_UNSPECIFIED = 0;
  HOOK_ADMISSION_STATE_PROPOSED = 1;
  HOOK_ADMISSION_STATE_PENDING = 2;
  HOOK_ADMISSION_STATE_REJECTED = 3;
  HOOK_ADMISSION_STATE_RUNNING = 4;
  HOOK_ADMISSION_STATE_COMPLETED = 5;
  HOOK_ADMISSION_STATE_FAILED = 6;
  HOOK_ADMISSION_STATE_CANCELED = 7;
  HOOK_ADMISSION_STATE_RESCHEDULED = 8;
}

enum AgentEventType {
  AGENT_EVENT_TYPE_UNSPECIFIED = 0;
  AGENT_EVENT_TYPE_LIFECYCLE = 1;
  AGENT_EVENT_TYPE_HOOK = 2;
  AGENT_EVENT_TYPE_MEMORY = 3;
  AGENT_EVENT_TYPE_BUDGET = 4;
  AGENT_EVENT_TYPE_REPLICATION = 5;
  AGENT_EVENT_TYPE_STATE = 6;
  AGENT_EVENT_TYPE_PRESENTATION = 7;
}

// K-AGCORE-037 AgentStateEventFamily discriminates runtime.agent.state.* event
// families. Mapping is 1:1 to the mounted public family names
// (runtime.agent.state.{status_text_changed|execution_state_changed|
// emotion_changed|posture_changed}). Consumers MUST dispatch on `family`;
// reading payload fields alone is not a substitute for the discriminator.
enum AgentStateEventFamily {
  AGENT_STATE_EVENT_FAMILY_UNSPECIFIED = 0;
  AGENT_STATE_EVENT_FAMILY_STATUS_TEXT_CHANGED = 1;
  AGENT_STATE_EVENT_FAMILY_EXECUTION_STATE_CHANGED = 2;
  AGENT_STATE_EVENT_FAMILY_EMOTION_CHANGED = 3;
  AGENT_STATE_EVENT_FAMILY_POSTURE_CHANGED = 4;
}

// K-AGCORE-037 AgentPresentationEventFamily discriminates
// runtime.agent.presentation.* families. Mapping is 1:1 to
// runtime.agent.presentation.{activity_requested|motion_requested|
// expression_requested|pose_requested|pose_cleared|lookat_requested}.
enum AgentPresentationEventFamily {
  AGENT_PRESENTATION_EVENT_FAMILY_UNSPECIFIED = 0;
  AGENT_PRESENTATION_EVENT_FAMILY_ACTIVITY_REQUESTED = 1;
  AGENT_PRESENTATION_EVENT_FAMILY_MOTION_REQUESTED = 2;
  AGENT_PRESENTATION_EVENT_FAMILY_EXPRESSION_REQUESTED = 3;
  AGENT_PRESENTATION_EVENT_FAMILY_POSE_REQUESTED = 4;
  AGENT_PRESENTATION_EVENT_FAMILY_POSE_CLEARED = 5;
  AGENT_PRESENTATION_EVENT_FAMILY_LOOKAT_REQUESTED = 6;
}

enum AgentAutonomyMode {
  AGENT_AUTONOMY_MODE_UNSPECIFIED = 0;
  AGENT_AUTONOMY_MODE_OFF = 1;
  AGENT_AUTONOMY_MODE_LOW = 2;
  AGENT_AUTONOMY_MODE_MEDIUM = 3;
  AGENT_AUTONOMY_MODE_HIGH = 4;
}

enum ConversationAnchorStatus {
  CONVERSATION_ANCHOR_STATUS_UNSPECIFIED = 0;
  CONVERSATION_ANCHOR_STATUS_ACTIVE = 1;
  CONVERSATION_ANCHOR_STATUS_CLOSED = 2;
}


message AgentRequestContext {
  string app_id = 1;
  string subject_user_id = 2;
}

message AgentAutonomyConfig {
  int64 daily_token_budget = 1;
  int64 max_tokens_per_hook = 2;
  google.protobuf.Duration min_hook_interval = 3;
  google.protobuf.Timestamp suspend_until = 4;
  AgentAutonomyMode mode = 5;
  google.protobuf.Struct extensions = 10;
}

message AgentAutonomyState {
  bool enabled = 1;
  AgentAutonomyConfig config = 2;
  int64 used_tokens_in_window = 3;
  google.protobuf.Timestamp window_started_at = 4;
  bool budget_exhausted = 5;
  google.protobuf.Timestamp suspended_until = 6;
}

message AgentRecord {
  string agent_id = 1;
  string display_name = 2;
  AgentLifecycleStatus lifecycle_status = 3;
  AgentAutonomyState autonomy = 4;
  google.protobuf.Struct metadata = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message AgentStateProjection {
  AgentExecutionState execution_state = 1;
  string status_text = 2;
  string active_world_id = 3;
  string active_user_id = 4;
  map<string, string> attributes = 5;
  google.protobuf.Timestamp updated_at = 6;
  // K-AGCORE-038: current_emotion is durable-until-replace runtime state and
  // must project through AgentStateProjection.current_emotion. Emitting only
  // runtime.agent.state.emotion_changed without writing here is authority
  // drift: GetAgentState / snapshot / recovery would not observe committed
  // emotion truth.
  string current_emotion = 7;
}

message AgentStateSetStatusText {
  string status_text = 1;
}

message AgentStateSetWorldContext {
  string world_id = 1;
}

message AgentStateClearWorldContext {}

message AgentStateSetDyadicContext {
  string user_id = 1;
}

message AgentStateClearDyadicContext {}

message AgentStatePutAttribute {
  string key = 1;
  string value = 2;
}

message AgentStateRemoveAttribute {
  string key = 1;
}

message AgentStateMutation {
  oneof mutation {
    AgentStateSetStatusText set_status_text = 1;
    AgentStateSetWorldContext set_world_context = 2;
    AgentStateClearWorldContext clear_world_context = 3;
    AgentStateSetDyadicContext set_dyadic_context = 4;
    AgentStateClearDyadicContext clear_dyadic_context = 5;
    AgentStatePutAttribute put_attribute = 6;
    AgentStateRemoveAttribute remove_attribute = 7;
  }
}

// K-AGCORE-041 HookIntent admitted trigger detail shapes.
// `time(delay)` uses a relative delay applied at admission time.
// `event(user_idle, idle_for)` and `event(chat_ended)` are the only admitted
// event-family details. No absolute-time, turn-completed, state-condition,
// world-event, or compound trigger is admitted in the v1 matrix.
message HookTriggerTimeDetail {
  google.protobuf.Duration delay = 1;
}

message HookTriggerEventUserIdleDetail {
  google.protobuf.Duration idle_for = 1;
}

message HookTriggerEventChatEndedDetail {}

message HookTriggerDetail {
  oneof detail {
    HookTriggerTimeDetail time = 10;
    HookTriggerEventUserIdleDetail event_user_idle = 11;
    HookTriggerEventChatEndedDetail event_chat_ended = 12;
  }
}

// K-AGCORE-041 HookIntent minimum typed shape.
// `intent_id` is hook identity across the admission lifecycle.
// `trigger_family` + `trigger_detail` + `effect` + `admission_state` together
// form the committed runtime truth projected on `runtime.agent.hook.*`.
// Origin linkage (`conversation_anchor_id`, `originating_turn_id`,
// `originating_stream_id`) is preserved when present but never fabricated.
message HookIntent {
  string intent_id = 1;
  string agent_id = 2;
  string conversation_anchor_id = 3;
  string originating_turn_id = 4;
  string originating_stream_id = 5;
  HookTriggerFamily trigger_family = 6;
  HookTriggerDetail trigger_detail = 7;
  HookEffect effect = 8;
  HookAdmissionState admission_state = 9;
  google.protobuf.Timestamp not_before = 10;
  google.protobuf.Timestamp expires_at = 11;
  string reason = 12;
}

// HookExecutionOutcome projects a single admission-state transition of a
// `HookIntent`. `reason_code` is populated only on rejected/failed states;
// `reason` is populated only on canceled state. `observed_at` is the
// committed transition time.
message HookExecutionOutcome {
  HookIntent intent = 1;
  google.protobuf.Timestamp observed_at = 2;
  ReasonCode reason_code = 3;
  string message = 4;
  string reason = 5;
}

// PendingHook represents admitted scheduler truth for a HookIntent that has
// reached `pending` admission state. The embedded HookIntent carries all
// admitted hook vocabulary; there is no parallel trigger/next-intent shape.
message PendingHook {
  HookIntent intent = 1;
  google.protobuf.Timestamp scheduled_for = 2;
  google.protobuf.Timestamp admitted_at = 3;
}

message CanonicalMemoryCandidate {
  MemoryCanonicalClass canonical_class = 1;
  MemoryBankLocator target_bank = 2;
  MemoryRecordInput record = 3;
  string source_event_id = 4;
  string policy_reason = 5;
  google.protobuf.Struct extensions = 10;
}

message CanonicalMemoryView {
  MemoryCanonicalClass canonical_class = 1;
  MemoryBankLocator source_bank = 2;
  MemoryRecord record = 3;
  double recall_score = 4;
  string policy_reason = 5;
}

message CanonicalMemoryRejection {
  string source_event_id = 1;
  ReasonCode reason_code = 2;
  string message = 3;
}

message AgentLifecycleEventDetail {
  AgentLifecycleStatus previous_status = 1;
  AgentLifecycleStatus current_status = 2;
}

// AgentHookEventDetail projects a `runtime.agent.hook.*` event per
// K-AGCORE-042. `family` is the first-class runtime-owned discriminator
// (mirror of `intent.admission_state`) and maps 1:1 to the mounted public
// seam family name (`runtime.agent.hook.intent_proposed` / `pending` /
// `rejected` / `running` / `completed` / `failed` / `canceled` /
// `rescheduled`). Consumers MUST read `family` to dispatch; reading
// `intent.admission_state` alone is admitted but treated as an internal
// consistency check, not as the discriminator.
message AgentHookEventDetail {
  HookAdmissionState family = 1;
  HookIntent intent = 2;
  google.protobuf.Timestamp observed_at = 3;
  ReasonCode reason_code = 4;
  string message = 5;
  string reason = 6;
}

message AgentMemoryEventDetail {
  repeated CanonicalMemoryView accepted = 1;
  repeated CanonicalMemoryRejection rejected = 2;
}

message AgentBudgetEventDetail {
  bool budget_exhausted = 1;
  int64 remaining_tokens = 2;
  google.protobuf.Timestamp window_started_at = 3;
}

message AgentReplicationEventDetail {
  string memory_id = 1;
  MemoryReplicationState replication = 2;
}

// K-AGCORE-037 PostureProjection is the canonical schema alias for
// runtime.agent.state.posture_changed.detail.current_posture. Only the
// narrow read-only projection admitted through K-AGCORE-037 may cross the
// public RuntimeAgentService surface; runtime-private posture truth (truth
// basis ids, transition reason, posture class) is not exposed here.
message AgentPostureProjection {
  string action_family = 1;
  string interrupt_mode = 2;
}

// AgentStateEventDetail projects runtime.agent.state.* events per
// K-AGCORE-037 / state_envelope. `agent_id` is REQUIRED at the AgentEvent
// envelope level; origin linkage (`conversation_anchor_id` /
// `originating_turn_id` / `originating_stream_id`) is OPTIONAL and is carried
// ONLY when the state projection is traceable to a specific continuity
// branch. Runtime MUST NOT fabricate origin linkage for no-origin state
// transitions (admin posture change, lifecycle-driven state, etc.).
message AgentStateEventDetail {
  AgentStateEventFamily family = 1;

  // Optional origin linkage (state_envelope.optional_origin_fields).
  string conversation_anchor_id = 2;
  string originating_turn_id = 3;
  string originating_stream_id = 4;

  // Family-specific payload fields. Exactly one family's block is populated
  // per event; discriminator is `family`.
  string current_status_text = 10;
  string previous_status_text = 11;
  bool has_previous_status_text = 12;

  AgentExecutionState current_execution_state = 20;
  AgentExecutionState previous_execution_state = 21;

  string current_emotion = 30;
  string previous_emotion = 31;
  string emotion_source = 32;

  AgentPostureProjection current_posture = 40;
  AgentPostureProjection previous_posture = 41;
}

// AgentPresentationEventDetail projects runtime.agent.presentation.* events
// per K-AGCORE-037 / presentation_envelope. `agent_id` is REQUIRED at the
// AgentEvent envelope level; `conversation_anchor_id`, `turn_id`, and
// `stream_id` are ALSO REQUIRED on every presentation event because
// presentation is stream-scoped transient projection derived from committed
// runtime interpretation. Runtime MUST NOT emit presentation events without
// real stream-identity linkage.
message AgentPresentationEventDetail {
  AgentPresentationEventFamily family = 1;
  string conversation_anchor_id = 2;
  string turn_id = 3;
  string stream_id = 4;

  // activity_requested
  string activity_name = 10;
  string activity_category = 11;
  string activity_intensity = 12;
  string activity_source = 13;

  // motion_requested
  string motion_id = 20;
  string motion_priority = 21;
  int64 motion_expected_duration_ms = 22;

  // expression_requested
  string expression_id = 30;
  int64 expression_expected_duration_ms = 31;

  // pose_requested / pose_cleared
  string pose_id = 40;
  int64 pose_expected_duration_ms = 41;
  string previous_pose_id = 42;

  // lookat_requested
  string lookat_target_kind = 50;
  double lookat_x = 51;
  double lookat_y = 52;
  double lookat_z = 53;
  bool lookat_has_x = 54;
  bool lookat_has_y = 55;
  bool lookat_has_z = 56;
}

message AgentEvent {
  AgentEventType event_type = 1;
  uint64 sequence = 2;
  string agent_id = 3;
  google.protobuf.Timestamp timestamp = 4;
  oneof detail {
    AgentLifecycleEventDetail lifecycle = 10;
    AgentHookEventDetail hook = 11;
    AgentMemoryEventDetail memory = 12;
    AgentBudgetEventDetail budget = 13;
    AgentReplicationEventDetail replication = 14;
    AgentStateEventDetail state = 15;
    AgentPresentationEventDetail presentation = 16;
  }
}

message InitializeAgentRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  string display_name = 3;
  AgentAutonomyConfig autonomy_config = 4;
  string world_id = 5;
  google.protobuf.Struct metadata = 6;
}

message InitializeAgentResponse {
  AgentRecord agent = 1;
  AgentStateProjection state = 2;
}

message TerminateAgentRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  string reason = 3;
}

message TerminateAgentResponse {
  Ack ack = 1;
}

message GetAgentRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
}

message GetAgentResponse {
  AgentRecord agent = 1;
}

message ListAgentsRequest {
  AgentRequestContext context = 1;
  AgentLifecycleStatus lifecycle_filter = 2;
  optional bool autonomy_enabled = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListAgentsResponse {
  repeated AgentRecord agents = 1;
  string next_page_token = 2;
}

message GetAgentStateRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
}

message GetAgentStateResponse {
  AgentStateProjection state = 1;
}

message UpdateAgentStateRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  repeated AgentStateMutation mutations = 3;
}

message UpdateAgentStateResponse {
  AgentStateProjection state = 1;
}

message EnableAutonomyRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
}

message EnableAutonomyResponse {
  AgentAutonomyState autonomy = 1;
}

message DisableAutonomyRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  string reason = 3;
}

message DisableAutonomyResponse {
  AgentAutonomyState autonomy = 1;
}

message SetAutonomyConfigRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  AgentAutonomyConfig config = 3;
}

message SetAutonomyConfigResponse {
  AgentAutonomyState autonomy = 1;
}

message ListPendingHooksRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  HookTriggerFamily trigger_family_filter = 3;
  HookAdmissionState admission_state_filter = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListPendingHooksResponse {
  repeated PendingHook hooks = 1;
  string next_page_token = 2;
}

message CancelHookRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  string intent_id = 3;
  string reason = 4;
}

message CancelHookResponse {
  HookExecutionOutcome outcome = 1;
}

message QueryAgentMemoryRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  string query = 3;
  int32 limit = 4;
  repeated MemoryCanonicalClass canonical_classes = 5;
  repeated MemoryRecordKind kinds = 6;
  bool include_invalidated = 7;
}

message QueryAgentMemoryResponse {
  repeated CanonicalMemoryView memories = 1;
  repeated NarrativeRecallHit narratives = 2;
}

message WriteAgentMemoryRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  repeated CanonicalMemoryCandidate candidates = 3;
}

message WriteAgentMemoryResponse {
  repeated CanonicalMemoryView accepted = 1;
  repeated CanonicalMemoryRejection rejected = 2;
}

message SubscribeAgentEventsRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  string cursor = 3;
  repeated AgentEventType event_filters = 4;
}

// K-AGCORE-034 ConversationAnchor boundary: runtime-owned continuity anchor.
// `conversation_anchor_id` is the only admitted cross-surface continuity
// scope; `agent_id` is agent identity only. `turn_id` and `message_id` are
// anchor-scoped. `subject_user_id` is explicit runtime truth at anchor-open
// time; hosts must not infer anchor continuity from agent identity.
message ConversationAnchor {
  string conversation_anchor_id = 1;
  string agent_id = 2;
  string subject_user_id = 3;
  ConversationAnchorStatus status = 4;
  string last_turn_id = 5;
  string last_message_id = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  google.protobuf.Struct metadata = 9;
}

message ConversationAnchorSnapshot {
  ConversationAnchor anchor = 1;
  string active_turn_id = 2;
  string active_stream_id = 3;
}

message OpenConversationAnchorRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  string subject_user_id = 3;
  google.protobuf.Struct metadata = 4;
}

message OpenConversationAnchorResponse {
  ConversationAnchorSnapshot snapshot = 1;
}

message GetConversationAnchorSnapshotRequest {
  AgentRequestContext context = 1;
  string agent_id = 2;
  string conversation_anchor_id = 3;
}

message GetConversationAnchorSnapshotResponse {
  ConversationAnchorSnapshot snapshot = 1;
}

service RuntimeAgentService {
  rpc InitializeAgent(InitializeAgentRequest) returns (InitializeAgentResponse);
  rpc TerminateAgent(TerminateAgentRequest) returns (TerminateAgentResponse);
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc OpenConversationAnchor(OpenConversationAnchorRequest) returns (OpenConversationAnchorResponse);
  rpc GetConversationAnchorSnapshot(GetConversationAnchorSnapshotRequest) returns (GetConversationAnchorSnapshotResponse);
  rpc GetAgentState(GetAgentStateRequest) returns (GetAgentStateResponse);
  rpc UpdateAgentState(UpdateAgentStateRequest) returns (UpdateAgentStateResponse);
  rpc EnableAutonomy(EnableAutonomyRequest) returns (EnableAutonomyResponse);
  rpc DisableAutonomy(DisableAutonomyRequest) returns (DisableAutonomyResponse);
  rpc SetAutonomyConfig(SetAutonomyConfigRequest) returns (SetAutonomyConfigResponse);
  rpc ListPendingHooks(ListPendingHooksRequest) returns (ListPendingHooksResponse);
  rpc CancelHook(CancelHookRequest) returns (CancelHookResponse);
  rpc QueryAgentMemory(QueryAgentMemoryRequest) returns (QueryAgentMemoryResponse);
  rpc WriteAgentMemory(WriteAgentMemoryRequest) returns (WriteAgentMemoryResponse);
  rpc SubscribeAgentEvents(SubscribeAgentEventsRequest) returns (stream AgentEvent);
}
