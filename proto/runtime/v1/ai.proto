syntax = "proto3";

package nimi.runtime.v1;

option go_package = "github.com/nimiplatform/nimi/runtime/gen/runtime/v1;runtimev1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "runtime/v1/common.proto";
import "runtime/v1/voice.proto";

enum Modal {
  MODAL_UNSPECIFIED = 0;
  MODAL_TEXT = 1;
  MODAL_IMAGE = 2;
  MODAL_VIDEO = 3;
  MODAL_TTS = 4;
  MODAL_STT = 5;
  MODAL_EMBEDDING = 6;
}

enum ScenarioType {
  SCENARIO_TYPE_UNSPECIFIED = 0;
  SCENARIO_TYPE_TEXT_GENERATE = 1;
  SCENARIO_TYPE_TEXT_EMBED = 2;
  SCENARIO_TYPE_IMAGE_GENERATE = 3;
  SCENARIO_TYPE_VIDEO_GENERATE = 4;
  SCENARIO_TYPE_SPEECH_SYNTHESIZE = 5;
  SCENARIO_TYPE_SPEECH_TRANSCRIBE = 6;
  SCENARIO_TYPE_VOICE_CLONE = 7;
  SCENARIO_TYPE_VOICE_DESIGN = 8;
}

enum ExecutionMode {
  EXECUTION_MODE_UNSPECIFIED = 0;
  EXECUTION_MODE_SYNC = 1;
  EXECUTION_MODE_STREAM = 2;
  EXECUTION_MODE_ASYNC_JOB = 3;
}

enum RoutePolicy {
  ROUTE_POLICY_UNSPECIFIED = 0;
  ROUTE_POLICY_LOCAL_RUNTIME = 1;
  ROUTE_POLICY_TOKEN_API = 2;
}

enum FallbackPolicy {
  FALLBACK_POLICY_UNSPECIFIED = 0;
  FALLBACK_POLICY_DENY = 1;
  FALLBACK_POLICY_ALLOW = 2;
}

enum FinishReason {
  FINISH_REASON_UNSPECIFIED = 0;
  FINISH_REASON_STOP = 1;
  FINISH_REASON_LENGTH = 2;
  FINISH_REASON_TOOL_CALL = 3;
  FINISH_REASON_CONTENT_FILTER = 4;
  FINISH_REASON_ERROR = 5;
}

enum TokenProviderHealthStatus {
  TOKEN_PROVIDER_HEALTH_STATUS_UNSPECIFIED = 0;
  TOKEN_PROVIDER_HEALTH_STATUS_HEALTHY = 1;
  TOKEN_PROVIDER_HEALTH_STATUS_DEGRADED = 2;
  TOKEN_PROVIDER_HEALTH_STATUS_UNREACHABLE = 3;
  TOKEN_PROVIDER_HEALTH_STATUS_UNAUTHORIZED = 4;
  TOKEN_PROVIDER_HEALTH_STATUS_UNSUPPORTED = 5;
}

enum StreamEventType {
  STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  STREAM_EVENT_STARTED = 1;
  STREAM_EVENT_DELTA = 2;
  STREAM_EVENT_TOOL_CALL = 3;
  STREAM_EVENT_TOOL_RESULT = 4;
  STREAM_EVENT_USAGE = 5;
  STREAM_EVENT_COMPLETED = 6;
  STREAM_EVENT_FAILED = 7;
}

enum VideoMode {
  VIDEO_MODE_UNSPECIFIED = 0;
  VIDEO_MODE_T2V = 1;
  VIDEO_MODE_I2V_FIRST_FRAME = 2;
  VIDEO_MODE_I2V_FIRST_LAST = 3;
  VIDEO_MODE_I2V_REFERENCE = 4;
}

enum VideoContentType {
  VIDEO_CONTENT_TYPE_UNSPECIFIED = 0;
  VIDEO_CONTENT_TYPE_TEXT = 1;
  VIDEO_CONTENT_TYPE_IMAGE_URL = 2;
}

enum VideoContentRole {
  VIDEO_CONTENT_ROLE_UNSPECIFIED = 0;
  VIDEO_CONTENT_ROLE_PROMPT = 1;
  VIDEO_CONTENT_ROLE_FIRST_FRAME = 2;
  VIDEO_CONTENT_ROLE_LAST_FRAME = 3;
  VIDEO_CONTENT_ROLE_REFERENCE_IMAGE = 4;
}

enum SpeechTimingMode {
  SPEECH_TIMING_MODE_UNSPECIFIED = 0;
  SPEECH_TIMING_MODE_NONE = 1;
  SPEECH_TIMING_MODE_WORD = 2;
  SPEECH_TIMING_MODE_CHAR = 3;
}

enum SpeechAlignmentUnit {
  SPEECH_ALIGNMENT_UNIT_UNSPECIFIED = 0;
  SPEECH_ALIGNMENT_UNIT_WORD = 1;
  SPEECH_ALIGNMENT_UNIT_CHAR = 2;
}

message ChatMessage {
  string role = 1;
  string content = 2;
  string name = 3;
}

message ToolSpec {
  string name = 1;
  google.protobuf.Struct input_schema = 2;
}

message ScenarioRequestHead {
  string app_id = 1;
  string subject_user_id = 2;
  string model_id = 3;
  RoutePolicy route_policy = 4;
  FallbackPolicy fallback = 5;
  int32 timeout_ms = 6;
  string connector_id = 7;
}

message ScenarioExtension {
  string namespace = 1;
  google.protobuf.Struct payload = 2;
}

message IgnoredScenarioExtension {
  string namespace = 1;
  string reason = 2;
}

message TextGenerateScenarioSpec {
  repeated ChatMessage input = 1;
  string system_prompt = 2;
  repeated ToolSpec tools = 3;
  float temperature = 4;
  float top_p = 5;
  int32 max_tokens = 6;
}

message TextEmbedScenarioSpec {
  repeated string inputs = 1;
}

message ImageGenerateScenarioSpec {
  string prompt = 1;
  string negative_prompt = 2;
  int32 n = 3;
  string size = 4;
  string aspect_ratio = 5;
  string quality = 6;
  string style = 7;
  int64 seed = 8;
  repeated string reference_images = 9;
  string mask = 10;
  string response_format = 11;
}

message VideoGenerateScenarioSpec {
  string prompt = 1;
  string negative_prompt = 2;
  VideoMode mode = 3;
  repeated VideoContentItem content = 4;
  VideoGenerationOptions options = 5;
}

message SpeechSynthesizeScenarioSpec {
  string text = 1;
  string language = 2;
  string audio_format = 3;
  int32 sample_rate_hz = 4;
  float speed = 5;
  float pitch = 6;
  float volume = 7;
  string emotion = 8;
  VoiceReference voice_ref = 9;
  SpeechTimingMode timing_mode = 10;
  VoiceRenderHints voice_render_hints = 11;
}

message SpeechTranscribeScenarioSpec {
  string mime_type = 1;
  string language = 2;
  bool timestamps = 3;
  bool diarization = 4;
  int32 speaker_count = 5;
  string prompt = 6;
  SpeechTranscriptionAudioSource audio_source = 7;
  string response_format = 8;
}

message VoiceCloneScenarioSpec {
  string target_model_id = 1;
  VoiceV2VInput input = 2;
}

message VoiceDesignScenarioSpec {
  string target_model_id = 1;
  VoiceT2VInput input = 2;
}

message ScenarioSpec {
  oneof spec {
    TextGenerateScenarioSpec text_generate = 1;
    TextEmbedScenarioSpec text_embed = 2;
    ImageGenerateScenarioSpec image_generate = 3;
    VideoGenerateScenarioSpec video_generate = 4;
    SpeechSynthesizeScenarioSpec speech_synthesize = 5;
    SpeechTranscribeScenarioSpec speech_transcribe = 6;
    VoiceCloneScenarioSpec voice_clone = 7;
    VoiceDesignScenarioSpec voice_design = 8;
  }
}

message ExecuteScenarioRequest {
  ScenarioRequestHead head = 1;
  ScenarioType scenario_type = 2;
  ExecutionMode execution_mode = 3;
  ScenarioSpec spec = 4;
  repeated ScenarioExtension extensions = 5;
}

message ExecuteScenarioResponse {
  google.protobuf.Struct output = 1;
  FinishReason finish_reason = 2;
  UsageStats usage = 3;
  RoutePolicy route_decision = 4;
  string model_resolved = 5;
  string trace_id = 6;
  repeated IgnoredScenarioExtension ignored_extensions = 7;
}

message StreamScenarioRequest {
  ScenarioRequestHead head = 1;
  ScenarioType scenario_type = 2;
  ExecutionMode execution_mode = 3;
  ScenarioSpec spec = 4;
  repeated ScenarioExtension extensions = 5;
}

message ScenarioStreamStarted {
  string model_resolved = 1;
  RoutePolicy route_decision = 2;
}

message ScenarioStreamDelta {
  string text = 1;
  bytes chunk = 2;
  string mime_type = 3;
}

message ScenarioStreamCompleted {
  FinishReason finish_reason = 1;
  UsageStats usage = 2;
  bool stream_simulated = 3;
}

message ScenarioStreamFailed {
  ReasonCode reason_code = 1;
  string action_hint = 2;
}

message StreamScenarioEvent {
  StreamEventType event_type = 1;
  uint64 sequence = 2;
  string trace_id = 3;
  google.protobuf.Timestamp timestamp = 4;
  oneof payload {
    ScenarioStreamStarted started = 10;
    ScenarioStreamDelta delta = 11;
    UsageStats usage = 14;
    ScenarioStreamCompleted completed = 15;
    ScenarioStreamFailed failed = 16;
  }
}

enum ScenarioJobStatus {
  SCENARIO_JOB_STATUS_UNSPECIFIED = 0;
  SCENARIO_JOB_STATUS_SUBMITTED = 1;
  SCENARIO_JOB_STATUS_QUEUED = 2;
  SCENARIO_JOB_STATUS_RUNNING = 3;
  SCENARIO_JOB_STATUS_COMPLETED = 4;
  SCENARIO_JOB_STATUS_FAILED = 5;
  SCENARIO_JOB_STATUS_CANCELED = 6;
  SCENARIO_JOB_STATUS_TIMEOUT = 7;
}

enum ScenarioJobEventType {
  SCENARIO_JOB_EVENT_TYPE_UNSPECIFIED = 0;
  SCENARIO_JOB_EVENT_SUBMITTED = 1;
  SCENARIO_JOB_EVENT_QUEUED = 2;
  SCENARIO_JOB_EVENT_RUNNING = 3;
  SCENARIO_JOB_EVENT_COMPLETED = 4;
  SCENARIO_JOB_EVENT_FAILED = 5;
  SCENARIO_JOB_EVENT_CANCELED = 6;
  SCENARIO_JOB_EVENT_TIMEOUT = 7;
}

message ScenarioArtifact {
  string artifact_id = 1;
  string mime_type = 2;
  bytes bytes = 3;
  string uri = 4;
  string sha256 = 5;
  int64 size_bytes = 6;
  int64 duration_ms = 7;
  int32 fps = 8;
  int32 width = 9;
  int32 height = 10;
  int32 sample_rate_hz = 11;
  int32 channels = 12;
  SpeechAlignment speech_alignment = 13;
}

message ScenarioJob {
  string job_id = 1;
  ScenarioRequestHead head = 2;
  ScenarioType scenario_type = 3;
  ExecutionMode execution_mode = 4;
  RoutePolicy route_decision = 5;
  string model_resolved = 6;
  ScenarioJobStatus status = 7;
  string provider_job_id = 8;
  ReasonCode reason_code = 9;
  string reason_detail = 10;
  int32 retry_count = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  google.protobuf.Timestamp next_poll_at = 14;
  repeated ScenarioArtifact artifacts = 15;
  UsageStats usage = 16;
  string trace_id = 17;
  repeated IgnoredScenarioExtension ignored_extensions = 18;
}

message SubmitScenarioJobRequest {
  ScenarioRequestHead head = 1;
  ScenarioType scenario_type = 2;
  ExecutionMode execution_mode = 3;
  ScenarioSpec spec = 4;
  string request_id = 5;
  string idempotency_key = 6;
  map<string, string> labels = 7;
  repeated ScenarioExtension extensions = 8;
}

message SubmitScenarioJobResponse {
  ScenarioJob job = 1;
  VoiceAsset asset = 2;
}

message GetScenarioJobRequest {
  string job_id = 1;
}

message GetScenarioJobResponse {
  ScenarioJob job = 1;
}

message CancelScenarioJobRequest {
  string job_id = 1;
  string reason = 2;
}

message CancelScenarioJobResponse {
  ScenarioJob job = 1;
}

message ScenarioJobEvent {
  ScenarioJobEventType event_type = 1;
  uint64 sequence = 2;
  string trace_id = 3;
  google.protobuf.Timestamp timestamp = 4;
  ScenarioJob job = 5;
}

message SubscribeScenarioJobEventsRequest {
  string job_id = 1;
}

message GetScenarioArtifactsRequest {
  string job_id = 1;
}

message GetScenarioArtifactsResponse {
  string job_id = 1;
  repeated ScenarioArtifact artifacts = 2;
  string trace_id = 3;
}

message ScenarioProfile {
  ScenarioType scenario_type = 1;
  repeated ExecutionMode supported_execution_modes = 2;
  string description = 3;
}

message ListScenarioProfilesRequest {
  string model_id = 1;
}

message ListScenarioProfilesResponse {
  repeated ScenarioProfile profiles = 1;
}

message VideoContentImageURL {
  string url = 1;
}

message VideoContentItem {
  VideoContentType type = 1;
  VideoContentRole role = 2;
  string text = 3;
  VideoContentImageURL image_url = 4;
}

message VideoGenerationOptions {
  string resolution = 1;
  string ratio = 2;
  int32 duration_sec = 3;
  int32 frames = 4;
  int32 fps = 5;
  int64 seed = 6;
  bool camera_fixed = 7;
  bool watermark = 8;
  bool generate_audio = 9;
  bool draft = 10;
  string service_tier = 11;
  int32 execution_expires_after_sec = 12;
  bool return_last_frame = 13;
}

message VoiceRenderHints {
  float stability = 1;
  float similarity_boost = 2;
  float style = 3;
  bool use_speaker_boost = 4;
  float speed = 5;
}

message AudioChunks {
  repeated bytes chunks = 1;
}

message SpeechTranscriptionAudioSource {
  oneof source {
    bytes audio_bytes = 1;
    string audio_uri = 2;
    AudioChunks audio_chunks = 3;
  }
}

message SpeechAlignmentToken {
  string token = 1;
  int64 start_ms = 2;
  int64 end_ms = 3;
}

message SpeechAlignment {
  SpeechAlignmentUnit unit = 1;
  repeated SpeechAlignmentToken tokens = 2;
}

message ArtifactChunk {
  string artifact_id = 1;
  string mime_type = 2;
  uint64 sequence = 3;
  bytes chunk = 4;
  bool eof = 5;
  UsageStats usage = 6;
  RoutePolicy route_decision = 7;
  string model_resolved = 8;
  string trace_id = 9;
}

// Removed messages: ListTokenProviderModelsRequest (fields 1-5),
// TokenProviderModelDescriptor (fields 1-3), ListTokenProviderModelsResponse (fields 1-4),
// CheckTokenProviderHealthRequest (fields 1-6), TokenProviderHealthSnapshot (fields 1-6),
// CheckTokenProviderHealthResponse (fields 1-2).

service RuntimeAiService {
  rpc ExecuteScenario(ExecuteScenarioRequest) returns (ExecuteScenarioResponse);
  rpc StreamScenario(StreamScenarioRequest) returns (stream StreamScenarioEvent);
  rpc SubmitScenarioJob(SubmitScenarioJobRequest) returns (SubmitScenarioJobResponse);
  rpc GetScenarioJob(GetScenarioJobRequest) returns (GetScenarioJobResponse);
  rpc CancelScenarioJob(CancelScenarioJobRequest) returns (CancelScenarioJobResponse);
  rpc SubscribeScenarioJobEvents(SubscribeScenarioJobEventsRequest) returns (stream ScenarioJobEvent);
  rpc GetScenarioArtifacts(GetScenarioArtifactsRequest) returns (GetScenarioArtifactsResponse);
  rpc ListScenarioProfiles(ListScenarioProfilesRequest) returns (ListScenarioProfilesResponse);
  rpc GetVoiceAsset(GetVoiceAssetRequest) returns (GetVoiceAssetResponse);
  rpc ListVoiceAssets(ListVoiceAssetsRequest) returns (ListVoiceAssetsResponse);
  rpc DeleteVoiceAsset(DeleteVoiceAssetRequest) returns (DeleteVoiceAssetResponse);
  rpc ListPresetVoices(ListPresetVoicesRequest) returns (ListPresetVoicesResponse);
}
