syntax = "proto3";

package nimi.runtime.v1;

option go_package = "github.com/nimiplatform/nimi/runtime/gen/runtime/v1;runtimev1";

import "google/protobuf/struct.proto";

enum LocalModelStatus {
  LOCAL_MODEL_STATUS_UNSPECIFIED = 0;
  LOCAL_MODEL_STATUS_INSTALLED = 1;
  LOCAL_MODEL_STATUS_ACTIVE = 2;
  LOCAL_MODEL_STATUS_UNHEALTHY = 3;
  LOCAL_MODEL_STATUS_REMOVED = 4;
}

enum LocalArtifactKind {
  LOCAL_ARTIFACT_KIND_UNSPECIFIED = 0;
  LOCAL_ARTIFACT_KIND_VAE = 1;
  LOCAL_ARTIFACT_KIND_LLM = 2;
  LOCAL_ARTIFACT_KIND_CLIP = 3;
  LOCAL_ARTIFACT_KIND_CONTROLNET = 4;
  LOCAL_ARTIFACT_KIND_LORA = 5;
  LOCAL_ARTIFACT_KIND_AUXILIARY = 6;
}

enum LocalArtifactStatus {
  LOCAL_ARTIFACT_STATUS_UNSPECIFIED = 0;
  LOCAL_ARTIFACT_STATUS_INSTALLED = 1;
  LOCAL_ARTIFACT_STATUS_ACTIVE = 2;
  LOCAL_ARTIFACT_STATUS_UNHEALTHY = 3;
  LOCAL_ARTIFACT_STATUS_REMOVED = 4;
}

enum LocalServiceStatus {
  LOCAL_SERVICE_STATUS_UNSPECIFIED = 0;
  LOCAL_SERVICE_STATUS_INSTALLED = 1;
  LOCAL_SERVICE_STATUS_ACTIVE = 2;
  LOCAL_SERVICE_STATUS_UNHEALTHY = 3;
  LOCAL_SERVICE_STATUS_REMOVED = 4;
}

enum LocalEngineRuntimeMode {
  LOCAL_ENGINE_RUNTIME_MODE_UNSPECIFIED = 0;
  LOCAL_ENGINE_RUNTIME_MODE_SUPERVISED = 1;
  LOCAL_ENGINE_RUNTIME_MODE_ATTACHED_ENDPOINT = 2;
}

enum LocalDependencyKind {
  LOCAL_DEPENDENCY_KIND_UNSPECIFIED = 0;
  LOCAL_DEPENDENCY_KIND_MODEL = 1;
  LOCAL_DEPENDENCY_KIND_SERVICE = 2;
  LOCAL_DEPENDENCY_KIND_NODE = 3;
  reserved 4;
  reserved "LOCAL_DEPENDENCY_KIND_WORKFLOW";
}

message LocalModelSource {
  string repo = 1;
  string revision = 2;
}

message LocalArtifactSource {
  string repo = 1;
  string revision = 2;
}

message LocalModelRecord {
  string local_model_id = 1;
  string model_id = 2;
  repeated string capabilities = 3;
  string engine = 4;
  string entry = 5;
  string license = 6;
  LocalModelSource source = 7;
  map<string, string> hashes = 8;
  string endpoint = 9;
  LocalModelStatus status = 10;
  string installed_at = 11;
  string updated_at = 12;
  string health_detail = 13;
  string local_invoke_profile_id = 14;
  google.protobuf.Struct engine_config = 15;
}

message LocalModelHealth {
  string local_model_id = 1;
  LocalModelStatus status = 2;
  string detail = 3;
  string endpoint = 4;
}

message LocalArtifactRecord {
  string local_artifact_id = 1;
  string artifact_id = 2;
  LocalArtifactKind kind = 3;
  string engine = 4;
  string entry = 5;
  repeated string files = 6;
  string license = 7;
  LocalArtifactSource source = 8;
  map<string, string> hashes = 9;
  LocalArtifactStatus status = 10;
  string installed_at = 11;
  string updated_at = 12;
  string health_detail = 13;
  google.protobuf.Struct metadata = 14;
}

message LocalVerifiedModelDescriptor {
  string template_id = 1;
  string title = 2;
  string description = 3;
  string install_kind = 4;
  string model_id = 5;
  string repo = 6;
  string revision = 7;
  repeated string capabilities = 8;
  string engine = 9;
  string entry = 10;
  repeated string files = 11;
  string license = 12;
  map<string, string> hashes = 13;
  string endpoint = 14;
  int32 file_count = 15;
  int64 total_size_bytes = 16;
  repeated string tags = 17;
  google.protobuf.Struct engine_config = 18;
}

message LocalVerifiedArtifactDescriptor {
  string template_id = 1;
  string title = 2;
  string description = 3;
  string artifact_id = 4;
  LocalArtifactKind kind = 5;
  string engine = 6;
  string entry = 7;
  repeated string files = 8;
  string license = 9;
  string repo = 10;
  string revision = 11;
  map<string, string> hashes = 12;
  int32 file_count = 13;
  int64 total_size_bytes = 14;
  repeated string tags = 15;
  google.protobuf.Struct metadata = 16;
}

message LocalProviderHintsLocalAi {
  string backend = 1;
  string preferred_adapter = 2;
  string whisper_variant = 3;
  string stablediffusion_pipeline = 4;
  string video_backend = 5;
}

message LocalProviderHintsNexa {
  string backend = 1;
  string preferred_adapter = 2;
  string plugin_id = 3;
  string device_id = 4;
  string model_type = 5;
  string npu_mode = 6;
  string policy_gate = 7;
  bool host_npu_ready = 8;
  bool model_probe_has_npu_candidate = 9;
  bool policy_gate_allows_npu = 10;
  bool npu_usable = 11;
  string gate_reason = 12;
  string gate_detail = 13;
}

message LocalProviderHints {
  LocalProviderHintsLocalAi localai = 1;
  LocalProviderHintsNexa nexa = 2;
  map<string, string> extra = 10;
}

message LocalCatalogModelDescriptor {
  string item_id = 1;
  string source = 2;
  string title = 3;
  string description = 4;
  string model_id = 5;
  string repo = 6;
  string revision = 7;
  string template_id = 8;
  repeated string capabilities = 9;
  string engine = 10;
  LocalEngineRuntimeMode engine_runtime_mode = 11;
  string install_kind = 12;
  bool install_available = 13;
  string endpoint = 14;
  LocalProviderHints provider_hints = 15;
  string entry = 16;
  repeated string files = 17;
  string license = 18;
  map<string, string> hashes = 19;
  repeated string tags = 20;
  int64 downloads = 21;
  int64 likes = 22;
  string last_modified = 23;
  bool verified = 24;
  google.protobuf.Struct engine_config = 25;
}

message LocalInstallPlanDescriptor {
  string plan_id = 1;
  string item_id = 2;
  string source = 3;
  string template_id = 4;
  string model_id = 5;
  string repo = 6;
  string revision = 7;
  repeated string capabilities = 8;
  string engine = 9;
  LocalEngineRuntimeMode engine_runtime_mode = 10;
  string install_kind = 11;
  bool install_available = 12;
  string endpoint = 13;
  LocalProviderHints provider_hints = 14;
  string entry = 15;
  repeated string files = 16;
  string license = 17;
  map<string, string> hashes = 18;
  repeated string warnings = 19;
  string reason_code = 20;
  google.protobuf.Struct engine_config = 21;
}

message LocalGpuProfile {
  bool available = 1;
  string vendor = 2;
  string model = 3;
}

message LocalPythonProfile {
  bool available = 1;
  string version = 2;
}

message LocalNpuProfile {
  bool available = 1;
  bool ready = 2;
  string vendor = 3;
  string runtime = 4;
  string detail = 5;
}

message LocalPortAvailability {
  int32 port = 1;
  bool available = 2;
}

message LocalDeviceProfile {
  string os = 1;
  string arch = 2;
  LocalGpuProfile gpu = 3;
  LocalPythonProfile python = 4;
  LocalNpuProfile npu = 5;
  int64 disk_free_bytes = 6;
  repeated LocalPortAvailability ports = 7;
}

message LocalDependencyOptionDescriptor {
  string dependency_id = 1;
  LocalDependencyKind kind = 2;
  string capability = 3;
  string title = 4;
  string model_id = 5;
  string repo = 6;
  string service_id = 7;
  string node_id = 8;
  reserved 9;
  reserved "workflow_id";
  string engine = 10;
}

message LocalDependencyAlternativeDescriptor {
  string alternative_id = 1;
  string preferred_dependency_id = 2;
  repeated LocalDependencyOptionDescriptor options = 3;
}

message LocalDependenciesDeclarationDescriptor {
  repeated LocalDependencyOptionDescriptor required = 1;
  repeated LocalDependencyOptionDescriptor optional = 2;
  repeated LocalDependencyAlternativeDescriptor alternatives = 3;
  map<string, string> preferred = 4;
}

message LocalDependencyDescriptor {
  string dependency_id = 1;
  LocalDependencyKind kind = 2;
  string capability = 3;
  bool required = 4;
  bool selected = 5;
  bool preferred = 6;
  string model_id = 7;
  string repo = 8;
  string engine = 9;
  string service_id = 10;
  string node_id = 11;
  reserved 12;
  reserved "workflow_id";
  string reason_code = 13;
  repeated string warnings = 14;
}

message LocalPreflightDecision {
  string dependency_id = 1;
  string target = 2;
  string check = 3;
  bool ok = 4;
  string reason_code = 5;
  string detail = 6;
}

message LocalDependencySelectionRationale {
  string dependency_id = 1;
  bool selected = 2;
  string reason_code = 3;
  string detail = 4;
}

message LocalDependencyResolutionPlan {
  string plan_id = 1;
  string mod_id = 2;
  string capability = 3;
  LocalDeviceProfile device_profile = 4;
  repeated LocalDependencyDescriptor dependencies = 5;
  repeated LocalDependencySelectionRationale selection_rationale = 6;
  repeated LocalPreflightDecision preflight_decisions = 7;
  repeated string warnings = 8;
  string reason_code = 9;
}

message LocalDependencyApplyStageResult {
  string stage = 1;
  bool ok = 2;
  string reason_code = 3;
  string detail = 4;
}

message LocalServiceDescriptor {
  string service_id = 1;
  string title = 2;
  string engine = 3;
  string artifact_type = 4;
  string endpoint = 5;
  repeated string capabilities = 6;
  string local_model_id = 7;
  LocalServiceStatus status = 8;
  string detail = 9;
  string installed_at = 10;
  string updated_at = 11;
}

message LocalDependencyApplyResult {
  string plan_id = 1;
  string mod_id = 2;
  repeated LocalDependencyDescriptor dependencies = 3;
  repeated LocalModelRecord installed_models = 4;
  repeated LocalServiceDescriptor services = 5;
  repeated string capabilities = 6;
  repeated LocalDependencyApplyStageResult stage_results = 7;
  repeated LocalPreflightDecision preflight_decisions = 8;
  bool rollback_applied = 9;
  repeated string warnings = 10;
  string reason_code = 11;
}

message LocalNodeDescriptor {
  string node_id = 1;
  string title = 2;
  string service_id = 3;
  repeated string capabilities = 4;
  string provider = 5;
  string adapter = 6;
  string backend = 7;
  string backend_source = 8;
  bool available = 9;
  string reason_code = 10;
  LocalProviderHints provider_hints = 11;
  string policy_gate = 12;
  string api_path = 13;
  google.protobuf.Struct input_schema = 14;
  google.protobuf.Struct output_schema = 15;
  bool read_only = 16;
}

message LocalAuditEvent {
  string id = 1;
  string event_type = 2;
  string occurred_at = 3;
  string source = 4;
  string modality = 5;
  string reason_code = 6;
  string detail = 7;
  string model_id = 8;
  string local_model_id = 9;
  google.protobuf.Struct payload = 10;
  string trace_id = 11;
  string app_id = 12;
  string domain = 13;
  string operation = 14;
  string subject_user_id = 15;
}

message LocalAuditTimeRange {
  string from = 1;
  string to = 2;
}
