syntax = "proto3";

package nimi.runtime.v1;

option go_package = "github.com/nimiplatform/nimi/runtime/gen/runtime/v1;runtimev1";

import "google/protobuf/struct.proto";

service ScriptWorkerService {
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
}

message ExecuteRequest {
  string task_id = 1;
  string node_id = 2;
  map<string, google.protobuf.Struct> inputs = 3;
  string runtime = 4;
  string code = 5;
  int32 timeout_ms = 6;
  int64 memory_limit_bytes = 7;
}

message ExecuteResponse {
  google.protobuf.Struct output = 1;
  bool success = 2;
  string error_message = 3;
}
