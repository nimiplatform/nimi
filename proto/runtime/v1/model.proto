syntax = "proto3";

package nimi.runtime.v1;

option go_package = "github.com/nimiplatform/nimi/runtime/gen/runtime/v1;runtimev1";

import "google/protobuf/timestamp.proto";
import "runtime/v1/common.proto";
import "runtime/v1/local_runtime_types.proto";

enum ModelStatus {
  MODEL_STATUS_UNSPECIFIED = 0;
  MODEL_STATUS_INSTALLED = 1;
  MODEL_STATUS_PULLING = 2;
  MODEL_STATUS_FAILED = 3;
  MODEL_STATUS_REMOVED = 4;
}

message ModelCapabilityProfile {
  bool supports_text_generate = 1;
  bool supports_text_stream = 2;
  bool supports_embedding = 3;
  bool supports_image_generation = 4;
  bool supports_video_generation = 5;
  bool supports_speech_synthesis = 6;
  bool supports_speech_transcription = 7;
  bool supports_async_media_job = 8;
  bool supports_streaming = 9;
}

message ModelDescriptor {
  string model_id = 1;
  string version = 2;
  ModelStatus status = 3;
  repeated string capabilities = 4;
  google.protobuf.Timestamp last_health_at = 5;
  ModelCapabilityProfile capability_profile = 6;
  string logical_model_id = 7;
  string family = 8;
  repeated string artifact_roles = 9;
  string preferred_engine = 10;
  repeated string fallback_engines = 11;
  LocalBundleState bundle_state = 12;
  LocalWarmState warm_state = 13;
  LocalHostRequirements host_requirements = 14;
}

message ListModelsRequest {}

message ListModelsResponse {
  repeated ModelDescriptor models = 1;
}

message PullModelRequest {
  string app_id = 1;
  string model_ref = 2;
  string source = 3;
  string digest = 4;
}

message PullModelResponse {
  string task_id = 1;
  bool accepted = 2;
  ReasonCode reason_code = 3;
}

message RemoveModelRequest {
  string app_id = 1;
  string model_id = 2;
}

message CheckModelHealthRequest {
  string model_id = 1;
  string app_id = 2;
}

message CheckModelHealthResponse {
  bool healthy = 1;
  ReasonCode reason_code = 2;
  string action_hint = 3;
}

service RuntimeModelService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc PullModel(PullModelRequest) returns (PullModelResponse);
  rpc RemoveModel(RemoveModelRequest) returns (Ack);
  rpc CheckModelHealth(CheckModelHealthRequest) returns (CheckModelHealthResponse);
}
