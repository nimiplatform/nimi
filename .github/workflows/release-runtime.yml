name: release-runtime

on:
  push:
    tags:
      - runtime/v*
  workflow_dispatch:

permissions:
  contents: read

env:
  NIMI_MODS_REF: 1936c644557ebbaa0a3741668ba1b788bcc71e2f # pragma: allowlist secret

jobs:
  live-smoke-gate:
    if: startsWith(github.ref, 'refs/tags/runtime/v')
    runs-on: ubuntu-latest
    env:
      NIMI_MODS_LIVE: '1'
      NIMI_LIVE_OPENAI_API_KEY: ${{ secrets.NIMI_LIVE_OPENAI_API_KEY }}
      NIMI_LIVE_OPENAI_MODEL_ID: ${{ vars.NIMI_LIVE_OPENAI_MODEL_ID || 'gpt-4o-mini' }}
      NIMI_LIVE_ALIBABA_BASE_URL: ${{ vars.NIMI_LIVE_ALIBABA_BASE_URL || 'https://dashscope.aliyuncs.com/compatible-mode/v1' }}
      NIMI_LIVE_ALIBABA_API_KEY: ${{ secrets.NIMI_LIVE_ALIBABA_API_KEY }}
      NIMI_LIVE_ALIBABA_CHAT_MODEL_ID: ${{ vars.NIMI_LIVE_ALIBABA_CHAT_MODEL_ID || 'alibaba/qwen-turbo' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout nimi-mods (pinned external repo)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nimiplatform/nimi-mods
          ref: ${{ env.NIMI_MODS_REF }}
          path: nimi-mods
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: runtime/go.mod
          cache: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install nimi-mods dependencies
        run: pnpm --dir nimi-mods install --no-frozen-lockfile

      - name: Live provider invariants gate
        run: pnpm check:live-provider-invariants

      - name: Run local-chat live smoke gate
        run: pnpm check:local-chat-live-smoke

      - name: Run live smoke matrix
        run: node scripts/run-live-test-matrix.mjs

      - name: Evaluate release live smoke gate
        run: pnpm check:live-smoke-gate --require-release

      - name: Upload live smoke coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: live-test-coverage-runtime-${{ github.ref_name }}
          path: dev/report/live-test-coverage.yaml
          if-no-files-found: error

  release-tag:
    needs: live-smoke-gate
    if: startsWith(github.ref, 'refs/tags/runtime/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: runtime/go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Resolve runtime semver tag
        id: runtime_tag
        run: |
          if [[ "${GITHUB_REF_NAME}" != runtime/v* ]]; then
            echo "unexpected runtime tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "tag=${GITHUB_REF_NAME#runtime/}" >> "${GITHUB_OUTPUT}"

      - name: Goreleaser release
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.runtime_tag.outputs.tag }}

      - name: Install supply chain tooling (cosign + syft)
        run: |
          set -euo pipefail
          GOBIN="$(go env GOPATH)/bin"
          echo "${GOBIN}" >> "${GITHUB_PATH}"
          go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.2
          go install github.com/anchore/syft/cmd/syft@v1.42.2

      - name: Resolve runtime archives for signing
        id: runtime_archives
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const output = process.env.GITHUB_OUTPUT;
          if (!output) {
            throw new Error('GITHUB_OUTPUT is required');
          }

          const distRoot = path.resolve('dist/runtime');
          const files = fs
            .readdirSync(distRoot, { withFileTypes: true })
            .filter((entry) => entry.isFile())
            .map((entry) => path.join(distRoot, entry.name))
            .filter((filePath) => filePath.endsWith('.tar.gz') || filePath.endsWith('.zip'));

          if (files.length === 0) {
            throw new Error(`no runtime archives found in ${distRoot}`);
          }

          fs.appendFileSync(output, `archives_json=${JSON.stringify(files)}\n`);
          NODE

      - name: Generate SBOM + sign runtime archives
        env:
          NIMI_ARTIFACT_PATHS_JSON: ${{ steps.runtime_archives.outputs.archives_json }}
          NIMI_SIGN_IDENTITY_REGEX: https://github.com/${{ github.repository }}/.github/workflows/release-runtime.yml@.*
          NIMI_SIGN_OUTPUT_MANIFEST: dist/runtime/signing-manifest.json
        run: node scripts/release/sign-and-sbom-artifacts.mjs

      - name: Sign and verify checksums.txt
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-signature dist/runtime/checksums.txt.sig \
            --output-certificate dist/runtime/checksums.txt.pem \
            dist/runtime/checksums.txt

          cosign verify-blob \
            --certificate dist/runtime/checksums.txt.pem \
            --signature dist/runtime/checksums.txt.sig \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release-runtime.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            dist/runtime/checksums.txt

      - name: Upload supply chain assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.runtime_tag.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t generated_files < <(node <<'NODE'
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync('dist/runtime/signing-manifest.json', 'utf8'));
          for (const filePath of payload) {
            process.stdout.write(`${filePath}\n`);
          }
          NODE
          )
          generated_files+=(
            "dist/runtime/signing-manifest.json"
            "dist/runtime/checksums.txt.sig"
            "dist/runtime/checksums.txt.pem"
          )
          gh release upload "${RELEASE_TAG}" "${generated_files[@]}" --clobber

  release-snapshot:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: runtime/go.mod
          cache: false

      - name: Goreleaser snapshot (dry-run)
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot --skip=publish --skip=announce --config .goreleaser.yml
