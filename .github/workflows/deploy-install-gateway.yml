name: deploy-install-gateway

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-install-gateway
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GITHUB_RELEASES_TOKEN: ${{ secrets.GITHUB_RELEASES_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test install gateway
        run: pnpm --filter @nimiplatform/install-gateway test

      - name: Build install gateway assets
        run: pnpm --filter @nimiplatform/install-gateway build

      - name: Sync optional GitHub release token secret
        if: env.GITHUB_RELEASES_TOKEN != ''
        run: |
          set -euo pipefail
          cd apps/install-gateway
          printf '%s' "${GITHUB_RELEASES_TOKEN}" | pnpm dlx wrangler secret put GITHUB_RELEASES_TOKEN --config wrangler.jsonc

      - name: Deploy install gateway worker
        run: |
          set -euo pipefail
          cd apps/install-gateway
          pnpm dlx wrangler deploy --config wrangler.jsonc
