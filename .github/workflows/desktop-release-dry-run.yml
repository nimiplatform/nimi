name: desktop-release-dry-run

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional semver version override (for example 0.1.0 or v0.1.0)
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/desktop-release-dry-run.yml
      - .github/workflows/release.yml
      - apps/desktop/**
      - runtime/**
      - sdk/**
      - scripts/release/**
      - package.json
      - pnpm-lock.yaml

permissions:
  contents: read

concurrency:
  group: desktop-release-dry-run-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  NIMI_MODS_REF: 931311bcc79ce93195e539da793a05579ee66194 # pragma: allowlist secret
  NIMI_MODS_CHECKOUT_TOKEN: ${{ secrets.NIMI_MODS_REPO_TOKEN || github.token }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      version_plain: ${{ steps.resolve.outputs.version_plain }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve desktop dry-run version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION:-}"
          if [[ -z "${version}" ]]; then
            version="$(node -p "JSON.parse(require('node:fs').readFileSync('apps/desktop/package.json', 'utf8')).version")"
          fi
          if [[ "${version}" != v* ]]; then
            version="v${version}"
          fi
          if ! [[ "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid semver version: ${version}" >&2
            exit 1
          fi
          {
            echo "version=${version}"
            echo "version_plain=${version#v}"
          } >> "${GITHUB_OUTPUT}"

  dry-run:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            extra_args: appimage
          - platform: macos-latest
            extra_args: app
          - platform: windows-latest
            extra_args: nsis
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    env:
      RELEASE_VERSION: ${{ needs.resolve.outputs.version_plain }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Probe nimi-mods access
        id: nimi_mods_access
        run: |
          set -euo pipefail
          if curl --fail --silent --show-error \
            -H "Authorization: Bearer ${NIMI_MODS_CHECKOUT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/nimiplatform/nimi-mods/commits/${NIMI_MODS_REF}" \
            >/dev/null; then
            {
              echo "available=true"
            } >> "${GITHUB_OUTPUT}"
          else
            {
              echo "available=false"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout nimi-mods (pinned external repo)
        if: steps.nimi_mods_access.outputs.available == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nimiplatform/nimi-mods
          ref: ${{ env.NIMI_MODS_REF }}
          path: nimi-mods
          fetch-depth: 1
          token: ${{ env.NIMI_MODS_CHECKOUT_TOKEN }}

      - name: Setup pnpm
        if: steps.nimi_mods_access.outputs.available == 'true'
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.32.1

      - name: Setup Node.js
        if: steps.nimi_mods_access.outputs.available == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Go
        if: steps.nimi_mods_access.outputs.available == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: runtime/go.mod
          cache: false

      - name: Install Rust toolchain
        if: steps.nimi_mods_access.outputs.available == 'true'
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: steps.nimi_mods_access.outputs.available == 'true' && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver xvfb

      - name: Install dependencies
        if: steps.nimi_mods_access.outputs.available == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Install desktop E2E driver
        if: steps.nimi_mods_access.outputs.available == 'true' && matrix.platform != 'macos-latest'
        run: cargo install tauri-driver --locked

      - name: Probe or install Windows native driver
        if: steps.nimi_mods_access.outputs.available == 'true' && matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Get-Command msedgedriver -ErrorAction SilentlyContinue)) {
            winget install --exact --id Microsoft.EdgeWebDriver --silent --accept-package-agreements --accept-source-agreements
          }
          Get-Command msedgedriver | Out-String | Write-Host

      - name: Build SDK surfaces (desktop runtime dependency)
        if: steps.nimi_mods_access.outputs.available == 'true'
        run: pnpm build:sdk

      - name: Run desktop E2E smoke (Linux)
        id: desktop_e2e_smoke_linux
        if: steps.nimi_mods_access.outputs.available == 'true' && matrix.platform == 'ubuntu-22.04'
        env:
          NIMI_E2E_NATIVE_DRIVER: /usr/bin/WebKitWebDriver
        run: xvfb-run -a pnpm check:desktop-e2e-smoke

      - name: Run desktop E2E journeys (Linux)
        id: desktop_e2e_journeys_linux
        if: steps.nimi_mods_access.outputs.available == 'true' && matrix.platform == 'ubuntu-22.04'
        env:
          NIMI_E2E_NATIVE_DRIVER: /usr/bin/WebKitWebDriver
        run: xvfb-run -a pnpm check:desktop-e2e-journeys

      - name: Run desktop E2E smoke (Windows)
        id: desktop_e2e_smoke_windows
        if: steps.nimi_mods_access.outputs.available == 'true' && matrix.platform == 'windows-latest'
        env:
          NIMI_E2E_NATIVE_DRIVER: msedgedriver
        run: pnpm check:desktop-e2e-smoke

      - name: Run desktop E2E journeys (Windows)
        id: desktop_e2e_journeys_windows
        if: steps.nimi_mods_access.outputs.available == 'true' && matrix.platform == 'windows-latest'
        env:
          NIMI_E2E_NATIVE_DRIVER: msedgedriver
        run: pnpm check:desktop-e2e-journeys

      - name: Generate desktop E2E evidence (Linux)
        if: always() && steps.nimi_mods_access.outputs.available == 'true' && matrix.platform == 'ubuntu-22.04'
        run: |
          pnpm --filter @nimiplatform/desktop run report:desktop-e2e-evidence -- \
            --platform ubuntu-22.04 \
            --workflow-ref desktop-release-dry-run \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --commit "${GITHUB_SHA}" \
            --smoke-outcome "${SMOKE_OUTCOME}" \
            --journeys-outcome "${JOURNEYS_OUTCOME}" \
            --native-driver /usr/bin/WebKitWebDriver \
            --tauri-driver tauri-driver \
            --app-mode packaged \
            --artifact-upload-path "apps/desktop/reports/e2e/**"
        env:
          SMOKE_OUTCOME: ${{ steps.desktop_e2e_smoke_linux.outcome }}
          JOURNEYS_OUTCOME: ${{ steps.desktop_e2e_journeys_linux.outcome }}

      - name: Generate desktop E2E evidence (Windows)
        if: always() && steps.nimi_mods_access.outputs.available == 'true' && matrix.platform == 'windows-latest'
        shell: bash
        run: |
          pnpm --filter @nimiplatform/desktop run report:desktop-e2e-evidence -- \
            --platform windows-latest \
            --workflow-ref desktop-release-dry-run \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --commit "${GITHUB_SHA}" \
            --smoke-outcome "${SMOKE_OUTCOME}" \
            --journeys-outcome "${JOURNEYS_OUTCOME}" \
            --native-driver msedgedriver \
            --tauri-driver tauri-driver \
            --app-mode packaged \
            --artifact-upload-path "apps/desktop/reports/e2e/**"
        env:
          SMOKE_OUTCOME: ${{ steps.desktop_e2e_smoke_windows.outcome }}
          JOURNEYS_OUTCOME: ${{ steps.desktop_e2e_journeys_windows.outcome }}

      - name: Upload desktop E2E evidence
        if: always() && steps.nimi_mods_access.outputs.available == 'true' && matrix.platform != 'macos-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-e2e-evidence-${{ matrix.platform }}
          path: apps/desktop/reports/e2e/evidence/**
          if-no-files-found: ignore

      - name: Upload desktop E2E artifacts
        if: failure() && steps.nimi_mods_access.outputs.available == 'true' && matrix.platform != 'macos-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-e2e-artifacts-${{ matrix.platform }}
          path: apps/desktop/reports/e2e/**
          if-no-files-found: ignore

      - name: Validate desktop mods env contract
        if: steps.nimi_mods_access.outputs.available == 'true'
        run: pnpm --filter @nimiplatform/desktop run env:check:mods-root

      - name: Resolve macOS signing mode
        id: macos_signing
        if: steps.nimi_mods_access.outputs.available == 'true'
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
          CONFIGURED_MODE: ${{ vars.NIMI_DESKTOP_MACOS_SIGNING_MODE || 'developer-id' }}
        run: |
          set -euo pipefail
          case "${CONFIGURED_MODE}" in
            developer-id|ad-hoc)
              ;;
            *)
              echo "NIMI_DESKTOP_MACOS_SIGNING_MODE must be developer-id or ad-hoc, got: ${CONFIGURED_MODE}" >&2
              exit 1
              ;;
          esac

          if [[ "${MATRIX_PLATFORM}" != 'macos-latest' ]]; then
            mode='not-applicable'
            use_ad_hoc='false'
            require_apple='false'
          elif [[ "${CONFIGURED_MODE}" == 'ad-hoc' ]]; then
            mode='ad-hoc'
            use_ad_hoc='true'
            require_apple='false'
          else
            mode='developer-id'
            use_ad_hoc='false'
            require_apple='true'
          fi

          {
            echo "mode=${mode}"
            echo "use_ad_hoc_signing=${use_ad_hoc}"
            echo "require_apple_credentials=${require_apple}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate desktop signing inputs
        if: steps.nimi_mods_access.outputs.available == 'true'
        run: |
          set -euo pipefail
          if [[ -z "${NIMI_DESKTOP_UPDATER_PUBLIC_KEY:-}" ]]; then
            echo "NIMI_DESKTOP_UPDATER_PUBLIC_KEY is required" >&2
            exit 1
          fi
          if [[ -z "${NIMI_DESKTOP_UPDATER_ENDPOINT:-}" ]]; then
            echo "NIMI_DESKTOP_UPDATER_ENDPOINT is required" >&2
            exit 1
          fi
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required" >&2
            exit 1
          fi
          if [[ "${REQUIRE_APPLE_CREDENTIALS}" == 'true' ]]; then
            if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
              echo "APPLE_CERTIFICATE is required for developer-id macOS signing" >&2
              exit 1
            fi
            if [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
              echo "APPLE_CERTIFICATE_PASSWORD is required for developer-id macOS signing" >&2
              exit 1
            fi
            if [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
              echo "APPLE_SIGNING_IDENTITY is required for developer-id macOS signing" >&2
              exit 1
            fi
            if [[ -z "${APPLE_ID:-}" ]]; then
              echo "APPLE_ID is required for developer-id macOS notarization" >&2
              exit 1
            fi
            if [[ -z "${APPLE_PASSWORD:-}" ]]; then
              echo "APPLE_PASSWORD is required for developer-id macOS notarization" >&2
              exit 1
            fi
            if [[ -z "${APPLE_TEAM_ID:-}" ]]; then
              echo "APPLE_TEAM_ID is required for developer-id macOS notarization" >&2
              exit 1
            fi
          fi
          if [[ "${MACOS_SIGNING_MODE}" == 'ad-hoc' ]]; then
            echo "macOS desktop artifacts will use ad-hoc signing and skip Apple notarization"
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_SIGNING_MODE: ${{ steps.macos_signing.outputs.mode }}
          NIMI_DESKTOP_UPDATER_PUBLIC_KEY: ${{ vars.NIMI_DESKTOP_UPDATER_PUBLIC_KEY }}
          NIMI_DESKTOP_UPDATER_ENDPOINT: ${{ vars.NIMI_DESKTOP_UPDATER_ENDPOINT || 'https://install.nimi.xyz/desktop/latest.json' }}
          REQUIRE_APPLE_CREDENTIALS: ${{ steps.macos_signing.outputs.require_apple_credentials }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Prepare bundled runtime resources
        if: steps.nimi_mods_access.outputs.available == 'true'
        run: |
          pnpm --filter @nimiplatform/desktop run prepare:runtime-bundle -- \
            --version "${RELEASE_VERSION}" \
            --channel stable \
            --commit "${GITHUB_SHA}"

      - name: Validate desktop version sync
        if: steps.nimi_mods_access.outputs.available == 'true'
        run: pnpm --filter @nimiplatform/desktop run check:version-sync -- --expected "${RELEASE_VERSION}"

      - name: Validate bundled runtime manifest
        if: steps.nimi_mods_access.outputs.available == 'true'
        run: pnpm --filter @nimiplatform/desktop run check:desktop-release-sync -- --expected "${RELEASE_VERSION}"

      - name: Build desktop updater artifacts
        id: tauri_build
        if: steps.nimi_mods_access.outputs.available == 'true'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIMI_DESKTOP_UPDATER_PUBLIC_KEY: ${{ vars.NIMI_DESKTOP_UPDATER_PUBLIC_KEY }}
          NIMI_DESKTOP_UPDATER_ENDPOINT: ${{ vars.NIMI_DESKTOP_UPDATER_ENDPOINT || 'https://install.nimi.xyz/desktop/latest.json' }}
          NIMI_DESKTOP_MACOS_SIGNING_MODE: ${{ steps.macos_signing.outputs.mode }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ matrix.platform == 'macos-latest' && steps.macos_signing.outputs.require_apple_credentials == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos-latest' && steps.macos_signing.outputs.require_apple_credentials == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && (steps.macos_signing.outputs.use_ad_hoc_signing == 'true' && '-' || secrets.APPLE_SIGNING_IDENTITY) || '' }}
          APPLE_ID: ${{ matrix.platform == 'macos-latest' && steps.macos_signing.outputs.require_apple_credentials == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'macos-latest' && steps.macos_signing.outputs.require_apple_credentials == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'macos-latest' && steps.macos_signing.outputs.require_apple_credentials == 'true' && secrets.APPLE_TEAM_ID || '' }}
        with:
          projectPath: apps/desktop
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.conf.json --bundles ${{ matrix.extra_args }} --ci

      - name: Validate desktop updater artifacts
        if: steps.nimi_mods_access.outputs.available == 'true'
        env:
          NIMI_ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
          NIMI_EXPECTED_BUNDLE: ${{ matrix.extra_args }}
        run: pnpm --filter @nimiplatform/desktop run check:desktop-updater-artifacts

      - name: Generate desktop dry-run evidence
        if: steps.nimi_mods_access.outputs.available == 'true'
        env:
          NIMI_ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
        run: |
          pnpm --filter @nimiplatform/desktop run report:desktop-release-evidence -- \
            --expected-version "${RELEASE_VERSION}" \
            --expected-bundle "${{ matrix.extra_args }}" \
            --platform "${{ matrix.platform }}" \
            --workflow-ref "${GITHUB_WORKFLOW}#${GITHUB_RUN_ID}" \
            --commit "${GITHUB_SHA}" \
            --output-dir "reports"

      - name: Compose desktop dry-run upload paths
        id: upload_paths
        if: steps.nimi_mods_access.outputs.available == 'true'
        env:
          NIMI_ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const outputPath = process.env.GITHUB_OUTPUT;
          if (!outputPath) {
            throw new Error('GITHUB_OUTPUT is required');
          }
          const artifactPaths = JSON.parse(process.env.NIMI_ARTIFACT_PATHS_JSON || '[]');
          const uploadPaths = [
            ...artifactPaths,
            'apps/desktop/src-tauri/resources/desktop-release-manifest.json',
            'apps/desktop/src-tauri/resources/runtime',
            'apps/desktop/reports',
          ];
          fs.appendFileSync(outputPath, 'paths<<__NIMI_EOF__\\n');
          for (const filePath of uploadPaths) {
            fs.appendFileSync(outputPath, `${filePath}\\n`);
          }
          fs.appendFileSync(outputPath, '__NIMI_EOF__\\n');
          NODE

      - name: Upload desktop dry-run artifacts
        if: steps.nimi_mods_access.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-dry-run-${{ matrix.platform }}-${{ needs.resolve.outputs.version }}
          path: ${{ steps.upload_paths.outputs.paths }}
          if-no-files-found: error

      - name: Report skipped dry-run prerequisites
        if: steps.nimi_mods_access.outputs.available != 'true'
        run: echo "Skipping desktop dry-run because the workflow token cannot read nimiplatform/nimi-mods. Configure NIMI_MODS_REPO_TOKEN to enable the full preflight."
