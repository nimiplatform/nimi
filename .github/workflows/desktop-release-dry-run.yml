name: desktop-release-dry-run

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional semver version override (for example 0.1.0 or v0.1.0)
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/desktop-release-dry-run.yml
      - .github/workflows/release.yml
      - apps/desktop/**
      - runtime/**
      - sdk/**
      - scripts/release/**
      - package.json
      - pnpm-lock.yaml

permissions:
  contents: read

concurrency:
  group: desktop-release-dry-run-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  NIMI_MODS_REF: 1936c644557ebbaa0a3741668ba1b788bcc71e2f # pragma: allowlist secret

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      version_plain: ${{ steps.resolve.outputs.version_plain }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve desktop dry-run version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION:-}"
          if [[ -z "${version}" ]]; then
            version="$(node -p "JSON.parse(require('node:fs').readFileSync('apps/desktop/package.json', 'utf8')).version")"
          fi
          if [[ "${version}" != v* ]]; then
            version="v${version}"
          fi
          if ! [[ "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid semver version: ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "version_plain=${version#v}" >> "${GITHUB_OUTPUT}"

  dry-run:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            extra_args: appimage
          - platform: macos-latest
            extra_args: app
          - platform: windows-latest
            extra_args: nsis
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_VERSION: ${{ needs.resolve.outputs.version_plain }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout nimi-mods (pinned external repo)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nimiplatform/nimi-mods
          ref: ${{ env.NIMI_MODS_REF }}
          path: nimi-mods
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: false
          package-manager-cache: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: runtime/go.mod
          cache: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver xvfb

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install desktop E2E driver
        if: matrix.platform != 'macos-latest'
        run: cargo install tauri-driver --locked

      - name: Probe or install Windows native driver
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Get-Command msedgedriver -ErrorAction SilentlyContinue)) {
            winget install --exact --id Microsoft.EdgeWebDriver --silent --accept-package-agreements --accept-source-agreements
          }
          Get-Command msedgedriver | Out-String | Write-Host

      - name: Build SDK surfaces (desktop runtime dependency)
        run: pnpm build:sdk

      - name: Run desktop E2E smoke (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          NIMI_E2E_NATIVE_DRIVER: /usr/bin/WebKitWebDriver
        run: xvfb-run -a pnpm check:desktop-e2e-smoke

      - name: Run desktop E2E journeys (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          NIMI_E2E_NATIVE_DRIVER: /usr/bin/WebKitWebDriver
        run: xvfb-run -a pnpm check:desktop-e2e-journeys

      - name: Run desktop E2E smoke (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          NIMI_E2E_NATIVE_DRIVER: msedgedriver
        run: pnpm check:desktop-e2e-smoke

      - name: Run desktop E2E journeys (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          NIMI_E2E_NATIVE_DRIVER: msedgedriver
        run: pnpm check:desktop-e2e-journeys

      - name: Upload desktop E2E artifacts
        if: failure() && matrix.platform != 'macos-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-e2e-artifacts-${{ matrix.platform }}
          path: apps/desktop/reports/e2e/**
          if-no-files-found: ignore

      - name: Validate desktop mods env contract
        run: pnpm --filter @nimiplatform/desktop run env:check:mods-root

      - name: Validate desktop updater signing inputs
        run: |
          set -euo pipefail
          if [[ -z "${NIMI_DESKTOP_UPDATER_PUBLIC_KEY:-}" ]]; then
            echo "NIMI_DESKTOP_UPDATER_PUBLIC_KEY is required" >&2
            exit 1
          fi
          if [[ -z "${NIMI_DESKTOP_UPDATER_ENDPOINT:-}" ]]; then
            echo "NIMI_DESKTOP_UPDATER_ENDPOINT is required" >&2
            exit 1
          fi
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required" >&2
            exit 1
          fi
        env:
          NIMI_DESKTOP_UPDATER_PUBLIC_KEY: ${{ vars.NIMI_DESKTOP_UPDATER_PUBLIC_KEY }}
          NIMI_DESKTOP_UPDATER_ENDPOINT: ${{ vars.NIMI_DESKTOP_UPDATER_ENDPOINT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Prepare bundled runtime resources
        run: |
          pnpm --filter @nimiplatform/desktop run prepare:runtime-bundle -- \
            --version "${RELEASE_VERSION}" \
            --channel stable \
            --commit "${GITHUB_SHA}"

      - name: Validate desktop version sync
        run: pnpm --filter @nimiplatform/desktop run check:version-sync -- --expected "${RELEASE_VERSION}"

      - name: Validate bundled runtime manifest
        run: pnpm --filter @nimiplatform/desktop run check:desktop-release-sync -- --expected "${RELEASE_VERSION}"

      - name: Build desktop updater artifacts
        id: tauri_build
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIMI_DESKTOP_UPDATER_PUBLIC_KEY: ${{ vars.NIMI_DESKTOP_UPDATER_PUBLIC_KEY }}
          NIMI_DESKTOP_UPDATER_ENDPOINT: ${{ vars.NIMI_DESKTOP_UPDATER_ENDPOINT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.conf.json --bundles ${{ matrix.extra_args }} --ci

      - name: Validate desktop updater artifacts
        env:
          NIMI_ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
          NIMI_EXPECTED_BUNDLE: ${{ matrix.extra_args }}
        run: pnpm --filter @nimiplatform/desktop run check:desktop-updater-artifacts

      - name: Generate desktop dry-run evidence
        env:
          NIMI_ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
        run: |
          pnpm --filter @nimiplatform/desktop run report:desktop-release-evidence -- \
            --expected-version "${RELEASE_VERSION}" \
            --expected-bundle "${{ matrix.extra_args }}" \
            --platform "${{ matrix.platform }}" \
            --workflow-ref "${GITHUB_WORKFLOW}#${GITHUB_RUN_ID}" \
            --commit "${GITHUB_SHA}" \
            --output-dir "reports"

      - name: Compose desktop dry-run upload paths
        id: upload_paths
        env:
          NIMI_ARTIFACT_PATHS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const outputPath = process.env.GITHUB_OUTPUT;
          if (!outputPath) {
            throw new Error('GITHUB_OUTPUT is required');
          }
          const artifactPaths = JSON.parse(process.env.NIMI_ARTIFACT_PATHS_JSON || '[]');
          const uploadPaths = [
            ...artifactPaths,
            'apps/desktop/src-tauri/resources/desktop-release-manifest.json',
            'apps/desktop/src-tauri/resources/runtime',
            'apps/desktop/reports',
          ];
          fs.appendFileSync(outputPath, 'paths<<__NIMI_EOF__\\n');
          for (const filePath of uploadPaths) {
            fs.appendFileSync(outputPath, `${filePath}\\n`);
          }
          fs.appendFileSync(outputPath, '__NIMI_EOF__\\n');
          NODE

      - name: Upload desktop dry-run artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: desktop-dry-run-${{ matrix.platform }}-${{ needs.resolve.outputs.version }}
          path: ${{ steps.upload_paths.outputs.paths }}
          if-no-files-found: error
