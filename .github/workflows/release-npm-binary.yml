name: release-npm-binary

on:
  workflow_call:
    inputs:
      runtime_tag:
        description: Runtime release tag (for example v0.2.0)
        required: true
        type: string
      publish:
        description: Publish to npm instead of running a dry-run
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      runtime_tag:
        description: Runtime release tag (for example v0.2.0)
        required: true
        type: string
      publish:
        description: Publish to npm instead of running a dry-run
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Resolve runtime release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          CALL_TAG: ${{ inputs.runtime_tag }}
          CALL_PUBLISH: ${{ inputs.publish }}
          INPUT_TAG: ${{ github.event.inputs.runtime_tag }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_TAG}"
            PUBLISH="${INPUT_PUBLISH}"
          else
            TAG="${CALL_TAG}"
            PUBLISH="${CALL_PUBLISH}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "runtime tag is required" >&2
            exit 1
          fi
          if [[ "${TAG}" != v* ]]; then
            echo "runtime tag must start with v: ${TAG}" >&2
            exit 1
          fi
          {
            echo "tag=${TAG}"
            echo "version=${TAG#v}"
            echo "publish=${PUBLISH}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download runtime archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/npm-binary
          gh release download "${RELEASE_TAG}" \
            --dir dist/npm-binary \
            --pattern 'nimi-runtime_*_macos_*.tar.gz' \
            --pattern 'nimi-runtime_*_linux_*.tar.gz' \
            --pattern 'nimi-runtime_*_windows_*.zip'

      - name: Stamp npm package versions
        env:
          NIMI_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const version = process.env.NIMI_VERSION;
          const root = path.resolve('npm-packages');
          const packageDirs = fs.readdirSync(root, { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => path.join(root, entry.name));

          for (const dir of packageDirs) {
            const packageJsonPath = path.join(dir, 'package.json');
            const pkg = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
            pkg.version = version;
            if (pkg.optionalDependencies) {
              for (const key of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[key] = version;
              }
            }
            fs.writeFileSync(packageJsonPath, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          NODE

      - name: Unpack platform binaries
        env:
          NIMI_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          VERSION="${NIMI_VERSION}"

          mkdir -p npm-packages/nimi-darwin-arm64/bin
          mkdir -p npm-packages/nimi-darwin-x64/bin
          mkdir -p npm-packages/nimi-linux-arm64/bin
          mkdir -p npm-packages/nimi-linux-x64/bin
          mkdir -p npm-packages/nimi-win32-arm64/bin
          mkdir -p npm-packages/nimi-win32-x64/bin

          tar -xzf "dist/npm-binary/nimi-runtime_${VERSION}_macos_arm64.tar.gz" -C npm-packages/nimi-darwin-arm64/bin
          tar -xzf "dist/npm-binary/nimi-runtime_${VERSION}_macos_x64.tar.gz" -C npm-packages/nimi-darwin-x64/bin
          tar -xzf "dist/npm-binary/nimi-runtime_${VERSION}_linux_arm64.tar.gz" -C npm-packages/nimi-linux-arm64/bin
          tar -xzf "dist/npm-binary/nimi-runtime_${VERSION}_linux_x64.tar.gz" -C npm-packages/nimi-linux-x64/bin

          unzip -o "dist/npm-binary/nimi-runtime_${VERSION}_windows_arm64.zip" -d npm-packages/nimi-win32-arm64/bin
          unzip -o "dist/npm-binary/nimi-runtime_${VERSION}_windows_x64.zip" -d npm-packages/nimi-win32-x64/bin

          chmod +x npm-packages/nimi-darwin-arm64/bin/nimi
          chmod +x npm-packages/nimi-darwin-x64/bin/nimi
          chmod +x npm-packages/nimi-linux-arm64/bin/nimi
          chmod +x npm-packages/nimi-linux-x64/bin/nimi

      - name: Verify platform package payloads
        run: |
          set -euo pipefail
          test -f npm-packages/nimi-darwin-arm64/bin/nimi
          test -f npm-packages/nimi-darwin-x64/bin/nimi
          test -f npm-packages/nimi-linux-arm64/bin/nimi
          test -f npm-packages/nimi-linux-x64/bin/nimi
          test -f npm-packages/nimi-win32-arm64/bin/nimi.exe
          test -f npm-packages/nimi-win32-x64/bin/nimi.exe

      - name: Smoke test launcher package
        run: node scripts/check-npm-binary-smoke.mjs

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for package_dir in \
            npm-packages/nimi-darwin-arm64 \
            npm-packages/nimi-darwin-x64 \
            npm-packages/nimi-linux-arm64 \
            npm-packages/nimi-linux-x64 \
            npm-packages/nimi-win32-arm64 \
            npm-packages/nimi-win32-x64
          do
            if [[ "${{ steps.tag.outputs.publish }}" == "true" ]]; then
              npm publish "${package_dir}" --access public
            else
              npm publish "${package_dir}" --access public --dry-run
            fi
          done

      - name: Publish launcher package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.tag.outputs.publish }}" == "true" ]]; then
            npm publish npm-packages/nimi --access public
          else
            npm publish npm-packages/nimi --access public --dry-run
          fi
