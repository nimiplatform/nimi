name: security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: python -m pip install --upgrade pip && pip install detect-secrets==1.5.0

      - name: Secret baseline gate
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline

  workflow-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1

      - name: Install zizmor
        run: cargo install --locked zizmor

      - name: Workflow and dependabot audit (high severity gate)
        run: >
          zizmor
          --no-online-audits
          --min-severity high
          --collect workflows
          --collect dependabot
          --
          .github/workflows
          .github/dependabot.yml
