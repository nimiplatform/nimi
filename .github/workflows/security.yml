name: security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: python -m pip install --upgrade pip && pip install detect-secrets==1.5.0

      - name: Secret baseline gate
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline

  workflow-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install zizmor
        run: cargo install --locked zizmor

      - name: Workflow and dependabot audit (high severity gate)
        run: >
          zizmor
          --no-online-audits
          --min-severity high
          --collect workflows
          --collect dependabot
          --
          .github/workflows
          .github/dependabot.yml
