name: live-smoke-matrix

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

concurrency:
  group: live-smoke-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NIMI_MODS_REF: 931311bcc79ce93195e539da793a05579ee66194 # pragma: allowlist secret

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    env:
      NIMI_MODS_LIVE: '1'
      NIMI_LIVE_GEMINI_API_KEY: ${{ secrets.NIMI_LIVE_GEMINI_API_KEY }}
      NIMI_LIVE_GEMINI_MODEL_ID: ${{ vars.NIMI_LIVE_GEMINI_MODEL_ID || 'gemini-3-flash-preview' }}
      NIMI_LIVE_ALIBABA_BASE_URL: ${{ vars.NIMI_LIVE_ALIBABA_BASE_URL || 'https://dashscope.aliyuncs.com/compatible-mode/v1' }}
      NIMI_LIVE_ALIBABA_API_KEY: ${{ secrets.NIMI_LIVE_ALIBABA_API_KEY }}
      NIMI_LIVE_ALIBABA_CHAT_MODEL_ID: ${{ vars.NIMI_LIVE_ALIBABA_CHAT_MODEL_ID || 'alibaba/qwen-turbo' }}
      NIMI_LIVE_DASHSCOPE_BASE_URL: ${{ vars.NIMI_LIVE_ALIBABA_BASE_URL || 'https://dashscope.aliyuncs.com/compatible-mode/v1' }}
      NIMI_LIVE_DASHSCOPE_API_KEY: ${{ secrets.NIMI_LIVE_ALIBABA_API_KEY }}
      NIMI_LIVE_GOLD_SUBJECT_USER_ID: ${{ vars.NIMI_LIVE_GOLD_SUBJECT_USER_ID || 'gold-user' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout nimi-mods (pinned external repo)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nimiplatform/nimi-mods
          token: ${{ secrets.NIMI_MODS_REPO_TOKEN || github.token }}
          ref: ${{ env.NIMI_MODS_REF }}
          path: nimi-mods
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: runtime/go.mod
          cache: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install nimi-mods dependencies
        run: pnpm --dir nimi-mods install --no-frozen-lockfile

      - name: Live provider invariants gate
        run: pnpm check:live-provider-invariants

      - name: Run local-chat live smoke gate
        run: pnpm check:local-chat-live-smoke

      - name: Run live smoke matrix
        run: node scripts/run-live-test-matrix.mjs

      - name: Evaluate nightly live smoke gate
        run: pnpm check:live-smoke-gate --require-release

      - name: Upload live smoke coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: live-test-coverage-${{ github.run_id }}
          path: nimi-coding/.local/report/live-test-coverage.yaml
          if-no-files-found: error
