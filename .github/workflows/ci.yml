name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NIMI_MODS_REF: 1936c644557ebbaa0a3741668ba1b788bcc71e2f # pragma: allowlist secret

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.detect.outputs.docs_changed }}
      core_changed: ${{ steps.detect.outputs.core_changed }}
      shared_changed: ${{ steps.detect.outputs.shared_changed }}
      sdk_changed: ${{ steps.detect.outputs.sdk_changed }}
      runtime_changed: ${{ steps.detect.outputs.runtime_changed }}
      desktop_web_changed: ${{ steps.detect.outputs.desktop_web_changed }}
      mods_changed: ${{ steps.detect.outputs.mods_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            {
              echo "docs_changed=true"
              echo "core_changed=true"
              echo "shared_changed=true"
              echo "sdk_changed=true"
              echo "runtime_changed=true"
              echo "desktop_web_changed=true"
              echo "mods_changed=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          base_sha=""
          head_sha=""
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          else
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${PUSH_HEAD_SHA}"
            if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
              base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || echo "${head_sha}")"
            fi
          fi

          git diff --name-only "${base_sha}" "${head_sha}" > /tmp/nimi_changed_files.txt || true

          docs_changed=false
          core_changed=false
          shared_changed=false
          sdk_changed=false
          runtime_changed=false
          desktop_web_changed=false
          mods_changed=false

          docs_regex='^(docs/|examples/|README\.md$|CHANGELOG\.md$)'
          shared_regex='^(scripts/|package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$|\.github/workflows/|\.gitignore$|\.editorconfig$)'

          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue

            if [[ "${file}" =~ ${docs_regex} ]]; then
              docs_changed=true
            else
              core_changed=true
            fi

            if [[ "${file}" =~ ${shared_regex} ]]; then
              shared_changed=true
            fi
            if [[ "${file}" =~ ^sdk/ ]]; then
              sdk_changed=true
            fi
            if [[ "${file}" =~ ^runtime/ || "${file}" =~ ^proto/ || "${file}" == ".goreleaser.yml" ]]; then
              runtime_changed=true
            fi
            if [[ ( "${file}" =~ ^apps/desktop/ || "${file}" =~ ^apps/web/ ) && ! "${file}" =~ ^apps/(desktop|web)/AGENTS\.md$ ]]; then
              desktop_web_changed=true
            fi
            if [[ "${file}" =~ ^nimi-mods/ ]]; then
              mods_changed=true
            fi
          done < /tmp/nimi_changed_files.txt

          if [[ "${shared_changed}" == "true" ]]; then
            core_changed=true
          fi

          {
            echo "docs_changed=${docs_changed}"
            echo "core_changed=${core_changed}"
            echo "shared_changed=${shared_changed}"
            echo "sdk_changed=${sdk_changed}"
            echo "runtime_changed=${runtime_changed}"
            echo "desktop_web_changed=${desktop_web_changed}"
            echo "mods_changed=${mods_changed}"
          } >> "${GITHUB_OUTPUT}"

  docs-contract:
    needs: changes
    if: needs.changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Linux desktop E2E dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-driver xvfb
          cargo install tauri-driver --locked

      - name: Build SDK surfaces for examples
        run: pnpm build:sdk

      - name: Compile examples
        run: pnpm check:examples

      - name: Build docs portal
        run: pnpm docs:build

      - name: Markdown lint baseline
        run: pnpm check:markdown

      - name: Enforce first-run docs drift contract
        run: pnpm check:first-run-doc-drift

      - name: Enforce no legacy nimid invocation in docs
        run: pnpm check:no-nimid-doc-invocation

      - name: Install script dry-run smoke
        run: pnpm check:install-script-smoke

      - name: Enforce no absolute user-home paths in docs/spec/examples
        run: pnpm check:no-absolute-user-paths

      - name: Enforce no legacy docs contract aliases
        run: pnpm check:no-legacy-doc-contracts

  core-static:
    needs: changes
    if: needs.changes.outputs.core_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Enforce no-legacy imports
        run: pnpm check:no-legacy-imports

      - name: Enforce no-legacy app-auth CLI naming
        run: pnpm check:no-legacy-app-auth-cli

      - name: AGENTS freshness gate
        run: pnpm check:agents-freshness

      - name: Enforce no private local_ai tauri calls in desktop TS
        run: pnpm check:no-local-ai-private-calls

      - name: Enforce no local_ai tauri command exposure
        run: pnpm check:no-local-ai-tauri-commands

      - name: Enforce no legacy nimid symbols
        run: pnpm check:no-nimid-source

      - name: Enforce no legacy mod permissions field
        run: pnpm check:no-legacy-mod-permissions-field

      - name: Enforce desktop no private @client alias
        run: pnpm check:desktop-no-client-alias

      - name: Scope catalog drift check
        run: pnpm check:scope-catalog-drift

      - name: SDK import boundary check
        run: pnpm check:sdk-import-boundary

      - name: SDK single-package layout check
        run: pnpm check:sdk-single-package-layout

      - name: SDK public naming check
        run: pnpm check:sdk-public-naming

      - name: Enforce no createNimiClient legacy entry
        run: pnpm check:no-create-nimi-client

      - name: Enforce no global OpenAPI singleton config
        run: pnpm check:no-global-openapi-config

      - name: Enforce no OpenAPI singleton import
        run: pnpm check:no-openapi-singleton-import

      - name: Runtime spec kernel consistency check
        run: pnpm check:runtime-spec-kernel-consistency

      - name: Runtime spec kernel generated-doc drift check
        run: pnpm check:runtime-spec-kernel-docs-drift

      - name: SDK spec kernel consistency check
        run: pnpm check:sdk-spec-kernel-consistency

      - name: SDK spec kernel generated-doc drift check
        run: pnpm check:sdk-spec-kernel-docs-drift

      - name: Desktop spec kernel consistency check
        run: pnpm check:desktop-spec-kernel-consistency

      - name: Desktop spec kernel generated-doc drift check
        run: pnpm check:desktop-spec-kernel-docs-drift

      - name: Future spec kernel consistency check
        run: pnpm check:future-spec-kernel-consistency

      - name: Future spec kernel generated-doc drift check
        run: pnpm check:future-spec-kernel-docs-drift

      - name: ReasonCode constants policy check
        run: pnpm check:reason-code-constants

      - name: Runtime bridge method drift check
        run: pnpm check:runtime-bridge-method-drift

  ai-context-budget:
    needs: changes
    if: needs.changes.outputs.core_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: AI context budget gate
        run: pnpm check:ai-context-budget

      - name: AI hotspots report
        run: pnpm report:ai-hotspots --limit 120

  sdk-quality:
    needs: changes
    if: needs.changes.outputs.sdk_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build SDK surfaces
        run: pnpm build:sdk

      - name: Test unified sdk
        run: pnpm --filter @nimiplatform/sdk test

      - name: SDK vNext matrix gate
        run: pnpm check:sdk-vnext-matrix

      - name: SDK coverage gate
        run: pnpm check:sdk-coverage

      - name: SDK version matrix check
        run: pnpm check:sdk-version-matrix

      - name: SDK consumer smoke (npm pack + node import)
        run: pnpm check:sdk-consumer-smoke

  runtime-quality:
    needs: changes
    if: needs.changes.outputs.runtime_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: runtime/go.mod
          cache-dependency-path: runtime/go.sum

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Buf CLI
        run: |
          set -euo pipefail
          GOBIN="$(go env GOPATH)/bin"
          echo "${GOBIN}" >> "${GITHUB_PATH}"
          go install github.com/bufbuild/buf/cmd/buf@v1.66.1

      - name: Live provider invariants gate
        run: pnpm check:live-provider-invariants

      - name: Proto lint
        run: pnpm proto:lint

      - name: Proto baseline exists (hard gate)
        run: test -s runtime/proto/runtime-v1.baseline.binpb

      - name: Proto breaking (hard gate)
        run: pnpm proto:breaking

      - name: Proto drift check
        run: pnpm proto:drift-check

      - name: Runtime go build
        working-directory: runtime
        run: go build ./...

      - name: npm binary launcher smoke
        run: pnpm check:npm-binary-smoke

      - name: Runtime go vet
        working-directory: runtime
        run: go vet ./...

      - name: Runtime go coverage gate
        env:
          NIMI_RUNTIME_MIN_STATEMENTS_COVERAGE: 60
        run: pnpm check:runtime-go-coverage

      - name: Runtime ai scenario coverage gate
        run: pnpm check:runtime-ai-scenario-coverage

      - name: Runtime golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          working-directory: runtime

      - name: Runtime govulncheck
        working-directory: runtime
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Runtime compliance gate
        working-directory: runtime
        run: go run ./cmd/runtime-compliance --gate

  desktop-web-quality:
    needs: changes
    if: needs.changes.outputs.desktop_web_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Linux desktop E2E dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver xvfb
          cargo install tauri-driver --locked

      - name: Desktop cloud runtime-only gate
        run: pnpm check:desktop-cloud-runtime-only

      - name: Rust cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Rust runtime bridge tests
        run: cargo test runtime_bridge --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Rust cargo test
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets

      - name: Rust cargo audit
        run: cargo install cargo-audit --locked && cargo audit --file apps/desktop/src-tauri/Cargo.lock

      - name: Typecheck desktop
        run: pnpm --filter @nimiplatform/desktop typecheck

      - name: Test desktop
        run: pnpm --filter @nimiplatform/desktop test

      - name: Desktop E2E smoke
        id: desktop_e2e_smoke
        env:
          NIMI_E2E_NATIVE_DRIVER: /usr/bin/WebKitWebDriver
        run: xvfb-run -a pnpm check:desktop-e2e-smoke

      - name: Desktop E2E journeys
        id: desktop_e2e_journeys
        env:
          NIMI_E2E_NATIVE_DRIVER: /usr/bin/WebKitWebDriver
        run: xvfb-run -a pnpm check:desktop-e2e-journeys

      - name: Generate desktop E2E evidence
        if: always()
        run: |
          pnpm --filter @nimiplatform/desktop run report:desktop-e2e-evidence -- \
            --platform ubuntu-latest \
            --workflow-ref ci \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --commit "${GITHUB_SHA}" \
            --smoke-outcome "${SMOKE_OUTCOME}" \
            --journeys-outcome "${JOURNEYS_OUTCOME}" \
            --native-driver /usr/bin/WebKitWebDriver \
            --tauri-driver tauri-driver \
            --app-mode packaged \
            --artifact-upload-path "apps/desktop/reports/e2e/**"
        env:
          SMOKE_OUTCOME: ${{ steps.desktop_e2e_smoke.outcome }}
          JOURNEYS_OUTCOME: ${{ steps.desktop_e2e_journeys.outcome }}

      - name: Upload desktop E2E evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-e2e-evidence-ubuntu-latest
          path: apps/desktop/reports/e2e/evidence/**
          if-no-files-found: ignore

      - name: Upload desktop E2E artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-e2e-artifacts
          path: apps/desktop/reports/e2e/**
          if-no-files-found: ignore

      - name: Typecheck web
        run: pnpm --filter @nimiplatform/web typecheck

      - name: Build web
        run: pnpm --filter @nimiplatform/web build

  mods-quality:
    needs: changes
    if: needs.changes.outputs.mods_changed == 'true'
    runs-on: ubuntu-latest
    env:
      NIMI_MODS_ROOT: ${{ github.workspace }}/nimi-mods
      NIMI_RUNTIME_MODS_DIR: ${{ github.workspace }}/nimi-mods/runtime
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout nimi-mods (pinned external repo)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nimiplatform/nimi-mods
          ref: ${{ env.NIMI_MODS_REF }}
          path: nimi-mods
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install nimi-mods dependencies
        run: pnpm --dir nimi-mods install --no-frozen-lockfile

      - name: Mods boundary gate
        run: pnpm check:mods-no-runtime-sdk

      - name: local-chat deterministic e2e gate
        run: pnpm check:local-chat-e2e

      - name: Desktop mod smoke gate (local-chat)
        run: pnpm check:desktop-mods-smoke:local-chat

  governance-security:
    needs: changes
    if: needs.changes.outputs.core_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: npm dependency audit
        run: pnpm audit --prod --audit-level=high

      - name: License file map check
        run: pnpm check:license-file-map

      - name: Package license matrix check
        run: pnpm check:package-license-matrix

      - name: Experimental API lifecycle check
        run: pnpm check:experimental-api-lifecycle

  js-contract:
    needs:
      - changes
      - docs-contract
      - core-static
      - ai-context-budget
      - sdk-quality
      - runtime-quality
      - desktop-web-quality
      - mods-quality
      - governance-security
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate CI status
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          DOCS_CONTRACT_RESULT: ${{ needs.docs-contract.result }}
          CORE_STATIC_RESULT: ${{ needs.core-static.result }}
          AI_CONTEXT_BUDGET_RESULT: ${{ needs.ai-context-budget.result }}
          SDK_QUALITY_RESULT: ${{ needs.sdk-quality.result }}
          RUNTIME_QUALITY_RESULT: ${{ needs.runtime-quality.result }}
          DESKTOP_WEB_QUALITY_RESULT: ${{ needs.desktop-web-quality.result }}
          MODS_QUALITY_RESULT: ${{ needs.mods-quality.result }}
          GOVERNANCE_SECURITY_RESULT: ${{ needs.governance-security.result }}
        run: |
          set -euo pipefail
          failed=0

          for item in \
            "changes:${CHANGES_RESULT}" \
            "docs-contract:${DOCS_CONTRACT_RESULT}" \
            "core-static:${CORE_STATIC_RESULT}" \
            "ai-context-budget:${AI_CONTEXT_BUDGET_RESULT}" \
            "sdk-quality:${SDK_QUALITY_RESULT}" \
            "runtime-quality:${RUNTIME_QUALITY_RESULT}" \
            "desktop-web-quality:${DESKTOP_WEB_QUALITY_RESULT}" \
            "mods-quality:${MODS_QUALITY_RESULT}" \
            "governance-security:${GOVERNANCE_SECURITY_RESULT}"; do
            name="${item%%:*}"
            result="${item#*:}"
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "${name} failed with result=${result}" >&2
              failed=1
            fi
          done

          if [[ "${failed}" -ne 0 ]]; then
            exit 1
          fi

          echo "CI aggregate passed (all required jobs succeeded or were skipped by path filters)."
