version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    open-pull-requests-limit: 4
    rebase-strategy: auto
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: gomod
    directory: /runtime
    schedule:
      interval: weekly
      day: monday
      time: "03:20"
      timezone: UTC
    open-pull-requests-limit: 4
    rebase-strategy: auto
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      gomod-security:
        applies-to: security-updates
        patterns:
          - "*"
      gomod-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      gomod-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:40"
      timezone: UTC
    open-pull-requests-limit: 4
    rebase-strategy: auto
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      github-actions-all:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 2
    rebase-strategy: auto
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      docker-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - major
