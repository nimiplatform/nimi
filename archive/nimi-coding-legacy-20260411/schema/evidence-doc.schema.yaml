id: nimi-coding.evidence-doc.v1
kind: markdown-doc
doc_type: evidence
required_frontmatter:
  - title
  - doc_type
  - status
  - reason
  - owner
  - updated_at
  - decision
status_enum:
  - recorded
  - accepted
  - rejected
  - deferred
  - final
  - archived
required_sections:
  - Findings
  - Checks Run
  - Decision
  - Why This Decision
  - Remaining Risks or Gaps
  - Next Action or Reopen Condition
optional_sections:
  - Resolved Findings
  - Invalidated Findings
  - Deferred Findings
  - Superseded Findings
