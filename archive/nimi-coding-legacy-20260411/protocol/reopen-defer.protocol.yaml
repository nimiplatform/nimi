id: reopen-defer.v1
purpose: Define defer and reopen semantics.
requires:
  - explicit reason
  - owner
  - updated_at
  - evidence_ref when closeout is evidence-backed
rules:
  - deferred is not failure
  - deferred does not imply phase completion as complete; it pauses or reroutes the current frozen phase after one closed attempt
  - reopen must be explicit
  - old findings or phases are not reopened by silent state overwrite
