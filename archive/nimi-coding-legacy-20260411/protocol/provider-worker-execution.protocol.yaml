id: provider-worker-execution.v1
purpose: Define the minimum module-owned provider invocation contract for executing one bounded worker phase inside the continuous runner without changing packet, orchestration, or acceptance ownership.
requires:
  - first-cut admitted provider surface limited to codex exec
  - provider invocation role limited to executing one already-dispatched bounded phase from a module-owned prompt artifact
  - required provider prompt preamble owned and injected by nimi-coding prompt-generation or runner logic rather than by topic artifacts or external glue
  - one explicit working directory chosen by the runner that keeps packet-declared authority refs resolvable; first cut expects repository-root execution for codex exec
  - writable behavior limited to packet-declared write_scope and expected worker artifact paths inside the topic workspace
  - provider success meaning limited to successful process completion plus required worker artifact writeback that can be handed to worker-runner-signal.v1 and worker-output.v1 validation
forbids:
  - admission of claude, gemini, kimi, or any provider other than codex exec in the first cut
  - provider-owned semantic acceptance, finding lifecycle judgment, or final confirmation
  - provider mutation of execution-packet or orchestration-state semantics
  - provider stdout or stderr being treated as canonical worker completion output
  - generic agent marketplace, queue, broker, fan-out, or multi-provider orchestration semantics
rules:
  - provider-worker-execution.v1 is protocol-only and must not create a new topic artifact family or persist provider session internals into execution-packet or orchestration-state artifacts
  - the external provider-reference is implementation reference only; admitted-provider authority, success semantics, failure semantics, and timeout semantics remain module-owned by nimi-coding
  - the runner must invoke the provider headlessly against a generated prompt artifact and must capture or validate topic-local worker artifact writeback without relying on human copy/paste or manager salvage
  - provider process start failure, missing binary, non-zero exit, timeout, missing required worker artifacts, or malformed worker artifacts are all fail-close conditions at the provider-execution boundary
  - provider execution may request no semantic state transition directly; only the continuous runner may map provider results into paused, failed, completed, legacy awaiting_confirmation, or continued packet progression
