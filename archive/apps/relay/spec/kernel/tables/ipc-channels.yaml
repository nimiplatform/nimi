# Relay Electron IPC Channel Registry
# Source of truth for RL-IPC-006, RL-IPC-007, RL-IPC-008, RL-IPC-009

channels:
  # AI consume (all carry agentId per RL-CORE-004)
  - channel: relay:ai:generate
    type: unary
    module: ai
    sdk_method: runtime.ai.text.generate
    source_rule: RL-IPC-006

  - channel: relay:ai:stream:open
    type: stream-open
    module: ai
    sdk_method: runtime.ai.text.stream
    source_rule: RL-IPC-006

  - channel: relay:ai:stream:cancel
    type: stream-cancel
    module: ai
    source_rule: RL-IPC-006

  # gRPC stream events (main → renderer)
  - channel: relay:stream:chunk
    type: event
    direction: main-to-renderer
    source_rule: RL-IPC-003

  - channel: relay:stream:end
    type: event
    direction: main-to-renderer
    source_rule: RL-IPC-003

  - channel: relay:stream:error
    type: event
    direction: main-to-renderer
    source_rule: RL-IPC-003

  # Media
  - channel: relay:media:tts:synthesize
    type: unary
    module: media
    sdk_method: runtime.media.tts.synthesize
    source_rule: RL-IPC-007

  - channel: relay:media:tts:voices
    type: unary
    module: media
    sdk_method: runtime.media.tts.listVoices
    source_rule: RL-IPC-007

  - channel: relay:media:stt:transcribe
    type: unary
    module: media
    sdk_method: runtime.media.stt.transcribe
    source_rule: RL-IPC-007

  - channel: relay:media:image:generate
    type: unary
    module: media
    sdk_method: runtime.media.image.generate
    source_rule: RL-IPC-007

  - channel: relay:media:video:generate
    type: unary
    module: media
    sdk_method: runtime.media.video.generate
    source_rule: RL-IPC-007

  # Video job management
  - channel: relay:media:video:job:subscribe
    type: stream-open
    module: media
    sdk_method: runtime.media.jobs.subscribe
    description: Subscribe to video job status events
    source_rule: RL-IPC-007

  - channel: relay:media:video:job:get
    type: unary
    module: media
    sdk_method: runtime.media.jobs.get
    description: Get video job status (polling fallback)
    source_rule: RL-IPC-007

  - channel: relay:media:video:job:artifacts
    type: unary
    module: media
    sdk_method: runtime.media.jobs.getArtifacts
    description: Get completed job artifacts
    source_rule: RL-IPC-007

  - channel: relay:media:video:job:cancel
    type: stream-cancel
    module: media
    description: Cancel video job subscription stream
    source_rule: RL-IPC-007

  # Typed Realm data bridge
  - channel: relay:agent:list
    type: unary
    module: agent
    description: List available agents for selection
    source_rule: RL-IPC-008

  - channel: relay:agent:get
    type: unary
    module: agent
    description: Fetch one agent profile
    source_rule: RL-IPC-008

  # Realtime event forwarding (socket.io → renderer)
  - channel: relay:realtime:message
    type: event
    direction: main-to-renderer
    description: New message in subscribed channel
    source_rule: RL-IPC-009

  - channel: relay:realtime:presence
    type: event
    direction: main-to-renderer
    description: User presence change
    source_rule: RL-IPC-009

  - channel: relay:realtime:status
    type: event
    direction: main-to-renderer
    description: Socket.io connection status change
    source_rule: RL-IPC-009

  - channel: relay:realtime:subscribe
    type: unary
    module: realtime
    description: Subscribe to a channel
    source_rule: RL-IPC-009

  - channel: relay:realtime:unsubscribe
    type: unary
    module: realtime
    description: Unsubscribe from a channel
    source_rule: RL-IPC-009

  # Chat pipeline (RL-PIPE-*)
  - channel: relay:chat:send
    type: unary
    module: chat-pipeline
    description: Send user turn — triggers beat-first pipeline in main process
    source_rule: RL-PIPE-001

  - channel: relay:chat:cancel
    type: unary
    module: chat-pipeline
    description: Cancel in-flight turn (firstBeat + tail beats)
    source_rule: RL-PIPE-005

  - channel: relay:chat:history
    type: unary
    module: chat-pipeline
    description: Load session history for current agent
    source_rule: RL-PIPE-002

  - channel: relay:chat:clear
    type: unary
    module: chat-pipeline
    description: Clear session history
    source_rule: RL-PIPE-002

  - channel: relay:chat:settings:get
    type: unary
    module: chat-pipeline
    description: Get product + inspect settings
    source_rule: RL-PIPE-006

  - channel: relay:chat:settings:set
    type: unary
    module: chat-pipeline
    description: Update product + inspect settings (partial patch)
    source_rule: RL-PIPE-006

  - channel: relay:chat:proactive:toggle
    type: unary
    module: chat-pipeline
    description: Enable/disable proactive heartbeat
    source_rule: RL-PIPE-007

  # Chat pipeline events (main → renderer)
  - channel: relay:chat:turn:phase
    type: event
    direction: main-to-renderer
    description: Turn phase transition (idle/awaiting-first-beat/streaming-first-beat/planning-tail/delivering-tail)
    source_rule: RL-PIPE-001

  - channel: relay:chat:messages
    type: event
    direction: main-to-renderer
    description: Full message array push (replaces per-beat events for simplicity)
    source_rule: RL-PIPE-005

  - channel: relay:chat:sessions
    type: event
    direction: main-to-renderer
    description: Session list update
    source_rule: RL-PIPE-002

  - channel: relay:chat:status-banner
    type: event
    direction: main-to-renderer
    description: Status/error banner for turn failures
    source_rule: RL-PIPE-001

  - channel: relay:chat:prompt-trace
    type: event
    direction: main-to-renderer
    description: Prompt trace diagnostics push
    source_rule: RL-PIPE-003

  - channel: relay:chat:turn-audit
    type: event
    direction: main-to-renderer
    description: Turn audit diagnostics push
    source_rule: RL-PIPE-001

  - channel: relay:chat:input-text
    type: event
    direction: main-to-renderer
    description: Input text clear after turn send
    source_rule: RL-PIPE-001

  - channel: relay:chat:selected-session
    type: event
    direction: main-to-renderer
    description: Selected session ID update
    source_rule: RL-PIPE-002

  # Auth (RL-BOOT-005)
  - channel: relay:auth:status
    type: unary
    module: auth
    description: Query current auth state (pending/authenticating/authenticated/failed)
    source_rule: RL-BOOT-005

  - channel: relay:auth:status
    type: event
    direction: main-to-renderer
    description: Auth state change push (state + error)
    source_rule: RL-BOOT-005

  - channel: relay:auth:logout
    type: unary
    module: auth
    description: Logout and clear session
    source_rule: RL-BOOT-005

  - channel: relay:auth:apply-token
    type: unary
    module: auth
    description: Apply externally obtained token
    source_rule: RL-BOOT-005

  - channel: relay:auth:check-email
    type: unary
    module: auth
    description: Check email entry route (register/otp/password)
    source_rule: RL-BOOT-005

  - channel: relay:auth:password-login
    type: unary
    module: auth
    description: Password-based login
    source_rule: RL-BOOT-005

  - channel: relay:auth:oauth-login
    type: unary
    module: auth
    description: Realm SDK OAuth login passthrough
    source_rule: RL-BOOT-005

  - channel: relay:auth:email-otp-request
    type: unary
    module: auth
    description: Request email OTP code
    source_rule: RL-BOOT-005

  - channel: relay:auth:email-otp-verify
    type: unary
    module: auth
    description: Verify email OTP and login
    source_rule: RL-BOOT-005

  - channel: relay:auth:2fa-verify
    type: unary
    module: auth
    description: Two-factor authentication verify
    source_rule: RL-BOOT-005

  - channel: relay:auth:wallet-challenge
    type: unary
    module: auth
    description: Request wallet login challenge
    source_rule: RL-BOOT-005

  - channel: relay:auth:wallet-login
    type: unary
    module: auth
    description: Wallet signature login
    source_rule: RL-BOOT-005

  - channel: relay:auth:update-password
    type: unary
    module: auth
    description: Update user password
    source_rule: RL-BOOT-005

  - channel: relay:auth:current-user
    type: unary
    module: auth
    description: Query current authenticated user
    source_rule: RL-BOOT-005

  # OAuth loopback (RL-BOOT-006)
  - channel: relay:oauth:listen-for-code
    type: unary
    module: auth
    description: Start loopback HTTP listener for OAuth authorization code callback
    source_rule: RL-BOOT-006

  - channel: relay:oauth:open-external-url
    type: unary
    module: auth
    description: Open authorization URL in system browser
    source_rule: RL-BOOT-006

  - channel: relay:oauth:focus-main-window
    type: unary
    module: auth
    description: Restore and focus main window after OAuth callback
    source_rule: RL-BOOT-006

  - channel: relay:oauth:token-exchange
    type: unary
    module: auth
    description: Exchange authorization code for tokens with PKCE support
    source_rule: RL-BOOT-006

  # Model service (RL-IPC-010)
  - channel: relay:model:list
    type: unary
    module: model
    sdk_method: runtime.model.list
    source_rule: RL-IPC-010

  - channel: relay:model:pull
    type: unary
    module: model
    sdk_method: runtime.model.pull
    source_rule: RL-IPC-010

  - channel: relay:model:remove
    type: unary
    module: model
    sdk_method: runtime.model.remove
    source_rule: RL-IPC-010

  - channel: relay:model:health
    type: unary
    module: model
    sdk_method: runtime.model.checkHealth
    source_rule: RL-IPC-010

  # Local runtime (RL-IPC-011)
  - channel: relay:local:assets:list
    type: unary
    module: local
    sdk_method: runtime.local.listLocalAssets
    source_rule: RL-IPC-011

  - channel: relay:local:assets:verified
    type: unary
    module: local
    sdk_method: runtime.local.listVerifiedAssets
    source_rule: RL-IPC-011

  - channel: relay:local:assets:catalog-search
    type: unary
    module: local
    sdk_method: runtime.local.searchCatalogModels
    source_rule: RL-IPC-011

  - channel: relay:local:assets:install-plan
    type: unary
    module: local
    sdk_method: runtime.local.resolveModelInstallPlan
    source_rule: RL-IPC-011

  - channel: relay:local:assets:install
    type: unary
    module: local
    sdk_method: runtime.local.installVerifiedAsset
    source_rule: RL-IPC-011

  - channel: relay:local:assets:install-verified
    type: unary
    module: local
    sdk_method: runtime.local.installVerifiedAsset
    source_rule: RL-IPC-011

  - channel: relay:local:assets:import
    type: unary
    module: local
    sdk_method: runtime.local.importLocalAsset
    source_rule: RL-IPC-011

  - channel: relay:local:assets:remove
    type: unary
    module: local
    sdk_method: runtime.local.removeLocalAsset
    source_rule: RL-IPC-011

  - channel: relay:local:assets:start
    type: unary
    module: local
    sdk_method: runtime.local.startLocalAsset
    source_rule: RL-IPC-011

  - channel: relay:local:assets:stop
    type: unary
    module: local
    sdk_method: runtime.local.stopLocalAsset
    source_rule: RL-IPC-011

  - channel: relay:local:assets:health
    type: unary
    module: local
    sdk_method: runtime.local.checkLocalAssetHealth
    source_rule: RL-IPC-011

  - channel: relay:local:assets:warm
    type: unary
    module: local
    sdk_method: runtime.local.warmLocalAsset
    source_rule: RL-IPC-011

  - channel: relay:local:device-profile
    type: unary
    module: local
    sdk_method: runtime.local.collectDeviceProfile
    source_rule: RL-IPC-011

  - channel: relay:local:profile:resolve
    type: unary
    module: local
    sdk_method: runtime.local.resolveProfile
    source_rule: RL-IPC-011

  - channel: relay:local:catalog:nodes
    type: unary
    module: local
    sdk_method: runtime.local.listNodeCatalog
    source_rule: RL-IPC-011

  # Connector (RL-IPC-012)
  - channel: relay:connector:create
    type: unary
    module: connector
    sdk_method: runtime.connector.createConnector
    source_rule: RL-IPC-012

  - channel: relay:connector:get
    type: unary
    module: connector
    sdk_method: runtime.connector.getConnector
    source_rule: RL-IPC-012

  - channel: relay:connector:list
    type: unary
    module: connector
    sdk_method: runtime.connector.listConnectors
    source_rule: RL-IPC-012

  - channel: relay:connector:update
    type: unary
    module: connector
    sdk_method: runtime.connector.updateConnector
    source_rule: RL-IPC-012

  - channel: relay:connector:delete
    type: unary
    module: connector
    sdk_method: runtime.connector.deleteConnector
    source_rule: RL-IPC-012

  - channel: relay:connector:test
    type: unary
    module: connector
    sdk_method: runtime.connector.testConnector
    source_rule: RL-IPC-012

  - channel: relay:connector:models
    type: unary
    module: connector
    sdk_method: runtime.connector.listConnectorModels
    source_rule: RL-IPC-012

  - channel: relay:connector:provider-catalog
    type: unary
    module: connector
    sdk_method: runtime.connector.listProviderCatalog
    source_rule: RL-IPC-012

  - channel: relay:connector:catalog-providers
    type: unary
    module: connector
    sdk_method: runtime.connector.listModelCatalogProviders
    source_rule: RL-IPC-012

  - channel: relay:connector:catalog-provider-models
    type: unary
    module: connector
    sdk_method: runtime.connector.listCatalogProviderModels
    source_rule: RL-IPC-012

  - channel: relay:connector:catalog-model-detail
    type: unary
    module: connector
    sdk_method: runtime.connector.getCatalogModelDetail
    source_rule: RL-IPC-012

  - channel: relay:connector:catalog-provider:upsert
    type: unary
    module: connector
    sdk_method: runtime.connector.upsertModelCatalogProvider
    source_rule: RL-IPC-012

  - channel: relay:connector:catalog-provider:delete
    type: unary
    module: connector
    sdk_method: runtime.connector.deleteModelCatalogProvider
    source_rule: RL-IPC-012

  - channel: relay:connector:catalog-overlay:upsert
    type: unary
    module: connector
    sdk_method: runtime.connector.upsertCatalogModelOverlay
    source_rule: RL-IPC-012

  - channel: relay:connector:catalog-overlay:delete
    type: unary
    module: connector
    sdk_method: runtime.connector.deleteCatalogModelOverlay
    source_rule: RL-IPC-012

  # Desktop interop (RL-IPC-013)
  - channel: relay:desktop:open-config
    type: unary
    module: desktop
    description: Open Desktop runtime config page via nimi-desktop:// URL scheme
    source_rule: RL-IPC-013

  # Config
  - channel: relay:config
    type: unary
    module: config
    description: Expose non-secret env defaults (agentId, worldId) to renderer
    source_rule: RL-CORE-003

  # Health
  - channel: relay:health
    type: unary
    module: health
    sdk_method: runtime.health
    source_rule: RL-IPC-002
