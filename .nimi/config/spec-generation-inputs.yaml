version: 1
contract_ref: .nimi/contracts/spec-generation-inputs.schema.yaml
spec_generation_inputs:
  mode: mixed
  canonical_target_root: .nimi/spec
  code_roots:
    - runtime
    - sdk
    - apps/desktop
    - apps/web
    - kit
    - scripts
  docs_roots:
    - README.md
    - .nimi/spec
  structure_roots:
    - .
  human_note_paths:
    - .nimi/topics/closed/2026-04-11-nimicoding-canonical-spec-model-redesign/design.md
  benchmark_blueprint_root: null
  benchmark_mode: none
  acceptance_mode: canonical_tree_validity_without_blueprint
  generation_order:
    - index
    - kernel_markdown
    - kernel_tables
    - generated_views
    - thin_guides
  inference_rules:
    - treat_canonical_root_as_the_only_active_authority_surface
    - infer_domain_structure_from_source_materials_and_benchmark_shape
    - separate_normative_kernel_from_generated_and_guidance_surfaces
    - establish_kernel_markdown_before_thin_guides
    - establish_kernel_tables_before_generated_views
