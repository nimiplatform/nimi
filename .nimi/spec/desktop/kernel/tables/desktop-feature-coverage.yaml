version: 1
features:
  - feature: boot-startup
    risk_tier: P0
    required_layers:
      - unit_contract
      - desktop_e2e_smoke
      - desktop_e2e_recovery
    covers_tabs: []
    covers_bootstrap_phases:
      - runtime-defaults
      - platform-client
      - datasync-init
      - runtime-host
      - runtime-mods
      - external-agent
      - auth-session
      - bootstrap-ready
    covers_ipc_commands:
      - runtime_defaults
      - runtime_bridge_status
    covers_runtime_pages: []
    scenarios:
      - scenario_id: boot.anonymous.login-screen
        source_rule: D-GATE-030
        spec_path: apps/desktop/e2e/specs/boot.anonymous.login-screen.e2e.mjs
      - scenario_id: boot.authenticated.main-shell
        source_rule: D-GATE-030
        spec_path: apps/desktop/e2e/specs/boot.authenticated.main-shell.e2e.mjs
