# Desktop DataSync Flow Enumeration
# Source: apps/desktop/src/runtime/data-sync/facade.ts (DataSync class methods)

flows:
  - flow: infrastructure
    methods:
      - initApi
      - readDataSyncHotState
      - writeDataSyncHotState
      - callApi
      - startPolling
      - stopPolling
      - stopAllPolling
      - emitDataSyncError
      - loadInitialData
    description: DataSync API initialization, hot state, polling, error emission, and initial-load infrastructure
    source_rule: D-DSYNC-000
  - flow: auth
    methods:
      - login
      - register
      - logout
    description: Authentication flows (credential exchange, session teardown)
    source_rule: D-DSYNC-001

  - flow: user
    methods:
      - loadCurrentUser
      - updateUserProfile
      - loadUserProfile
    description: User profile read/write
    source_rule: D-DSYNC-002

  - flow: chat
    methods:
      - loadChats
      - loadMoreChats
      - startChat
      - loadMessages
      - loadMoreMessages
      - sendMessage
      - syncChatEvents
      - flushChatOutbox
      - markChatRead
    description: Chat list, message timeline, outbox, event sync
    source_rule: D-DSYNC-003

  - flow: social
    methods:
      - loadContacts
      - loadSocialSnapshot
      - searchUser
      - requestOrAcceptFriend
      - rejectOrRemoveFriend
      - removeFriend
      - blockUser
      - unblockUser
      - loadFriendRequests
    description: Contacts, friend requests, social graph
    source_rule: D-DSYNC-004

  - flow: world
    methods:
      - loadWorlds
      - loadWorldDetailById
      - loadWorldAgents
      - loadWorldDetailWithAgents
      - loadWorldSemanticBundle
      - loadWorldEvents
      - loadWorldLorebooks
      - loadWorldResourceBindings
      - loadMainWorld
      - loadWorldLevelAudits
    description: World listing, detail, semantic data
    source_rule: D-DSYNC-005

  - flow: transit
    methods:
      - startWorldTransit
      - listWorldTransits
      - getActiveWorldTransit
      - startTransitSession
      - addTransitCheckpoint
      - completeWorldTransit
      - abandonWorldTransit
    description: World transit management
    source_rule: D-DSYNC-012

  - flow: economy
    methods:
      - loadCurrencyBalances
      - loadSparkTransactionHistory
      - loadGemTransactionHistory
      - loadSubscriptionStatus
      - loadSparkPackages
      - createSparkCheckout
      - loadWithdrawalEligibility
      - loadWithdrawalHistory
      - createWithdrawal
      - loadGiftCatalog
      - loadReceivedGifts
      - sendGift
      - acceptGift
      - rejectGift
      - createGiftReview
    description: Currency, transactions, subscriptions, gifts
    source_rule: D-DSYNC-006

  - flow: feed
    methods:
      - loadPostFeed
      - createPost
      - createImageDirectUpload
      - createVideoDirectUpload
      - finalizeResource
    description: Social feed posts and resource uploads; direct-upload sessions require
      finalizeResource after S3 upload before createPost; createPost references resourceId only
    source_rule: D-DSYNC-007

  - flow: explore
    methods:
      - loadExploreFeed
      - loadMoreExploreFeed
      - loadAgentDetails
    description: Explore discovery feed and agent detail
    source_rule: D-DSYNC-008

  - flow: notification
    methods:
      - loadNotificationUnreadCount
      - loadNotifications
      - markNotificationsRead
      - markNotificationRead
    description: Notification listing and read status
    source_rule: D-DSYNC-009

  - flow: settings
    methods:
      - loadMySettings
      - updateMySettings
      - loadMyNotificationSettings
      - updateMyNotificationSettings
      - loadMyCreatorEligibility
    description: User settings and notification preferences
    source_rule: D-DSYNC-010

  - flow: agent
    methods:
      - loadMyAgents
    description: Agent listing only; Agent LLM route/memory stays in host data capabilities for mods
    source_rule: D-DSYNC-011
