# Desktop IPC Commands (Tauri invoke)
# Source of truth: apps/desktop/src-tauri/src/main_parts/app_bootstrap.rs
# Synced: 2026-03-09

commands:
  # Runtime lifecycle
  - command: runtime_defaults
    module: runtime-defaults
    description: Get realm and runtime execution defaults
    source_rule: D-IPC-001

  - command: auth_session_load
    module: auth-session
    description: Load the shared encrypted desktop auth session from ~/.nimi/auth/session.v1.json
    source_rule: D-IPC-001

  - command: auth_session_save
    module: auth-session
    description: Atomically overwrite the shared encrypted desktop auth session
    source_rule: D-IPC-001

  - command: auth_session_clear
    module: auth-session
    description: Delete the shared desktop auth session file
    source_rule: D-IPC-001

  - command: desktop_release_info_get
    module: desktop-release
    description: Read validated desktop release metadata for the packaged shell + bundled runtime unit
    source_rule: D-IPC-015

  - command: desktop_update_state_get
    module: desktop-update
    description: Read current desktop updater state machine snapshot
    source_rule: D-IPC-015

  - command: desktop_update_check
    module: desktop-update
    description: Check GitHub release metadata for a newer packaged desktop update
    source_rule: D-IPC-015

  - command: desktop_update_download
    module: desktop-update
    description: Download the currently available packaged desktop update
    source_rule: D-IPC-015

  - command: desktop_update_install
    module: desktop-update
    description: Consume already-downloaded update bytes and enter installer stage for the packaged desktop update
    source_rule: D-IPC-015

  - command: desktop_update_restart
    module: desktop-update
    description: Restart the packaged desktop after updater install is ready
    source_rule: D-IPC-015

  # System / telemetry
  - command: get_system_resource_snapshot
    module: system
    description: Collect system resource snapshot (CPU, memory, GPU) for device profiling
    source_rule: D-IPC-009

  # HTTP proxy
  - command: http_request
    module: http
    description: Proxy HTTP request through Tauri backend (bypasses browser CORS)
    source_rule: D-IPC-004

  # UI
  - command: open_external_url
    module: ui
    description: Open external URL in system browser
    source_rule: D-IPC-005

  - command: desktop_avatar_launch_handoff
    module: ui
    description: Launch the avatar app handoff URI with explicit agent/avatar-instance/anchor context and no raw JWT payload
    source_rule: D-IPC-005

  - command: oauth_token_exchange
    module: oauth
    description: Exchange OAuth authorization code for tokens
    source_rule: D-IPC-006

  - command: oauth_listen_for_code
    module: oauth
    description: Listen for OAuth callback code on redirect URI
    source_rule: D-IPC-006

  - command: confirm_private_sync
    module: ui
    description: Confirm private data sync for agent/session
    source_rule: D-IPC-005

  - command: log_renderer_event
    module: telemetry
    description: Forward renderer-side structured log event to Tauri backend logger
    source_rule: D-IPC-009

  - command: start_window_drag
    module: ui
    description: Start native window drag operation
    source_rule: D-IPC-005

  - command: menu_bar_sync_runtime_health
    module: ui
    description: Sync menu bar runtime/provider health summary from renderer to Tauri backend
    source_rule: D-IPC-005

  - command: menu_bar_complete_quit
    module: ui
    description: Finalize explicit app quit after renderer cleanup
    source_rule: D-IPC-005

  # Mod local (runtime_mod::commands)
  - command: runtime_mod_append_audit
    module: mod-local
    description: Append mod audit record
    source_rule: D-IPC-007

  - command: runtime_mod_query_audit
    module: mod-local
    description: Query mod audit records
    source_rule: D-IPC-007

  - command: runtime_mod_delete_audit
    module: mod-local
    description: Delete mod audit record
    source_rule: D-IPC-007

  - command: runtime_mod_list_local_manifests
    module: mod-local
    description: List local mod manifest summaries
    source_rule: D-IPC-007

  - command: runtime_mod_list_installed
    module: mod-local
    description: List installed runtime mods
    source_rule: D-IPC-007

  - command: runtime_mod_sources_list
    module: mod-local
    description: List registered runtime mod source directories
    source_rule: D-IPC-013

  - command: runtime_mod_sources_upsert
    module: mod-local
    description: Add or update a runtime mod source directory
    source_rule: D-IPC-013

  - command: runtime_mod_sources_remove
    module: mod-local
    description: Remove a runtime mod source directory
    source_rule: D-IPC-013

  - command: runtime_mod_dev_mode_get
    module: mod-local
    description: Read Desktop Mod Developer Mode state
    source_rule: D-IPC-013

  - command: runtime_mod_dev_mode_set
    module: mod-local
    description: Update Desktop Mod Developer Mode state
    source_rule: D-IPC-013

  - command: runtime_mod_storage_dirs_get
    module: mod-local
    description: Read Desktop nimi_dir and nimi_data_dir storage directories
    source_rule: D-IPC-013

  - command: runtime_mod_data_dir_set
    module: mod-local
    description: Update Desktop nimi_data_dir and switch storage roots
    source_rule: D-IPC-013

  - command: runtime_mod_diagnostics_list
    module: mod-local
    description: List runtime mod source diagnostics and conflict records
    source_rule: D-IPC-013

  - command: runtime_mod_reload
    module: mod-local
    description: Trigger reload diagnostics for a single runtime mod
    source_rule: D-IPC-013

  - command: runtime_mod_reload_all
    module: mod-local
    description: Trigger reload diagnostics for all runtime mods
    source_rule: D-IPC-013

  - command: runtime_mod_install
    module: mod-local
    description: Install a prebuilt runtime mod from directory, archive, or URL
    source_rule: D-IPC-007

  - command: runtime_mod_update
    module: mod-local
    description: Update an installed runtime mod from a prebuilt package source
    source_rule: D-IPC-007

  - command: runtime_mod_uninstall
    module: mod-local
    description: Uninstall an installed runtime mod package without deleting its mod-data directory
    source_rule: D-IPC-007

  - command: runtime_mod_read_manifest
    module: mod-local
    description: Read an installed runtime mod manifest
    source_rule: D-IPC-007

  - command: runtime_mod_install_progress
    module: mod-local
    description: Query runtime mod install progress events
    source_rule: D-IPC-007

  - command: runtime_mod_read_local_entry
    module: mod-local
    description: Read local mod entry source code
    source_rule: D-IPC-007

  - command: runtime_mod_read_local_asset
    module: mod-local
    description: Read manifest-declared local mod asset payload
    source_rule: D-IPC-007

  - command: runtime_mod_get_action_idempotency
    module: mod-local
    description: Get mod action idempotency record
    source_rule: D-IPC-007

  - command: runtime_mod_put_action_idempotency
    module: mod-local
    description: Put mod action idempotency record
    source_rule: D-IPC-007

  - command: runtime_mod_purge_action_idempotency
    module: mod-local
    description: Purge expired mod action idempotency records
    source_rule: D-IPC-007

  - command: runtime_mod_get_action_verify_ticket
    module: mod-local
    description: Get mod action verify ticket
    source_rule: D-IPC-007

  - command: runtime_mod_put_action_verify_ticket
    module: mod-local
    description: Put mod action verify ticket
    source_rule: D-IPC-007

  - command: runtime_mod_delete_action_verify_ticket
    module: mod-local
    description: Delete mod action verify ticket
    source_rule: D-IPC-007

  - command: runtime_mod_purge_action_verify_tickets
    module: mod-local
    description: Purge expired mod action verify tickets
    source_rule: D-IPC-007

  - command: runtime_mod_put_action_execution_ledger
    module: mod-local
    description: Put mod action execution ledger entry
    source_rule: D-IPC-007

  - command: runtime_mod_query_action_execution_ledger
    module: mod-local
    description: Query mod action execution ledger
    source_rule: D-IPC-007

  - command: runtime_mod_purge_action_execution_ledger
    module: mod-local
    description: Purge expired mod action execution ledger entries
    source_rule: D-IPC-007

  - command: runtime_mod_media_cache_put
    module: mod-local
    description: Put media blob into mod media cache
    source_rule: D-IPC-007

  - command: runtime_mod_media_cache_gc
    module: mod-local
    description: Garbage-collect expired mod media cache entries
    source_rule: D-IPC-007

  - command: runtime_mod_storage_file_read
    module: mod-local
    description: Read a text or binary file from the caller mod's files storage subtree
    source_rule: D-IPC-007

  - command: runtime_mod_storage_file_write
    module: mod-local
    description: Atomically write a text or binary file into the caller mod's files storage subtree
    source_rule: D-IPC-007

  - command: runtime_mod_storage_file_delete
    module: mod-local
    description: Delete a file or directory from the caller mod's files storage subtree
    source_rule: D-IPC-007

  - command: runtime_mod_storage_file_list
    module: mod-local
    description: List entries under the caller mod's files storage subtree
    source_rule: D-IPC-007

  - command: runtime_mod_storage_file_stat
    module: mod-local
    description: Read metadata for a path under the caller mod's files storage subtree
    source_rule: D-IPC-007

  - command: runtime_mod_storage_sqlite_query
    module: mod-local
    description: Execute a read query against the caller mod's sqlite/main.db
    source_rule: D-IPC-007

  - command: runtime_mod_storage_sqlite_execute
    module: mod-local
    description: Execute a write statement against the caller mod's sqlite/main.db
    source_rule: D-IPC-007

  - command: runtime_mod_storage_sqlite_transaction
    module: mod-local
    description: Execute a write transaction against the caller mod's sqlite/main.db
    source_rule: D-IPC-007

  - command: runtime_mod_storage_data_purge
    module: mod-local
    description: Delete the caller mod's host-managed mod-data directory
    source_rule: D-IPC-007

  # External agent (external_agent_gateway)
  - command: external_agent_issue_token
    module: external-agent
    description: Issue external agent access token
    source_rule: D-IPC-008

  - command: external_agent_revoke_token
    module: external-agent
    description: Revoke external agent access token
    source_rule: D-IPC-008

  - command: external_agent_list_tokens
    module: external-agent
    description: List external agent tokens
    source_rule: D-IPC-008

  - command: external_agent_verify_execution_context
    module: external-agent
    description: Verify external agent execution context before action dispatch
    source_rule: D-IPC-008

  - command: external_agent_sync_action_descriptors
    module: external-agent
    description: Sync external agent action descriptors
    source_rule: D-IPC-008

  - command: external_agent_complete_execution
    module: external-agent
    description: Complete external agent action execution
    source_rule: D-IPC-008

  - command: external_agent_gateway_status
    module: external-agent
    description: Get external agent gateway status
    source_rule: D-IPC-008

  # Runtime bridge (runtime_bridge) — gRPC transport
  - command: runtime_bridge_unary
    module: runtime-bridge
    description: Forward a unary gRPC call to runtime daemon via IPC bridge
    source_rule: D-IPC-012

  - command: runtime_bridge_stream_open
    module: runtime-bridge
    description: Open a server-streaming gRPC call to runtime daemon via IPC bridge
    source_rule: D-IPC-012

  - command: runtime_bridge_stream_close
    module: runtime-bridge
    description: Close an active server-streaming gRPC call via IPC bridge
    source_rule: D-IPC-012

  - command: runtime_bridge_status
    module: runtime-daemon
    description: Get runtime daemon status (running, managed, launchMode, grpcAddr)
    source_rule: D-IPC-002

  - command: runtime_bridge_start
    module: runtime-daemon
    description: Start runtime daemon
    source_rule: D-IPC-002

  - command: runtime_bridge_stop
    module: runtime-daemon
    description: Stop runtime daemon
    source_rule: D-IPC-002

  - command: runtime_bridge_restart
    module: runtime-daemon
    description: Restart runtime daemon
    source_rule: D-IPC-002

  - command: runtime_bridge_config_get
    module: runtime-daemon
    description: Get runtime bridge configuration
    source_rule: D-IPC-003

  - command: runtime_bridge_config_set
    module: runtime-daemon
    description: Set runtime bridge configuration
    source_rule: D-IPC-003

  # Local runtime (local_runtime::commands)
  - command: runtime_local_audits_list
    module: local-runtime
    description: Host helper surface for local AI audit listing; shipped product paths must treat runtime audit state as authoritative
    source_rule: D-IPC-011

  - command: runtime_local_pick_asset_manifest_path
    module: local-runtime
    description: Pick a local AI asset.manifest.json path under the runtime models root via native file dialog
    source_rule: D-IPC-011

  - command: runtime_local_pick_asset_directory
    module: local-runtime
    description: Pick a local asset bundle directory for bundle import or rescan helper flows
    source_rule: D-IPC-011

  - command: runtime_local_assets_install_verified
    module: local-runtime
    description: Install a verified asset through the runtime-authoritative verified asset catalog; ordinary-user local speech flows still require explicit Download confirmation and runtime-owned bundle projection
    source_rule: D-IPC-011

  - command: runtime_local_assets_import
    module: local-runtime
    description: Import a local asset from an asset.manifest.json file
    source_rule: D-IPC-011

  - command: runtime_local_models_catalog_search
    module: local-runtime
    description: Host catalog helper; catalog/install-plan truth must remain runtime-owned
    source_rule: D-IPC-011

  - command: runtime_local_models_catalog_list_variants
    module: local-runtime
    description: Host catalog helper for model variants; not a local model state truth source
    source_rule: D-IPC-011

  - command: runtime_local_models_catalog_resolve_install_plan
    module: local-runtime
    description: Host install-plan helper; product install-plan truth must remain runtime-owned
    source_rule: D-IPC-011

  - command: runtime_local_profiles_resolve
    module: local-runtime
    description: Resolve a mod-declared local AI profile into an executable runtime plan
    source_rule: D-IPC-011

  - command: runtime_local_device_profile_collect
    module: local-runtime
    description: Collect local device profile (CPU/GPU/NPU/disk/ports)
    source_rule: D-IPC-011

  - command: runtime_local_recommendation_feed_get
    module: local-runtime
    description: Read capability-scoped host recommendation feed; helper-only and not a local model truth source
    source_rule: D-IPC-011

  - command: runtime_local_profiles_apply
    module: local-runtime
    description: Apply a resolved local AI profile after host confirmation without creating Desktop-owned local model truth
    source_rule: D-IPC-011

  - command: runtime_local_services_list
    module: local-runtime
    description: Host helper surface for local service listing; shipped product paths must treat RuntimeLocalService as the service truth source
    source_rule: D-IPC-011

  - command: runtime_local_services_install
    module: local-runtime
    description: Host service install helper; shipped product install truth must come from RuntimeLocalService and must not imply Desktop-owned local speech install truth
    source_rule: D-IPC-011

  - command: runtime_local_services_start
    module: local-runtime
    description: Host service start helper; shipped product lifecycle truth must come from RuntimeLocalService and must not bypass explicit Download-gated speech bundle flows
    source_rule: D-IPC-011

  - command: runtime_local_services_stop
    module: local-runtime
    description: Host service stop helper; shipped product lifecycle truth must come from RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_services_health
    module: local-runtime
    description: Host service health helper; shipped product health truth must come from RuntimeLocalService and may only feed a runtime-owned speech bundle projection
    source_rule: D-IPC-011

  - command: runtime_local_services_remove
    module: local-runtime
    description: Host service removal helper; shipped product removal truth must come from RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_nodes_catalog_list
    module: local-runtime
    description: Host node-catalog helper; node availability truth remains runtime-owned
    source_rule: D-IPC-011

  - command: runtime_local_assets_install
    module: local-runtime
    description: Install an asset from catalog parameters; execution truth is RuntimeLocalService and must not create Desktop-owned speech bundle truth
    source_rule: D-IPC-011

  - command: runtime_local_assets_import_file
    module: local-runtime
    description: Import a local asset file; execution truth is RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_assets_import_bundle
    module: local-runtime
    description: Import a local asset bundle directory; execution truth is RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_assets_remove
    module: local-runtime
    description: Remove an installed asset; execution truth is RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_assets_start
    module: local-runtime
    description: Start a runnable asset; lifecycle truth is RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_assets_stop
    module: local-runtime
    description: Stop a running asset; lifecycle truth is RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_assets_health
    module: local-runtime
    description: Check asset health; health truth is RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_downloads_list
    module: local-runtime
    description: List active download/transfer sessions
    source_rule: D-IPC-011

  - command: runtime_local_downloads_pause
    module: local-runtime
    description: Pause an active download session
    source_rule: D-IPC-011

  - command: runtime_local_downloads_resume
    module: local-runtime
    description: Resume a paused download session
    source_rule: D-IPC-011

  - command: runtime_local_downloads_cancel
    module: local-runtime
    description: Cancel an active download session
    source_rule: D-IPC-011

  - command: runtime_local_pick_asset_file
    module: local-runtime
    description: Pick a local asset file for import via native file dialog
    source_rule: D-IPC-011

  - command: runtime_local_append_inference_audit
    module: local-runtime
    description: Append a local AI inference audit record
    source_rule: D-IPC-011

  - command: runtime_local_append_runtime_audit
    module: local-runtime
    description: Append local runtime audit event
    source_rule: D-IPC-011

  - command: runtime_local_assets_reveal_in_folder
    module: local-runtime
    description: Reveal installed asset files in system file manager
    source_rule: D-IPC-011

  - command: runtime_local_assets_reveal_root_folder
    module: local-runtime
    description: Reveal the runtime models root folder in the system file manager
    source_rule: D-IPC-011

  - command: runtime_local_assets_scan_unregistered
    module: local-runtime
    description: Host-local unregistered asset helper; if shipped product paths have runtime scan coverage, runtime remains the only truth source
    source_rule: D-IPC-011

  - command: runtime_local_assets_scaffold_orphan
    module: local-runtime
    description: Host-local orphan intake helper that promotes an explicitly reviewed loose asset file into runtime-managed storage via RuntimeLocalService
    source_rule: D-IPC-011

  - command: runtime_local_assets_rescan_bundle
    module: local-runtime
    description: Re-scan a previously imported asset bundle directory; execution truth is RuntimeLocalService
    source_rule: D-IPC-011
