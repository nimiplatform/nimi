version: 1
gates:
  - gate: unit_contract_mock
    command: pnpm --filter @nimiplatform/desktop test
    source_rule: D-GATE-010
  - gate: rust_tauri_integration
    command: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml && cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets
    source_rule: D-GATE-020
  - gate: desktop_e2e_smoke
    command: pnpm check:desktop-e2e-smoke
    source_rule: D-GATE-030
  - gate: desktop_e2e_journeys
    command: pnpm check:desktop-e2e-journeys
    source_rule: D-GATE-040
  - gate: selector_testability
    command: pnpm --filter @nimiplatform/desktop lint && pnpm check:desktop-e2e-smoke
    source_rule: D-GATE-050
  - gate: os_matrix
    command: linux:PR+release; windows:release; macos:manual-smoke+supplementary-automated-smoke
    source_rule: D-GATE-060
  - gate: desktop_macos_automated_smoke
    command: pnpm check:desktop-macos-smoke
    source_rule: D-GATE-060
  - gate: release_parity
    command: pnpm check:desktop-e2e-smoke && pnpm check:desktop-e2e-journeys
    source_rule: D-GATE-070
  - gate: spec_consistency
    command: pnpm exec nimicoding validate-spec-governance --profile nimi --scope desktop-consistency
    source_rule: D-GATE-080
  - gate: docs_drift
    command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope desktop --check
    source_rule: D-GATE-080
  - gate: design_contract
    command: pnpm check:desktop-design-contract
    source_rule: D-GATE-090
  - gate: design_adoption
    command: pnpm check:desktop-design-contract
    source_rule: D-GATE-091
