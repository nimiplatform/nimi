version: 1
surfaces:
  - path: .nimi/spec/sdk/index.md
    package_subpath: "@nimiplatform/sdk"
    role: app_composition_root
    governed_by: [S-SURFACE-001, S-SURFACE-012, S-RUNTIME-091]
    note: Root composition surface may host World Evolution Engine app-facing logical facade candidates without implying new daemon RPC parity
  - path: .nimi/spec/sdk/runtime.md
    package_subpath: "@nimiplatform/sdk/runtime"
    role: runtime_projection
    governed_by: [S-SURFACE-002, S-SURFACE-007, S-SURFACE-009, S-SURFACE-011, S-SURFACE-012, S-RUNTIME-091]
    note: Shared World Evolution Engine app-facing candidate types may be projected here, but logical facades remain consumer-seam-only rather than daemon method-group parity
  - path: .nimi/spec/sdk/world.md
    package_subpath: "@nimiplatform/sdk/world"
    role: world_domain_facade
    governed_by: [S-SURFACE-001, S-SURFACE-014, S-WORLD-001]
    note: Stable world-domain facade subpath composes realm truth consume and runtime-backed materialization without implying daemon RPC parity or K-WEV semantic ownership
  - path: .nimi/spec/sdk/ai-provider.md
    package_subpath: "@nimiplatform/sdk/ai-provider"
    role: ai_provider_projection
    governed_by: [S-SURFACE-011]
  - path: .nimi/spec/sdk/realm.md
    package_subpath: "@nimiplatform/sdk/realm"
    role: realm_projection
    governed_by: [S-SURFACE-004, S-SURFACE-005, S-SURFACE-006, S-SURFACE-007, S-SURFACE-008, S-SURFACE-010]
  - path: .nimi/spec/sdk/scope.md
    package_subpath: "@nimiplatform/sdk/scope"
    role: scope_projection
    governed_by: [S-SURFACE-004]
  - path: .nimi/spec/sdk/mod.md
    package_subpath: "@nimiplatform/sdk/mod"
    role: mod_projection
    governed_by: [S-SURFACE-004, S-SURFACE-012, S-MOD-014]
    note: World Evolution Engine mod-facing candidate families remain host-injected logical facades rather than host bridge passthrough surface
  - path: .nimi/spec/sdk/types.md
    package_subpath: "@nimiplatform/sdk/types"
    role: types_projection
    governed_by: [S-SURFACE-001, S-SURFACE-004]
    note: Shared type definitions (NimiError, ScopeName, ExternalPrincipalId etc) re-exported for external consumers
