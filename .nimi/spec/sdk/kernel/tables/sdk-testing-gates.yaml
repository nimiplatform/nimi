version: 1
gates:
  - gate: unit_module
    command: pnpm --filter @nimiplatform/sdk test
    source_rule: S-GATE-010
  - gate: consumer_smoke
    command: pnpm check:sdk-consumer-smoke
    source_rule: S-GATE-010
  - gate: boundary_checks
    command: pnpm check:sdk-import-boundary && pnpm check:sdk-public-naming && pnpm check:no-create-nimi-client && pnpm check:no-global-openapi-config && pnpm check:sdk-realm-legacy-clean && pnpm check:no-app-realm-rest-bypass && pnpm check:reason-code-constants && pnpm check:sdk-single-package-layout
    source_rule: S-GATE-020
  - gate: vnext_matrix
    command: pnpm check:sdk-vnext-matrix
    source_rule: S-GATE-030
  - gate: mod_scope
    command: pnpm check:mods-no-runtime-sdk && pnpm check:runtime-mod-hook-hardcut
    source_rule: S-GATE-040
  - gate: runtime_projection
    command: pnpm check:runtime-bridge-method-drift
    source_rule: S-GATE-050
  - gate: coverage
    command: pnpm check:sdk-coverage
    source_rule: S-GATE-060
  - gate: provider_alignment
    command: pnpm check:live-provider-invariants
    source_rule: S-GATE-070
  - gate: live_smoke
    command: node scripts/run-live-test-matrix.mjs && pnpm check:live-smoke-gate
    source_rule: S-GATE-080
  - gate: version_matrix
    command: pnpm check:sdk-version-matrix
    source_rule: S-GATE-090
  - gate: release_parity
    command: pnpm check:live-smoke-gate --require-release
    source_rule: S-GATE-090
  - gate: generated_type_quality
    command: pnpm check:sdk-generated-type-quality
    source_rule: S-GATE-091
  - gate: realm_generator_smoke
    command: pnpm check:realm-sdk-generator-smoke
    source_rule: S-GATE-091
  - gate: fallback_hardcut
    command: pnpm check:sdk-fallback-hardcut
    source_rule: S-GATE-091
  - gate: unsafe_raw_usage
    command: pnpm check:sdk-unsafe-raw-usage
    source_rule: S-GATE-091
  - gate: spec_consistency
    command: pnpm exec nimicoding validate-spec-governance --profile nimi --scope sdk-consistency
    source_rule: S-GATE-091
  - gate: docs_drift
    command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope sdk --check
    source_rule: S-GATE-091
