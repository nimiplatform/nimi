  - rule_id: R-BNDL-003
    domain: bundle
    level: must
    statement: Bundle mutation is explicit, idempotent, and auditable; draft editing, publish, archive, and import are first-class lifecycle or event transitions.
    source: .nimi/spec/realm/kernel/bundle-contract.md
  - rule_id: R-BNDL-004
    domain: bundle
    level: must
    statement: Bundle attachment preview resolves through Bundle.coverAssetId to OwnableAsset.previewResourceId to nested Attachment.preview; if the cover asset has no explicit preview resource then bundle read models remain CARD without inferred preview, and Binding kind IMPORT with objectType BUNDLE does not imply member Binding kind USE with objectType ASSET.
    source: .nimi/spec/realm/kernel/bundle-contract.md
  - rule_id: R-TRANSIT-001
