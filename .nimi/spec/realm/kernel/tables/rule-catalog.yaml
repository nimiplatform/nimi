  - rule_id: R-BIND-003
    domain: binding
    level: must
    statement: Binding legality is fail-close and matrix-governed; only declared bindingKind, objectType, hostType, and bindingPoint combinations are valid, and all undeclared combinations must be rejected.
    source: .nimi/spec/realm/kernel/binding-contract.md
  - rule_id: R-BIND-004
    domain: binding
    level: must
    statement: PRESENTATION bindings may carry flat string-map conditions and explicit binding points; USE and IMPORT bindings must not carry conditions; IMPORT bindings must pin the imported bundle version and do not imply member USE bindings.
    source: .nimi/spec/realm/kernel/binding-contract.md
  - rule_id: R-BIND-005
    domain: binding
    level: must
    statement: Binding writes are explicit, idempotent, and auditable; every binding resolves to a world scope, records the creating actor, and uses the same logical uniqueness key for validation, persistence, and upsert behavior.
