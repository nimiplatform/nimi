  - rule_id: R-TRUTH-010
    domain: truth
    level: must
    statement: GET /api/world/by-id/{id}/scenes is a public read surface exposing Scene identity for a world; it does not modify truth state.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-011
    domain: truth
    level: must
    statement: Official Realm content publish must converge on one package-native contract; world-drafts are minimal candidates, not a parallel official truth-write line.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-012
    domain: truth
    level: must
    statement: Official package publish requires explicit governance provenance including official owner, editorial operator, reviewer, publisher, source provenance, and review verdict; missing required governance fields must fail-close.
