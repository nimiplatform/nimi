    source: .nimi/spec/realm/kernel/projection-contract.md
  - rule_id: R-PROJ-003
    domain: projection
    level: must
    statement: Authoritative projection requests must explicitly identify world scope, agent scope, consumer surface, governing release/truth anchor, and constrained context envelope.
    source: .nimi/spec/realm/kernel/projection-contract.md
  - rule_id: R-PROJ-004
    domain: projection
    level: must
    statement: For identical inputs, consumer surface, release/truth anchor, and constrained context envelope, authoritative projection must be deterministic and checksumable.
