  - rule_id: R-BIND-002
    domain: binding
    level: must
    statement: Active binding object types are RESOURCE, ASSET, and BUNDLE; active binding host types are WORLD, AGENT, SCENE, WORLD_EVENT, and WORLDVIEW; WORKSPACE is outside the active backend binding model until a host contract exists.
