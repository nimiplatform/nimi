  - rule_id: R-TRUTH-002
    domain: truth
    level: must
    statement: World truth is anchored by WorldRule plus WorldRelease; Worldview is projection not truth.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-003
    domain: truth
    level: must
    statement: Agent truth is anchored by AgentRule and defines durable identity boundaries only.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-004
    domain: truth
    level: must
    statement: Truth writes are reserved for creator or control-plane authority.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-005
    domain: truth
    level: must
    statement: Truth changes must be explicit, versioned, transactional, and auditable.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-006
    domain: truth
    level: must
    statement: Realm truth must remain app-independent and cannot be owned by a single runtime path.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-007
    domain: truth
    level: must
    statement: OASIS is the unique system main world in Realm truth and cannot be creator-owned or replaced by creator convention.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-008
    domain: truth
    level: must
    statement: GET /api/world/oasis is a formal Realm truth read surface for the system main world.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-009
    domain: truth
    level: must
    statement: Public read surfaces may expose computed aggregates derived from truth but must not expose AgentRule content; aggregates are projection not truth writes.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-010
    domain: truth
    level: must
    statement: GET /api/world/by-id/{id}/scenes is a public read surface exposing Scene identity for a world; it does not modify truth state.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-WSTATE-001
    domain: world-state
    level: must
    statement: World State expresses durable shared present only and excludes story runtime.
    source: .nimi/spec/realm/kernel/world-state-contract.md
  - rule_id: R-WSTATE-002
    domain: world-state
    level: must
    statement: State mutation uses an explicit commit envelope with fixed provenance fields.
    source: .nimi/spec/realm/kernel/world-state-contract.md
  - rule_id: R-WSTATE-003
    domain: world-state
    level: must
    statement: World State scope is limited to durable shared scopes WORLD, ENTITY, or RELATION.
    source: .nimi/spec/realm/kernel/world-state-contract.md
  - rule_id: R-WSTATE-004
    domain: world-state
    level: must
    statement: effectClass is fixed to NONE, MEMORY_ONLY, STATE_ONLY, or STATE_AND_HISTORY.
    source: .nimi/spec/realm/kernel/world-state-contract.md
  - rule_id: R-WSTATE-005
    domain: world-state
    level: must
    statement: State writes require explicit app authorization through an appId/schemaId/schemaVersion/effectClass to runMode matrix and fail-close schema validation.
    source: .nimi/spec/realm/kernel/world-state-contract.md
  - rule_id: R-WSTATE-006
    domain: world-state
    level: must
    statement: Creator tooling and authorized apps use the same explicit state commit model.
    source: .nimi/spec/realm/kernel/world-state-contract.md
  - rule_id: R-WHIST-001
    domain: world-history
    level: must
    statement: World History stores canonical happened facts only, not arbitrary story traces.
    source: .nimi/spec/realm/kernel/world-history-contract.md
  - rule_id: R-WHIST-002
    domain: world-history
    level: must
    statement: History append is explicit and cannot be implied by stopping a story run.
    source: .nimi/spec/realm/kernel/world-history-contract.md
  - rule_id: R-WHIST-003
    domain: world-history
    level: must
    statement: Each history event carries typed provenance including appId, sessionId, actorRefs, reason, and evidenceRefs.
    source: .nimi/spec/realm/kernel/world-history-contract.md
  - rule_id: R-WHIST-004
    domain: world-history
    level: must
    statement: Replay and private continuity runs must not append shared world history; only CANON_MUTATION matrix entries may do so.
    source: .nimi/spec/realm/kernel/world-history-contract.md
  - rule_id: R-WHIST-005
    domain: world-history
    level: must
    statement: World History is append-only and corrections use superseding or invalidation records.
    source: .nimi/spec/realm/kernel/world-history-contract.md
  - rule_id: R-WHIST-006
    domain: world-history
    level: must
    statement: App-owned narrative archives must not be represented as Realm canonical world history.
    source: .nimi/spec/realm/kernel/world-history-contract.md
  - rule_id: R-MEM-001
    domain: agent-memory
    level: must
    statement: Agent Memory stores continuity facts only and excludes prompt or runtime orchestration.
    source: .nimi/spec/realm/kernel/agent-memory-contract.md
  - rule_id: R-MEM-002
    domain: agent-memory
    level: must
    statement: Memory class is fixed to PUBLIC_SHARED, WORLD_SHARED, or DYADIC.
    source: .nimi/spec/realm/kernel/agent-memory-contract.md
  - rule_id: R-MEM-003
    domain: agent-memory
    level: must
    statement: DYADIC memory is strictly isolated by agentId and userId.
    source: .nimi/spec/realm/kernel/agent-memory-contract.md
  - rule_id: R-MEM-004
    domain: agent-memory
    level: must
    statement: Memory writes are explicit, auditable, and provenance-bearing.
    source: .nimi/spec/realm/kernel/agent-memory-contract.md
  - rule_id: R-MEM-005
    domain: agent-memory
    level: must
    statement: Private deletion rights apply to DYADIC memory without damaging shared continuity.
    source: .nimi/spec/realm/kernel/agent-memory-contract.md
  - rule_id: R-MEM-006
    domain: agent-memory
    level: must
    statement: History and state may inform memory writes but do not auto-materialize memory by default; run-mode permissions remain explicit in the commit authorization matrix.
    source: .nimi/spec/realm/kernel/agent-memory-contract.md
  - rule_id: R-CHAT-001
    domain: chat
    level: must
    statement: Realm owns Chat as a realm domain and provides the canonical thread, message, read-state, and sync surface.
