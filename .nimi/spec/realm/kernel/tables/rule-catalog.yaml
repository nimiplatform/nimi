  - rule_id: R-TRANSIT-006
    domain: transit
    level: must
    statement: Creator worlds must not transit directly to other creator worlds; transit stays single-hop via OASIS and excludes scene quota/runtime gating.
    source: .nimi/spec/realm/kernel/transit-contract.md
