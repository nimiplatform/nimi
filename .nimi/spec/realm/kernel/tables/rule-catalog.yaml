  - rule_id: R-CHAT-002
    domain: chat
    level: must
    statement: Realm Chat v1 supports only HUMAN_HUMAN DIRECT chat; non-human participants and non-direct shapes must fail-close.
    source: .nimi/spec/realm/kernel/chat-contract.md
  - rule_id: R-CHAT-003
    domain: chat
    level: must
    statement: Social gates human chat admission, but canonical chat threads, messages, read state, and sync cursor semantics belong to Chat.
    source: .nimi/spec/realm/kernel/chat-contract.md
  - rule_id: R-CHAT-004
    domain: chat
    level: must
    statement: Human-agent chat, agent-agent chat, model routing, prompt assembly, session orchestration, and turn execution runtime stay outside Realm Chat v1.
    source: .nimi/spec/realm/kernel/chat-contract.md
  - rule_id: R-CHAT-005
    domain: chat
    level: must
    statement: Realm Chat canonicalizes non-text attachments as MessageType ATTACHMENT with payload.attachment generic envelope and does not expose assetId-only or resourceId-only attachment payload contracts.
    source: .nimi/spec/realm/kernel/chat-contract.md
  - rule_id: R-SOC-001
    domain: social
    level: must
    statement: Friendship is the canonical admission graph for realm-level social relationships.
    source: .nimi/spec/realm/kernel/social-contract.md
  - rule_id: R-SOC-002
    domain: social
    level: must
    statement: Friendship uses ordered-pair uniqueness and cannot produce duplicate canonical rows.
    source: .nimi/spec/realm/kernel/social-contract.md
  - rule_id: R-SOC-003
    domain: social
    level: must
    statement: Social defines relationship and admission facts and does not define agent-chat runtime, model routing, or turn execution.
    source: .nimi/spec/realm/kernel/social-contract.md
  - rule_id: R-SOC-004
    domain: social
    level: must
    statement: Social may gate human chat via preconditions, but canonical chat surface lives in Realm Chat and agent chat runtime stays outside Realm.
    source: .nimi/spec/realm/kernel/social-contract.md
  - rule_id: R-ECON-001
    domain: economy
    level: must
    statement: World creator economy and access economics remain auditable and separate from narrative runtime.
    source: .nimi/spec/realm/kernel/economy-contract.md
  - rule_id: R-ECON-002
    domain: economy
    level: must
    statement: AI compute route cost is not modeled as Realm core truth or hidden world mutation.
    source: .nimi/spec/realm/kernel/economy-contract.md
  - rule_id: R-ECON-003
    domain: economy
    level: must
    statement: Revenue and settlement logic use explicit event types and append-only accounting with observable distribution rules.
    source: .nimi/spec/realm/kernel/economy-contract.md
  - rule_id: R-ECON-004
    domain: economy
    level: must
    statement: Apps cannot hide economic state changes inside narrative history or memory commits.
    source: .nimi/spec/realm/kernel/economy-contract.md
  - rule_id: R-RSRC-001
    domain: resource
    level: must
    statement: Realm Resource objects are typed content carriers with stable identity, storage, delivery, status, and controller semantics, not independent ownership semantics.
    source: .nimi/spec/realm/kernel/resource-contract.md
  - rule_id: R-RSRC-002
    domain: resource
    level: must
    statement: Active Resource types are fixed to IMAGE, VIDEO, AUDIO, and TEXT; VOICE remains outside the active hard-cut model.
    source: .nimi/spec/realm/kernel/resource-contract.md
  - rule_id: R-RSRC-003
    domain: resource
    level: must
    statement: Resource lifecycle mutation is explicit, idempotent, and auditable; prepare upload, finalize, update, and delete are lifecycle transitions.
    source: .nimi/spec/realm/kernel/resource-contract.md
  - rule_id: R-RSRC-004
    domain: resource
    level: must
    statement: Resource objects may participate in attachment or binding relations without promoting them into OwnableAsset by default, but Binding kind PRESENTATION with objectType RESOURCE is the only active formal resource-binding shape in Realm.
    source: .nimi/spec/realm/kernel/resource-contract.md
  - rule_id: R-BIND-001
    domain: binding
    level: must
    statement: Realm Binding is the only formal durable relation used to attach Realm objects to Realm hosts for presentation, use, or import semantics; Attachment remains a display envelope only.
    source: .nimi/spec/realm/kernel/binding-contract.md
  - rule_id: R-BIND-002
    domain: binding
    level: must
    statement: Active binding object types are RESOURCE, ASSET, and BUNDLE; active binding host types are WORLD, AGENT, SCENE, WORLD_EVENT, and WORLDVIEW; WORKSPACE is outside the active backend binding model until a host contract exists.
    source: .nimi/spec/realm/kernel/binding-contract.md
  - rule_id: R-BIND-003
    domain: binding
    level: must
    statement: Binding legality is fail-close and matrix-governed; only declared bindingKind, objectType, hostType, and bindingPoint combinations are valid, and all undeclared combinations must be rejected.
    source: .nimi/spec/realm/kernel/binding-contract.md
  - rule_id: R-BIND-004
    domain: binding
    level: must
    statement: PRESENTATION bindings may carry flat string-map conditions and explicit binding points; USE and IMPORT bindings must not carry conditions; IMPORT bindings must pin the imported bundle version and do not imply member USE bindings.
    source: .nimi/spec/realm/kernel/binding-contract.md
  - rule_id: R-BIND-005
    domain: binding
    level: must
    statement: Binding writes are explicit, idempotent, and auditable; every binding resolves to a world scope, records the creating actor, and uses the same logical uniqueness key for validation, persistence, and upsert behavior.
    source: .nimi/spec/realm/kernel/binding-contract.md
  - rule_id: R-ATTACH-001
    domain: attachment
    level: must
    statement: Realm Attachment is a first-class cross-surface envelope with stable targetType plus targetId identity and is not equivalent to Resource, OwnableAsset, Bundle, or Binding.
    source: .nimi/spec/realm/kernel/attachment-contract.md
  - rule_id: R-ATTACH-002
    domain: attachment
    level: must
    statement: Active attachment targets are fixed to RESOURCE, ASSET, and BUNDLE; attachment target enums are independent from binding object enums even when values overlap, write surfaces persist target references only, and read surfaces may resolve display metadata.
    source: .nimi/spec/realm/kernel/attachment-contract.md
  - rule_id: R-ATTACH-003
    domain: attachment
    level: must
    statement: Post attachments persist as ordered PostAttachment relations and chat non-text attachment messages persist as MessageType ATTACHMENT with payload.attachment envelope.
    source: .nimi/spec/realm/kernel/attachment-contract.md
  - rule_id: R-ATTACH-004
    domain: attachment
    level: must
    statement: Resolved attachment read models may expose displayKind, URLs, thumbnails, duration, title, subtitle, and nested preview attachments for card targets; surface readability authorizes preview resolution, and stable APIs must not collapse back to resourceId-only or assetId-only attachment contracts.
    source: .nimi/spec/realm/kernel/attachment-contract.md
  - rule_id: R-RSRC-005
    domain: resource
    level: must
    statement: Resource deliveryAccess defines delivery strategy such as public versus signed URL resolution only; viewer authorization is enforced by the reading surface or controller and must not be inferred from deliveryAccess alone.
    source: .nimi/spec/realm/kernel/resource-contract.md
  - rule_id: R-RSRC-006
    domain: resource
    level: must
    statement: Public resource upload preparation defaults to SIGNED delivery unless the caller explicitly requests PUBLIC; this default applies to direct upload and inline text creation surfaces for managed realm resources.
    source: .nimi/spec/realm/kernel/resource-contract.md
  - rule_id: R-ASSET-101
    domain: asset
    level: must
    statement: Realm OwnableAsset objects are independently ownable formal objects with stable identity, owner, authorship, lineage, lifecycle, and binding policy semantics.
    source: .nimi/spec/realm/kernel/asset-contract.md
  - rule_id: R-ASSET-102
    domain: asset
    level: must
    statement: OwnableAsset is distinct from Resource, truth, history, and memory; raw content carriers and app-private archives must not masquerade as ownable realm assets.
    source: .nimi/spec/realm/kernel/asset-contract.md
  - rule_id: R-ASSET-103
    domain: asset
    level: must
    statement: OwnableAsset mutations are explicit, idempotent, and auditable; create, update, clone, and lifecycle transitions are first-class state changes.
    source: .nimi/spec/realm/kernel/asset-contract.md
  - rule_id: R-ASSET-104
    domain: asset
    level: must
    statement: Formal asset use is expressed only through Binding kind USE with objectType ASSET, while bundle membership or app usage must not usurp asset ownership, lifecycle, policy, or lineage truth.
    source: .nimi/spec/realm/kernel/asset-contract.md
  - rule_id: R-ASSET-105
    domain: asset
    level: must
    statement: OwnableAsset.resourceRefs defines composition only and must reference real, undeleted, attachable Resource objects that the current actor is allowed to reference; OwnableAsset.previewResourceId, when present, must reference one member of resourceRefs, surfaces must not infer preview from resourceRefs ordering, and preview exposure through attachment read models does not change ownership, authorship, acquisition, lifecycle, or policy truth.
    source: .nimi/spec/realm/kernel/asset-contract.md
  - rule_id: R-BNDL-001
    domain: bundle
    level: must
    statement: Realm Bundle objects are formal composition units with stable identity, owner, member ordering, cover asset, metadata, lifecycle, and import semantics.
    source: .nimi/spec/realm/kernel/bundle-contract.md
  - rule_id: R-BNDL-002
    domain: bundle
    level: must
    statement: Bundle members must be OwnableAsset references only and raw Resource objects must not appear as direct bundle members.
    source: .nimi/spec/realm/kernel/bundle-contract.md
  - rule_id: R-BNDL-003
    domain: bundle
    level: must
    statement: Bundle mutation is explicit, idempotent, and auditable; draft editing, publish, archive, and import are first-class lifecycle or event transitions.
    source: .nimi/spec/realm/kernel/bundle-contract.md
  - rule_id: R-BNDL-004
    domain: bundle
    level: must
    statement: Bundle attachment preview resolves through Bundle.coverAssetId to OwnableAsset.previewResourceId to nested Attachment.preview; if the cover asset has no explicit preview resource then bundle read models remain CARD without inferred preview, and Binding kind IMPORT with objectType BUNDLE does not imply member Binding kind USE with objectType ASSET.
    source: .nimi/spec/realm/kernel/bundle-contract.md
  - rule_id: R-TRANSIT-001
    domain: transit
    level: must
    statement: Transit is a continuity protocol for cross-world movement and not a narrative engine.
    source: .nimi/spec/realm/kernel/transit-contract.md
  - rule_id: R-TRANSIT-002
    domain: transit
    level: must
    statement: Transit preserves identity continuity while allowing world-context change.
    source: .nimi/spec/realm/kernel/transit-contract.md
  - rule_id: R-TRANSIT-003
    domain: transit
    level: must
    statement: Transit state changes are explicit, state-machine governed, and auditable.
    source: .nimi/spec/realm/kernel/transit-contract.md
  - rule_id: R-TRANSIT-004
    domain: transit
    level: must
    statement: Transit may hand off durable references but app-local runtime checkpoints stay outside Realm.
    source: .nimi/spec/realm/kernel/transit-contract.md
  - rule_id: R-TRANSIT-005
    domain: transit
    level: must
    statement: OASIS is the default return point and transit hub for creator-world continuity transfer.
