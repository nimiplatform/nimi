  - rule_id: R-TRUTH-013
    domain: truth
    level: must
    statement: Official package publish must atomically write world truth, agent truth, projection inputs, and WorldRelease; partial success middle states are invalid.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-014
    domain: truth
    level: must
    statement: WorldRelease is the sole official release governance anchor; each official publish binds package version, provenance, diff metadata, and rollback lineage to an explicit release identity.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-015
    domain: truth
    level: must
    statement: CanonicalTruthPackage is the formal upstream truth-ingress object for official content publish; it must separate canonical truth units, derivation or inheritance inputs, projection inputs, and governance or release metadata, and must not center lorebook text, prompt payloads, or card views.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-016
    domain: truth
    level: must
    statement: InheritanceLink is the formal world-truth-to-agent-truth edge; WORLD_INHERITED and worldRuleRef may materialize it, but they do not replace the full inheritance semantics.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-017
    domain: truth
    level: must
    statement: Official package publish, creator create-agent, and future import surfaces must pass through the same truth derivation line and fail-close if they cannot produce governed truth writes, inheritance materialization or derivation basis, and projection inputs.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-018
    domain: truth
    level: must
    statement: Formal Forge extract-observations and refine-observations must converge on one ObservationMarkupProtocol mainline; strict single-object JSON payloads and provider- or stage-specific parallel wire contracts are not formal authority.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-019
    domain: truth
    level: must
    statement: ObservationCommitLedger may admit only closed and validated observation units; truncated envelopes, unclosed units, or provider-returned but unvalidated content are not committed authoring truth evidence.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-020
    domain: truth
    level: must
    statement: ObservationContinuationPlan semantics are owned by the runtime or authoring kernel, not by the model; models may declare remaining categories or stop reason but may not define opaque cursor semantics or override frozen sequence discipline.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-TRUTH-021
    domain: truth
    level: must
    statement: Official publish, workspace continuation, and governed Forge commit surfaces must distinguish raw attempt artifacts, committed observation units, and the final consolidated extraction batch; raw provider output, partial attempt residue, or incomplete continuation state cannot be treated as canonical truth ingress or successful publish evidence.
    source: .nimi/spec/realm/kernel/truth-contract.md
  - rule_id: R-PROJ-001
    domain: projection
