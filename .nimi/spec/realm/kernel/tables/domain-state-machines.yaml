version: 1
updated_at: 2026-03-26
owner: '@team'
state_machines:
  - machine_id: WORLD-STATE-COMMIT
    domain: world-state
    initial_state: DRAFTED
    states: [DRAFTED, VALIDATED, COMMITTED, REJECTED]
    transitions:
      - { from: DRAFTED, to: VALIDATED, event: validate-pass }
      - { from: DRAFTED, to: REJECTED, event: validate-fail }
      - { from: VALIDATED, to: COMMITTED, event: commit }
      - { from: VALIDATED, to: REJECTED, event: auth-fail }
    source_rules: [R-WSTATE-002, R-WSTATE-005]
  - machine_id: WORLD-HISTORY-APPEND
    domain: world-history
    initial_state: PREPARED
    states: [PREPARED, APPENDED, REJECTED, INVALIDATED]
    transitions:
      - { from: PREPARED, to: APPENDED, event: append }
      - { from: PREPARED, to: REJECTED, event: reject }
      - { from: APPENDED, to: INVALIDATED, event: invalidate }
    source_rules: [R-WHIST-002, R-WHIST-005]
  - machine_id: TRANSIT-SESSION
    domain: transit
    initial_state: PENDING
    states: [PENDING, ACTIVE, COMPLETED, ABANDONED]
    transitions:
      - { from: PENDING, to: ACTIVE, event: start }
      - { from: ACTIVE, to: COMPLETED, event: complete }
      - { from: PENDING, to: ABANDONED, event: cancel }
      - { from: ACTIVE, to: ABANDONED, event: cancel }
    source_rules: [R-TRANSIT-003]
  - machine_id: RESOURCE-LIFECYCLE
    domain: resource
    initial_state: PENDING
    states: [PENDING, READY, FAILED, DELETED]
    transitions:
      - { from: PENDING, to: READY, event: finalize }
      - { from: PENDING, to: FAILED, event: fail }
      - { from: READY, to: DELETED, event: delete }
      - { from: FAILED, to: DELETED, event: delete }
    source_rules: [R-RSRC-003]
  - machine_id: OWNABLE-ASSET-LIFECYCLE
    domain: asset
    initial_state: DRAFT
    states: [DRAFT, READY, ARCHIVED, DELETED]
    transitions:
      - { from: DRAFT, to: READY, event: publish-ready }
      - { from: READY, to: ARCHIVED, event: archive }
      - { from: DRAFT, to: DELETED, event: delete }
      - { from: READY, to: DELETED, event: delete }
      - { from: ARCHIVED, to: DELETED, event: delete }
    source_rules: [R-ASSET-103]
  - machine_id: BUNDLE-LIFECYCLE
    domain: bundle
    initial_state: DRAFT
    states: [DRAFT, PUBLISHED, ARCHIVED]
    transitions:
      - { from: DRAFT, to: PUBLISHED, event: publish }
      - { from: PUBLISHED, to: ARCHIVED, event: archive }
    source_rules: [R-BNDL-003]
    notes: "ARCHIVED is the terminal active state; bundles do not have a DELETED lifecycle state in the current contract."
