contract_id: TRUTH-CONTRACT-001
domain: truth
status: ACTIVE
version: 2026-04-09
owner: '@team'
sources:
  human_spec: ../truth-contract.md
  openapi:
    - ../../nimi-backend/api-nimi.yaml
    - ../../nimi-backend/api-dashboard.yaml
  prisma: ../../nimi-backend/prisma/schema.prisma
  services:
    - ../../nimi-backend/libs/domains/world/src/world-rule.service.ts
    - ../../nimi-backend/libs/domains/world/src/agent-rule.service.ts
    - ../../nimi-backend/libs/domains/world/src/world-release.service.ts
    - ../../nimi-backend/libs/domains/world/src/projection/projection.service.ts
    - ../../nimi-backend/apps/api/src/modules/@admin/world/admin-world-package.service.ts
    - ../../nimi-backend/libs/domains/world/src/world-control.service.ts
rule_id_prefix: R-TRUTH-
rules:
  - rule_id: R-TRUTH-001
    level: must
    title: realm-truth-scope
    statement: "Realm canonical truth is limited to creator-governed world truth and agent truth; runtime story output is not truth by default."
  - rule_id: R-TRUTH-002
    level: must
    title: world-rule-canonical
    statement: "World truth is anchored by WorldRule entries and WorldRelease snapshots; Worldview is computed projection only."
  - rule_id: R-TRUTH-003
    level: must
    title: agent-rule-canonical
    statement: "Agent truth is anchored by AgentRule entries bound to world scope; agent truth defines identity and durable behavioral boundaries only."
  - rule_id: R-TRUTH-004
    level: must
    title: creator-only-truth-write
    statement: "Truth writes are reserved for creator/control-plane authority and cannot be produced by runtime story execution."
  - rule_id: R-TRUTH-005
    level: must
    title: truth-write-audited
    statement: "Truth changes are explicit, versioned, transactional, and auditable; projection updates cannot masquerade as truth writes."
  - rule_id: R-TRUTH-006
    level: must
    title: truth-app-independent
    statement: "Realm truth remains app-independent and cannot be owned by a single app, renderer, or model route."
  - rule_id: R-TRUTH-007
    level: must
    title: oasis-is-system-main-world
    statement: "OASIS is the unique system main world in Realm truth, cannot be creator-owned, and cannot be replaced by creator convention."
  - rule_id: R-TRUTH-008
    level: must
    title: oasis-read-surface-formal
    statement: "GET /api/world/oasis is a formal Realm truth read surface for the system main world and not a legacy browse shortcut."
  - rule_id: R-TRUTH-009
    level: must
    title: public-projection-aggregates-not-truth
    statement: "Public read surfaces (e.g. detail-with-agents) may expose computed aggregates derived from truth (activeRuleCount, agentRuleSummary byLayer) but must not expose AgentRule content; aggregates are projection, not truth writes."
  - rule_id: R-TRUTH-010
    level: must
    title: world-scenes-public-read-surface
    statement: "GET /api/world/by-id/{id}/scenes is a public read surface exposing Scene identity (id, name, description, activeEntities) for a world; it does not modify truth state."
  - rule_id: R-TRUTH-011
    level: must
    title: official-package-publish-is-unique
    statement: "Official Realm content publish must converge on one package-native publish contract; world-drafts may remain minimal candidates but are not a parallel canonical truth-write contract for official content."
  - rule_id: R-TRUTH-012
    level: must
    title: official-publish-governance-provenance-required
    statement: "Official package publish requires explicit governance provenance including official owner, editorial operator, reviewer, publisher, source provenance, and review verdict; missing required governance identity or verdict must fail-close."
  - rule_id: R-TRUTH-013
    level: must
    title: official-publish-atomic-world-agent-release
    statement: "Official package publish must atomically write world truth, agent truth, projection inputs, and WorldRelease; world-published/agent-pending or release-less success states are invalid."
  - rule_id: R-TRUTH-014
    level: must
    title: release-governance-and-rollback-anchor
    statement: "WorldRelease is the sole official truth release governance anchor; each official publish must bind package version, publish provenance, checksum/diff metadata, and rollback lineage to an explicit release identity."
entities:
  - name: World
    prisma_model: World
    required_fields: [id, type, status]
  - name: WorldRule
    prisma_model: WorldRule
    required_fields: [id, worldId, ruleKey, title, statement, domain, hardness, scope, status, version]
    json_fields: [structured, dependsOn, conflictsWith]
  - name: AgentRule
    prisma_model: AgentRule
    required_fields: [id, agentId, ruleKey, title, statement, layer, hardness, scope, status, version]
    json_fields: [structured, dependsOn, conflictsWith]
  - name: WorldRelease
    prisma_model: WorldRelease
    required_fields: [id, worldId, versionTag, worldRuleChecksum, agentRuleChecksum]
    json_fields: [metadata]
api_surface:
  required_operations:
    - GET /api/world/oasis
    - POST /api/admin/worlds/packages/publish
    - GET /api/world/by-id/{worldId}/rules
    - POST /api/world/by-id/{worldId}/rules
    - PATCH /api/world/by-id/{worldId}/rules/{ruleId}
    - POST /api/world/by-id/{worldId}/rules/{ruleId}/deprecate
    - POST /api/world/by-id/{worldId}/rules/{ruleId}/archive
    - GET /api/world/by-id/{worldId}/agents/{agentId}/rules
    - POST /api/world/by-id/{worldId}/agents/{agentId}/rules
    - PATCH /api/world/by-id/{worldId}/agents/{agentId}/rules/{ruleId}
    - POST /api/world/by-id/{worldId}/agents/{agentId}/rules/{ruleId}/deprecate
    - POST /api/world/by-id/{worldId}/agents/{agentId}/rules/{ruleId}/archive
    - GET /api/world/by-id/{id}
    - GET /api/world/by-id/{id}/detail-with-agents
    - GET /api/world/by-id/{id}/worldview
    - GET /api/world/by-id/{id}/lorebooks
  secondary_operations:
    - GET /api/world
    - GET /api/world/by-id/{id}/bindings
    - GET /api/world/by-id/{id}/scenes
