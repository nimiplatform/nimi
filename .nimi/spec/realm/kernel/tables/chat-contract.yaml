contract_id: CHAT-CONTRACT-001
domain: chat
status: ACTIVE
version: 2026-04-23
owner: '@team'
sources:
  human_spec: ../chat-contract.md
  openapi:
    - nimi-backend/api-nimi.yaml
  prisma: nimi-backend/prisma/schema.prisma
  services:
    - nimi-backend/libs/domains/chat/src/domains/chat.service.ts
    - nimi-backend/libs/domains/chat/src/domains/group-chat.service.ts
    - nimi-backend/apps/api/src/modules/group-chat/group-chat.controller.ts
rule_id_prefix: R-CHAT-
rules:
  - rule_id: R-CHAT-001
    level: must
    title: chat-is-realm-domain
    statement: "Realm owns Chat as a realm domain and provides the canonical thread, message, read-state, sync, membership, group lifecycle, and agent-slot metadata surface."
  - rule_id: R-CHAT-002
    level: must
    title: direct-and-group-substrate-in-v1
    statement: "Realm Chat v1 admits DIRECT and GROUP as canonical chat substrates; GROUP threads may contain human participants and agent slots/authors, while AI execution, prompt assembly, model routing, session orchestration, and turn execution stay outside Realm Chat."
  - rule_id: R-CHAT-003
    level: must
    title: social-gates-chat-but-does-not-own-it
    statement: "Social gates human participant admission preconditions, but canonical chat threads, messages, read state, and sync cursor semantics belong to Chat."
  - rule_id: R-CHAT-004
    level: must
    title: agent-chat-runtime-stays-outside
    statement: "Human-agent chat, agent-agent chat, model routing, prompt assembly, session orchestration, and turn execution runtime stay outside Realm Chat v1, and group membership does not transfer those responsibilities into Realm."
  - rule_id: R-CHAT-005
    level: must
    title: canonical-chat-attachment-envelope
    statement: "Realm Chat canonicalizes non-text attachments as MessageType ATTACHMENT with payload.attachment generic envelope and does not expose assetId-only or resourceId-only attachment payload contracts."
  - rule_id: R-CHAT-006
    level: must
    title: chat-owns-group-lifecycle-and-admin-authority
    statement: "Realm Chat owns GROUP lifecycle transitions, roster management, membership roles, and agent-slot metadata; Social only gates human admission preconditions and does not own group lifecycle or agent-slot state."
  - rule_id: R-CHAT-007
    level: must
    title: group-agent-authorship-must-validate-slot-binding
    statement: "Agent-authored group posts and messages must validate thread owner and slot binding before commit, read visibility, or sync fanout, and spoofed agent authorship must fail-close."
entities:
  - name: ChatThread
    prisma_model: Chat
    required_fields: [id, type, accountIdL, accountIdH, createdAt, updatedAt]
    json_fields: []
  - name: ChatMessage
    prisma_model: Message
    required_fields: [id, chatId, senderId, type, createdAt]
    json_fields: [payload, interaction, diagnostics]
  - name: GroupChatThread
    prisma_model: Chat
    required_fields: [id, type, title, creatorId, createdAt, updatedAt]
    json_fields: []
  - name: GroupParticipant
    prisma_model: ChatParticipant
    required_fields: [chatId, accountId, role, type, joinedAt]
    json_fields: []
  - name: GroupMessage
    prisma_model: Message
    required_fields: [id, chatId, senderId, type, createdAt]
    json_fields: [payload, interaction, diagnostics]
group_authority:
  lifecycle_owner: Chat
  admission_admin_owner: Chat
  human_admission_gate: Social
  anti_spoof_rule: Agent-authored group posts and messages must validate thread owner/slot binding before commit, read visibility, or sync fanout.
api_surface:
  required_operations:
    - GET /api/human/chats
    - POST /api/human/chats
    - GET /api/human/chats/{chatId}
    - GET /api/human/chats/{chatId}/messages
    - GET /api/human/chats/{chatId}/sync
    - POST /api/human/chats/{chatId}/messages
    - PATCH /api/human/chats/{chatId}/messages/{messageId}
    - POST /api/human/chats/{chatId}/messages/{messageId}/recall
    - POST /api/human/chats/{chatId}/read
    - GET /api/human/group-chats
    - POST /api/human/group-chats
    - GET /api/human/group-chats/{chatId}
    - PATCH /api/human/group-chats/{chatId}
    - GET /api/human/group-chats/{chatId}/messages
    - POST /api/human/group-chats/{chatId}/messages
    - POST /api/human/group-chats/{chatId}/agent-messages
    - PATCH /api/human/group-chats/{chatId}/messages/{messageId}
    - POST /api/human/group-chats/{chatId}/messages/{messageId}/recall
    - POST /api/human/group-chats/{chatId}/read
    - GET /api/human/group-chats/{chatId}/sync
    - POST /api/human/group-chats/{chatId}/participants
    - DELETE /api/human/group-chats/{chatId}/participants/{accountId}
    - PATCH /api/human/group-chats/{chatId}/participants/{accountId}
    - POST /api/human/group-chats/{chatId}/agents
    - DELETE /api/human/group-chats/{chatId}/agents/{agentAccountId}
  secondary_operations: []
service_evidence_notes:
  - "Human chat surface is handled by nimi-backend/apps/api/src/modules/chat/chat.controller.ts; group chat surface is handled by nimi-backend/apps/api/src/modules/group-chat/group-chat.controller.ts and nimi-backend/libs/domains/chat/src/domains/group-chat.service.ts."
dto_evidence:
  - GroupChatViewDto
  - GroupParticipantDto
  - GroupMessageAuthorDto
  - GroupMessageViewDto
  - ListGroupChatsResultDto
  - ListGroupMessagesResultDto
  - CreateGroupInputDto
  - UpdateGroupInputDto
  - AddGroupParticipantInputDto
  - AddGroupAgentInputDto
  - SendGroupAgentMessageInputDto
  - UpdateParticipantRoleInputDto
  - ChatSyncResultDto
test_evidence_notes:
  - "Group lifecycle/admin, roster changes, and agent-auth anti-spoof are covered by nimi-backend/libs/domains/chat/src/domains/group-chat.service.spec.ts, with broader chat coverage in chat.controller.spec.ts and social integration tests."
