version: 1
modules:
  - id: kit.ui
    subpath: /ui
    kind: foundation
    surface_level: foundation
    adapter_contract: none
    description: Cross-app design system built on Radix UI + CVA + Tailwind, with nimi semantic tokens
    dependencies: ["@radix-ui/react-dialog", "@radix-ui/react-tooltip", "@radix-ui/react-scroll-area", "@radix-ui/react-select", "@radix-ui/react-switch", "@radix-ui/react-avatar", "@radix-ui/react-popover", "@radix-ui/react-slot", "class-variance-authority", "clsx", "tailwind-merge"]
    peer_dependencies: [react, react-dom]
    exports:
      - ./ui
      - ./ui/styles.css
      - ./ui/themes/light.css
      - ./ui/themes/dark.css
      - ./ui/themes/desktop-accent.css
      - ./ui/themes/forge-accent.css
      - ./ui/themes/relay-accent.css
      - ./ui/themes/overtone-accent.css
      - ./ui/themes/video-food-map-accent.css
    headless_exports: []
    ui_exports:
      - ./ui
      - ./ui/styles.css
      - ./ui/themes/light.css
      - ./ui/themes/dark.css
      - ./ui/themes/desktop-accent.css
      - ./ui/themes/forge-accent.css
      - ./ui/themes/relay-accent.css
      - ./ui/themes/overtone-accent.css
      - ./ui/themes/video-food-map-accent.css
    planned_consumers: [desktop, forge, overtone, relay, video-food-map, web]
    reuse_entrypoints:
      - ./ui
      - ./ui/styles.css
    admission_status: active
    owner: platform
    source_rule: P-KIT-010
  - id: kit.auth
    subpath: /auth
    kind: feature
    surface_level: headless+ui
    adapter_contract: AuthPlatformAdapter
    description: Cross-app authentication UI (email, OTP, wallet, social OAuth)
    dependencies: [kit.core, sdk]
    peer_dependencies: [react, react-i18next]
    exports:
      - ./auth
      - ./auth/styles.css
      - ./auth/native-oauth-result-page
    headless_exports:
      - ./auth
      - ./auth/native-oauth-result-page
    ui_exports:
      - ./auth
      - ./auth/styles.css
    planned_consumers: [desktop, forge, overtone, relay, web]
    reuse_entrypoints:
      - ./auth
      - ./auth/styles.css
      - ./auth/native-oauth-result-page
    admission_status: active
    owner: platform
    source_rule: P-KIT-020
  - id: kit.core
    subpath: /core
    kind: logic
    surface_level: logic
    adapter_contract: none
    description: Pure-logic utilities (OAuth, env, shell-mode)
    dependencies: []
    peer_dependencies: []
    exports:
      - ./core/shell-mode
      - ./core/oauth
    headless_exports:
      - ./core/shell-mode
      - ./core/oauth
    ui_exports: []
    planned_consumers: [desktop, forge, overtone, relay, web, realm-drift]
    reuse_entrypoints:
      - ./core/shell-mode
      - ./core/oauth
    admission_status: active
    owner: platform
    source_rule: P-KIT-030
  - id: kit.shell.tauri
    subpath: /shell/tauri
    kind: infra
    surface_level: infra
    adapter_contract: none
    description: Shared Tauri host glue — runtime bridge, daemon lifecycle, session logging, auth/oauth commands, runtime defaults. Delivered as a Rust crate (non-npm) within the single kit authority.
    dependencies: []
    peer_dependencies: []
    exports: []
    headless_exports: []
    ui_exports: []
    planned_consumers: [desktop, forge, parentos, shiji, lookdev, moment, overtone, realm-drift, video-food-map]
    reuse_entrypoints: []
    admission_status: active
    owner: platform
    source_rule: P-KIT-041
    notes: Non-npm Rust crate. Apps consume via Cargo path dependency, not subpath import. No package.json exports.
  - id: kit.shell.renderer
    subpath: /shell/renderer
    kind: infra
    surface_level: infra
    adapter_contract: none
    description: Shared renderer shell glue — Tauri command wrappers, bridge primitives, bootstrap skeleton. Delivered as subpath exports of the single nimi-kit npm package.
    dependencies: [kit.core, kit.auth, kit.telemetry, sdk]
    peer_dependencies: [react]
    exports:
      - ./shell/renderer/bridge
      - ./shell/renderer/bootstrap
    headless_exports:
      - ./shell/renderer/bridge
      - ./shell/renderer/bootstrap
    ui_exports: []
    planned_consumers: [desktop, forge, parentos, shiji, lookdev, moment, overtone, realm-drift, video-food-map, web]
    reuse_entrypoints:
      - ./shell/renderer/bridge
      - ./shell/renderer/bootstrap
    admission_status: active
    owner: platform
    source_rule: P-KIT-042
  - id: kit.core.runtime-capabilities
    subpath: /core/runtime-capabilities
    kind: logic
    surface_level: logic
    adapter_contract: none
    description: Pure-logic capability normalization, wildcard matching, and codegen capability catalog truth. Runtime-safe and renderer-safe.
    dependencies: []
    peer_dependencies: []
    exports:
      - ./core/runtime-capabilities
    headless_exports:
      - ./core/runtime-capabilities
    ui_exports: []
    planned_consumers: [desktop, web, runtime]
    reuse_entrypoints:
      - ./core/runtime-capabilities
    admission_status: active
    owner: platform
    source_rule: P-KIT-043
    notes: Runtime-safe — may be consumed by runtime-side code (Go consumers import via kit/core transpiled output or shared contract).
  - id: kit.telemetry
    subpath: /telemetry
    kind: infra
    surface_level: infra
    adapter_contract: none
    description: Renderer-side telemetry (emit, debug-buffer, error-boundary)
    dependencies: []
    peer_dependencies: [react]
    exports:
      - ./telemetry
      - ./telemetry/error-boundary
    headless_exports:
      - ./telemetry
    ui_exports:
      - ./telemetry/error-boundary
    planned_consumers: [forge, desktop, relay]
    reuse_entrypoints:
      - ./telemetry
      - ./telemetry/error-boundary
    admission_status: active
    owner: platform
    source_rule: P-KIT-040
  - id: kit.features.chat
    subpath: /features/chat
    kind: feature
    surface_level: headless+ui+runtime+realm
    adapter_contract: ConversationSourceAdapter + ConversationShellAdapter + ConversationThreadAdapter + ConversationComposerAdapter + ConversationOrchestrationProvider + ConversationOrchestrationRegistry + ConversationRuntimeAdapter + ConversationContinuityAdapter + RuntimeChatComposerAdapterOptions + RealmChatComposerAdapterOptions
    description: Reusable unified conversation shell with target-first AI/human/agent contracts, a local-chat-equivalent canonical presentational and message shell, orchestration provider registry/contracts, active simple-ai runtime integration, active realm typed human chat integration, realtime normalization, timeline composition/display helpers, and a socket-agnostic transport controller
    dependencies: [kit.ui]
    peer_dependencies: [react]
    exports:
      - ./features/chat
      - ./features/chat/headless
      - ./features/chat/realm
      - ./features/chat/runtime
      - ./features/chat/ui
    headless_exports:
      - ./features/chat/headless
      - ./features/chat/realm
      - ./features/chat/runtime
    ui_exports:
      - ./features/chat/ui
    planned_consumers: [desktop, relay, forge, realm-drift]
    reuse_entrypoints:
      - ./features/chat/ui
      - ./features/chat/headless
      - ./features/chat/runtime
      - ./features/chat/realm
    admission_status: active
    owner: platform
    source_rule: P-KIT-070
  - id: kit.features.avatar
    subpath: /features/avatar
    kind: feature
    surface_level: headless+ui+runtime
    adapter_contract: AvatarPresentationAdapter + AvatarInteractionAdapter + RuntimeAgentPresentationAdapter
    description: Reusable avatar stage surface with normalized headless presentation contracts, default UI shell, runtime-backed persistent agent presentation projection binding, and optional backend renderer seams including the shipped VRM surface and admitted future Live2D backend family
    dependencies: [kit.ui, sdk]
    peer_dependencies: [react]
    exports:
      - ./features/avatar
      - ./features/avatar/headless
      - ./features/avatar/runtime
      - ./features/avatar/ui
      - ./features/avatar/vrm
      - ./features/avatar/live2d
    headless_exports:
      - ./features/avatar/headless
      - ./features/avatar/runtime
    ui_exports:
      - ./features/avatar/ui
      - ./features/avatar/vrm
      - ./features/avatar/live2d
    planned_consumers: [desktop, web]
    reuse_entrypoints:
      - ./features/avatar/ui
      - ./features/avatar/headless
      - ./features/avatar/runtime
      - ./features/avatar/vrm
      - ./features/avatar/live2d
    admission_status: active
    owner: platform
    source_rule: P-KIT-071
    notes: Live2D backend family is now shipped as `./features/avatar/live2d` for reusable renderer-domain helpers and optional renderer seams. The first concrete Live2D viewport may still remain desktop-local.
  - id: kit.features.model-picker
    subpath: /features/model-picker
    kind: feature
    surface_level: headless+ui+runtime
    adapter_contract: ModelCatalogAdapter
    description: Reusable model browse-and-select surface with headless filtering, default UI shell, and runtime-backed catalog panels
    dependencies: [kit.ui]
    peer_dependencies: [react]
    exports:
      - ./features/model-picker
      - ./features/model-picker/headless
      - ./features/model-picker/runtime
      - ./features/model-picker/ui
    headless_exports:
      - ./features/model-picker/headless
      - ./features/model-picker/runtime
    ui_exports:
      - ./features/model-picker/ui
    planned_consumers: [desktop, relay]
    reuse_entrypoints:
      - ./features/model-picker/ui
      - ./features/model-picker/headless
      - ./features/model-picker/runtime
    admission_status: active
    owner: platform
    source_rule: P-KIT-070
  - id: kit.features.model-config
    subpath: /features/model-config
    kind: feature
    surface_level: headless+ui
    adapter_contract: ModelConfigPanel consumer-owned binding/profile/status adapter
    description: Reusable model configuration panel for AI capability bindings, profile apply UX, capability-local params editors, and optional diagnostics or scheduling sections while keeping AIConfig and runtime truth consumer-owned
    dependencies: [kit.ui, kit.features.model-picker, sdk]
    peer_dependencies: [react]
    exports:
      - ./features/model-config
      - ./features/model-config/headless
      - ./features/model-config/ui
    headless_exports:
      - ./features/model-config/headless
    ui_exports:
      - ./features/model-config/ui
    planned_consumers: [desktop, forge]
    reuse_entrypoints:
      - ./features/model-config/ui
      - ./features/model-config/headless
    admission_status: active
    owner: platform
    source_rule: P-KIT-070
  - id: kit.features.generation
    subpath: /features/generation
    kind: feature
    surface_level: headless+ui+runtime
    adapter_contract: GenerationPanelAdapter
    description: Reusable generation workflow shell with headless submit orchestration, default status panel UI, active overtone runtime panels, and active desktop runtime-status consumers
    dependencies: [kit.ui]
    peer_dependencies: [react]
    exports:
      - ./features/generation
      - ./features/generation/headless
      - ./features/generation/runtime
      - ./features/generation/ui
    headless_exports:
      - ./features/generation/headless
      - ./features/generation/runtime
    ui_exports:
      - ./features/generation/ui
    planned_consumers: [overtone, desktop]
    reuse_entrypoints:
      - ./features/generation/ui
      - ./features/generation/headless
      - ./features/generation/runtime
    admission_status: active
    owner: platform
    source_rule: P-KIT-070
  - id: kit.features.commerce
    subpath: /features/commerce
    kind: feature
    surface_level: headless+ui+realm
    adapter_contract: CommerceGiftAdapter
    description: Reusable commerce surface for cross-app gifting and lightweight transactional dialogs backed by realm business services, with desktop as the active consumer and web remaining planned
    dependencies: [kit.ui]
    peer_dependencies: [react]
    exports:
      - ./features/commerce
      - ./features/commerce/headless
      - ./features/commerce/realm
      - ./features/commerce/ui
    headless_exports:
      - ./features/commerce/headless
      - ./features/commerce/realm
    ui_exports:
      - ./features/commerce/ui
    planned_consumers: [desktop, web]
    reuse_entrypoints:
      - ./features/commerce/ui
      - ./features/commerce/headless
      - ./features/commerce/realm
    admission_status: active
    owner: platform
    source_rule: P-KIT-070
