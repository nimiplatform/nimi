version: 1
evidence_catalog:
  platform_kernel_consistency:
    type: static_gate
    evidence_type: structural
    command: pnpm exec nimicoding validate-spec-governance --profile nimi --scope platform-consistency
    path: scripts/check-platform-spec-kernel-consistency.mjs
    description: Kernel rule integrity, error code uniqueness, primitive completeness, compliance matrix, and authorization preset checks for Platform domain.
  nimi_ui_pattern:
    type: static_gate
    evidence_type: structural
    command: pnpm check:nimi-ui-pattern
    path: scripts/check-nimi-ui-pattern.mjs
    description: Cross-app Nimi design pattern gate for shared lib imports, theme pack entrypoints, governed module adoption, and raw style hardcuts.
  nimi_ui_lib_drift:
    type: generated_projection
    evidence_type: structural
    command: pnpm check:nimi-ui-lib-drift
    path: scripts/generate-nimi-ui-lib.mjs
    description: Generated Nimi design shared-lib projection drift check for tokens and theme packs.
  nimi_kit_gate:
    type: static_gate
    evidence_type: structural
    command: pnpm check:nimi-kit
    path: scripts/check-nimi-kit.mjs
    description: Nimi kit hard gate for registry parity, surface topology, integration taxonomy, and cross-layer boundary enforcement.

