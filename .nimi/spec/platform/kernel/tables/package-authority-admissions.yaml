version: 1
admissions:
  - id: nimi-coding
    status: active
    owner_domain: nimi-coding
    authority_root: nimi-coding/spec
    evidence_roots:
      - nimi-coding
    may_not_override:
      - .nimi/spec/runtime/**
      - .nimi/spec/sdk/**
      - .nimi/spec/realm/**
      - .nimi/spec/platform/**
      - .nimi/spec/desktop/**
      - .nimi/spec/cognition/**
    projection_boundary:
      host_project_admission_owner: .nimi/spec/platform/kernel/package-authority-admission-contract.md
      package_truth_root: nimi-coding/spec
      host_local_projection_roots:
        - .nimi/contracts
        - .nimi/methodology
      host_authority_projection_refs:
        - host_ref: .nimi/spec/_meta/command-gating-matrix.yaml
          package_ref: nimi-coding/spec/_meta/command-gating-matrix.yaml
        - host_ref: .nimi/spec/_meta/generate-drift-migration-checklist.yaml
          package_ref: nimi-coding/spec/_meta/generate-drift-migration-checklist.yaml
        - host_ref: .nimi/spec/_meta/governance-routing-cutover-checklist.yaml
          package_ref: nimi-coding/spec/_meta/governance-routing-cutover-checklist.yaml
        - host_ref: .nimi/spec/_meta/phase2-impacted-surface-matrix.yaml
          package_ref: nimi-coding/spec/_meta/phase2-impacted-surface-matrix.yaml
        - host_ref: .nimi/spec/_meta/spec-authority-cutover-readiness.yaml
          package_ref: nimi-coding/spec/_meta/spec-authority-cutover-readiness.yaml
        - host_ref: .nimi/spec/_meta/spec-tree-model.yaml
          package_ref: nimi-coding/spec/_meta/spec-tree-model.yaml
        - host_ref: .nimi/spec/bootstrap-state.yaml
          package_ref: nimi-coding/spec/bootstrap-state.yaml
        - host_ref: .nimi/spec/product-scope.yaml
          package_ref: nimi-coding/spec/product-scope.yaml
    source_rule: P-PKG-001
