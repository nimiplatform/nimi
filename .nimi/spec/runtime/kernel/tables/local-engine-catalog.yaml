version: 1
engines:
  - engine: llama
    default_endpoint: ""
    runtime_mode: attached_endpoint
    protocol: nimi_runtime_text
    phase1: true
    source_rule: K-LENG-005
  - engine: llama
    runtime_mode: supervised
    protocol: nimi_runtime_text
    phase1: true
    source_rule: K-LENG-004
    discovery: managed_binary
    supported_platforms:
      - darwin/arm64
      - darwin/amd64
      - linux/amd64
      - windows/amd64
      - windows/arm64
    health_path: "/v1/models"
    start_command: "llama-server --host 127.0.0.1 --port {port} --model {entry}"
    default_port: 1234
    startup_timeout_seconds: 120
  - engine: media
    default_endpoint: ""
    runtime_mode: attached_endpoint
    protocol: nimi_runtime_media
    phase1: true
    source_rule: K-LENG-005
  - engine: media
    runtime_mode: supervised
    protocol: nimi_runtime_media
    phase1: true
    source_rule: K-LENG-004
    discovery: managed_binary
    supported_platforms:
      - darwin/arm64
      - darwin/amd64
      - linux/amd64
      - linux/arm64
      - windows/amd64
    health_path: "/healthz"
    health_response: "\"ready\": true"
    start_command: "stable-diffusion-server --host 127.0.0.1 --port {port}"
    default_port: 8321
    startup_timeout_seconds: 180
  - engine: speech
    default_endpoint: ""
    runtime_mode: attached_endpoint
    protocol: nimi_runtime_speech
    phase1: true
    # Advanced/self-hosted local speech path only; not the ordinary-user default.
    source_rule: K-LENG-005
  - engine: speech
    runtime_mode: supervised
    protocol: nimi_runtime_speech
    phase1: true
    source_rule: K-LENG-004
    discovery: uv_managed_python
    # Ordinary-user canonical local speech path. The readiness signature below
    # applies only after an admitted plain-speech execution plane exists; the
    # current bootstrap placeholder must remain non-ready and fail-closed.
    # First-wave admitted family line:
    # - STT default lane: Qwen3-ASR-0.6B
    # - TTS default lane: Qwen3-TTS-12Hz-0.6B-CustomVoice
    # - local workflow family boundary: qwen3_tts only
    # - env topology: split qwen3_tts env + qwen3_asr env; do not assume one shared speech env
    # `health_response` below therefore describes the admitted-state readiness
    # signature, not the current placeholder fact surface.
    supported_platforms:
      - darwin/arm64
      - darwin/amd64
      - linux/amd64
      - linux/arm64
      - windows/amd64
    health_path: "/healthz"
    health_response: "\"ready\": true"
    start_command: "python {engine_root}/nimi_speech_server.py --host 127.0.0.1 --port {port}"
    default_port: 8330
    startup_timeout_seconds: 240
  - engine: sidecar
    default_endpoint: ""
    runtime_mode: attached_endpoint
    protocol: nimi_music_http
    phase1: true
    source_rule: K-LENG-005
