version: 1
rule_compliance:
  total_c_rules: 58
  audit_date: "2026-04-16"

evidence_catalog:
  cognition_spec_governance_gate:
    type: static_gate
    command: pnpm exec nimicoding validate-spec-governance --profile nimi --scope cognition-consistency
    path: .nimi/spec/cognition/kernel
    description: Cognition kernel rule integrity and domain-local governance validation.
  cognition_generated_docs_gate:
    type: static_gate
    command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope cognition --check
    path: .nimi/spec/cognition/kernel/generated
    description: Cognition kernel generated-doc drift and projection validation.
  cognition_semantic_completeness_gate:
    type: static_gate
    command: pnpm check:spec-semantic-completeness
    path: .nimi/spec
    description: Repo-wide kernel semantic completeness validation including cognition rules.
  cognition_build_gate:
    type: build_gate
    command: cd nimi-cognition && go build ./...
    path: nimi-cognition/go.mod
    description: Standalone cognition module build validation.
  cognition_test_gate:
    type: test_gate
    command: cd nimi-cognition && go test ./...
    path: nimi-cognition/go.mod
    description: Standalone cognition behavioral test suite.
  cognition_vet_gate:
    type: static_gate
    command: cd nimi-cognition && go vet ./...
    path: nimi-cognition/go.mod
    description: Standalone cognition static analysis gate.
  cognition_race_gate:
    type: test_gate
    command: cd nimi-cognition && go test -race ./...
    path: nimi-cognition/go.mod
    description: Standalone cognition race-safety and reopen-safe concurrent execution gate.

