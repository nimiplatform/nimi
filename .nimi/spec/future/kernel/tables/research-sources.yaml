- source_id: RESEARCH-AUI-001
  title: A2UI 对比校准执行记录（现存替代来源）
  date: '2026-03-14'
  source_kind: local_evidence
  access: local_only
  scope: 记录 A2UI 对比校准结论与 future backlog 更新动作；当前最接近的现存竞品/架构对比替代来源，用于替代已失效的 OpenFang 审计引用，但不伪装为缺失的原始 A2UI 审计正文
  conclusion: 可作为现存替代来源保留 A2UI 对比校准结论，但不得把缺失的原始 A2UI 审计正文伪装为仍然存在的 tracked 事实源。
- source_id: RESEARCH-AGRT-001
  title: World Evolution Engine Spec Landing Design
  date: '2026-04-08'
  source_kind: local_evidence
  access: local_only
  scope: preflight 设计输入，定义 World Evolution Engine 的 authority owner、唯一 landing path、必须复用的既有 authority，以及进入正式 spec intake 前必须完成的 reuse 和 boundary preflight
  conclusion: World Evolution Engine 进入正式 spec intake 前必须先完成 authority owner、唯一 landing path、既有 authority reuse 和 boundary preflight 的冻结。
- source_id: RESEARCH-AGRT-002
  title: World Evolution Engine Reuse-Conflict Matrix
  date: '2026-04-08'
  source_kind: local_evidence
  access: local_only
  scope: pilot 第一阶段 evidence，冻结 Realm state/history、commit authorization、runtime audit、workflow event 模型与 World Evolution Engine 之间的 direct reuse、extend、orthogonal、conflict 关系
  conclusion: World Evolution Engine intake 必须显式区分 direct reuse、extend、orthogonal 与 conflict，不能在 Realm state/history、commit authorization、runtime audit、workflow event 模型上制造 parallel truth。
- source_id: RESEARCH-AGRT-003
  title: World Evolution Engine P-ARCH-002 Derived Constraints
  date: '2026-04-08'
  source_kind: local_evidence
  access: local_only
  scope: pilot 第二阶段 evidence，冻结 SDK-only access、placement/adaptor boundary、no-second-truth、以及 mods/narrative/apps 边界的 derived constraints
  conclusion: World Evolution Engine 设计必须保持 SDK-only access、placement/adaptor boundary 和 no-second-truth，并继续约束 mods、narrative 与 apps 的跨层边界。
- source_id: RESEARCH-AGRT-004
  title: World Evolution Engine Spec Intake Readiness
  date: '2026-04-08'
  source_kind: local_evidence
  access: local_only
  scope: pilot 第三阶段 handoff，确认该 redesign 已 ready for spec/future intake、cross-layer placement framing、runtime semantic-owner framing，但仍未 ready for final runtime contract drafting 或 implementation，且 AGRT-PILOT-005 继续保留
  conclusion: 该 redesign 只 ready for spec/future intake 与 semantic-owner framing；仍未 ready for final runtime contract drafting 或 implementation。
