version: 1
spec_tree_model:
  profile: minimal
  canonical_root: .nimi/spec
  authority_mode: canonical_active
  domains:
    - id: desktop
      root: .nimi/spec/desktop
      normative_root: .nimi/spec/desktop/kernel
      tables_root: .nimi/spec/desktop/kernel/tables
      generated_root: .nimi/spec/desktop/kernel/generated
      guide_paths: []
    - id: future
      root: .nimi/spec/future
      normative_root: .nimi/spec/future/kernel
      tables_root: .nimi/spec/future/kernel/tables
      generated_root: .nimi/spec/future/kernel/generated
      guide_paths: []
    - id: platform
      root: .nimi/spec/platform
      normative_root: .nimi/spec/platform/kernel
      tables_root: .nimi/spec/platform/kernel/tables
      generated_root: .nimi/spec/platform/kernel/generated
      guide_paths: []
    - id: realm
      root: .nimi/spec/realm
      normative_root: .nimi/spec/realm/kernel
      tables_root: .nimi/spec/realm/kernel/tables
      generated_root: .nimi/spec/realm/kernel/generated
      guide_paths: []
    - id: runtime
      root: .nimi/spec/runtime
      normative_root: .nimi/spec/runtime/kernel
      tables_root: .nimi/spec/runtime/kernel/tables
      generated_root: .nimi/spec/runtime/kernel/generated
      guide_paths: []
    - id: sdk
      root: .nimi/spec/sdk
      normative_root: .nimi/spec/sdk/kernel
      tables_root: .nimi/spec/sdk/kernel/tables
      generated_root: .nimi/spec/sdk/kernel/generated
      guide_paths: []
  normative_classes:
    - id: kernel_markdown
      path_patterns:
        - .nimi/spec/**/kernel/*.md
      allowed_extensions:
        - .md
      normative: true
    - id: kernel_tables
      path_patterns:
        - .nimi/spec/**/kernel/tables/**/*.yaml
        - .nimi/spec/**/kernel/tables/**/*.yml
      allowed_extensions:
        - .yaml
        - .yml
      normative: true
  derived_classes:
    - id: kernel_generated
      path_patterns:
        - .nimi/spec/**/kernel/generated/**/*.md
      generator_refs:
        - pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope spec-human-doc
      normative: false
  guidance_classes:
    - id: domain_guides
      path_patterns:
        - .nimi/spec/**/*.md
      excluded_path_patterns:
        - .nimi/spec/**/kernel/*.md
        - .nimi/spec/**/kernel/generated/**/*.md
      must_reference_normative_ids: true
      normative: false
    - id: support_registry
      path_patterns:
        - .nimi/spec/**/spec-exempt-modules.yaml
      must_reference_normative_ids: false
      normative: false
  required_files:
    minimal:
      - .nimi/spec/INDEX.md
      - .nimi/spec/_meta/spec-tree-model.yaml
      - .nimi/spec/desktop/kernel/index.md
      - .nimi/spec/future/kernel/index.md
      - .nimi/spec/platform/kernel/index.md
      - .nimi/spec/realm/kernel/index.md
      - .nimi/spec/runtime/kernel/index.md
      - .nimi/spec/sdk/kernel/index.md
    standard:
      - .nimi/spec/INDEX.md
      - .nimi/spec/_meta/spec-tree-model.yaml
    mature:
      - .nimi/spec/INDEX.md
      - .nimi/spec/_meta/spec-tree-model.yaml
  generated_pipelines:
    - id: spec_human_doc
      owner_surface: repository_root_scripts
      input_roots:
        - .nimi/spec
      output_roots:
        - .nimi/spec/generated
      generate_command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope spec-human-doc
      drift_check_command: pnpm exec nimicoding generate-spec-derived-docs --profile nimi --scope spec-human-doc --check
  fail_closed_rules:
    - unknown_profile_is_invalid
    - canonical_root_outside_.nimi/spec_is_invalid
    - domain_roots_must_not_escape_canonical_root
    - normative_and_derived_path_overlap_is_invalid
    - required_files_must_stay_under_declared_domain_roots
    - generated_outputs_must_not_overlap_normative_roots
    - canonical_active_requires_no_other_active_normative_root
