id: orchestration-state.v1
purpose: Persist the minimum packet-bound mutable run position for continuous resumable autonomous mode.
requires:
  - packet_ref
  - run_status
  - current_phase_id
  - last_completed_phase_id
  - awaiting_human_action
  - updated_at
  - owner
forbids:
  - resume_token
  - notification transport internals
  - semantic acceptance outcomes
  - finding lifecycle judgments
  - generic workflow-engine state storage
rules:
  - idle is conceptual pre-start state and is represented by the absence of an active orchestration-state artifact
  - persisted run states are limited to running, paused, awaiting_confirmation, completed, failed, and superseded
  - orchestration state may reference prompt, worker-output, acceptance, evidence, and notification event/correlation refs, but it must remain packet-bound run position only
  - notification emission logs are transport-agnostic operational outputs and must not become orchestration-state ownership
