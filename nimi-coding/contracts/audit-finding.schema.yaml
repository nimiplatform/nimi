version: 1
schema:
  id: nimi-coding.audit-finding.v1
  kind: audit-finding
required_fields:
  - id
  - sweep_id
  - chunk_id
  - fingerprint
  - severity
  - category
  - actionability
  - confidence
  - impact
  - location
  - title
  - description
  - evidence
  - disposition
  - evidence_ref
severity_enum:
  - critical
  - high
  - medium
  - low
actionability_enum:
  - auto-fix
  - needs-decision
  - deferred-backlog
confidence_enum:
  - high
  - medium
  - low
disposition_enum:
  - open
  - remediated
  - accepted-risk
  - false-positive
  - deferred-backlog
location_required_fields:
  - file
evidence_required_fields:
  - summary
  - auditor_reasoning
hard_constraints:
  - finding_location_file_must_belong_to_source_chunk
  - finding_fingerprint_must_be_stable_over_semantically_identical_evidence
  - non_open_disposition_requires_resolution_evidence
