version: 2

project_name: nimi-runtime
dist: dist/runtime

builds:
  - id: nimi
    dir: runtime
    main: ./cmd/nimi
    binary: nimi
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: runtime-binary
    ids:
      - nimi
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  name_template: runtime/v{{ .Version }}
  prerelease: auto

snapshot:
  version_template: "0.0.0-next-{{ .ShortCommit }}"
