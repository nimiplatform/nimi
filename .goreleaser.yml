version: 2

project_name: nimi-runtime
dist: dist/runtime

builds:
  - id: nimi
    dir: runtime
    main: ./cmd/nimi
    binary: nimi
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: runtime-binary
    ids:
      - nimi
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

signs:
  - id: archives
    cmd: cosign
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: archive
    output: true
    signature: ${artifact}.sigstore.json
  - id: checksums
    cmd: cosign
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: checksum
    output: true
    signature: ${artifact}.sigstore.json

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  name_template: runtime/v{{ .Version }}
  prerelease: auto

snapshot:
  version_template: "0.0.0-next-{{ .ShortCommit }}-{{ .Timestamp }}"
