  - id: image_seed
    phase: P0
    priority: required
    dependency_posture: app_local
    summary: "Single-image threshold generation input."
  - id: phrase_seed
    phase: P0
    priority: required
    dependency_posture: app_local
    summary: "Single-phrase threshold generation input."
