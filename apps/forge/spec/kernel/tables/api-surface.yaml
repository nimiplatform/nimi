# Forge — API Surface
# Authoritative inventory of backend endpoints needed by Forge data adapters.
# App code must consume these through SDK services or typed data clients, not direct REST calls.
# status: existing = already implemented | new = requires new backend work

# ── World Control (existing) ─────────────────────────────
world-control:
  - method: GET
    path: /api/world-control/access/me
    status: existing
    feature: app-shell, world-list
    controller: world-control.controller.ts
    description: Check creator access status

  - method: GET
    path: /api/world-control/landing
    status: existing
    feature: world-list
    controller: world-control.controller.ts
    description: Get landing mode (NO_ACCESS / CREATE / MAINTAIN)

# ── World Drafts (existing) ──────────────────────────────
world-drafts:
  - method: POST
    path: /api/world-drafts
    status: existing
    feature: world-create
    controller: world-control.controller.ts
    description: Create minimal publish-candidate world draft (`importSource`, `truthDraft`, `stateDraft`, `historyDraft` only)

  - method: GET
    path: /api/world-drafts
    status: existing
    feature: world-list, world-create
    controller: world-control.controller.ts
    description: List creator's drafts

  - method: GET
    path: /api/world-drafts/{draftId}
    status: existing
    feature: world-create
    controller: world-control.controller.ts
    description: Get minimal publish-candidate draft detail (no workflow/editor process state)

  - method: PATCH
    path: /api/world-drafts/{draftId}
    status: existing
    feature: world-create
    controller: world-control.controller.ts
    description: Update minimal publish-candidate draft

  - method: POST
    path: /api/world-drafts/{draftId}/publish
    status: existing
    feature: world-create
    controller: world-control.controller.ts
    description: Publish draft → create world

