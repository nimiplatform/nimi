# Forge — Route Table
# Authoritative source for all application routes.
# Referenced by: kernel contracts, feature-matrix.yaml

routes:
  # ── Workbench (FG-WORLD-*, FG-AGENT-*, FG-IMPORT-*) ────
  - path: /
    feature: workbench-home
    component: WorkbenchHomePage
    lazy: true
    description: Workbench home — create/open a world workspace and resume local drafts

  - path: /workbench
    feature: workbench-home
    component: WorkbenchHomePage
    lazy: true
    description: Primary Forge home for world-centric workspaces

  - path: /workbench/new
    feature: workbench-shell
    component: WorkbenchNewPage
    lazy: true
    description: Creates a new local world workspace and routes into the workbench

  - path: /workbench/:workspaceId
    feature: workbench-shell
    component: WorkbenchPage
    lazy: true
    description: Unified world workbench for overview, truth, import, review, agents, and publish

  - path: /workbench/:workspaceId/import/character-card
    feature: import-character-card
    component: CharacterCardImportPage
    lazy: true
    description: Character Card import scoped to an existing world workspace

  - path: /workbench/:workspaceId/import/novel
    feature: import-novel
    component: NovelImportPage
    lazy: true
    description: Novel import scoped to an existing world workspace

  - path: /workbench/:workspaceId/agents/:agentId
    feature: workbench-agent-detail
    component: WorkbenchAgentDetailPage
    lazy: true
    description: World-owned agent draft detail and preview within a workspace

  # ── World Catalog + Ops (FG-WORLD-* + FG-CONTENT-*) ──
  - path: /worlds/library
    feature: world-list
    component: WorldListPage
    lazy: true
    description: World catalog entry for creator-owned worlds, stable detail surfaces, and workbench authoring handoff

  - path: /worlds/:worldId
    feature: world-detail
    component: WorldDetailPage
    lazy: true
    description: Stable creator world detail for deliverable completeness and current multimodal selections

  - path: /worlds/:worldId/agents
    feature: world-agents-roster
    component: WorldAgentsPage
    lazy: true
    description: World-owned agent roster with world-context inspection and multimodal deliverable status

  - path: /worlds/:worldId/assets
    feature: world-asset-ops
    component: WorldAssetsPage
    lazy: true
    description: World multimodal deliverable ops hub for family-scoped review, confirmation, and binding

  - path: /worlds/:worldId/assets/:family
    feature: world-asset-ops
    component: WorldAssetFamilyPage
    lazy: true
    description: Focused world deliverable family surface for candidate comparison and active selection review

  # ── Agent Catalog + Ops (FG-AGENT-* + FG-CONTENT-*) ──
  - path: /agents/library
    feature: agent-list
    component: AgentListPage
    lazy: true
    description: Master agent catalog plus world-context entrypoints across workbench and world surfaces

  - path: /agents/:agentId
    feature: agent-detail
    component: AgentDetailPage
    lazy: true
    description: Stable master agent detail for profile, DNA, preview, keys, and current deliverable inspection

  - path: /agents/:agentId/assets
    feature: agent-asset-ops
    component: AgentAssetsPage
    lazy: true
    description: Agent multimodal deliverable ops hub for visuals, greeting, and voice demo review

  - path: /agents/:agentId/assets/:family
    feature: agent-asset-ops
    component: AgentAssetFamilyPage
    lazy: true
    description: Focused agent deliverable family surface for candidate comparison and active selection review

  # ── Shared Creator Utilities (FG-CONTENT-*) ───────────
  - path: /content/images
    feature: image-studio
    component: ImageStudioPage
    lazy: true
    description: Shared AI image generation studio feeding world and agent deliverable ops

  - path: /content/videos
    feature: video-studio
    component: VideoStudioPage
    lazy: true
    description: Shared video upload and management utility for creator resources

  - path: /content/music
    feature: music-studio
    component: MusicStudioPage
    lazy: true
    description: Shared AI song generation studio for creator resources and publish flows

  - path: /content/library
    feature: content-library
    component: ContentLibraryPage
    lazy: true
    description: Shared unified asset browser supporting world and agent ops plus creator media flows

  - path: /publish/releases
    feature: publish-releases
    component: PublishReleasesPage
    lazy: true
    description: Supporting publish workspace for local drafts, publish history, and post composition

  - path: /publish/channels
    feature: publish-channels
    component: PublishChannelsPage
    lazy: true
    description: Supporting publish identity and internal destination settings

  # ── Copyright Management (FG-IP-*) ────────────────────
  - path: /copyright
    feature: copyright
    component: CopyrightPage
    lazy: true
    description: Deferred copyright extension placeholder

  # ── Revenue (FG-REV-*) ────────────────────────────────
  - path: /revenue
    feature: revenue-dashboard
    component: RevenueDashboardPage
    lazy: true
    description: Revenue dashboard — KPIs, charts, breakdown

  - path: /revenue/withdrawals
    feature: revenue-withdrawals
    component: WithdrawalsPage
    lazy: true
    description: Withdrawal management and Stripe Connect

  # ── Template Marketplace (FG-TPL-*) ───────────────────
  - path: /templates
    feature: template-browse
    component: TemplateBrowsePage
    lazy: true
    description: Deferred template marketplace placeholder

  - path: /templates/mine
    feature: template-mine
    component: MyTemplatesPage
    lazy: true
    description: Deferred template publishing placeholder

  - path: /templates/:templateId
    feature: template-detail
    component: TemplateDetailPage
    lazy: true
    description: Deferred template detail placeholder

  # ── AI Advisors (FG-ADV-*) ────────────────────────────
  - path: /advisors
    feature: advisor-hub
    component: AdvisorHubPage
    lazy: true
    description: AI advisor selection and sessions

  # ── Analytics (FG-ANA-*) ──────────────────────────────
  - path: /analytics
    feature: analytics
    component: AnalyticsPage
    lazy: true
    description: Deferred analytics extension placeholder

  # ── Settings ──────────────────────────────────────────
  - path: /settings
    feature: settings
    component: SettingsPage
    lazy: true
    description: App preferences and configuration
