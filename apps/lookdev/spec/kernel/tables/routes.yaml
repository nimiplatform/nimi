routes:
  - path: /
    surface: batch-list
    purpose: list batches and show batch summary health
  - path: /batches/new
    surface: create-batch
    purpose: define world style, compile portrait briefs, choose capture selection, and create a new frozen batch
  - path: /batches/:batchId
    surface: batch-detail
    purpose: inspect batch progress, item results, failed-item reruns, and commit actions

surface_map:
  batch-list:
    includes:
      - batch summary cards
      - batch status filter
      - create batch entry
  create-batch:
    includes:
      - selection mode chooser
      - world-scoped selection
      - explicit agent selection
      - world style pack editor
      - portrait brief compilation review
      - capture selection list
      - policy snapshot review
  batch-detail:
    includes:
      - batch summary header
      - item list
      - item preview
      - pause resume controls
      - rerun failed controls
      - commit batch control
