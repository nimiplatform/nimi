routes:
  - path: /
    surface: batch-list
    purpose: list batches and show batch summary health
  - path: /batches/new
    surface: create-batch
    purpose: run world style session, synthesize and confirm one style pack, synthesize capture states, review portrait briefs, choose capture selection, and create a new frozen batch
  - path: /batches/:batchId
    surface: batch-detail
    purpose: inspect in-flight batch progress, item results, failed-item reruns, and commit actions

surface_map:
  batch-list:
    includes:
      - batch summary cards
      - batch status filter
      - create batch entry
  create-batch:
    includes:
      - selection mode chooser
      - world-scoped selection
      - explicit agent selection
      - world style session
      - world style pack synthesis summary
      - world style pack advanced editor
      - silent capture-state synthesis review
      - focused capture refinement workspace
      - portrait brief materialization review
      - capture selection list
      - policy snapshot review
  batch-detail:
    includes:
      - batch summary header
      - item list
      - item preview
      - pause resume controls
      - rerun failed controls
      - commit batch control
