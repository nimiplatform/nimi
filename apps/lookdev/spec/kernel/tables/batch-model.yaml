batch_model:
  working_assets:
    world_style_session:
      required_fields:
        - sessionId
        - worldId
        - worldName
        - language
        - status
        - messages
        - understanding
        - openQuestions
        - readinessReason
        - summary
        - operatorTurnCount
        - lastTextTraceId
        - createdAt
        - updatedAt
        - synthesizedAt
      persistence:
        appLocalReusable: true
        realmTruth: false
      statuses:
        - collecting
        - ready_to_synthesize
        - synthesized
    world_style_pack:
      required_fields:
        - worldId
        - name
        - language
        - status
        - seedSource
        - sourceSessionId
        - summary
        - visualEra
        - artStyle
        - paletteDirection
        - materialDirection
        - silhouetteDirection
        - costumeDensity
        - backgroundDirection
        - promptFrame
        - forbiddenElements
        - createdAt
        - updatedAt
        - confirmedAt
      persistence:
        appLocalReusable: true
        realmTruth: false
      statuses:
        - draft
        - confirmed
      confirmation_gate:
        required_after_world_style_session: true
        required_before_portrait_brief_compile: true
        required_before_capture_selection: true
        required_before_batch_create: true
    portrait_brief:
      required_fields:
        - agentId
        - worldId
        - displayName
        - visualRole
        - silhouette
        - outfit
        - hairstyle
        - palettePrimary
        - artStyle
        - mustKeepTraits
        - forbiddenTraits
        - sourceConfidence
        - updatedAt
      persistence:
        appLocalReusable: true
        realmTruth: false

  batch:
    states:
      - running
      - paused
      - processing_complete
      - commit_complete
    required_fields:
      - batchId
      - status
      - selectionSnapshot
      - worldStylePackSnapshot
      - policySnapshot
      - totalItems
      - captureSelectedItems
      - passedItems
      - failedItems
      - committedItems
      - commitFailedItems
      - createdAt
      - updatedAt
      - processingCompletedAt
      - commitCompletedAt
      - selectedItemId
      - auditTrail
    selection_snapshot:
      required_fields:
        - selectionSource
        - agentIds
        - captureSelectionAgentIds
      selection_sources:
        - by_world
        - explicit_selection
      by_world_intake_scope: controllable_worlds_only
      capture_selection_authority: operator
      capture_selection_default: primary_agents
      style_pack_confirmation_required: true
    policy_snapshot:
      required_fields:
        - generationPolicy
        - autoEvalPolicy
        - retryPolicy
        - writebackPolicy
        - generationTarget
        - evaluationTarget
        - maxConcurrency
      defaults:
        maxConcurrency: 1
    audit_trail:
      event_scope:
        - batch
        - item
      event_kinds:
        - batch_created
        - batch_paused
        - batch_resumed
        - processing_complete
        - item_auto_passed
        - item_gated_retryable
        - item_gated_exhausted
        - item_processing_failed
        - rerun_queued
        - item_committed
        - item_commit_failed
        - commit_complete

  item:
    states:
      - pending
      - generating
      - auto_passed
      - auto_failed_retryable
      - auto_failed_exhausted
      - committed
      - commit_failed
    required_fields:
      - itemId
      - batchId
      - agentId
      - agentHandle
      - agentDisplayName
      - importance
      - captureMode
      - portraitBrief
      - status
      - attemptCount
      - currentImage
      - currentEvaluation
      - lastErrorCode
      - lastErrorMessage
      - committedAt
      - createdAt
      - updatedAt

  process_defaults:
    maxAttemptsPerItem: 3
    batchFrozenAfterCreate: true
    allowItemAppendAfterCreate: false
    allowPerItemPolicyOverride: false
    allowBatchReopenAfterCommit: false
    captureSelectionDefault: primary_agents
