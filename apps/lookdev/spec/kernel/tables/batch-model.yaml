batch_model:
  working_assets:
    world_style_pack:
      required_fields:
        - worldId
        - name
        - visualEra
        - artStyle
        - paletteDirection
        - materialDirection
        - silhouetteDirection
        - costumeDensity
        - backgroundDirection
        - promptFrame
        - forbiddenElements
        - createdAt
        - updatedAt
      persistence:
        appLocalReusable: true
        realmTruth: false
    portrait_brief:
      required_fields:
        - agentId
        - worldId
        - displayName
        - visualRole
        - silhouette
        - outfit
        - hairstyle
        - palettePrimary
        - artStyle
        - mustKeepTraits
        - forbiddenTraits
        - sourceConfidence
        - updatedAt
      persistence:
        appLocalReusable: true
        realmTruth: false

  batch:
    states:
      - running
      - paused
      - processing_complete
      - commit_complete
    required_fields:
      - batchId
      - status
      - selectionSnapshot
      - worldStylePackSnapshot
      - policySnapshot
      - totalItems
      - captureSelectedItems
      - passedItems
      - failedItems
      - committedItems
      - commitFailedItems
      - createdAt
      - updatedAt
      - processingCompletedAt
      - commitCompletedAt
    selection_snapshot:
      required_fields:
        - selectionSource
        - agentIds
        - captureSelectionAgentIds
      selection_sources:
        - by_world
        - explicit_selection
      capture_selection_authority: operator
      capture_selection_default: primary_agents
    policy_snapshot:
      required_fields:
        - generationPolicy
        - autoEvalPolicy
        - retryPolicy
        - writebackPolicy
        - maxConcurrency
      defaults:
        maxConcurrency: 1

  item:
    states:
      - pending
      - generating
      - auto_passed
      - auto_failed_retryable
      - auto_failed_exhausted
      - committed
      - commit_failed
    required_fields:
      - itemId
      - batchId
      - agentId
      - agentHandle
      - agentDisplayName
      - importance
      - captureMode
      - portraitBrief
      - status
      - attemptCount
      - currentImage
      - currentEvaluation
      - lastErrorCode
      - lastErrorMessage
      - committedAt
      - createdAt
      - updatedAt

  process_defaults:
    maxAttemptsPerItem: 3
    batchFrozenAfterCreate: true
    allowItemAppendAfterCreate: false
    allowPerItemPolicyOverride: false
    allowBatchReopenAfterCommit: false
    captureSelectionDefault: primary_agents
