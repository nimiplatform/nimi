version: 1

field_contract:
  domain:
    type: string
    required: true
    description: "Knowledge domain id aligned with reminder-rules.yaml domain values where applicable."
  source:
    type: string
    required: true
    description: "Authority source label."
  sourceLevel:
    type: enum
    values: [national, international, academic]
    required: true
    description: "Source authority tier."
  status:
    type: enum
    values: [reviewed, needs-review]
    required: true
    description: "reviewed may enter advisor reviewed-advice prompt paths; needs-review is limited to descriptive-only, clarifying, or non-expert prompt paths."
  owner:
    type: string
    required: true
    description: "Human owner for review and maintenance."
  lastReviewedAt:
    type: string
    required: false
    description: "Last manual review timestamp in ISO 8601."
  notes:
    type: string
    required: false
    description: "Current status note."

constraints:
  - "domain must be unique across all entries"
  - "status=reviewed entries must include lastReviewedAt"
  - "status=needs-review domains must not enter advisor reviewed-advice prompt generation in ParentOS"
  - "new domains must update the narrative projection in parentos.md section 8.2"

sources:
