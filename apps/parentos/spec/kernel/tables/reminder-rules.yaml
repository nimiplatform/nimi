# ──────────────────────────────────────────────────────────────
# reminder-rules.yaml — ParentOS 提醒规则知识库
# 这是提醒引擎的唯一权威数据源。
# 每条规则描述"在什么时间点，应该提醒家长关注什么"。
# ──────────────────────────────────────────────────────────────
# ── Schema ──────────────────────────────────────────────────
field_contract:
  rule:
    ruleId:          { type: string, required: true, pattern: "^PO-REM-[A-Z]{3,6}-[0-9]{3}$" }
    domain:          { type: enum, required: true, values: [vaccine, checkup, vision, dental, bone-age, growth, nutrition, sleep, motor, language, cognitive, social, emotional, sensitivity, hygiene, safety, interest, digital, finance, sexuality, values, career, independence, relationship, posture, fitness, tanner, outdoor] }
    category:        { type: enum, required: true, values: [rigid, stage, personalized] }
    #   rigid         — 刚性提醒：有国家/国际标准的确定性事项（疫苗、体检）
    #   stage         — 阶段提醒：基于发育科学的阶段性关注事项（敏感期、窗口期）
    #   personalized  — 个性化提醒：基于孩子档案数据由 AI 分析触发
    kind:            { type: enum, required: true, values: [task, guide, practice, consult] }
    #   task     — 一次性打钩型：医疗就诊、数据记录、结构化训练启动
    #   guide    — 读懂并开始应用型：结构化指南，确认已读即 acknowledged；可选 reflected
    #   practice — 持续实践行为型：循环可重入，practiceStartedAt + practiceLastAt + practiceCount，最终 habituated
    #   consult  — AI 顾问咨询型：完成信号由 advisor 在 AI 首次回复时写入
    #   kind 必须与 actionType 对齐映射，详见 reminder-interaction-contract.md#PO-REMI-002
    title:           { type: string, required: true, description: "提醒标题，面向家长" }
    description:     { type: string, required: true, description: "提醒摘要（行内展示），解释为什么重要" }
    triggerAge:
      type: object
      required: true
      fields:
        startMonths: { type: integer, required: true, description: "触发起始月龄（含）" }
        endMonths:   { type: integer, required: true, description: "触发截止月龄（含），-1 表示无上限" }
    triggerCondition:
      type: object
      required: false
      description: "除月龄外的附加触发条件（用于 personalized 类型）"
      fields:
        dataField:   { type: string, description: "关联的档案数据字段" }
        operator:    { type: enum, values: [gt, lt, eq, missing, overdue, trend_declining] }
        value:       { type: any, description: "比较值" }
    priority:        { type: enum, required: true, values: [P0, P1, P2, P3] }
    #   P0 — 不可跳过（疫苗、重大体检）
    #   P1 — 强烈建议（视力筛查、骨龄检查窗口）
    #   P2 — 推荐关注（敏感期、兴趣启蒙窗口）
    #   P3 — 可选参考（进阶内容，仅进阶养模式推送）
    nurtureMode:
      type: object
      required: true
      description: "不同养育模式下的行为参数"
      fields:
        relaxed:     { type: enum, values: [push, silent, hidden], description: "轻松养" }
        balanced:    { type: enum, values: [push, silent, hidden], description: "均衡养" }
        advanced:    { type: enum, values: [push, silent, hidden], description: "进阶养" }
    #   push   — 主动推送通知
    #   silent — 出现在时间线但不推送
    #   hidden — 不展示
    actionType:      { type: enum, required: true, values: [go_hospital, record_data, observe, read_guide, start_training, ai_consult] }
    #   go_hospital    — 需要去医疗机构              (kind=task)
    #   record_data    — 需要记录身体数据            (kind=task)
    #   start_training — 开始某项训练/培养            (kind=task)
    #   read_guide     — 阅读指南并开始应用          (kind=guide)
    #   observe        — 持续观察/实践行为           (kind=practice)
    #   ai_consult     — 与 AI 顾问对话了解更多      (kind=consult)
    repeatRule:
      type: object
      required: false
      fields:
        intervalMonths: { type: integer, description: "重复间隔月数" }
        maxRepeats:     { type: integer, description: "最大重复次数，-1 表示持续" }
    explain:
      type: object
      required: false
      description: |
        结构化指南内容，驱动 ReminderExplainDrawer 渲染。
        kind ∈ {guide, practice, consult} 时 required；kind = task 时 optional。
        详细授权契约见 reminder-interaction-contract.md#PO-REMI-006。
      fields:
        whyNow:     { type: string, required_when_explain_present: true, description: "2-3 句：为什么此刻值得做，家长此刻的痛点/机会" }
        howTo:      { type: array, items: string, required_when_explain_present: true, description: "3-6 条具体动作指引" }
        doneWhen:   { type: string, required_when_explain_present: true, description: "对该 kind 而言'到位'的感受或触发条件" }
        ifNotNow:   { type: string, required: false, description: "如果现在不方便，可采用的替代路径" }
        pitfalls:   { type: array, items: string, required: false, description: "常见陷阱，抽屉折叠段提示" }
        sources:
          type: array
          required_when_explain_present: true
          items:
            type: object
            fields:
              citation: { type: string, required: true, description: "知识来源引用键（如 NIP-2024、Gordon-PET）" }
              url:      { type: string, required: false, description: "可选外部链接；由系统浏览器打开，不得内嵌" }
    expiryMonths:    { type: integer, required: false }
    tags:            { type: array, items: string, required: false }
constraints:
  - "ruleId must be unique across all rules"
  - "P0 rules must have nurtureMode.relaxed = push (底线标准不因模式降级)"
  - "P0 rules must have nurtureMode.balanced = push"
  - "P0 rules must have nurtureMode.advanced = push"
  - "category=rigid rules must have verifiable explain.sources citations (国家标准/国际标准)"
  - "category=personalized rules must have triggerCondition defined"
  - "triggerAge.startMonths <= triggerAge.endMonths unless endMonths = -1"
  - "kind must match the required mapping for actionType (PO-REMI-002): go_hospital|record_data|start_training → task; read_guide → guide; observe → practice; ai_consult → consult"
  - "kind ∈ {guide, practice, consult} rules must carry a fully-populated explain object with whyNow, howTo (3-6 items), doneWhen, and non-empty sources (PO-REMI-006)"
  - "top-level source: string field is retired; every rule's citation metadata must live in explain.sources[].citation"
# ── Rules ───────────────────────────────────────────────────
# ── Vaccine (疫苗) ──────────────────────────────────────────
# Source: 中国国家免疫规划 (NIP-2024)
rules:
  # -- 一类疫苗（免费，必须接种）--
  - ruleId: PO-REM-VAC-001
    domain: vaccine
    category: rigid
    kind: task
    title: "乙肝疫苗（第1剂）"
    description: "出生后 24 小时内接种。预防乙型肝炎病毒感染。"
    triggerAge: { startMonths: 0, endMonths: 0 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "新生儿出生后 24 小时内是母婴阻断乙肝病毒传播的关键窗口，超过这个窗口阻断效果明显下降。"
      howTo:
        - "确认接生医院产科在新生儿离院前完成首剂接种。"
        - "在母子健康手册上保留接种记录（日期、批号、接种单位）。"
        - "在 ParentOS 疫苗档案中录入接种信息。"
      doneWhen: "疫苗接种记录已保存在档案中，母子健康手册有对应签章。"
      sources:
        - { citation: "NIP-2024" }
    tags: [newborn, hepatitis-b]
  - ruleId: PO-REM-VAC-002
    domain: vaccine
    category: rigid
    kind: task
    title: "卡介苗（BCG）"
    description: "出生后尽早接种，预防结核病。"
    triggerAge: { startMonths: 0, endMonths: 0 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "卡介苗预防婴幼儿结核性脑膜炎和粟粒性结核等重症结核，出生后越早接种越好。"
      howTo:
        - "接生医院一般在出生 24 小时内完成接种，确认母子健康手册已登记。"
        - "如出生时因低体重等原因未接种，满足补种条件后尽快补种。"
        - "在 ParentOS 疫苗档案中录入接种信息。"
      doneWhen: "疫苗接种记录已保存，接种部位未见异常化脓或持续红肿。"
      sources:
        - { citation: "NIP-2024" }
    tags: [newborn, bcg]
  - ruleId: PO-REM-VAC-003
    domain: vaccine
    category: rigid
    kind: task
    title: "乙肝疫苗（第2剂）"
    description: "1 月龄接种第二剂乙肝疫苗。"
    triggerAge: { startMonths: 1, endMonths: 2 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "乙肝三剂程序的第二剂，按 0-1-6 方案完成才能形成完整保护性抗体。"
      howTo:
        - "在满 1 月龄后预约社区预防接种门诊。"
        - "携带母子健康手册完成接种，留观 30 分钟。"
        - "在 ParentOS 疫苗档案中录入接种日期和批号。"
      doneWhen: "疫苗接种记录已保存，孩子无明显不良反应。"
      sources:
        - { citation: "NIP-2024" }
    tags: [hepatitis-b]
  - ruleId: PO-REM-VAC-004
    domain: vaccine
    category: rigid
    kind: task
    title: "脊灰灭活疫苗（IPV 第1剂）"
    description: "2 月龄接种，预防脊髓灰质炎。"
    triggerAge: { startMonths: 2, endMonths: 3 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "2 月龄是 IPV 脊灰灭活疫苗起始剂的接种时间，为后续 bOPV 程序建立免疫基础。"
      howTo:
        - "预约社区预防接种门诊。"
        - "接种后留观 30 分钟，观察是否有过敏反应。"
        - "在 ParentOS 疫苗档案中录入接种信息。"
      doneWhen: "疫苗接种记录已保存，孩子状态正常。"
      sources:
        - { citation: "NIP-2024" }
    tags: [polio, ipv]
  - ruleId: PO-REM-VAC-005
    domain: vaccine
    category: rigid
    kind: task
    title: "百白破疫苗（第1剂）"
    description: "3 月龄接种，预防百日咳、白喉、破伤风。"
    triggerAge: { startMonths: 3, endMonths: 4 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "3 月龄是百白破三联疫苗起始剂的接种时间，第三、四、五个月按月连续接种。"
      howTo:
        - "预约社区预防接种门诊。"
        - "接种当天注意体温，前后 3 天避免其他疫苗。"
        - "在 ParentOS 疫苗档案中录入接种信息。"
      doneWhen: "疫苗接种记录已保存，接种部位未见异常红肿。"
      sources:
        - { citation: "NIP-2024" }
    tags: [dtap]
  - ruleId: PO-REM-VAC-006
    domain: vaccine
    category: rigid
    kind: task
    title: "百白破疫苗（第2剂）"
    description: "4 月龄接种第二剂。"
    triggerAge: { startMonths: 4, endMonths: 5 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
