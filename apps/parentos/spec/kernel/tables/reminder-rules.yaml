      doneWhen: "疫苗接种记录已保存。"
      sources:
        - { citation: "NIP-2024" }
    tags: [polio, booster]
  - ruleId: PO-REM-VAC-017
    domain: vaccine
    category: rigid
    kind: task
    title: "白破疫苗 + A+C 群流脑疫苗（第2剂）"
    description: "6 岁接种白破加强和流脑加强。"
    triggerAge: { startMonths: 72, endMonths: 78 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "6 岁入学前的最后一针常规接种，保证入学体检通过。"
      howTo:
        - "预约社区预防接种门诊。"
        - "完成两针后留观 30 分钟。"
        - "在 ParentOS 疫苗档案中分别录入。"
      doneWhen: "两剂疫苗接种记录均已保存，可用于入学体检。"
      sources:
        - { citation: "NIP-2024" }
    tags: [dt, meningococcal, booster]
  # -- 二类疫苗（自费，推荐接种）--
  - ruleId: PO-REM-VAC-050
    domain: vaccine
    category: rigid
    kind: task
    title: "轮状病毒疫苗（推荐）"
    description: "2 月龄起可接种，预防轮状病毒腹泻。自费疫苗，建议接种。"
    triggerAge: { startMonths: 2, endMonths: 6 }
    priority: P1
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "轮状病毒是婴幼儿重症腹泻的主要病因，早接种早保护，接种窗口在 2-6 月龄。"
      howTo:
        - "咨询社区预防接种门诊或儿科医生，确认品牌和剂次。"
        - "预约并完成口服接种。"
        - "在 ParentOS 疫苗档案中录入接种信息。"
      ifNotNow: "超过 6 月龄可咨询医生是否还能启动五价方案；过窗口后只能通过防护避免感染。"
      doneWhen: "首剂接种记录已保存，后续剂次按厂商说明完成。"
      sources:
        - { citation: "WHO-2023-rotavirus" }
    tags: [rotavirus, optional]
  - ruleId: PO-REM-VAC-051
    domain: vaccine
    category: rigid
    kind: task
    title: "水痘疫苗（推荐）"
    description: "12 月龄起可接种，预防水痘。建议 12 月龄和 4 岁各一剂。"
    triggerAge: { startMonths: 12, endMonths: 15 }
    priority: P1
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "12 月龄起水痘疫苗免疫效果稳定，避免孩子在幼儿园集体感染。"
      howTo:
        - "预约社区预防接种门诊。"
        - "接种后留观 30 分钟。"
        - "在 4 岁时安排第二剂加强。"
        - "在 ParentOS 疫苗档案中录入两剂信息。"
      doneWhen: "两剂水痘疫苗接种记录均已保存。"
      sources:
        - { citation: "WHO-2023-varicella" }
    tags: [varicella, optional]
  - ruleId: PO-REM-VAC-052
    domain: vaccine
    category: rigid
    kind: task
    title: "流感疫苗（每年推荐）"
    description: "6 月龄以上每年秋季接种流感疫苗。"
    triggerAge: { startMonths: 6, endMonths: -1 }
    priority: P1
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: go_hospital
    repeatRule: { intervalMonths: 12, maxRepeats: -1 }
    explain:
      whyNow: "流感病毒株每年变化，每年秋冬来临前接种能显著降低重症和住院风险。"
      howTo:
        - "每年 9-10 月预约社区预防接种门诊。"
        - "首次接种 6 月龄-8 岁儿童通常需要间隔 4 周接种 2 剂。"
        - "接种后留观 30 分钟。"
        - "在 ParentOS 疫苗档案中录入当年接种记录。"
      ifNotNow: "错过秋季窗口也可在整个流感季内补种，只是保护起效时间推迟。"
      doneWhen: "当年流感疫苗接种记录已保存。"
      sources:
        - { citation: "CDC-influenza" }
    tags: [influenza, annual, optional]
  - ruleId: PO-REM-VAC-053
    domain: vaccine
    category: rigid
    kind: task
    title: "HPV 疫苗（推荐）"
    description: "9-14 岁是最佳接种窗口，男女均建议接种。"
    triggerAge: { startMonths: 108, endMonths: 168 }
    priority: P1
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "9-14 岁仅需两剂即可形成完整保护，超过 15 岁需三剂；男女都建议接种以建立群体免疫。"
      howTo:
        - "咨询社区预防接种门诊或妇幼保健院，确认可用价次（2/4/9 价）。"
        - "按 0-6 月方案完成两剂接种。"
        - "接种后留观 30 分钟。"
        - "在 ParentOS 疫苗档案中录入两剂信息。"
      ifNotNow: "15 岁后仍可接种，只是需要三剂且保护起效稍晚。"
      doneWhen: "两剂 HPV 疫苗接种记录均已保存。"
      sources:
        - { citation: "WHO-2023-hpv" }
    tags: [hpv, adolescent, optional]
  # ── Checkup (体检) ───────────────────────────────────────
  # Source: 国家基本公共卫生服务规范（2023）
  - ruleId: PO-REM-CHK-001
    domain: checkup
    category: rigid
    kind: task
    title: "新生儿访视"
    description: "出生后 1 周内和第 28 天各一次家庭访视，评估新生儿健康状况。"
    triggerAge: { startMonths: 0, endMonths: 1 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "新生儿访视是产后早期识别先天性疾病、喂养问题、黄疸异常的关键机会。"
      howTo:
        - "出院时确认社区儿保已登记信息，约定第一次访视时间。"
        - "访视前准备出生记录、喂养记录、黄疸观察记录。"
        - "28 天访视时记录体重、喂养情况和任何异常。"
        - "在 ParentOS 档案中录入两次访视的关键结论。"
      doneWhen: "两次访视均已完成，ParentOS 档案中有对应记录。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [newborn, home-visit]
  - ruleId: PO-REM-CHK-002
    domain: checkup
    category: rigid
    kind: task
    title: "42 天体检"
    description: "产后 42 天母婴体检。评估产后恢复和婴儿发育。"
    triggerAge: { startMonths: 1, endMonths: 2 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "42 天体检是评估新生儿早期生长、排查先天性心脏病和髋关节异常的常规节点。"
      howTo:
        - "提前预约妇幼保健院的母婴体检。"
        - "当天带母子健康手册和出院记录。"
        - "关注体重、身长、头围、喂养评价和医生建议的复查项。"
        - "在 ParentOS 档案中录入体检结论和测量值。"
      doneWhen: "42 天体检已完成，关键测量已录入档案。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [postpartum]
  - ruleId: PO-REM-CHK-003
    domain: checkup
    category: rigid
    kind: task
    title: "3 月龄体检"
    description: "评估体格发育、运动发育、听力筛查复查。"
    triggerAge: { startMonths: 3, endMonths: 4 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "3 月龄是评估抬头、追视、听力筛查复查和髋关节稳定性的关键节点。"
      howTo:
        - "预约社区儿童保健门诊。"
        - "当天记录体重、身长、头围、运动发育评估结论。"
        - "确认听力筛查若未通过需要在本次复查。"
        - "在 ParentOS 档案中录入测量和结论。"
      doneWhen: "体检已完成，数据已录入档案。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [infant]
  - ruleId: PO-REM-CHK-004
    domain: checkup
    category: rigid
    kind: task
    title: "6 月龄体检"
    description: "评估体格发育、辅食添加指导、血常规检查。"
    triggerAge: { startMonths: 6, endMonths: 7 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "6 月龄评估辅食转换、铁储备，血常规可以早期发现缺铁性贫血。"
      howTo:
        - "预约社区儿童保健门诊。"
        - "血常规建议空腹或安排在上午完成。"
        - "咨询医生辅食添加顺序和量，确认是否需要补充维 D、铁。"
        - "在 ParentOS 档案中录入测量结果和医生建议。"
      doneWhen: "体检和血常规完成，数据已录入档案。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [infant, blood-test]
  - ruleId: PO-REM-CHK-005
    domain: checkup
    category: rigid
    kind: task
    title: "9 月龄体检"
    description: "评估运动、语言、认知发育。"
    triggerAge: { startMonths: 9, endMonths: 10 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "9 月龄是评估坐、爬、叫爸妈、认生等里程碑的关键节点。"
      howTo:
        - "预约社区儿童保健门诊。"
        - "记录孩子最近完成的里程碑（如能否扶站、模仿声音）。"
        - "当天配合完成发育筛查问卷。"
        - "在 ParentOS 档案中录入结论。"
      doneWhen: "体检已完成，发育评估结论已录入档案。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [infant]
  - ruleId: PO-REM-CHK-006
    domain: checkup
    category: rigid
    kind: task
    title: "12 月龄体检"
    description: "1 岁体检，评估体格和发育里程碑。"
    triggerAge: { startMonths: 12, endMonths: 13 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "1 岁综合评估体格、神经发育、营养状况，为幼儿期保健建立基线。"
      howTo:
        - "预约社区儿童保健门诊。"
        - "带好母子健康手册、疫苗记录。"
        - "记录孩子是否能独站、叫人、指物。"
        - "在 ParentOS 档案中录入测量结果和里程碑。"
      doneWhen: "1 岁体检完成，里程碑记录已存档。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [annual]
  - ruleId: PO-REM-CHK-007
    domain: checkup
    category: rigid
    kind: task
    title: "18 月龄体检"
    description: "评估语言发育、行为发育、自闭症筛查（M-CHAT）。"
    triggerAge: { startMonths: 18, endMonths: 20 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "18 月龄是 M-CHAT 自闭症筛查标准窗口，也是语言、社交发育关键评估点。"
      howTo:
        - "预约社区儿童保健门诊。"
        - "提前回顾孩子的语言、眼神交流、兴趣指向表现。"
        - "完成 M-CHAT 筛查问卷。"
        - "在 ParentOS 档案中录入结论。"
      doneWhen: "体检和筛查完成，结论已录入档案。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [autism-screening]
  - ruleId: PO-REM-CHK-008
    domain: checkup
    category: rigid
    kind: task
    title: "24 月龄体检"
    description: "2 岁体检，评估体格、语言、社交发育。"
    triggerAge: { startMonths: 24, endMonths: 26 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "2 岁评估孩子从婴儿到幼儿过渡期的综合发育状态。"
      howTo:
        - "预约社区儿童保健门诊。"
        - "记录孩子的日常语句长度、社交表现、精细动作。"
        - "完成体格测量和发育筛查。"
        - "在 ParentOS 档案中录入结论。"
      doneWhen: "2 岁体检完成，结论已录入档案。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [annual]
  - ruleId: PO-REM-CHK-009
    domain: checkup
    category: rigid
    kind: task
    title: "30 月龄体检"
    description: "2 岁半体检，评估行为发育和营养状况。"
    triggerAge: { startMonths: 30, endMonths: 32 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "30 月龄关注营养状况、身高增长、行为发育的一致性。"
      howTo:
        - "预约社区儿童保健门诊。"
        - "回顾孩子饮食习惯、挑食情况、作息。"
        - "完成体格测量。"
        - "在 ParentOS 档案中录入结论。"
      doneWhen: "体检完成，结论已录入档案。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [toddler]
  - ruleId: PO-REM-CHK-010
    domain: checkup
    category: rigid
    kind: task
    title: "年度健康体检（3-6 岁）"
    description: "每年一次常规体检，含身高体重、视力、口腔检查。"
    triggerAge: { startMonths: 36, endMonths: 72 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    repeatRule: { intervalMonths: 12, maxRepeats: 3 }
    explain:
      whyNow: "学龄前每年体检是追踪生长曲线、筛查视力异常和龋齿的基础节奏。"
      howTo:
        - "每年约同一时间预约儿童保健门诊或幼儿园体检。"
        - "包含身高体重、视力筛查、口腔检查、血红蛋白。"
        - "在 ParentOS 档案中录入当年测量结果。"
      doneWhen: "当年体检完成，数据已录入档案。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [annual, preschool]
  - ruleId: PO-REM-CHK-011
    domain: checkup
    category: rigid
    kind: task
    title: "入学体检"
    description: "入小学前必须完成的健康体检和疫苗查验。"
    triggerAge: { startMonths: 72, endMonths: 78 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "入学体检是小学报名的必经手续，且需要查验一类疫苗接种记录。"
      howTo:
        - "入学当年 4-6 月预约儿童保健门诊完成入学体检。"
        - "同时申请疫苗查验证明。"
        - "保留体检报告和查验证明以备学校要求。"
        - "在 ParentOS 档案中录入体检结论。"
      doneWhen: "体检报告和疫苗查验证明已出具并保留。"
      sources:
        - { citation: "NBPHS-2023" }
    tags: [school-entry]
  # ── Vision (视力) ────────────────────────────────────────
  # Source: 国家卫健委《0-6 岁儿童眼保健及视力检查服务规范》
  # Early screening (0-36 months)
  - ruleId: PO-REM-VIS-010
    domain: vision
    category: rigid
    kind: task
    title: "新生儿红光反射检查"
    description: "出生后及 42 天体检时应做红光反射检查，筛查先天性白内障和视网膜母细胞瘤。"
    triggerAge: { startMonths: 0, endMonths: 2 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "红光反射可以早期筛出危及视力或生命的先天性白内障、视网膜母细胞瘤等眼底疾病。"
      howTo:
        - "在新生儿访视或 42 天体检时主动要求医生做红光反射。"
        - "如社区门诊不具备，预约妇幼保健院或眼科门诊补做。"
        - "在 ParentOS 档案中录入检查结论。"
      doneWhen: "红光反射检查结果已录入档案，无异常记录。"
      sources:
        - { citation: "NHC-eye-health-0-6-2023" }
    tags: [red-reflex, congenital-screening, early-vision]
  - ruleId: PO-REM-VIS-011
    domain: vision
    category: rigid
    kind: task
    title: "6 月龄眼科筛查"
    description: "6 月龄时进行眼位检查和光筛查仪筛查，排除斜视和明显屈光异常。"
    triggerAge: { startMonths: 6, endMonths: 9 }
    priority: P1
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "6 月龄是眼位和屈光状态稳定、开始配合光筛查仪的早期窗口。"
      howTo:
        - "预约妇幼保健院或眼科门诊的儿童眼保健。"
        - "携带母子健康手册和既往检查记录。"
        - "在 ParentOS 档案中录入眼位和光筛结论。"
      doneWhen: "眼科筛查结果已录入档案。"
      sources:
        - { citation: "NHC-eye-health-0-6-2023" }
    tags: [strabismus-screening, photoscreener, early-vision]
  - ruleId: PO-REM-VIS-012
    domain: vision
    category: rigid
    kind: task
    title: "1 岁眼科筛查"
    description: "12 月龄时进行眼科筛查，关注注视追视能力、眼位及泪道通畅情况。"
    triggerAge: { startMonths: 12, endMonths: 15 }
    priority: P1
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "1 岁筛查关注注视追视、泪道通畅、眼位，为后续远视储备测量建立基线。"
      howTo:
        - "预约儿童眼保健门诊。"
        - "观察并向医生描述孩子追视和眼神交流情况。"
        - "在 ParentOS 档案中录入筛查结论。"
      doneWhen: "眼科筛查结果已录入档案。"
      sources:
        - { citation: "NHC-eye-health-0-6-2023" }
    tags: [fixation-tracking, early-vision]
  # Quantitative vision (36+ months)
  - ruleId: PO-REM-VIS-001
    domain: vision
    category: rigid
    kind: task
    title: "远视储备检查（首次）"
    description: "3 岁时进行首次屈光检查，了解远视储备量。远视储备不足是近视的早期预警。"
    triggerAge: { startMonths: 36, endMonths: 42 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "3 岁是测量远视储备并建立屈光档案的起始点；远视储备不足在学龄前就能预警近视趋势。"
      howTo:
        - "预约三级医院或专业眼科门诊的儿童屈光检查。"
        - "可能需要散瞳验光，提前预留半天时间。"
        - "保存屈光档案首次数据（裸眼视力、屈光度、眼轴）。"
        - "在 ParentOS 视力档案中录入结果。"
      doneWhen: "首次远视储备检查结果已保存，屈光档案建立完成。"
      sources:
        - { citation: "NHC-vision-2023" }
    tags: [hyperopia-reserve, myopia-prevention]
  - ruleId: PO-REM-VIS-002
    domain: vision
    category: rigid
    kind: task
    title: "视力定期检查（学龄前）"
    description: "4-6 岁每半年检查一次视力和屈光度，监控远视储备消耗速度。"
    triggerAge: { startMonths: 48, endMonths: 72 }
    priority: P1
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    repeatRule: { intervalMonths: 6, maxRepeats: 4 }
    explain:
      whyNow: "学龄前半年一次的视力复查可以及早发现远视储备消耗过快并调整用眼习惯。"
      howTo:
        - "每半年预约一次眼科门诊。"
        - "对比上一次屈光档案，关注储备变化趋势。"
        - "根据医生建议调整户外时间、用眼距离。"
        - "在 ParentOS 视力档案中录入当次数据。"
      doneWhen: "本期视力复查完成，档案更新了最新屈光度。"
      sources:
        - { citation: "NHC-vision-2023" }
    tags: [myopia-prevention]
  - ruleId: PO-REM-VIS-003
    domain: vision
    category: rigid
    kind: task
    title: "视力定期检查（学龄期）"
    description: "6-18 岁每半年检查一次视力，已近视者监控度数增长。"
    triggerAge: { startMonths: 72, endMonths: 216 }
    priority: P1
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    repeatRule: { intervalMonths: 6, maxRepeats: -1 }
    explain:
      whyNow: "学龄期是近视高发阶段，半年一次检查可以及早干预度数增长。"
      howTo:
        - "每半年预约眼科门诊。"
        - "已近视者关注度数增长、眼轴变化。"
        - "未近视者继续监控远视储备消耗。"
        - "在 ParentOS 视力档案中录入当次数据。"
      doneWhen: "本期视力复查完成，档案更新了最新屈光度。"
      sources:
        - { citation: "NHC-vision-2023" }
    tags: [myopia-monitoring]
  # ── Outdoor (户外) ──────────────────────────────────────
  # Source: WHO-2019 myopia-prevention guidelines, NHC-vision-2023
  - ruleId: PO-REM-OUTD-001
    domain: outdoor
    category: stage
    kind: task
    title: "每周户外目标 — 设定目标"
    description: "为孩子设定每周户外活动目标。每天累计 2 小时以上的户外活动有助于降低近视风险。"
    triggerAge: { startMonths: 6, endMonths: 216 }
    priority: P1
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: record_data
    explain:
      whyNow: "每天累计 2 小时以上户外活动能显著降低近视风险，需要先设定目标再落实。"
      howTo:
        - "在 ParentOS 户外目标页为孩子设定每周分钟数目标（建议 630 分钟）。"
        - "按家庭实际情况调整目标值，保持可达性。"
        - "设定后每周在户外记录中打卡。"
      doneWhen: "每周户外目标已保存到档案。"
      sources:
        - { citation: "WHO-2019" }
        - { citation: "NHC-vision-2023" }
    tags: [outdoor, myopia-prevention, habit]
  - ruleId: PO-REM-OUTD-002
    domain: outdoor
    category: stage
    kind: task
    title: "户外活动记录提醒"
    description: "定期记录孩子的户外活动时长，帮助追踪每周户外目标完成进度。"
    triggerAge: { startMonths: 6, endMonths: 216 }
    priority: P2
    nurtureMode: { relaxed: hidden, balanced: silent, advanced: push }
    actionType: record_data
    repeatRule: { intervalMonths: 0, maxRepeats: -1 }
    explain:
      whyNow: "每周及时记录户外时长才能准确评估目标完成率，否则记忆会高估实际时间。"
      howTo:
        - "每天或每周在 ParentOS 户外记录中登记分钟数。"
        - "区分真正露天时间和室内外出；仅露天计入。"
        - "每周回顾一次目标完成率，不足时调整下周安排。"
      doneWhen: "本周户外记录已录入。"
      sources:
        - { citation: "WHO-2019" }
        - { citation: "NHC-vision-2023" }
    tags: [outdoor, myopia-prevention, weekly-tracking]
  # ── Dental (牙齿) ────────────────────────────────────────
  - ruleId: PO-REM-DEN-001
    domain: dental
    category: rigid
    kind: task
    title: "第一颗乳牙萌出后首次口腔检查"
    description: "第一颗牙萌出后 6 个月内进行首次口腔检查。"
    triggerAge: { startMonths: 6, endMonths: 12 }
    priority: P1
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "第一颗乳牙萌出后 6 个月内首次口腔检查可以建立口腔档案并指导家长正确刷牙。"
      howTo:
        - "预约专业儿童口腔门诊。"
        - "询问医生如何给婴幼儿刷牙、是否需要含氟涂布。"
        - "在 ParentOS 口腔档案中录入首次检查结论。"
      doneWhen: "首次口腔检查已完成，档案记录建立。"
      sources:
        - { citation: "AAPD-2023" }
    tags: [first-tooth]
  - ruleId: PO-REM-DEN-002
    domain: dental
    category: rigid
    kind: task
    title: "窝沟封闭（第一磨牙）"
    description: "6-7 岁第一恒磨牙（六龄齿）萌出后尽早做窝沟封闭，有效预防龋齿。"
    triggerAge: { startMonths: 72, endMonths: 84 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "第一恒磨牙萌出后 6-12 个月内做窝沟封闭防龋效果最好，错过黄金窗口后易成为龋病高发牙位。"
      howTo:
        - "确认第一恒磨牙萌出情况（通常 6-7 岁）。"
        - "预约儿童口腔门诊做窝沟封闭（通常可使用公卫项目或学校统一安排）。"
        - "封闭后每半年复查一次。"
        - "在 ParentOS 口腔档案中录入封闭记录。"
      doneWhen: "四颗第一恒磨牙窝沟封闭均已完成且有档案记录。"
      sources:
        - { citation: "AAPD-2023" }
    tags: [sealant, molar]
  - ruleId: PO-REM-DEN-003
    domain: dental
    category: rigid
    kind: task
    title: "窝沟封闭（第二磨牙）"
    description: "11-13 岁第二恒磨牙萌出后做窝沟封闭。"
    triggerAge: { startMonths: 132, endMonths: 156 }
    priority: P0
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "第二恒磨牙萌出后同样需要窝沟封闭以避免青少年期龋病高发。"
      howTo:
        - "青春期口腔复查时确认第二磨牙萌出情况。"
        - "预约儿童口腔门诊做封闭。"
        - "在 ParentOS 口腔档案中录入封闭记录。"
      doneWhen: "第二恒磨牙窝沟封闭已完成并有档案记录。"
      sources:
        - { citation: "AAPD-2023" }
    tags: [sealant, molar]
  - ruleId: PO-REM-DEN-004
    domain: dental
    category: stage
    kind: task
    title: "正畸初评推荐窗口"
    description: "7-8 岁适合完成一次正畸初评，可较早了解咬合、牙列和换牙情况。"
    triggerAge: { startMonths: 84, endMonths: 96 }
    expiryMonths: 0
    priority: P2
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "7-8 岁是混合牙列阶段，做一次正畸初评可以及早识别咬合、牙弓问题，为早期干预留时间。"
      howTo:
        - "预约儿童正畸科门诊。"
        - "复查咬合、牙列、换牙顺序。"
        - "如医生建议早期干预，讨论合适方案。"
        - "在 ParentOS 口腔档案中录入评估结论。"
      ifNotNow: "窗口期过后仍可在 8-14 岁做评估，只是早期干预机会减少。"
      doneWhen: "正畸初评已完成，档案记录建立。"
      sources:
        - { citation: "AAO-2023" }
    tags: [orthodontics]
  - ruleId: PO-REM-DEN-005
    domain: dental
    category: stage
    kind: task
    title: "安排一次正畸初评"
    description: "如果之前还没做过正畸初评，可在近期安排一次口腔正畸检查，帮助了解咬合和恒牙萌出情况。"
    triggerAge: { startMonths: 97, endMonths: 168 }
    priority: P2
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "如果 7-8 岁没做正畸初评，8-14 岁期间仍是识别牙弓、咬合问题的重要窗口。"
      howTo:
        - "预约儿童正畸科门诊。"
        - "咨询医生当前发育情况和是否需要干预。"
        - "在 ParentOS 口腔档案中录入评估结论。"
      doneWhen: "正畸初评已完成，档案记录建立。"
      sources:
        - { citation: "AAO-2023" }
    tags: [orthodontics]
