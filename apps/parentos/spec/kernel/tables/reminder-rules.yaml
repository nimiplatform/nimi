  - ruleId: PO-REM-BON-002
    domain: bone-age
    category: stage
    kind: task
    title: "骨龄评估（青春期前窗口）"
    description: "8-10 岁建议做骨龄检查，评估生长潜力和青春期发育时间预测。"
    triggerAge: { startMonths: 96, endMonths: 120 }
    priority: P1
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: go_hospital
    explain:
      whyNow: "8-10 岁骨龄评估可预测青春期启动时间和最终身高潜力，为干预留时间。"
      howTo:
        - "预约儿童生长发育专科。"
        - "做左手腕骨龄 X 光片。"
        - "将骨龄结果、身高速率、Tanner 分期一起评估。"
        - "在 ParentOS 生长档案中录入。"
      doneWhen: "骨龄报告已录入档案，医生给出青春期预测。"
      sources:
        - { citation: "Pediatric-Endocrine-2023" }
    tags: [bone-age, puberty-prediction]
  - ruleId: PO-REM-BON-003
    domain: bone-age
    category: stage
    kind: task
    title: "骨龄评估（青春期监控）"
    description: "青春期期间每年评估骨龄，监控生长板闭合进度。"
    triggerAge: { startMonths: 120, endMonths: 192 }
    priority: P2
    nurtureMode: { relaxed: hidden, balanced: silent, advanced: push }
    actionType: go_hospital
    repeatRule: { intervalMonths: 12, maxRepeats: 6 }
    explain:
      whyNow: "青春期每年一次骨龄可跟踪生长板闭合进度、评估剩余生长空间。"
      howTo:
        - "每年固定时间预约儿童生长发育专科。"
        - "做左手腕骨龄 X 光片。"
        - "对比往年骨龄与身高曲线。"
        - "在 ParentOS 生长档案中录入当年数据。"
      doneWhen: "当年骨龄报告已录入档案。"
      sources:
        - { citation: "Pediatric-Endocrine-2023" }
    tags: [bone-age, growth-plate]
  # ── Growth (生长发育监测) ─────────────────────────────────
  - ruleId: PO-REM-GRO-001
    domain: growth
    category: rigid
    kind: task
    title: "身高体重头围记录（0-12月）"
    description: "每月记录一次身高、体重、头围，绘制生长曲线。"
    triggerAge: { startMonths: 0, endMonths: 12 }
    priority: P1
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: record_data
    repeatRule: { intervalMonths: 1, maxRepeats: 12 }
    explain:
      whyNow: "0-12 月生长速率最快，每月测量才能在曲线上及时发现异常。"
      howTo:
        - "使用体重秤、软尺在相对固定的时间段（例如早晨空腹）测量。"
        - "在 ParentOS 生长档案中录入身高、体重、头围。"
        - "每月回顾一次生长曲线走势。"
      doneWhen: "本月测量数据已录入档案。"
      sources:
        - { citation: "WHO-growth-standards-2006" }
    tags: [growth-curve, monthly]
  - ruleId: PO-REM-GRO-002
    domain: growth
    category: rigid
    kind: task
    title: "身高体重记录（1-3 岁）"
    description: "每季度记录一次身高体重。"
    triggerAge: { startMonths: 12, endMonths: 36 }
    priority: P1
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: record_data
    repeatRule: { intervalMonths: 3, maxRepeats: 8 }
    explain:
      whyNow: "1-3 岁每季度记录，捕捉幼儿期生长趋势变化。"
      howTo:
        - "季度初在相对一致的条件下测量身高体重。"
        - "在 ParentOS 生长档案中录入并查看曲线。"
        - "如曲线波动较大，在下次体检时咨询医生。"
      doneWhen: "本季度测量数据已录入档案。"
      sources:
        - { citation: "WHO-growth-standards-2006" }
    tags: [growth-curve, quarterly]
  - ruleId: PO-REM-GRO-003
    domain: growth
    category: rigid
    kind: task
    title: "身高体重记录（3-18 岁）"
    description: "每半年记录一次身高体重。"
    triggerAge: { startMonths: 36, endMonths: 216 }
    priority: P2
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: record_data
    repeatRule: { intervalMonths: 6, maxRepeats: -1 }
    explain:
      whyNow: "3 岁后每半年一次的身高体重能支撑长期生长曲线和青春期评估。"
      howTo:
        - "春秋两次固定测量时间。"
        - "在 ParentOS 生长档案中录入并查看曲线。"
        - "结合学校体检数据保持完整。"
      doneWhen: "本半年测量数据已录入档案。"
      sources:
        - { citation: "WHO-growth-references-2007" }
    tags: [growth-curve, biannual]
  # ── Safety (安全) ────────────────────────────────────────
  - ruleId: PO-REM-SAF-001
    domain: safety
    category: stage
    kind: guide
    title: "家居安全排查（会爬期）"
    description: "孩子开始会爬后，排查家居安全隐患：插座保护、桌角防撞、小物件收纳。"
    triggerAge: { startMonths: 6, endMonths: 10 }
    priority: P1
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: read_guide
    explain:
      whyNow: "孩子会爬后移动半径指数级增加，6-10 月龄是家庭伤害事故的高发窗口。"
      howTo:
        - "蹲下到孩子视线高度巡视每个房间，标记低处危险点。"
        - "安装插座保护盖、桌角防撞条，收纳小物件和清洁剂。"
        - "楼梯口、阳台门安装护栏或儿童锁。"
        - "与看护人统一安全底线，例如不独自留在床上。"
      ifNotNow: "空闲时先处理楼梯和插座这两类高风险点，其他隐患一周内分批完成。"
      doneWhen: "家里每个孩子可到区域均完成一次安全排查，没有明显隐患。"
      pitfalls:
        - "只排查自己家，忽略祖辈/保姆家也是孩子长时间待的地方。"
      sources:
        - { citation: "AAP-safety-2023" }
    tags: [home-safety, crawling]
  - ruleId: PO-REM-SAF-002
    domain: safety
    category: stage
    kind: guide
    title: "家居安全排查（会走期）"
    description: "孩子开始独走后，升级安全措施：楼梯门栏、窗户锁、厨房柜锁。"
    triggerAge: { startMonths: 10, endMonths: 18 }
    priority: P1
    nurtureMode: { relaxed: push, balanced: push, advanced: push }
    actionType: read_guide
    explain:
      whyNow: "独立行走期孩子能爬上椅子、够到台面，家庭安全隐患类型从地面扩展到高处。"
      howTo:
        - "安装楼梯门栏和窗户锁/限位器。"
        - "厨房柜、药品柜加装儿童锁。"
        - "重新收纳高处易倒物件和电线。"
        - "和看护人约定烹饪、洗澡时的安全规矩。"
      doneWhen: "家中高风险区域（厨房、阳台、楼梯）均已升级防护。"
      pitfalls:
        - "只做结构性保护，忽略热水、热食烫伤等日常动作风险。"
      sources:
        - { citation: "AAP-safety-2023" }
    tags: [home-safety, walking]
  # ── Sensitivity (敏感期) ─────────────────────────────────
  # 完整定义见 sensitive-periods.yaml，这里只放提醒规则
  - ruleId: PO-REM-SEN-001
    domain: sensitivity
    category: stage
    kind: guide
    title: "口腔敏感期即将到来"
    description: "0-12 个月：婴儿通过口腔探索世界，不要过度阻止孩子用嘴探索物品（确保安全即可）。"
    triggerAge: { startMonths: 0, endMonths: 2 }
    priority: P2
    nurtureMode: { relaxed: silent, balanced: push, advanced: push }
    actionType: read_guide
    explain:
      whyNow: "口腔敏感期是婴儿认识世界的方式，家长越早理解越能避免过度阻止造成的发展压抑。"
      howTo:
        - "提供干净、安全、尺寸适合的咬咬物与日常玩具。"
        - "小物件、绳索类、过硬食物提前收到孩子够不到的地方。"
        - "不用焦虑语气阻止'吃手'，只保证物品卫生与安全。"
      doneWhen: "家庭已建立'安全可探索'的物理环境，家长不再因孩子吃手而焦虑。"
      pitfalls:
