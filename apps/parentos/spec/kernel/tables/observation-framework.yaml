# ──────────────────────────────────────────────────────────────
# observation-framework.yaml — ParentOS 多理论融合观察框架
#
# 将多种儿童发展理论的专业观察方法论转化为家长可用的结构化工具。
# 不要求家长学理论，用引导式问题帮助家长看到孩子行为的本质。
#
# 理论来源按年龄段分层：
#   0-6岁: 蒙特梭利观察法 (Montessori)
#   6-12岁: 执行功能 (Diamond) + CASEL 社会情感学习 + 成长型思维 (Dweck)
#          + 多元智能 (Gardner) + 勤勉 vs 自卑 (Erikson Stage 4)
#   12-18岁: 自我认同 (Erikson Stage 5) + 积极青少年发展 PYD 5C (Lerner)
#           + 元认知 + 道德发展 (Kohlberg)
#   全年龄: 依恋理论 (Bowlby/Ainsworth)
#
# Sources:
#   - Maria Montessori, "The Absorbent Mind", "The Discovery of the Child"
#   - AMI / AMS observation guidelines
#   - Adele Diamond, "Executive Functions" (2013)
#   - CASEL, "SEL Framework" (2020)
#   - Carol Dweck, "Mindset" (2006)
#   - Howard Gardner, "Frames of Mind" (1983, revised)
#   - Erik Erikson, "Identity and the Life Cycle" (1959)
#   - Richard Lerner, "The Five Cs of PYD" (2005)
#   - John Bowlby, "Attachment and Loss" (1969)
#   - Lawrence Kohlberg, "Stages of Moral Development"
# ──────────────────────────────────────────────────────────────

# ── 设计理念 ──────────────────────────────────────────────

designPhilosophy:
  principle: "教家长用发展心理学家的眼睛看孩子——在不同年龄段，自动切换最合适的观察视角"
  approach:
    - "不教理论，用引导式问题代替"
    - "观察 → 记录 → AI 分析 → 洞察，家长只需完成前两步"
    - "降低记录门槛：选择题 > 简短文字 > 长文描述"
    - "客观描述行为，不评判好坏对错"
    - "根据孩子月龄自动展示对应年龄段的观察维度"
    - "同一个孩子随着成长，观察维度自然过渡（如专注力维度从感官探索→学习策略→自我驱动学习）"
  antiPatterns:
    - "不让家长给孩子打分"
    - "不做横向比较（你的孩子 vs 别的孩子）"
    - "不用'应该''正常''异常'等评判性词汇"
    - "不做诊断性结论"
    - "不给理论贴标签（不在UI上显示'蒙特梭利''CASEL'等术语）"

# ── 理论-年龄映射 ────────────────────────────────────────

frameworkMapping:
  description: "不同年龄段激活的理论框架。UI 不展示理论名称，只展示观察维度。"
  layers:
    - ageRange: { startMonths: 0, endMonths: 72 }
      primaryFramework: "Montessori"
      dimensions: [CONC, REPT, CHOI, INDP, SOCL, EMOT, MOVE, LANG, ORDR, EXPL]

    - ageRange: { startMonths: 72, endMonths: 144 }
      primaryFramework: "Executive Function + CASEL + Growth Mindset + Multiple Intelligences + Erikson-Industry"
      dimensions: [EXEC, CASL, GROW, MINT, INDU, SOCL, EMOT, LANG, EXPL]

    - ageRange: { startMonths: 144, endMonths: 216 }
      primaryFramework: "Erikson-Identity + PYD 5C + Metacognition + Moral Development"
      dimensions: [IDEN, PYDC, META, MORL, SOCL, EMOT, LANG]

    - ageRange: { startMonths: 0, endMonths: -1 }
      primaryFramework: "Attachment + Relationship Quality (cross-age)"
      dimensions: [ATTC, RELQ]

  transitionRules:
    - "维度切换不是突然的，在过渡期(±12个月)两套维度并存"
    - "通用维度(SOCL, EMOT, LANG, EXPL)在所有年龄段保持，但引导问题和信号随年龄进化"
    - "家长看到的是连续的观察体验，不会意识到底层理论框架的切换"

# ── 观察模式 ──────────────────────────────────────────────

observationModes:

  - modeId: quick-capture
    displayName: "快速捕捉"
    description: "看到有趣/特别的行为时，30 秒内完成记录"
    duration: "< 1 分钟"
    format: "选择维度 + 简短描述/拍照/语音"
    frequency: "随时"
    guidancePrompt: "刚才孩子做了什么让你注意到了？"

  - modeId: focused-observation
    displayName: "专注观察"
    description: "选定一个维度，安静观察 10-15 分钟，不干预"
    duration: "10-15 分钟"
    format: "引导式问题 + 结构化记录"
    frequency: "建议每周 1-2 次"
    guidancePrompt: "找一个孩子正在做事的时刻，安静地坐在旁边观察。不要介入、不要说话、不要评价。只是看。"
    tips:
      - "选择孩子自发活动的时刻，不要在你安排的活动中观察"
      - "坐在不显眼的位置，避免眼神接触引导孩子"
      - "如果孩子来找你，简短回应后继续观察"
      - "记下你看到的事实，不是你的感受或判断"

  - modeId: daily-reflection
    displayName: "每日回顾"
    description: "一天结束时花 2 分钟回顾今天印象最深的观察"
    duration: "2-3 分钟"
    format: "AI 引导式对话"
    frequency: "每天睡前"
    guidancePrompt: "今天有没有什么时刻，孩子的行为让你觉得有意思、意外、或者特别？"

  - modeId: five-minute
    displayName: "五分钟模式"
    description: "系统主动推一个极简问题，家长语音或文字回答即可。适合碎片化时间。"
    duration: "< 1 分钟"
    format: "系统推问题 → 语音/文字回答 → 自动归类"
    frequency: "系统判断最佳时机推送，或家长主动进入"
    guidancePrompt: null
    notes:
      - "问题由系统根据当前最需补充的维度自动生成，来源于各维度的 guidedQuestions"
      - "与其他三种模式的区别：其他模式由家长主动发起并选择维度，五分钟模式由系统推送问题和维度"
      - "每次只推一个问题，回答后可选择'再来一个'或结束"
      - "碎片化回答长期积累比刻意长记录更真实"

# ── 观察维度 ──────────────────────────────────────────────
# 蒙氏教师的核心观察维度，转化为家长可理解的框架

field_contract:
  dimension:
    dimensionId:     { type: string, required: true, pattern: "^PO-OBS-[A-Z]{3,6}-[0-9]{3}$" }
    displayName:     { type: string, required: true }
    parentQuestion:  { type: string, required: true, description: "用家长能理解的一句话概括这个维度" }
    ageRelevance:
      type: object
      fields:
        startMonths: { type: integer }
        endMonths:   { type: integer, description: "-1 表示无上限" }
    indicators:
      type: array
      items:
        type: object
        fields:
          signal:      { type: string, description: "可观察的行为信号" }
          meaning:     { type: string, description: "这个信号可能意味着什么" }
    guidedQuestions:
      type: array
      items: string
      description: "引导家长观察的具体问题"
    quickTags:
      type: array
      items: string
      description: "快速记录时的预设标签"
    source: { type: string, required: true }

constraints:
  - "guidedQuestions 必须是开放式的描述性问题，不是 yes/no 判断题"
  - "indicators.meaning 使用'可能意味着'而非'说明''证明'"
  - "所有维度的解读仅供参考，不做发育评估"

dimensions:

  # ── 1. 专注力 (Concentration) ────────────────────────────

  - dimensionId: PO-OBS-CONC-001
    displayName: "专注力"
    parentQuestion: "孩子能不能沉浸在一件事情里？"
    ageRelevance: { startMonths: 3, endMonths: -1 }
    indicators:
      - signal: "长时间注视或操作同一个物品/活动"
        meaning: "深度专注状态，这是蒙氏所说的'正常化'的核心标志"
      - signal: "周围有干扰（噪音、其他孩子）但不受影响"
        meaning: "专注力正在发展到抗干扰阶段"
      - signal: "被打断时表现出不悦或抗拒"
        meaning: "孩子的专注正在被外部因素中断，尽量减少不必要的打断"
      - signal: "完成后表现出满足和平静"
        meaning: "蒙氏称之为'工作后的喜悦'，是内在动机驱动的标志"
      - signal: "频繁切换活动，每样只做一小会儿"
        meaning: "可能还在寻找感兴趣的活动，或环境刺激过多"
    guidedQuestions:
      - "孩子刚才做了什么活动？持续了大约多长时间？"
      - "在做这件事的时候，孩子的表情和身体状态是什么样的？"
      - "有没有被外界打扰？被打扰后的反应是什么？"
      - "结束后孩子的情绪如何？"
      - "这个活动是孩子自己选择的，还是你安排的？"
    quickTags:
      - "深度专注"
      - "反复操作"
      - "容易分心"
      - "被打断后难以恢复"
      - "完成后很满足"
      - "自发选择"
    source: "Montessori-concentration-normalization"

  # ── 2. 重复 (Repetition) ─────────────────────────────────

  - dimensionId: PO-OBS-REPT-001
    displayName: "重复行为"
    parentQuestion: "孩子是不是在反复做同一件事？"
    ageRelevance: { startMonths: 6, endMonths: 72 }
    indicators:
      - signal: "反复将物品放入容器再倒出"
        meaning: "可能在探索空间关系和因果逻辑"
      - signal: "反复爬同一段楼梯、走同一条线路"
        meaning: "运动技能的自我完善，通过重复建立身体记忆"
      - signal: "反复听同一个故事、看同一本书"
        meaning: "语言和叙事理解的深化过程"
      - signal: "反复排列、堆叠、分类物品"
        meaning: "秩序感和数学思维的早期发展"
      - signal: "重复后表现出更高的熟练度或变化"
        meaning: "从简单重复进入精进阶段，是掌握新技能的标志"
    guidedQuestions:
      - "孩子重复做了什么？大约重复了多少次？"
      - "每次重复和上一次有没有什么不同（更快、更准确、加入了变化）？"
      - "是你要求他/她重复的，还是自发的？"
      - "重复的时候孩子看起来无聊还是投入？"
    quickTags:
      - "自发重复"
      - "精进性重复"
      - "机械重复"
      - "创造性变化"
      - "越来越熟练"
    source: "Montessori-repetition-mastery"

  # ── 3. 选择与意志 (Choice & Will) ───────────────────────

  - dimensionId: PO-OBS-CHOI-001
    displayName: "选择与意志"
    parentQuestion: "孩子能不能自己决定做什么？"
    ageRelevance: { startMonths: 12, endMonths: -1 }
    indicators:
      - signal: "主动从多个选项中选择一个活动"
        meaning: "意志力和决策能力正在发展"
      - signal: "拒绝成人安排的活动，坚持自己的选择"
        meaning: "自主意识的表现（不等于'叛逆'）"
      - signal: "选择了一个有挑战性的活动并坚持"
        meaning: "对自己能力边界的探索"
      - signal: "总是选择同一个活动"
        meaning: "可能正处于某个技能的敏感期，需要通过重复来掌握"
      - signal: "无法选择，在活动之间犹豫不决"
        meaning: "可能选项过多，或对环境不够熟悉"
    guidedQuestions:
      - "今天孩子自己选择了什么活动/玩具/食物？"
      - "选择的过程是快速决定还是犹豫了很久？"
      - "有没有拒绝你的建议？拒绝的方式是什么？"
      - "选择之后坚持了多久？有没有中途放弃？"
    quickTags:
      - "自主选择"
      - "果断决定"
      - "犹豫不决"
      - "坚持己见"
      - "放弃选择"
      - "寻求帮助"
    source: "Montessori-will-development"

  # ── 4. 独立性 (Independence) ─────────────────────────────

  - dimensionId: PO-OBS-INDP-001
    displayName: "独立性"
    parentQuestion: "孩子在哪些事情上不需要你的帮助了？"
    ageRelevance: { startMonths: 9, endMonths: -1 }
    indicators:
      - signal: "尝试自己完成以前需要帮助的事"
        meaning: "独立性发展的积极信号"
      - signal: "'我自己来！'——拒绝帮助"
        meaning: "强烈的自主需求，这是正常且积极的"
      - signal: "遇到困难时先自己尝试解决，实在不行再求助"
        meaning: "问题解决能力和挫折耐受力的发展"
      - signal: "主动承担力所能及的任务（收拾玩具、倒水）"
        meaning: "蒙氏称之为'日常生活练习'，是独立性的核心发展路径"
      - signal: "遇到困难立刻哭闹或求助"
        meaning: "可能需要更多鼓励自主尝试的机会"
    guidedQuestions:
      - "今天孩子自己完成了什么以前做不到的事？"
      - "遇到困难时是怎么反应的？"
      - "你是主动帮忙了，还是等孩子来请求帮助？"
      - "有没有什么事是孩子想自己做但你替他/她做了的？"
    quickTags:
      - "自己完成"
      - "拒绝帮助"
      - "主动求助"
      - "先尝试后求助"
      - "新技能达成"
      - "日常自理"
    source: "Montessori-independence"

  # ── 5. 社交互动 (Social Interaction) ────────────────────

  - dimensionId: PO-OBS-SOCL-001
    displayName: "社交互动"
    parentQuestion: "孩子和其他人在一起时是什么状态？"
    ageRelevance: { startMonths: 6, endMonths: -1 }
    indicators:
      - signal: "在其他孩子旁边各玩各的（平行游戏）"
        meaning: "2 岁前这是正常的社交发展阶段，不代表'不合群'"
      - signal: "主动邀请或加入其他孩子的活动"
        meaning: "合作性社交能力的发展"
      - signal: "观察其他孩子但不加入"
        meaning: "蒙氏称为'旁观者游戏'，是通过观察学习的方式"
      - signal: "因物品发生冲突"
        meaning: "所有权概念的发展期，需要引导而非惩罚"
      - signal: "主动分享或帮助他人"
        meaning: "同理心和亲社会行为的萌芽"
      - signal: "在陌生环境中紧贴家长"
        meaning: "安全依恋的表现，不要强迫孩子'大方'"
    guidedQuestions:
      - "孩子今天和谁互动了？互动方式是什么（语言/动作/表情）？"
      - "在群体中孩子倾向于什么角色（发起者/跟随者/观察者）？"
      - "有没有发生冲突？孩子怎么处理的？"
      - "有没有表现出帮助、分享、安慰他人的行为？"
    quickTags:
      - "平行游戏"
      - "合作游戏"
      - "旁观学习"
      - "主动社交"
      - "回避社交"
      - "冲突发生"
      - "主动分享"
      - "寻求安全感"
    source: "Montessori-social-development, Parten-play-stages"

  # ── 6. 情绪状态 (Emotional State) ───────────────────────

  - dimensionId: PO-OBS-EMOT-001
    displayName: "情绪状态"
    parentQuestion: "孩子今天的心情怎么样？"
    ageRelevance: { startMonths: 0, endMonths: -1 }
    indicators:
      - signal: "在活动中表现出平静和满足"
        meaning: "蒙氏'正常化'状态的外在表现"
      - signal: "突然的情绪爆发（大哭/发怒）"
        meaning: "可能有未被满足的需求，或自我调节能力在发展中"
      - signal: "情绪转换迅速（哭完很快恢复）"
        meaning: "幼儿的正常情绪模式，情绪调节能力在逐步建立"
      - signal: "长时间情绪低落或焦躁"
        meaning: "值得关注的信号，观察是否有持续的触发因素"
      - signal: "用语言表达自己的情绪"
        meaning: "情绪认知和表达能力的发展"
    guidedQuestions:
      - "今天孩子情绪最好的时刻是什么时候？在做什么？"
      - "有没有情绪波动比较大的时刻？前后发生了什么？"
      - "孩子用什么方式表达不满或不开心（哭闹/语言/动作）？"
      - "你做了什么帮助孩子平静下来？效果如何？"
    quickTags:
      - "平静满足"
      - "兴奋喜悦"
      - "焦躁不安"
      - "哭闹"
      - "愤怒"
      - "恐惧"
      - "快速恢复"
      - "需要安慰"
      - "用语言表达"
    source: "Montessori-normalization"

  # ── 7. 运动与身体 (Movement & Body) ────────────────────

  - dimensionId: PO-OBS-MOVE-001
    displayName: "运动与身体"
    parentQuestion: "孩子的身体在探索什么？"
    ageRelevance: { startMonths: 0, endMonths: 72 }
    indicators:
      - signal: "反复练习某个新动作（翻身、爬、走）"
        meaning: "运动敏感期中的自我驱动练习"
      - signal: "对攀爬、跳跃、平衡有强烈兴趣"
        meaning: "大运动发展的内在需求"
      - signal: "反复操作小物品（拧、捏、倒、插）"
        meaning: "精细动作发展，手眼协调能力在建立"
      - signal: "身体动作有节奏感（走路有韵律、拍手有节拍）"
        meaning: "身体控制力和节奏感的发展"
      - signal: "手眼不协调、动作笨拙"
        meaning: "正常的发展阶段，需要更多练习机会而非纠正"
    guidedQuestions:
      - "今天孩子最喜欢的身体活动是什么？"
      - "有没有反复练习什么动作？"
      - "有没有尝试什么新的运动挑战？"
      - "精细动作方面：有没有操作小物品的行为？"
    quickTags:
      - "大运动练习"
      - "精细动作"
      - "手眼协调"
      - "平衡挑战"
      - "新动作尝试"
      - "动作越来越流畅"
    source: "Montessori-movement-sensitive-period"

  # ── 8. 语言与沟通 (Language & Communication) ────────────

  - dimensionId: PO-OBS-LANG-001
    displayName: "语言与沟通"
    parentQuestion: "孩子今天说了什么有趣的话？"
    ageRelevance: { startMonths: 0, endMonths: -1 }
    indicators:
      - signal: "模仿成人的语句或语调"
        meaning: "语言习得的自然过程"
      - signal: "不断问'为什么''这是什么'"
        meaning: "求知欲驱动的语言探索，尽可能认真回答"
      - signal: "自言自语（叙述自己在做什么）"
        meaning: "内部语言的发展，是思维能力的重要标志"
      - signal: "造出新词或创造性使用语言"
        meaning: "语言规则的内化和创造性应用"
      - signal: "用身体语言代替口头表达"
        meaning: "语言表达还在发展中，或此刻身体表达更有效"
    guidedQuestions:
      - "今天孩子说了什么让你印象深刻的话？"
      - "和孩子对话时，他/她的回应方式是什么？"
      - "有没有问你什么问题？"
      - "有没有自言自语或'讲故事'的行为？"
    quickTags:
      - "新词汇"
      - "长句子"
      - "提问"
      - "自言自语"
      - "模仿语言"
      - "创造性表达"
      - "非语言沟通"
    source: "Montessori-language-sensitive-period"

  # ── 9. 秩序感 (Sense of Order) ──────────────────────────

  - dimensionId: PO-OBS-ORDR-001
    displayName: "秩序感"
