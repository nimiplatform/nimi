  # ── 12. 社会情感能力 (CASEL SEL) ────────────────────────

  - dimensionId: PO-OBS-CASL-001
    displayName: "社会情感能力"
    parentQuestion: "孩子了解自己的情绪吗？能和别人好好相处吗？"
    ageRelevance: { startMonths: 72, endMonths: 144 }
    indicators:
      # 自我意识
      - signal: "能准确地说出自己的情绪（不只是'开心/不开心'，而是'我觉得委屈/紧张/失望'）"
        meaning: "情绪词汇量和自我意识在扩展"
      - signal: "能识别什么情境会触发自己的情绪"
        meaning: "情绪自我觉察能力的发展"
      # 自我管理
      - signal: "生气或沮丧时有自己的冷静方式（深呼吸、独处、画画）"
        meaning: "开始建立个人化的情绪调节策略"
      - signal: "能设定目标并为之努力"
        meaning: "自我驱动力和延迟满足能力的发展"
      # 社会意识
      - signal: "注意到别人的情绪变化并回应（'你看起来不开心'）"
        meaning: "共情能力的发展"
      # 关系技能
      - signal: "在冲突中尝试用语言协商而非肢体"
        meaning: "冲突解决能力在发展"
      - signal: "能在团队中承担角色并配合他人"
        meaning: "合作能力和团队意识"
      # 负责任的决策
      - signal: "做决定前会考虑后果（'如果我这样做会怎样'）"
        meaning: "因果推理和责任意识的发展"
    guidedQuestions:
      - "孩子今天有没有说出自己的感受？用了什么词？"
      - "有没有注意到别人的情绪？怎么回应的？"
      - "遇到不顺心的事时怎么处理的？"
      - "有没有做什么决定？做决定的过程是怎样的？"
      - "和朋友/同学之间有什么互动？"
    quickTags:
      - "准确表达情绪"
      - "自我调节"
      - "共情回应"
      - "语言解决冲突"
      - "团队合作"
      - "考虑后果"
      - "情绪爆发"
      - "退缩回避"
    source: "CASEL-SEL-framework-2020"

  # ── 13. 成长型思维 (Growth Mindset) ────────────────────

  - dimensionId: PO-OBS-GROW-001
    displayName: "面对挑战的态度"
    parentQuestion: "孩子遇到困难时是什么反应？"
    ageRelevance: { startMonths: 48, endMonths: -1 }
    indicators:
      # 成长型思维信号
      - signal: "遇到困难说'我还没学会'而不是'我不行'"
        meaning: "成长型思维的语言标志——相信能力可以通过努力改变"
      - signal: "失败后愿意换一种方法再试"
        meaning: "把失败看作学习过程的一部分"
      - signal: "对挑战性任务表现出兴趣而非回避"
        meaning: "主动寻求挑战是成长型思维的行为表现"
      - signal: "关注自己的进步而非和别人比较"
        meaning: "内在参照标准正在建立"
      # 固定型思维信号
      - signal: "遇到困难就说'我做不到''我太笨了'"
        meaning: "可能在某些领域形成了固定型思维，需要关注表扬方式"
      - signal: "只愿意做确定能做好的事，回避挑战"
        meaning: "害怕失败可能与'聪明'标签带来的压力有关"
      - signal: "别人成功时表现出嫉妒或沮丧"
        meaning: "在零和框架中看待能力，需要转变为共同成长的视角"
      - signal: "被表扬'聪明'后更不愿意尝试难题"
        meaning: "Dweck 研究证实的现象：智力表扬会削弱挑战意愿"
    guidedQuestions:
      - "孩子今天遇到了什么困难？他/她的第一反应是什么？"
      - "有没有失败或犯错的时刻？之后怎么做的？"
      - "你今天怎么表扬孩子的？表扬的是结果还是过程？"
      - "孩子有没有主动选择做一件有挑战的事？"
      - "有没有说过'我不行''太难了'这类话？在什么情境下？"
    quickTags:
      - "迎接挑战"
      - "失败后再试"
      - "关注过程"
      - "关注进步"
      - "回避挑战"
      - "害怕犯错"
      - "说'我不行'"
      - "和别人比较"
    source: "Dweck-mindset-2006"

