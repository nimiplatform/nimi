  # ── 16. 自我认同 (Erikson: Identity vs. Role Confusion) ─

  - dimensionId: PO-OBS-IDEN-001
    displayName: "自我认同探索"
    parentQuestion: "孩子在思考'我是谁'吗？"
    ageRelevance: { startMonths: 132, endMonths: 216 }
    indicators:
      - signal: "尝试不同的穿着风格、音乐偏好、兴趣圈子"
        meaning: "身份探索的正常过程，Erikson 称之为'心理延缓期'(psychosocial moratorium)"
      - signal: "质疑家庭的价值观或规则"
        meaning: "从接受他人价值观转向建构自己的价值体系——这是健康的"
      - signal: "对某个身份标签非常认同（'我是一个音乐人/程序员/运动员'）"
        meaning: "开始在某个领域形成身份承诺"
      - signal: "经常说'你不理解我''没人理解我'"
        meaning: "对独特性的强调，是自我意识发展的一部分"
      - signal: "回避自我探索，不关心未来，随波逐流"
        meaning: "可能处于身份混乱阶段，值得关注但不必焦虑"
      - signal: "对未来有自己的想法和计划"
        meaning: "身份形成趋向成熟"
    guidedQuestions:
      - "最近孩子有没有表达对自己的新认识？（'我发现我喜欢/不喜欢…'）"
      - "有没有尝试什么新的风格、兴趣、圈子？"
      - "有没有质疑家里的规矩或你们的观点？他/她怎么表达的？"
      - "关于未来，孩子最近说了什么？"
      - "在同伴群体中，孩子是跟随者还是有自己的主见？"
    quickTags:
      - "尝试新身份"
      - "质疑规则"
      - "身份承诺"
      - "寻找归属"
      - "随波逐流"
      - "对未来有想法"
      - "感觉被误解"
    source: "Erikson-identity-vs-role-confusion"

