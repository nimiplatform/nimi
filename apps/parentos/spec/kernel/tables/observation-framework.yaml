    ageRelevance: { startMonths: 60, endMonths: 144 }
    indicators:
      - signal: "能按计划完成多步骤任务（如：先做作业→整理书包→准备明天的东西）"
        meaning: "工作记忆和计划能力在发展"
      - signal: "能抵抗诱惑（如：想玩但先完成手头的事）"
        meaning: "抑制控制能力的发展，是自律的核心"
      - signal: "当原计划行不通时能调整策略"
        meaning: "认知灵活性——执行功能的三大核心之一"
      - signal: "忘记带东西、忘记任务、经常丢三落四"
