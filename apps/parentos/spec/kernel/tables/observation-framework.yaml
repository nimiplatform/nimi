      - "有没有因为觉得'不对'而拒绝做某事？即使同伴都在做？"
      - "他/她为什么觉得那件事是对的/错的？理由是什么？"
    quickTags:
      - "遵守规则"
      - "内在判断"
      - "质疑公平性"
      - "不随大流"
      - "关注正义"
      - "害怕惩罚"
      - "同伴压力"
    source: "Kohlberg-moral-development"

  # ════════════════════════════════════════════════════════════
  # 全年龄通用维度
  # ════════════════════════════════════════════════════════════

  # ── 20. 亲子依恋 (Attachment) ──────────────────────────

  - dimensionId: PO-OBS-ATTC-001
    displayName: "安全感与亲子关系"
    parentQuestion: "孩子在你身边感到安全吗？"
    ageRelevance: { startMonths: 0, endMonths: -1 }
    indicators:
      # 婴幼儿 (0-3)
      - signal: "受到惊吓或不安时主动寻找照护者"
        meaning: "安全依恋的核心标志——把你当作'安全基地'"
      - signal: "离开照护者去探索，时不时回头确认你在"
        meaning: "安全依恋下的探索行为——信任你会在那里"
      # 学龄期 (6-12)
      - signal: "遇到挫折时愿意和你说"
        meaning: "信任亲子关系，把你当作情感支持的来源"
      - signal: "在外面受了委屈，回家后情绪释放（大哭）"
        meaning: "家是安全的情绪释放空间——这是好事"
      # 青春期 (12-18)
      - signal: "虽然独立意识很强，但关键时刻仍会征求你的意见"
        meaning: "健康的依恋在青春期表现为'有距离的信任'"
      - signal: "完全不和家长沟通，封闭所有信息"
        meaning: "值得关注的信号——可能需要调整沟通方式"
    guidedQuestions:
      - "孩子今天有没有主动找你说话/寻求安慰/分享经历？"
      - "你们今天有没有'质量时间'（不看手机、全身心在一起的时刻）？"
      - "孩子遇到问题时会找你吗？还是更倾向于找其他人或自己消化？"
      - "你觉得现在你们之间的关系距离是合适的吗？"
    quickTags:
      - "主动亲近"
      - "主动分享"
      - "寻求安慰"
      - "安全探索"
      - "拒绝沟通"
      - "过度黏人"
      - "质量时间"
    source: "Bowlby-attachment-1969"

  # ── 21. 亲子关系质量 (Relationship Quality) ────────────
  # 与 ATTC 的区别：ATTC 观察的是孩子的依恋行为（单向），
  # 本维度观察的是亲子互动的双向质量——包括家长的沟通方式和关系动态。
  # 亲子关系是一切观察、沟通、引导的基础通道。通道不通，其他维度都是空转。

  - dimensionId: PO-OBS-RELQ-001
    displayName: "亲子关系质量"
    parentQuestion: "你和孩子之间的沟通通道畅通吗？"
    ageRelevance: { startMonths: 0, endMonths: -1 }
    indicators:
      # ── 婴幼儿期 (0-3) ──
      - signal: "你能准确判断孩子哭声的含义（饿了/困了/不舒服/要抱）"
        meaning: "敏感性回应——关系质量的早期基石"
      - signal: "你回应孩子的速度和方式是稳定的，不因自己心情波动"
        meaning: "一致性回应——孩子由此建立对世界的可预测感"
      - signal: "你能在孩子探索时保持'在场但不干预'的状态"
        meaning: "安全基地功能——你既在又不侵入"
      # ── 学龄前 (3-6) ──
      - signal: "孩子做错事时，你分离了行为和人格（'这件事不对' vs '你怎么这么笨'）"
        meaning: "无条件积极关注——孩子感受到的是'被爱的人做了不对的事'而非'不被爱'"
      - signal: "你和孩子之间有专属的仪式或暗号（如特殊的告别方式、睡前固定流程）"
        meaning: "关系独特性——孩子感受到'我和你之间有特别的东西'"
      - signal: "冲突后你会主动修复关系（道歉、拥抱、解释）"
        meaning: "关系修复能力——比避免冲突更重要的是冲突后能修复"
      # ── 学龄期 (6-12) ──
      - signal: "孩子会主动和你分享学校/朋友的事，包括不愉快的"
        meaning: "信息通道畅通——孩子认为告诉你是安全的"
      - signal: "你在孩子说话时能放下手机全神贯注地听"
        meaning: "被倾听的体验——关系质量的日常维护"
      - signal: "你允许孩子表达不同意见，甚至反驳你"
        meaning: "关系中的权力平衡在向对等方向发展"
      - signal: "孩子在外面的表现和在家里的表现差异很大"
        meaning: "可能在家里不敢展现真实自我——关系中可能有压力源"
      # ── 青春期 (12-18) ──
      - signal: "你们能就敏感话题（恋爱、压力、身体变化）进行对话"
        meaning: "关系深度——能承载敏感话题是高质量关系的标志"
      - signal: "孩子遇到真正的困难时，你是他/她前三个想联系的人之一"
        meaning: "关系的实际权重——不是口头上的亲近，而是危机时刻的选择"
      - signal: "你能接受孩子的选择即使你不同意，并表达'我不同意但我尊重你的决定'"
        meaning: "从'管教关系'过渡到'顾问关系'——青春期关系转型的核心"
      - signal: "争吵后孩子或你能先开口缓和，不让冷战持续超过一天"
        meaning: "双向修复——关系韧性的标志"
      - signal: "孩子不再和你说任何心里话，所有对话都是事务性的"
        meaning: "沟通通道可能在关闭——需要关注，但不要强行撬开"
    guidedQuestions:
      - "今天你和孩子之间最好的一个互动时刻是什么？"
      - "有没有什么时刻你觉得沟通不太顺畅？发生了什么？"
      - "你今天有没有认真听孩子说话（不打断、不评判、不急着给建议）的时刻？"
      - "孩子今天有没有主动和你分享什么？还是你主动问的？"
      - "有没有什么事是孩子不愿意告诉你的？你觉得原因是什么？"
      - "你今天对孩子说过'对不起'或'谢谢你告诉我'吗？"
    quickTags:
      - "深度对话"
      - "质量时间"
      - "主动分享"
      - "认真倾听"
      - "冲突修复"
      - "敏感话题"
      - "事务性对话"
      - "冷战"
      - "我先道歉了"
      - "放下手机"
    source: "Gottman-relationship-research, Gordon-PET, Ginott-parent-child-communication"

# ── AI 分析规则 ──────────────────────────────────────────

aiAnalysisRules:
  description: "AI 基于观察记录的多框架分析规则"

  analysisTypes:

    # 所有年龄通用
    - type: pattern-detection
      description: "从多条观察记录中识别行为模式"
      ageRange: { startMonths: 0, endMonths: -1 }
      examples:
        - "最近两周，专注力维度的记录频繁出现'深度专注'标签，且持续时间在增加"
        - "亲子依恋维度的记录显示孩子在遇到挫折时更多地选择和你沟通"

    - type: trend-summary
      description: "生成阶段性观察总结"
      ageRange: { startMonths: 0, endMonths: -1 }
      examples:
        - "本月观察 12 条：专注力 5 条（集中在绘画活动）、独立性 3 条（穿衣自理进步）、社交 4 条（开始合作游戏）"
        - "本月观察 8 条：学习自觉性 3 条（开始使用清单管理作业）、面对挑战 2 条（数学测验失利后主动练题）、社会情感 3 条（和同学冲突后用语言协商）"

    # 0-6 岁特有
    - type: sensitive-period-matching
      description: "将观察到的行为信号与 sensitive-periods.yaml 中的敏感期进行匹配"
      ageRange: { startMonths: 0, endMonths: 72 }
      examples:
        - "观察到大量重复排列行为 + 秩序敏感期月龄范围 → 提示'孩子可能正处于秩序敏感期'"
        - "大量语言相关记录（新词汇、提问、自言自语）+ 18-24 月龄 → 提示语言爆发期"

    # 6-12 岁特有
    - type: mindset-analysis
      description: "从面对挑战维度的记录中分析思维模式倾向"
      ageRange: { startMonths: 48, endMonths: 144 }
      examples:
        - "近期 5 条挑战相关记录中 4 条标记为'迎接挑战''失败后再试' → 孩子在这个领域倾向于成长型思维"
        - "数学领域连续出现'说我不行''回避挑战' → 可能在数学领域形成了固定型思维，观察一下表扬方式是否聚焦于结果而非过程"

    - type: intelligence-profile
      description: "从智能倾向维度的长期记录中描绘孩子的多元智能画像"
      ageRange: { startMonths: 36, endMonths: -1 }
      examples:
        - "过去 3 个月的记录中，'语言文字''内省反思'标签出现频率最高 → 孩子可能更偏向语言智能和内省智能"

    - type: executive-function-growth
      description: "追踪执行功能（自我管理）能力的发展轨迹"
      ageRange: { startMonths: 60, endMonths: 144 }
      examples:
        - "3 个月前：'忘事''容易分心'标签多 → 现在：'使用清单/工具''按计划执行'增加 → 工作记忆辅助策略在建立"

    # 12-18 岁特有
    - type: identity-exploration-tracking
      description: "追踪青少年的身份探索过程"
      ageRange: { startMonths: 132, endMonths: 216 }
      examples:
        - "过去半年记录显示孩子在音乐领域持续投入（从'尝试新身份'到'身份承诺'），同时在学业领域出现'质疑规则' → 可能正在形成以音乐为核心的身份认同"

    - type: moral-reasoning-development
      description: "观察道德推理的发展水平变化"
      ageRange: { startMonths: 72, endMonths: 216 }
      examples:
        - "早期记录多为'遵守规则'(怕惩罚) → 近期出现'质疑公平性''内在判断' → 道德推理正从前习俗水平向习俗/后习俗水平发展"

    # 全年龄——关系质量
    - type: relationship-quality-tracking
      description: "追踪亲子关系质量的变化趋势，关注沟通通道是否畅通"
      ageRange: { startMonths: 0, endMonths: -1 }
      examples:
        - "近期 RELQ 维度记录中'深度对话''主动分享'标签增多，'事务性对话'减少 → 沟通通道在改善"
        - "最近一个月 RELQ 记录中出现 3 次'冷战'标签 → 关系可能处于紧张期，观察是否有'冲突修复'行为跟随"
        - "ATTC 和 RELQ 交叉分析：孩子的依恋行为（ATTC）稳定，但家长记录的互动质量（RELQ）在下降 → 可能是家长端的沟通方式需要关注"
      analysisConstraints:
        - "关系质量分析绝不评判家长（不说'你做得不够好'）"
        - "只描述互动模式的变化趋势"
        - "出现持续负面信号时，导向'可以和专业的家庭教育指导师聊聊'，不做关系诊断"

  outputConstraints:
    - "AI 输出使用'观察到''可能''倾向于'等非确定性措辞"
    - "不输出任何诊断性语言（如'发育迟缓''异常''障碍'）"
    - "分析结论附带观察记录来源引用（哪一天、哪条记录）"
    - "建议类输出限于'可以尝试''可以关注'，不使用'应该''必须'"
    - "不在 UI 上展示理论名称（如'根据 Erikson 理论'），用家长能理解的语言"
    - "多元智能分析强调'每个孩子都有自己的智能组合'，不暗示某些智能比其他更好"
    - "成长型思维分析不给孩子贴标签（'你的孩子是固定型思维'），而是描述在具体领域的行为模式"
    - "关系质量分析不评判家长的教养方式，只描述互动模式和趋势"

# ── 记录关联 ─────────────────────────────────────────────
# 观察记录存储在 local-storage.yaml#journal_entries 中
# 通过以下扩展字段关联到本框架

journalExtension:
  description: "journal_entries 表中 observation-framework 相关字段"
  fields:
    observationMode:   { type: TEXT, nullable: true, description: "quick-capture | focused-observation | daily-reflection | five-minute" }
    dimensionId:       { type: TEXT, nullable: true, description: "对应本表的 dimensionId" }
    selectedTags:      { type: TEXT, nullable: true, description: "JSON array: 从 quickTags 中选择的标签" }
    guidedAnswers:     { type: TEXT, nullable: true, description: "JSON object: 引导问题的回答 { questionIndex: answer }" }
    observationDuration: { type: INTEGER, nullable: true, description: "观察时长（分钟）" }
  note: "这些字段扩展 journal_entries，不创建新表"
