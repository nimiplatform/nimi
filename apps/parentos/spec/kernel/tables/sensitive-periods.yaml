# ──────────────────────────────────────────────────────────────
# sensitive-periods.yaml — ParentOS 敏感期定义
# 基于蒙特梭利敏感期理论的结构化定义。
# 提醒规则在 reminder-rules.yaml 中，这里是详细定义。
# ──────────────────────────────────────────────────────────────

field_contract:
  period:
    periodId:       { type: string, required: true, pattern: "^PO-SP-[A-Z]{3,6}-[0-9]{3}$" }
    title:          { type: string, required: true }
    description:    { type: string, required: true }
    ageRange:
      type: object
      required: true
      fields:
        startMonths: { type: integer }
        peakMonths:  { type: integer, description: "敏感期高峰月龄" }
        endMonths:   { type: integer }
    observableSigns:
      type: array
      items: string
      required: true
      description: "家长可观察到的行为信号"
    supportStrategies:
      type: array
      items: string
      required: true
      description: "家长支持策略"
    commonMistakes:
      type: array
      items: string
      required: true
      description: "常见误区"
    source:         { type: string, required: true }

constraints:
  - "periodId must be unique"
  - "ageRange.startMonths < ageRange.peakMonths < ageRange.endMonths"
  - "supportStrategies 描述家长行为，不做发育评估"

periods:

  - periodId: PO-SP-ORAL-001
    title: "口腔敏感期"
    description: "婴儿通过口腔探索世界，是感觉统合发育的重要组成部分。"
    ageRange: { startMonths: 0, peakMonths: 4, endMonths: 12 }
    observableSigns:
      - "把一切物品放进嘴里"
      - "啃咬玩具、手指、衣服"
      - "对不同质地的物品有强烈的嘴巴探索欲"
    supportStrategies:
      - "提供安全、干净、不同质地的磨牙玩具"
      - "不要过度阻止口腔探索行为"
      - "确保可触及物品的安全性"
    commonMistakes:
      - "反复说'不许吃'打断探索"
      - "只提供一种类型的咬胶"
    source: "Montessori-sensitive-periods"

  - periodId: PO-SP-ORDER-001
    title: "秩序敏感期"
    description: "孩子对环境中事物的位置、顺序、所有权有强烈的内在需求。"
    ageRange: { startMonths: 12, peakMonths: 24, endMonths: 42 }
    observableSigns:
      - "物品不在原位时强烈抗议或哭闹"
      - "坚持固定的生活流程和顺序"
      - "反复把物品放回'正确'位置"
      - "不接受事物的改变（如家具位置）"
    supportStrategies:
      - "保持家庭环境的相对稳定"
      - "建立可预测的日常流程"
      - "尊重孩子对秩序的需求，不嘲笑"
      - "大变动前提前预告"
    commonMistakes:
      - "认为孩子'太固执'或'不讲道理'"
      - "频繁改变日常流程"
      - "强制打断孩子的整理行为"
    source: "Montessori-sensitive-periods"

  - periodId: PO-SP-LANG-001
    title: "语言敏感期"
    description: "大脑对语言输入极度敏感，是语言习得效率最高的时期。"
    ageRange: { startMonths: 6, peakMonths: 24, endMonths: 72 }
    observableSigns:
      - "长时间注视说话者的嘴唇"
      - "咿呀学语越来越复杂"
      - "突然出现词汇爆发（18-24 个月）"
      - "不断问'这是什么'"
      - "对韵律和重复的故事着迷"
    supportStrategies:
      - "大量、丰富的语言输入（对话、讲述、朗读）"
      - "回应孩子的每次发声尝试"
      - "使用完整句子，不过度简化"
      - "亲子阅读时间"
      - "双语家庭可自然地使用两种语言"
    commonMistakes:
      - "过度使用电子屏幕替代亲子对话"
      - "用叠词代替正确词汇（'饭饭'→'吃饭'）"
      - "和其他孩子比较词汇量"
    source: "Montessori-sensitive-periods"

  - periodId: PO-SP-MOVE-001
    title: "运动敏感期"
    description: "对身体运动有强烈内驱力，是大运动和精细动作发展的关键期。"
    ageRange: { startMonths: 6, peakMonths: 18, endMonths: 48 }
    observableSigns:
      - "不停地要爬、走、跑、攀"
      - "反复练习新学会的动作"
      - "对高处和平衡挑战有兴趣"
      - "喜欢搬运、倒水、开合"
    supportStrategies:
      - "提供安全的自由活动空间"
      - "不过度限制运动探索"
      - "提供攀爬、平衡类器材"
      - "允许孩子反复练习"
    commonMistakes:
      - "因怕磕碰过度限制活动"
      - "长时间让孩子坐在推车/安全座椅中"
    source: "Montessori-sensitive-periods"

  - periodId: PO-SP-DETAIL-001
    title: "细节敏感期"
    description: "对微小的细节特别关注，能注意到成人忽略的小事物。"
    ageRange: { startMonths: 12, peakMonths: 24, endMonths: 48 }
    observableSigns:
      - "捡起地上极小的东西（线头、碎屑）"
      - "长时间观察蚂蚁、小虫"
      - "指出画面中微小的不同"
      - "对物品的细微差异很敏感"
    supportStrategies:
      - "不催促，给孩子观察细节的时间"
      - "和孩子一起观察并描述所见"
      - "提供放大镜等观察工具"
    commonMistakes:
      - "催促孩子'快走，别看了'"
      - "认为孩子'磨蹭'或'不专心'"
    source: "Montessori-sensitive-periods"

  - periodId: PO-SP-SOCIAL-001
    title: "社交敏感期"
    description: "从以自我为中心逐步发展出社交意识和合作能力。"
    ageRange: { startMonths: 30, peakMonths: 48, endMonths: 72 }
    observableSigns:
      - "开始主动接近其他孩子"
      - "从平行游戏过渡到合作游戏"
      - "出现'好朋友'概念"
      - "开始理解和遵守社交规则"
      - "对公平和轮流有强烈意识"
    supportStrategies:
      - "提供与同龄人互动的机会"
      - "不替孩子解决社交冲突，引导他们自己沟通"
      - "角色扮演练习社交场景"
      - "对孩子的社交尝试给予肯定"
    commonMistakes:
      - "强迫内向的孩子'去交朋友'"
      - "每次冲突都替孩子处理"
      - "和其他孩子的社交能力做比较"
    source: "Montessori-sensitive-periods"

  - periodId: PO-SP-NUMBER-001
    title: "数学敏感期"
    description: "对数量、排序、分类产生浓厚兴趣。"
    ageRange: { startMonths: 36, peakMonths: 54, endMonths: 72 }
    observableSigns:
      - "开始对数数感兴趣"
      - "喜欢排列和分类物品"
      - "注意到'多''少''一样多'"
      - "对形状和图案有兴趣"
    supportStrategies:
      - "在日常生活中融入数学（数台阶、分水果）"
      - "提供分类、排序的材料"
      - "不急于教抽象的算术"
      - "让孩子操作实物来理解数量"
    commonMistakes:
      - "过早进行纸面算术训练"
      - "跳过具象直接教抽象概念"
    source: "Montessori-sensitive-periods"

  - periodId: PO-SP-WRITE-001
    title: "书写敏感期"
    description: "对书写符号和文字产生兴趣，出现自发书写行为。"
    ageRange: { startMonths: 42, peakMonths: 54, endMonths: 72 }
    observableSigns:
      - "到处'写字'（涂鸦中出现类字符号）"
      - "模仿成人写字的动作"
      - "问'这个字怎么写'"
      - "在沙子、水雾中画字"
    supportStrategies:
      - "提供书写材料和空间"
      - "不纠正'写得不好'"
      - "可以示范但不强制临摹"
      - "先从描画简单线条开始"
    commonMistakes:
      - "过早要求工整书写"
      - "规定必须写多少遍"
      - "在敏感期之前就强制练字"
    source: "Montessori-sensitive-periods"

  - periodId: PO-SP-READ-001
    title: "阅读敏感期"
    description: "对文字符号产生解码兴趣，自发地尝试阅读环境中的文字。"
    ageRange: { startMonths: 48, peakMonths: 66, endMonths: 84 }
    observableSigns:
      - "指着路牌、包装上的字问'这写的什么'"
      - "开始认出常见的字"
      - "翻书时不只看图，也关注文字"
      - "'假装阅读'——看着书讲述故事"
    supportStrategies:
      - "保持丰富的阅读环境"
      - "回答关于文字的提问"
      - "指读绘本中的文字"
      - "不测试、不考核"
    commonMistakes:
      - "用识字量衡量进度"
      - "使用识字卡片进行机械记忆"
      - "在阅读敏感期到来前强制教认字"
    source: "Montessori-sensitive-periods"
