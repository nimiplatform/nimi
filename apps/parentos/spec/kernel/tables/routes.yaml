routes:
  - path: /timeline
    displayName: "成长时间线"
    feature: timeline
    description: "主页。展示今日重点、本周安排、阶段关注和逾期摘要。"
    isDefault: true
    nav: true
    icon: calendar

  - path: /profile
    displayName: "成长档案"
    feature: profile
    description: "孩子的完整档案入口。"
    nav: true
    icon: user

  - path: /profile/growth
    displayName: "生长曲线"
    feature: profile
    description: "身高体重头围与其他结构化测量图表。"
    parent: /profile
    routeKind: archive
    summarySource: growth_measurements

  - path: /profile/milestones
    displayName: "发育里程碑"
    feature: profile
    description: "发育里程碑达成追踪。"
    parent: /profile
    routeKind: archive
    summarySource: milestone_records

  - path: /profile/vaccines
    displayName: "疫苗记录"
    feature: profile
    description: "疫苗接种记录和计划。"
    parent: /profile
    routeKind: archive
    summarySource: vaccine_records

  - path: /profile/vision
    displayName: "视力档案"
    feature: profile
    description: "视力、验光、眼轴和眼健康记录。"
    parent: /profile
    routeKind: archive
    summarySource: growth_measurements

  - path: /profile/dental
    displayName: "口腔发育"
    feature: profile
    description: "牙齿萌出、换牙、龋齿和口腔检查记录。"
    parent: /profile
    routeKind: archive
    summarySource: dental_records

  - path: /profile/allergies
    displayName: "过敏记录"
    feature: profile
    description: "过敏原追踪、严重程度和状态变化。"
    parent: /profile
    routeKind: archive
    summarySource: allergy_records

  - path: /profile/sleep
    displayName: "睡眠记录"
    feature: profile
    description: "每日睡眠时长、作息规律和睡眠质量。"
    parent: /profile
    routeKind: archive
    summarySource: sleep_records

  - path: /profile/medical-events
    displayName: "就医记录"
    feature: profile
    description: "门诊、住院、筛查、用药和其他医学事件。"
    parent: /profile
    routeKind: archive
    summarySource: medical_events

  - path: /profile/posture
    displayName: "体态档案"
    feature: profile
    description: "姿态、足弓和身体对齐相关评估。"
    parent: /profile
    routeKind: archive
    summarySource: null

  - path: /profile/tanner
    displayName: "青春期发育"
    feature: profile
    description: "Tanner 分期和青春期发育记录。"
    parent: /profile
    routeKind: archive
    summarySource: tanner_assessments

  - path: /profile/fitness
    displayName: "体能测评"
    feature: profile
    description: "学校体测和运动能力评估。"
    parent: /profile
    routeKind: archive
    summarySource: fitness_assessments

  - path: /profile/outdoor
    displayName: "每周户外目标"
    feature: profile
    description: "户外活动记录、每周进度追踪和历史周回顾。"
    parent: /profile
    routeKind: archive
    summarySource: outdoor_records

  - path: /profile/report-upload
    displayName: "智能识别"
    feature: profile
    description: "上传本地图像并在家长确认后导入体检数据。"
    parent: /profile
    routeKind: tool

  - path: /journal
    displayName: "观察日记"
    feature: journal
    description: "文字、照片、语音观察记录与 AI 标签建议。"
    nav: true
    icon: book-open

  - path: /observe
    displayName: "专项观察"
    feature: journal
    description: "进入专项观察工作流，记录带维度的结构化观察。"
    parent: /journal
    routeKind: tool

  - path: /reminders
    displayName: "提醒列表"
    feature: timeline
    description: "查看今日重点、本周任务、阶段提醒和提醒历史。"

  - path: /advisor
    displayName: "成长顾问"
    feature: advisor
    description: "基于本地档案和审核知识域的顾问问答。"
    nav: true
    icon: message-circle

  - path: /reports
    displayName: "成长报告"
    feature: reports
    description: "查看和管理结构化与叙事成长报告。"
    nav: true
    icon: bar-chart

  - path: /settings
    displayName: "设置"
    feature: settings
    description: "孩子管理、养育模式、提醒和 AI 设置入口。"
    nav: true
    icon: settings

  - path: /settings/children
    displayName: "孩子管理"
    feature: settings
    description: "添加和编辑孩子档案。"
    parent: /settings

  - path: /settings/nurture-mode
    displayName: "养育模式"
    feature: settings
    description: "全局和按领域的养育模式配置。"
    parent: /settings

  - path: /settings/reminders
    displayName: "提醒管理"
    feature: settings
    description: "查看和管理已自定义频率的提醒。"
    parent: /settings

  - path: /settings/ai
    displayName: "AI 模型设置"
    feature: settings
    description: "配置对话、语音转写和 OCR 等 AI 能力的模型偏好。"
    parent: /settings

constraints:
  - "Exactly one route may have isDefault: true."
  - "Every route registered in routes.tsx must exist here."
  - "Every nav: true route must appear in shell-layout navigation, and no other route may appear there."
  - "Child-route feature values must match the parent route feature."
  - "Orphan or unrouted pages are not authority surfaces until listed here."
  - "Every /profile/* child route must declare routeKind: archive | tool."
  - "archive routes with summarySource must reference a valid local-storage.yaml table name or null."
  - "tool routes must not have summarySource."
