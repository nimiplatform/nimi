features:
  - featureId: PO-FEAT-001
    name: "Child profile CRUD"
    phase: 1
    priority: P0
    contract: profile-contract
    description: "Create, edit, and delete child profiles."
    tables: [local-storage.yaml#children, local-storage.yaml#families]

  - featureId: PO-FEAT-002
    name: "Reminder engine"
    phase: 1
    priority: P0
    contract: timeline-contract
    description: "Compute deterministic reminder eligibility and build a daily agenda from reminder-rules.yaml, child context, and local reminder state."
    tables: [reminder-rules.yaml, local-storage.yaml#reminder_states]

  - featureId: PO-FEAT-003
    name: "Growth timeline"
    phase: 1
    priority: P0
    contract: timeline-contract
    description: "Render agenda buckets for today focus, this-week tasks, stage guidance, overdue summary, and history."
    tables: [local-storage.yaml#reminder_states]

  - featureId: PO-FEAT-004
    name: "Growth measurement entry"
    phase: 1
    priority: P0
    contract: profile-contract
    description: "Record local height, weight, head circumference, lab, vision, and other structured measurements."
    tables: [local-storage.yaml#growth_measurements, growth-standards.yaml]

  - featureId: PO-FEAT-005
    name: "Growth curve charts"
    phase: 1
    priority: P0
    contract: profile-contract
    description: "Render local growth measurements with WHO-backed reference curves only where official data exists."
    tables: [growth-standards.yaml]

  - featureId: PO-FEAT-006
    name: "Vaccine tracking"
    phase: 1
    priority: P0
    contract: profile-contract
    description: "Track vaccine records and related reminder progress."
    tables: [local-storage.yaml#vaccine_records, reminder-rules.yaml]

  - featureId: PO-FEAT-007
    name: "Milestone tracking"
    phase: 1
    priority: P1
    contract: profile-contract
    description: "Record structured milestone achievements."
    tables: [milestone-catalog.yaml, local-storage.yaml#milestone_records]

  - featureId: PO-FEAT-008
    name: "Parent journal"
    phase: 1
    priority: P1
    contract: journal-contract
    description: "Create text, photo, voice, and mixed observation entries."
    tables: [local-storage.yaml#journal_entries, local-storage.yaml#journal_tags]

  - featureId: PO-FEAT-009
    name: "Nurture mode settings"
    phase: 1
    priority: P1
    contract: app-shell-contract
    description: "Manage global nurture mode and per-domain overrides."
    tables: [nurture-modes.yaml, local-storage.yaml#children]

  - featureId: PO-FEAT-010
    name: "AI growth advisor"
    phase: 1
    priority: P1
    contract: advisor-contract
    description: "Answer questions from local structured records and reviewed domains only."
    tables: [local-storage.yaml#ai_conversations, local-storage.yaml#ai_messages]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-011
    name: "Sensitive period guide"
    phase: 1
    priority: P1
    contract: timeline-contract
    description: "Project sensitive-period guidance by child age."
    tables: [sensitive-periods.yaml]

  - featureId: PO-FEAT-012
    name: "Observation framework guidance"
    phase: 1
    priority: P1
    contract: journal-contract
    description: "Guide journal capture with spec-backed observation dimensions, questions, and quick tags."
    tables: [observation-framework.yaml, local-storage.yaml#journal_entries]

  - featureId: PO-FEAT-013
    name: "Observation pattern identification"
    phase: 2
    priority: P2
    contract: advisor-contract
    description: "Reserved future scope; not admitted while observation remains needs-review."
    tables: [observation-framework.yaml, sensitive-periods.yaml]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-020
    name: "Voice observation capture"
    phase: 1
    priority: P1
    contract: journal-contract
    description: "Record app-local audio and optionally transcribe it through typed STT before save."
    tables: [local-storage.yaml#journal_entries]
    runtimeDependency: "runtime.ai.stt"

  - featureId: PO-FEAT-021
    name: "AI journal tags"
    phase: 1
    priority: P1
    contract: journal-contract
    description: "Local-first closed-set AI tag suggestion for unsaved journal drafts."
    tables: [local-storage.yaml#journal_tags, observation-framework.yaml]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-022
    name: "Checkup OCR"
    phase: 1
    priority: P2
    contract: profile-contract
    description: "Extract structured health measurements from a local checkup image and require parent confirmation before import."
    tables: [local-storage.yaml#growth_measurements, growth-standards.yaml]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-025
    name: "Profile-local AI summaries"
    phase: 1
    priority: P2
    contract: profile-contract
    description: "Generate safety-filtered summaries from the current profile page's local structured records only."
    tables: [local-storage.yaml#app_settings, local-storage.yaml#growth_measurements, local-storage.yaml#vaccine_records, local-storage.yaml#milestone_records, local-storage.yaml#dental_records, local-storage.yaml#allergy_records, local-storage.yaml#sleep_records, local-storage.yaml#medical_events, local-storage.yaml#tanner_assessments, local-storage.yaml#fitness_assessments]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-023
    name: "Growth reports surface"
    phase: 1
    priority: P1
    contract: advisor-contract
    description: "Generate, persist, and view growth reports in the dedicated reports surface."
    tables: [local-storage.yaml#growth_reports]

  - featureId: PO-FEAT-024
    name: "Trend analysis"
    phase: 1
    priority: P1
    contract: advisor-contract
    description: "Build evidence-backed trend signals from local growth, reminder, and journal records."
    tables: [local-storage.yaml#growth_reports, local-storage.yaml#journal_entries, local-storage.yaml#growth_measurements]

  - featureId: PO-FEAT-030
    name: "Family collaboration"
    phase: 3
    priority: P2
    contract: app-shell-contract
    description: "Future multi-caregiver collaboration around one child profile."

  - featureId: PO-FEAT-031
    name: "Data export"
    phase: 3
    priority: P2
    contract: profile-contract
    description: "Future export of a child profile into a shareable document."

  - featureId: PO-FEAT-032
    name: "Personalized reminders"
    phase: 3
    priority: P2
    contract: timeline-contract
    description: "Future reminder prioritization informed by historical data after the deterministic local agenda is stable."
    tables: [reminder-rules.yaml]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-033
    name: "Interest profile"
    phase: 3
    priority: P3
    contract: profile-contract
    description: "Future long-term tracking of child interests and strengths."

  - featureId: PO-FEAT-034
    name: "Vision and eye-health records"
    phase: 1
    priority: P1
    contract: profile-contract
    description: "Track vision, refraction, axial length, and related eye-health measurements."
    tables: [local-storage.yaml#growth_measurements, growth-standards.yaml]

  - featureId: PO-FEAT-035
    name: "Dental records"
    phase: 1
    priority: P1
    contract: profile-contract
    description: "Track eruption, caries, cleaning, and orthodontic assessment events."
    tables: [local-storage.yaml#dental_records]

  - featureId: PO-FEAT-036
    name: "Allergy tracking"
    phase: 1
    priority: P1
    contract: profile-contract
    description: "Track structured allergy history, severity, and status changes."
    tables: [local-storage.yaml#allergy_records, local-storage.yaml#children]

  - featureId: PO-FEAT-037
    name: "Sleep tracking"
    phase: 1
    priority: P1
    contract: profile-contract
    description: "Track daily sleep duration, naps, and sleep quality."
    tables: [local-storage.yaml#sleep_records]

  - featureId: PO-FEAT-038
    name: "Medical event timeline"
    phase: 1
    priority: P1
    contract: profile-contract
    description: "Track visits, screenings, hospitalizations, medications, and other medical events, including bounded local OCR intake and safety-filtered summaries."
    tables: [local-storage.yaml#medical_events]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-039
    name: "Posture assessment surface"
    phase: 1
    priority: P2
    contract: profile-contract
    description: "Project posture and alignment review in the profile surface without inventing a shadow storage model."
    tables: [local-storage.yaml#medical_events, local-storage.yaml#fitness_assessments]

  - featureId: PO-FEAT-040
    name: "Tanner puberty tracking"
    phase: 1
    priority: P2
    contract: profile-contract
    description: "Track Tanner staging and puberty development notes."
    tables: [local-storage.yaml#tanner_assessments]

  - featureId: PO-FEAT-041
    name: "Fitness assessments"
    phase: 1
    priority: P2
    contract: profile-contract
    description: "Track physical fitness test results and movement assessments."
    tables: [local-storage.yaml#fitness_assessments]

  - featureId: PO-FEAT-042
    name: "Reminder frequency settings"
    phase: 1
    priority: P2
    contract: app-shell-contract
    description: "Manage reminder frequency overrides from reminders and settings surfaces."
    tables: [local-storage.yaml#app_settings, reminder-rules.yaml]

  - featureId: PO-FEAT-043
    name: "AI model/runtime settings"
    phase: 1
    priority: P2
    contract: app-shell-contract
    description: "Configure ParentOS AI model preferences for advisor, OCR, and voice flows."
    tables: [local-storage.yaml#app_settings]

  - featureId: PO-FEAT-044
    name: "Narrative growth reports"
    phase: 1
    priority: P1
    contract: advisor-contract
    description: "Generate runtime-assisted narrative reports from local child records with safety filtering."
    tables: [local-storage.yaml#growth_reports]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-045
    name: "Report history and narrative editing"
    phase: 1
    priority: P2
    contract: advisor-contract
    description: "View report history and allow parent editing of narrative report content."
    tables: [local-storage.yaml#growth_reports]

  - featureId: PO-FEAT-046
    name: "Automatic monthly report generation"
    phase: 1
    priority: P2
    contract: timeline-contract
    description: "Trigger monthly report generation from the timeline surface when local prerequisites are available."
    tables: [local-storage.yaml#growth_reports]
    runtimeDependency: "runtime.ai.text.generate"

  - featureId: PO-FEAT-047
    name: "Weekly outdoor goal"
    phase: 1
    priority: P1
    contract: profile-contract
    description: "Track weekly outdoor activity duration per child for myopia prevention habit management."
    tables: [local-storage.yaml#outdoor_records, local-storage.yaml#children]

  - featureId: PO-FEAT-048
    name: "Orthodontic case management"
    phase: 1
    priority: P1
    contract: orthodontic-contract
    description: "Create, stage, pause-via-appliances, and complete orthodontic treatment courses."
    tables: [local-storage.yaml#orthodontic_cases, local-storage.yaml#dental_records]

  - featureId: PO-FEAT-049
    name: "Orthodontic appliance management"
    phase: 1
    priority: P1
    contract: orthodontic-contract
    description: "Track appliance instances attached to a case. Source of truth for wear prescription, review cadence, pause status, and expander activation counters."
    tables: [local-storage.yaml#orthodontic_appliances, orthodontic-protocols.yaml]

  - featureId: PO-FEAT-050
    name: "Orthodontic daily compliance checkins"
    phase: 1
    priority: P1
    contract: orthodontic-contract
    description: "High-frequency parent-facing compliance checkins limited to wear-daily, aligner-change, expander-activation, retention-wear."
    tables: [local-storage.yaml#orthodontic_checkins, orthodontic-protocols.yaml]

  - featureId: PO-FEAT-051
    name: "Orthodontic dynamic reminders"
    phase: 1
    priority: P1
    contract: orthodontic-contract
    description: "Admitted PO-ORTHO-* dynamic reminders compiled from orthodontic-protocols.yaml. Gated by live case/appliance state. Default push in all nurture modes."
    tables: [orthodontic-protocols.yaml, local-storage.yaml#reminder_states]

  - featureId: PO-FEAT-052
    name: "Orthodontic compliance dashboard"
    phase: 1
    priority: P2
    contract: orthodontic-contract
    description: "30-day task-completion approximation projection for active orthodontic appliances. Dashboard wording must label the metric as approximation, not clinical wear reconstruction."
    tables: [local-storage.yaml#orthodontic_checkins, orthodontic-protocols.yaml]

  - featureId: PO-FEAT-053
    name: "Reminder progression surface"
    phase: 1
    priority: P1
    contract: reminder-interaction-contract
    description: "Kind-aware reminder interaction: task | guide | practice | consult taxonomy, per-kind progression state machines persisted in reminder_states, structured explain content rendered in ReminderExplainDrawer, and advisor-written consultedAt/consultationConversationId on AI first reply for consult-kind reminders. Eligibility and bucketing remain in timeline-contract (PO-TIME-*); interaction semantics live in reminder-interaction-contract (PO-REMI-*)."
    tables: [reminder-rules.yaml, local-storage.yaml#reminder_states, local-storage.yaml#ai_conversations]

constraints:
  - "The current baseline preserves the reminder -> record -> review core loop."
  - "Implemented AI features must stay within typed runtime contracts and the current knowledge-source-readiness gates."
  - "Reports may generate narrative content from local facts, but they must preserve safety filtering and evidence-backed wording."
  - "ability-model.yaml is not a runtime source in the current baseline."
