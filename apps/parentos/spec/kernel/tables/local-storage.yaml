schema_version: 1

tables:
  - name: families
    description: "Single local family profile per account-scoped ParentOS database."
    columns:
      - { name: familyId, type: TEXT, pk: true, description: "ULID" }
      - { name: displayName, type: TEXT, nullable: false }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [familyId], unique: true }

  - name: children
    description: "Child profiles stored under one local family within the account-scoped database."
    columns:
      - { name: childId, type: TEXT, pk: true, description: "ULID" }
      - { name: familyId, type: TEXT, nullable: false, fk: "families.familyId" }
      - { name: displayName, type: TEXT, nullable: false }
      - { name: gender, type: TEXT, nullable: false, description: "male | female" }
      - { name: birthDate, type: TEXT, nullable: false, description: "ISO 8601 date" }
      - { name: birthWeightKg, type: REAL, nullable: true }
      - { name: birthHeightCm, type: REAL, nullable: true }
      - { name: birthHeadCircCm, type: REAL, nullable: true }
      - { name: avatarPath, type: TEXT, nullable: true }
      - { name: nurtureMode, type: TEXT, nullable: false, default: "balanced", description: "relaxed | balanced | advanced" }
      - { name: nurtureModeOverrides, type: TEXT, nullable: true, description: "JSON object: domain -> mode override" }
      - { name: allergies, type: TEXT, nullable: true, description: "JSON array of known allergies" }
      - { name: medicalNotes, type: TEXT, nullable: true, description: "JSON array of medical notes" }
      - { name: recorderProfiles, type: TEXT, nullable: true, description: "JSON array of recorder profiles: [{id,name}]" }
      - { name: outdoorGoalMinutes, type: INTEGER, nullable: true, description: "Weekly outdoor goal in minutes; null = not yet configured, suggested default 630" }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [familyId] }
      - { columns: [birthDate] }

  - name: growth_measurements
    description: "Structured child growth measurements."
    columns:
      - { name: measurementId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: typeId, type: TEXT, nullable: false, description: "References growth-standards.yaml typeId" }
      - { name: value, type: REAL, nullable: false }
      - { name: measuredAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: ageMonths, type: INTEGER, nullable: false }
      - { name: percentile, type: REAL, nullable: true }
      - { name: source, type: TEXT, nullable: true, description: "manual | ocr | imported" }
      - { name: notes, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, typeId, measuredAt] }
      - { columns: [childId, ageMonths] }

  - name: milestone_records
    description: "Achievement records for spec-backed milestones."
    columns:
      - { name: recordId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: milestoneId, type: TEXT, nullable: false, description: "References milestone-catalog.yaml" }
      - { name: achievedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime" }
      - { name: ageMonthsWhenAchieved, type: INTEGER, nullable: true }
      - { name: notes, type: TEXT, nullable: true }
      - { name: photoPath, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, milestoneId], unique: true }
      - { columns: [childId, achievedAt] }

  - name: reminder_states
    description: "Per-child reminder action state, per-kind progression timestamps, and daily agenda stability metadata. Progression column write rules are governed by reminder-interaction-contract.md#PO-REMI-004."
    columns:
      - { name: stateId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: ruleId, type: TEXT, nullable: false, description: "References reminder-rules.yaml" }
      - { name: status, type: TEXT, nullable: false, description: "Legacy compatibility field: pending | active | completed | dismissed | overdue" }
      - { name: activatedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime" }
      - { name: completedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime; task-kind terminal signal only (PO-REMI-004). Non-task kinds must not write this column." }
      - { name: dismissedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime" }
      - { name: dismissReason, type: TEXT, nullable: true }
      - { name: repeatIndex, type: INTEGER, nullable: false, default: 0 }
      - { name: nextTriggerAt, type: TEXT, nullable: true, description: "ISO 8601 datetime" }
      - { name: snoozedUntil, type: TEXT, nullable: true, description: "ISO 8601 date" }
      - { name: scheduledDate, type: TEXT, nullable: true, description: "ISO 8601 date" }
      - { name: notApplicable, type: INTEGER, nullable: false, default: 0, description: "0 | 1" }
      - { name: plannedForDate, type: TEXT, nullable: true, description: "ISO 8601 date for the persisted daily agenda slot" }
      - { name: surfaceRank, type: INTEGER, nullable: true, description: "Stable same-day agenda rank" }
      - { name: lastSurfacedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime when surfaced in today focus" }
      - { name: surfaceCount, type: INTEGER, nullable: false, default: 0, description: "How many times this reminder has entered today focus" }
      - { name: notes, type: TEXT, nullable: true }
      - { name: acknowledgedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime; guide-kind terminal signal (PO-REMI-003.guide). Non-guide kinds must not write this column." }
      - { name: reflectedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime; guide-kind optional reflection marker. Requires acknowledgedAt non-null (PO-REMI-004)." }
      - { name: practiceStartedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime; practice-kind entry signal. Non-practice kinds must not write this column." }
      - { name: practiceLastAt, type: TEXT, nullable: true, description: "ISO 8601 datetime; practice-kind most recent log_practice event." }
      - { name: practiceCount, type: INTEGER, nullable: false, default: 0, description: "Monotonic practice-kind engagement count. Only decremented by admin restore." }
      - { name: practiceHabituatedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime; practice-kind terminal habituation marker. Requires practiceStartedAt non-null (PO-REMI-004)." }
      - { name: consultedAt, type: TEXT, nullable: true, description: "ISO 8601 datetime; consult-kind terminal signal. Written by advisor module on AI first assistant reply (PO-REMI-007). Panels must not write this column directly." }
      - { name: consultationConversationId, type: TEXT, nullable: true, fk: "ai_conversations.conversationId", description: "FK to the anchored advisor conversation. Must be paired atomically with consultedAt (PO-REMI-004)." }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, ruleId, repeatIndex], unique: true }
      - { columns: [childId, status] }
      - { columns: [nextTriggerAt] }
      - { columns: [childId, plannedForDate, surfaceRank] }
      - { columns: [childId, snoozedUntil] }
      - { columns: [childId, scheduledDate] }
      - { columns: [childId, consultationConversationId] }

  - name: vaccine_records
    description: "Structured vaccine administration records."
    columns:
      - { name: recordId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: ruleId, type: TEXT, nullable: false, description: "References the vaccine reminder rule" }
      - { name: vaccineName, type: TEXT, nullable: false }
      - { name: vaccinatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: ageMonths, type: INTEGER, nullable: false }
      - { name: batchNumber, type: TEXT, nullable: true }
      - { name: hospital, type: TEXT, nullable: true }
      - { name: adverseReaction, type: TEXT, nullable: true }
      - { name: photoPath, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, ruleId], unique: true }
      - { columns: [childId, vaccinatedAt] }

  - name: journal_entries
    description: "Observation journal entries with optional voice, photo, and Montessori fields."
    columns:
      - { name: entryId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: contentType, type: TEXT, nullable: false, description: "text | voice | photo | mixed" }
      - { name: textContent, type: TEXT, nullable: true }
      - { name: voicePath, type: TEXT, nullable: true, description: "App-local audio file path" }
      - { name: photoPaths, type: TEXT, nullable: true, description: "JSON array of local photo paths" }
      - { name: recordedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: ageMonths, type: INTEGER, nullable: false }
      - { name: observationMode, type: TEXT, nullable: true, description: "quick-capture | focused-observation | daily-reflection | five-minute" }
      - { name: dimensionId, type: TEXT, nullable: true, description: "References observation-framework.yaml dimensionId" }
      - { name: selectedTags, type: TEXT, nullable: true, description: "JSON array of quickTags from the selected dimension" }
      - { name: guidedAnswers, type: TEXT, nullable: true, description: "JSON object keyed by guided question" }
      - { name: observationDuration, type: INTEGER, nullable: true }
      - { name: keepsake, type: INTEGER, nullable: false, default: 0, description: "0 | 1" }
      - { name: keepsakeTitle, type: TEXT, nullable: true, description: "Optional title for a keepsake entry" }
      - { name: keepsakeReason, type: TEXT, nullable: true, description: "commemorative | first-time | achievement | persistence | character | family-moment | other" }
      - { name: recorderId, type: TEXT, nullable: true, description: "Recorder identity such as dad | mom" }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, recordedAt] }
      - { columns: [childId, ageMonths] }
      - { columns: [childId, keepsake] }

  - name: journal_tags
    description: "Secondary journal tags, including spec-gated AI suggestions after parent confirmation."
    columns:
      - { name: tagId, type: TEXT, pk: true, description: "ULID" }
      - { name: entryId, type: TEXT, nullable: false, fk: "journal_entries.entryId" }
      - { name: domain, type: TEXT, nullable: false, description: "Tag family; Phase 2 AI suggestions use observation" }
      - { name: tag, type: TEXT, nullable: false }
      - { name: source, type: TEXT, nullable: false, description: "manual | ai" }
      - { name: confidence, type: REAL, nullable: true, description: "0-1 for AI-suggested tags" }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [entryId] }
      - { columns: [domain, tag] }

  - name: ai_conversations
    description: "Advisor conversation sessions."
    columns:
      - { name: conversationId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: title, type: TEXT, nullable: true }
      - { name: startedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: lastMessageAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: messageCount, type: INTEGER, nullable: false, default: 0 }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, lastMessageAt] }

  - name: ai_messages
    description: "Advisor message history."
    columns:
      - { name: messageId, type: TEXT, pk: true, description: "ULID" }
      - { name: conversationId, type: TEXT, nullable: false, fk: "ai_conversations.conversationId" }
      - { name: role, type: TEXT, nullable: false, description: "user | assistant" }
      - { name: content, type: TEXT, nullable: false }
      - { name: contextSnapshot, type: TEXT, nullable: true, description: "JSON payload captured at send time" }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [conversationId, createdAt] }

  - name: growth_reports
    description: "Structured and narrative reports saved from the reports or timeline surfaces."
    columns:
      - { name: reportId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: reportType, type: TEXT, nullable: false, description: "monthly | quarterly | quarterly-letter | custom" }
      - { name: periodStart, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: periodEnd, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: ageMonthsStart, type: INTEGER, nullable: false }
      - { name: ageMonthsEnd, type: INTEGER, nullable: false }
      - { name: content, type: TEXT, nullable: false, description: "JSON structured-local or narrative report payload" }
      - { name: generatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, reportType, periodStart] }

  # ── 口腔发育 ─────────────────────────────────────────────

  - name: dental_records
    description: "Dental events: tooth eruption, loss, caries, fillings, cleanings, fluoride, sealants, checkups, orthodontic assessments, and historical ortho-start markers."
    columns:
      - { name: recordId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: eventType, type: TEXT, nullable: false, description: "eruption | loss | caries | filling | cleaning | fluoride | sealant | checkup | ortho-assessment | ortho-start" }
      - { name: toothId, type: TEXT, nullable: true, description: "FDI tooth number (e.g. '51' for upper-right primary central incisor), null for whole-mouth events" }
      - { name: toothSet, type: TEXT, nullable: true, description: "primary | permanent" }
      - { name: eventDate, type: TEXT, nullable: false, description: "ISO 8601 date" }
      - { name: ageMonths, type: INTEGER, nullable: false }
      - { name: severity, type: TEXT, nullable: true, description: "For caries: mild | moderate | severe; for ortho: normal | monitor | referral" }
      - { name: hospital, type: TEXT, nullable: true }
      - { name: notes, type: TEXT, nullable: true }
      - { name: photoPath, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, eventDate] }
      - { columns: [childId, toothId] }
      - { columns: [childId, eventType] }

  # ── 正畸疗程真相 (orthodontic cases) ────────────────────
  # Governed by orthodontic-contract.md#PO-ORTHO-002.

  - name: orthodontic_cases
    description: "One row per orthodontic treatment course. Source of truth for caseType, stage, and review-date projection."
    columns:
      - { name: caseId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: caseType, type: TEXT, nullable: false, description: "early-intervention | fixed-braces | clear-aligners" }
      - { name: stage, type: TEXT, nullable: false, description: "assessment | planning | active | retention | completed" }
      - { name: startedAt, type: TEXT, nullable: false, description: "ISO 8601 date" }
      - { name: plannedEndAt, type: TEXT, nullable: true, description: "ISO 8601 date" }
      - { name: actualEndAt, type: TEXT, nullable: true, description: "ISO 8601 date; required when stage = completed" }
      - { name: primaryIssues, type: TEXT, nullable: true, description: "JSON array of parent-entered clinical concerns; never AI-generated" }
      - { name: providerName, type: TEXT, nullable: true }
      - { name: providerInstitution, type: TEXT, nullable: true }
      - { name: nextReviewDate, type: TEXT, nullable: true, description: "Cached projection of min(active appliances.nextReviewDate); never edited directly" }
      - { name: notes, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, stage] }
      - { columns: [childId, startedAt] }

  # ── 正畸装置真相 (orthodontic appliances) ───────────────
  # Governed by orthodontic-contract.md#PO-ORTHO-003.

  - name: orthodontic_appliances
    description: "One row per appliance instance. Source of truth for wear prescription, review cadence, and status (including pause)."
    columns:
      - { name: applianceId, type: TEXT, pk: true, description: "ULID" }
      - { name: caseId, type: TEXT, nullable: false, fk: "orthodontic_cases.caseId" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: applianceType, type: TEXT, nullable: false, description: "twin-block | expander | activator | metal-braces | ceramic-braces | clear-aligner | retainer-fixed | retainer-removable" }
      - { name: status, type: TEXT, nullable: false, description: "active | paused | completed" }
      - { name: startedAt, type: TEXT, nullable: false, description: "ISO 8601 date" }
      - { name: endedAt, type: TEXT, nullable: true, description: "ISO 8601 date" }
      - { name: prescribedHoursPerDay, type: INTEGER, nullable: true, description: "Used by wear-daily / retention-wear protocols" }
      - { name: prescribedActivations, type: INTEGER, nullable: true, description: "Expander total activation count target" }
      - { name: completedActivations, type: INTEGER, nullable: false, description: "Expander running activation counter; default 0" }
      - { name: reviewIntervalDays, type: INTEGER, nullable: true, description: "Review cadence; default comes from protocol rule" }
      - { name: lastReviewAt, type: TEXT, nullable: true, description: "ISO 8601 date" }
      - { name: nextReviewDate, type: TEXT, nullable: true, description: "ISO 8601 date" }
      - { name: pauseReason, type: TEXT, nullable: true, description: "Required when status = paused" }
      - { name: notes, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [caseId, status] }
      - { columns: [childId, status] }
      - { columns: [childId, nextReviewDate] }

  # ── 正畸日级打卡 (orthodontic checkins) ────────────────
  # Governed by orthodontic-contract.md#PO-ORTHO-005.

  - name: orthodontic_checkins
    description: "High-frequency compliance checkins. Only wear-daily, aligner-change, expander-activation, retention-wear are admitted. Checkins never appear in the dental clinical timeline."
    columns:
      - { name: checkinId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: caseId, type: TEXT, nullable: false, fk: "orthodontic_cases.caseId" }
      - { name: applianceId, type: TEXT, nullable: false, fk: "orthodontic_appliances.applianceId" }
      - { name: checkinType, type: TEXT, nullable: false, description: "wear-daily | aligner-change | expander-activation | retention-wear" }
      - { name: checkinDate, type: TEXT, nullable: false, description: "ISO 8601 date" }
      - { name: actualWearHours, type: REAL, nullable: true, description: "wear-daily / retention-wear only" }
      - { name: prescribedHours, type: REAL, nullable: true, description: "Snapshot of appliance.prescribedHoursPerDay at checkin time" }
      - { name: complianceBucket, type: TEXT, nullable: true, description: "done | partial | missed; computed at write per orthodontic-protocols#complianceThresholds; never stored for aligner-change / expander-activation" }
      - { name: activationIndex, type: INTEGER, nullable: true, description: "expander-activation only" }
      - { name: alignerIndex, type: INTEGER, nullable: true, description: "aligner-change only" }
      - { name: notes, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, checkinDate] }
      - { columns: [applianceId, checkinDate] }
      - { columns: [applianceId, checkinType, checkinDate], description: "query perf; daily-type uniqueness is enforced at the Rust command layer because SQLite partial-unique needs a predicate (checkinType IN ('wear-daily','retention-wear'))" }

  # ── 过敏记录 ─────────────────────────────────────────────

  - name: allergy_records
    description: "Structured allergy tracking with severity, reaction type, and status timeline. Replaces the flat children.allergies JSON for detailed tracking."
    columns:
      - { name: recordId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: allergen, type: TEXT, nullable: false, description: "Allergen name (e.g. '牛奶蛋白', '花粉', '青霉素')" }
      - { name: category, type: TEXT, nullable: false, description: "food | drug | environmental | contact | other" }
      - { name: reactionType, type: TEXT, nullable: true, description: "skin | respiratory | gastrointestinal | anaphylaxis | other" }
      - { name: severity, type: TEXT, nullable: false, description: "mild | moderate | severe" }
      - { name: diagnosedAt, type: TEXT, nullable: true, description: "ISO 8601 date of first confirmed diagnosis" }
      - { name: ageMonthsAtDiagnosis, type: INTEGER, nullable: true }
      - { name: status, type: TEXT, nullable: false, description: "active | outgrown | uncertain" }
      - { name: statusChangedAt, type: TEXT, nullable: true, description: "ISO 8601 date when status last changed" }
      - { name: confirmedBy, type: TEXT, nullable: true, description: "Diagnosis method: skin-prick | blood-test | oral-challenge | clinical-history" }
      - { name: notes, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, status] }
      - { columns: [childId, category] }

  # ── 睡眠记录 ─────────────────────────────────────────────

  - name: sleep_records
    description: "Daily sleep records: bedtime, wake time, duration, and quality."
    columns:
      - { name: recordId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: sleepDate, type: TEXT, nullable: false, description: "ISO 8601 date (the night of, e.g. 2026-04-02 for the night of Apr 2)" }
      - { name: bedtime, type: TEXT, nullable: true, description: "ISO 8601 datetime" }
      - { name: wakeTime, type: TEXT, nullable: true, description: "ISO 8601 datetime" }
      - { name: durationMinutes, type: INTEGER, nullable: true, description: "Total sleep including naps" }
      - { name: napCount, type: INTEGER, nullable: true, description: "Number of daytime naps (relevant for younger children)" }
      - { name: napMinutes, type: INTEGER, nullable: true, description: "Total nap duration" }
      - { name: quality, type: TEXT, nullable: true, description: "good | fair | poor" }
      - { name: ageMonths, type: INTEGER, nullable: false }
      - { name: notes, type: TEXT, nullable: true }
      - { name: createdAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }
    indexes:
      - { columns: [childId, sleepDate], unique: true }
      - { columns: [childId, ageMonths] }

  # ── 就医与用药事件 ──────────────────────────────────────

  - name: medical_events
    description: "General medical events: outpatient visits, emergency visits, hospitalizations, checkups/screenings, medication courses, and other notable health events."
    columns:
      - { name: eventId, type: TEXT, pk: true, description: "ULID" }
      - { name: childId, type: TEXT, nullable: false, fk: "children.childId" }
      - { name: eventType, type: TEXT, nullable: false, description: "visit | emergency | hospitalization | checkup | medication | other" }
      - { name: title, type: TEXT, nullable: false, description: "Short summary (e.g. '左前臂骨折', '湿疹发作', '新生儿听力筛查')" }
      - { name: eventDate, type: TEXT, nullable: false, description: "ISO 8601 date" }
      - { name: endDate, type: TEXT, nullable: true, description: "ISO 8601 date for conditions/medication courses with a duration" }
