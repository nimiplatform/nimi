      - { name: value, type: TEXT, nullable: false }
      - { name: updatedAt, type: TEXT, nullable: false, description: "ISO 8601 datetime" }

constraints:
  - "ParentOS local storage is account-scoped: each authenticated subject resolves a dedicated SQLite database file, and rows from one subject must not be read from another subject's database."
  - "All ULID fields use ULID identifiers."
  - "All datetime fields use ISO 8601 strings."
  - "JSON payloads are stored as TEXT and must remain valid JSON on read/write."
  - "childId is the primary filter field for child-scoped tables."
  - "growth_reports.reportType is limited to monthly | quarterly | quarterly-letter | custom."
  - "Child deletion cascades through all child-scoped tables: growth_measurements, milestone_records, reminder_states, vaccine_records, journal_entries, ai_conversations, growth_reports, dental_records, allergy_records, sleep_records, medical_events, tanner_assessments, fitness_assessments, outdoor_records, attachments, custom_todos, orthodontic_cases, orthodontic_appliances, orthodontic_checkins."
  - "orthodontic_cases deletion cascades to orthodontic_appliances and orthodontic_checkins. orthodontic_appliances deletion cascades to orthodontic_checkins."
  - "children.allergies JSON array remains as a quick-access summary; allergy_records is the structured source of truth."
