# Relay Feature Capabilities
# Source of truth for RL-FEAT-*

features:
  - id: agent-chat
    display_name: Agent Chat (Local AI)
    requires_runtime: true
    requires_realm: false
    requires_agent: true
    sdk_module: runtime.ai
    source_rule: RL-FEAT-001

  - id: human-chat
    display_name: Human Chat
    requires_runtime: false
    requires_realm: true
    requires_agent: true
    requires_socket: true
    sdk_module: realm
    source_rule: RL-FEAT-002

  - id: tts
    display_name: Text-to-Speech
    requires_runtime: true
    requires_realm: false
    requires_agent: true
    sdk_module: runtime.media.tts
    note: listVoices requires model (mandatory); agent profile resolves default model + voiceId
    source_rule: RL-FEAT-003

  - id: stt
    display_name: Speech-to-Text
    requires_runtime: true
    requires_realm: false
    requires_agent: false
    note: STT call is agent-independent; consumption of transcript is agent-scoped via RL-FEAT-001
    sdk_module: runtime.media.stt
    source_rule: RL-FEAT-004

  - id: live2d
    display_name: Live2D Character
    requires_runtime: false
    requires_realm: false
    requires_agent: true
    renderer_only: true
    source_rule: RL-FEAT-005

  - id: video
    display_name: Video Generation
    requires_runtime: true
    requires_realm: false
    requires_agent: true
    async_job: true
    sdk_module: runtime.media.video + runtime.media.jobs
    note: Job status via media.jobs.subscribe/get, not video.status (which does not exist)
    source_rule: RL-FEAT-006

  - id: agent-profile
    display_name: Agent Profile & Selection
    requires_runtime: false
    requires_realm: true
    requires_agent: false
    sdk_module: realm
    source_rule: RL-FEAT-007

  - id: model-config
    display_name: Model Configuration
    requires_runtime: true
    requires_realm: false
    requires_agent: false
    sdk_module: runtime.model + runtime.local + runtime.connector
    note: Lightweight route/model/artifact status and management, including local image workflow companion selection; full UI lives in Desktop (RL-INTOP-004)
    source_rule: RL-FEAT-008

  # Pipeline capabilities (RL-PIPE-*)
  - id: chat-pipeline
    display_name: Beat-First Chat Pipeline
    requires_runtime: true
    requires_realm: false
    requires_agent: true
    sdk_module: runtime.ai
    note: Full turn pipeline — first-beat reactor, turn composer, delivery director
    source_rule: RL-PIPE-001

  - id: session-store
    display_name: Session Persistence
    requires_runtime: false
    requires_realm: false
    requires_agent: true
    note: Conversation ledger persisted to Electron userData via RelayChatStorage
    source_rule: RL-PIPE-002

  - id: interaction-state
    display_name: Interaction State Tracking
    requires_runtime: false
    requires_realm: false
    requires_agent: true
    note: Emotional temperature, relationship state, commitments, open loops
    source_rule: RL-PIPE-008

  - id: relation-memory
    display_name: Relation Memory
    requires_runtime: false
    requires_realm: false
    requires_agent: true
    note: Slot-based memory (preference/boundary/rapport/promise/recurringCue/taboo)
    source_rule: RL-PIPE-009

  - id: media-orchestration
    display_name: Media Modality Orchestration
    requires_runtime: true
    requires_realm: false
    requires_agent: true
    sdk_module: runtime.media.image + runtime.media.video
    note: Per-beat modality selection with autonomy/cooldown/NSFW policy
    source_rule: RL-PIPE-006

  - id: proactive-heartbeat
    display_name: Proactive Heartbeat
    requires_runtime: true
    requires_realm: false
    requires_agent: true
    note: Deterministic policy engine with daily cap, cooldown, idle window gates
    source_rule: RL-PIPE-007

  - id: product-settings
    display_name: Product Settings
    requires_runtime: false
    requires_realm: false
    requires_agent: false
    note: mediaAutonomy, voiceAutonomy, visualComfortLevel, allowProactiveContact
    source_rule: RL-PIPE-006
