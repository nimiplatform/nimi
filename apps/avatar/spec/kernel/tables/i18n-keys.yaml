constraints:
  - description: "Both `locales/en/avatar.json` and `locales/zh/avatar.json` MUST contain every key listed in this table; missing key in either file is a build break."
  - description: "Adding new user-visible copy MUST update this table first; component code referencing an undeclared key fails CI."
  - description: "Locale files MUST mirror the dot-namespace structure here (e.g. `Avatar.composer.placeholder`)."
  - description: "All `summary_with_reason` keys MUST use `{{reason}}` interpolation; do not concatenate at the call site."
