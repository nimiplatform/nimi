version: 1
description: >
  Wave 2 admitted i18n key table for Nimi Avatar. Lists every i18n key used by
  the avatar shell renderer along with its English baseline copy, the
  `app-shell-contract.md` anchor that authorizes the surface fragment, and the
  consuming component path. Both `locales/en/avatar.json` and
  `locales/zh/avatar.json` MUST cover every key listed here in 1:1 alignment;
  drift is a CI failure (see `nimi-coding` validators).

  Hard rules:
  - Keys MUST be dot-namespaced under `Avatar.{section}.{leaf}`.
  - Surface fragments expressing fail-close reasons MUST use Runtime / account /
    binding language, never CORS / shared auth / workaround leakage (see
    NAV-SHELL-DEGRADED-002 + NAV-SHELL-FIRST-PARTY-RUNTIME hard rules).
  - No empty strings, no TODO placeholders.
  - When introducing or removing a key, update this table FIRST, then both
    locale JSON files, then the consuming component.

namespaces:
  - id: composer
    spec_anchor: "app-shell-contract.md §7.6 NAV-SHELL-COMPANION-006"
    description: "Companion composer (text input + send button)."
    keys:
      - key: Avatar.composer.placeholder
        english_baseline: "Type a message…"
        usage: "src/shell/renderer/companion-surface/companion-surface.tsx"
      - key: Avatar.composer.aria_label
        english_baseline: "Type a message to send to this anchor"
        usage: "src/shell/renderer/companion-surface/companion-surface.tsx"
      - key: Avatar.composer.send_aria
        english_baseline: "Send message"
        usage: "src/shell/renderer/companion-surface/companion-surface.tsx"
      - key: Avatar.composer.send_failed_prefix
