# ShiJi — Feature Matrix
# Authoritative source for feature phasing, priority, and dependencies.
# Referenced by: kernel contracts, routes.yaml

features:
  # ── Phase 1: Core ────────────────────────────────────
  - id: app-shell
    name: App Shell + Bootstrap + Auth
    phase: 1
    priority: P0
    contract: SJ-SHELL-001 ~ 004, SJ-SHELL-008 ~ 009
    dependencies:
      - "@nimiplatform/sdk"
      - "@nimiplatform/nimi-kit"
    description: Tauri shell, SDK bootstrap, auth flow, error boundary, 首次体验人物邂逅

  - id: settings
    name: 应用设置
    phase: 1
    priority: P1
    contract: SJ-SHELL-005 ~ 007
    dependencies:
      - app-shell
    description: 模型选择、语音开关、学习提醒、家长模式、learner profile、多 Profile 管理、版本控制

  - id: explore-home
    name: 时间长河浏览
    phase: 1
    priority: P0
    contract: SJ-EXPL-001 ~ 003, SJ-EXPL-007 ~ 012
    dependencies:
      - app-shell
    realm-apis:
      - GET /api/world
    description: 目录白名单驱动的统一时间长河浏览、分类校验、叙事过渡、多视角重玩信号

  - id: explore-world-detail
    name: 时期详情 + 人物列表
    phase: 1
    priority: P0
    contract: SJ-EXPL-004 ~ 005
    dependencies:
      - explore-home
    realm-apis:
      - GET /api/world/by-id/{worldId}/detail-with-agents
      - GET /api/world/by-id/{worldId}/agents
      - GET /api/world/by-id/{worldId}/bindings
    description: World 详情、推荐人物卡片网格

  - id: explore-agent-detail
    name: 人物详情
    phase: 1
    priority: P0
    contract: SJ-EXPL-006
    dependencies:
      - explore-world-detail
    realm-apis:
      - GET /api/agent/accounts/{agentId}
    description: Agent DNA、简介、"开始对话"入口

  - id: dialogue-session
    name: 沉浸式对话
    phase: 1
    priority: P0
    contract: SJ-DIAL-001 ~ 009, SJ-DIAL-013 ~ 019
    dependencies:
      - explore-agent-detail
    realm-apis:
      - GET /api/world/by-id/{worldId}/rules
      - GET /api/world/by-id/{worldId}/agent-rules
      - GET /api/world/by-id/{worldId}/lorebooks
      - GET /api/world/by-id/{worldId}/events
      - GET /api/world/by-id/{worldId}/scenes
      - GET /api/agent/{agentId}/memory/recall
      - POST /api/agent/{agentId}/memory/write
    runtime-apis:
      - runtime.ai.text.generate (streaming)
    description: 对话引擎全管线 — session classification snapshot、prompt 构建、流式生成、选项解析、节奏控制。注：trunk convergence (SJ-DIAL-007) 和 temporal immersion (SJ-DIAL-019) 在 Phase 1 不可用，阻塞于 /events 端点

  # ── Phase 2: Education ───────────────────────────────
  - id: knowledge-graph
    name: 知识图谱
    phase: 2
    priority: P1
    contract: SJ-KNOW-001 ~ 006, SJ-KNOW-007
    dependencies:
      - dialogue-session
    description: 按朝代/领域分类的已学概念可视化

  - id: knowledge-world
    name: 单时期知识详情
    phase: 2
    priority: P1
    contract: SJ-KNOW-005, SJ-KNOW-007 ~ 008
    dependencies:
      - knowledge-graph
    description: 单个 World 内的知识 depth 分布

  - id: progress-overview
    name: 学习进度
    phase: 2
    priority: P1
    contract: SJ-PROG-001 ~ 003, SJ-PROG-006 ~ 007
    dependencies:
      - dialogue-session
    description: 统计、章节时间线、探索覆盖率

  - id: achievements
    name: 成就勋章
    phase: 2
    priority: P2
    contract: SJ-PROG-004
    dependencies:
      - progress-overview
    description: 探索/知识/对话/特殊成就解锁

  - id: explore-atlas
    name: 历史地图视图
    phase: 2
    priority: P1
    contract: SJ-MAP-001 ~ 005
    dependencies:
      - explore-home
    realm-apis:
      - GET /api/world/by-id/{worldId}/map-profile
    description: 时间线联动的历史地点、路线与事件锚点地图

  # ── Phase 3: Multimodal ──────────────────────────────
  - id: tts-playback
    name: TTS 语音合成
    phase: 3
    priority: P1
    contract: SJ-DIAL-010
    dependencies:
      - dialogue-session
    runtime-apis:
      - runtime.media.tts.synthesize
      - runtime.media.tts.list.voices
    description: 历史人物语音朗读对白

  - id: stt-input
    name: STT 语音输入
    phase: 3
    priority: P2
    contract: SJ-DIAL-011
    dependencies:
      - dialogue-session
    runtime-apis:
      - runtime.media.stt.transcribe
    description: 学生语音输入转文字

  - id: scene-illustration
    name: 场景配图
    phase: 3
    priority: P2
    contract: SJ-DIAL-012
    dependencies:
      - dialogue-session
    runtime-apis:
      - runtime.media.image.generate
    description: 关键场景水墨风配图生成

  - id: ambient-audio
    name: 环境音
    phase: 3
    priority: P3
    dependencies:
      - dialogue-session
    description: 场景类型驱动的背景音效切换

  # ── Phase 4: Polish ──────────────────────────────────
  - id: learning-report
    name: 学习报告导出
    phase: 4
    priority: P2
    contract: SJ-PROG-005 ~ 007
    dependencies:
      - progress-overview
      - knowledge-graph
    description: 家长/教师可查看的学习进度报告
