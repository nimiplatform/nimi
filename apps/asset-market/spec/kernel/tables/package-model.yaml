# Asset Market — Package Model
# Authoritative source for current bundle/package fields, enums, readiness, and future reservations.

package_model:
  current_active_objects:
    - Asset
    - Bundle
    - Package

  reserved_future_objects:
    - PackageListing

  categories:
    - scenes
    - characters
    - styles

  media_filters:
    - images
    - videos
    - audio

  bundle:
    required_fields:
      - id
      - ownerId
      - memberAssetIds
      - title
      - description
      - tags
      - version
      - status
      - isReady
      - readinessIssues
      - compatibleApps
      - importTargets
      - createdAt
      - updatedAt
    optional_fields:
      - coverAssetId
      - publishedAt
    ordered_fields:
      - memberAssetIds
    invariants:
      - memberAssetIds count must be >= 1 for ready bundles
      - coverAssetId must belong to memberAssetIds when present
      - memberAssetIds must preserve explicit order
      - publishedAt is required once status becomes published or archived

  package:
    required_fields:
      - id
      - bundleId
      - ownerId
      - title
      - description
      - coverAssetId
      - category
      - price
      - version
      - status
      - isReady
      - readinessIssues
      - createdAt
      - updatedAt
    optional_fields:
      - publishedAt
    invariants:
      - package must bind to exactly one bundleId
      - package ownerId must match bundle ownerId
      - a published package must reference a published bundle
      - price may be 0 for free packages
      - publishedAt is required once status becomes published or archived

  lifecycle:
    bundle_statuses:
      - draft
      - published
      - archived
    package_statuses:
      - draft
      - published
      - archived

  readiness:
    bundle_required_for_ready:
      - ownerId present
      - title
      - version
      - status
      - memberAssetIds count >= 1
      - if coverAssetId exists, coverAssetId belongs to memberAssetIds
    package_required_for_ready:
      - bundleId present
      - ownerId present
      - title present
      - description present
      - coverAssetId present
      - category present
      - price present
      - version present
      - status present

  acquisition:
    object: PackageAcquisition
    key_fields:
      - packageId
      - bundleId
      - accountId
      - status
      - sourceType
      - acquiredAt

  import:
    object: BundleImport
    key_fields:
      - bundleId
      - accountId
      - targetApp
      - targetContext
      - status
      - importedAt

  upstream_mappings:
    - SceneCard may be published into a Realm Asset
    - ScenePack may be published into a Realm Bundle
    - Field-level conversion remains intentionally unspecified in the current spec
