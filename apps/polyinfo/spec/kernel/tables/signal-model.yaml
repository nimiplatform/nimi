# Polyinfo — Signal Model
# Authoritative source for admitted windows, weighting factors, and conclusion phrasing.

signal_model:
  windows:
    - id: 24h
      label: 24 hours
    - id: 48h
      label: 48 hours
    - id: 7d
      label: 7 days

  weighting_factors:
    - volume_rank_tier
    - volume24hr
    - liquidity
    - spread

  weight_tiers:
    - lead
    - support
    - watch

  conclusion_tones:
    - strengthening
    - weakening
    - mixed
    - low_confidence

  aggregation_order:
    - market
    - narrative
    - core_variable

  invariants:
    - current app weighting is soft and coarse rather than a persisted deterministic scoring formula
    - low-activity markets stay visible but should not dominate major markets
    - conclusion tones guide analyst wording but are not persisted as a separate snapshot enum
    - final analytical conclusion is produced by the sector analyst from the structured evidence package
    - analyst output must stay inside the admitted evidence boundary
