# Polyinfo — Object Model
# Authoritative source for current active objects, relationships, and invariants.

object_model:
  current_active_objects:
    - OfficialSectorTag
    - CustomSectorRecord
    - NarrativeRecord
    - CoreVariableRecord
    - ImportedEventRecord
    - AnalysisSnapshot
    - SectorChatState

  official_sector_tag:
    required_fields:
      - id
      - label
      - slug
    optional_fields:
      - description
      - parentSlug
      - displayedCount
    invariants:
      - official sectors originate from Polymarket front-end taxonomy
      - child sectors carry a parentSlug that points to a root sector

  custom_sector_record:
    required_fields:
      - id
      - title
      - createdAt
      - updatedAt
    optional_fields: []
    invariants:
      - custom sectors are app-local records
      - custom sector ids remain stable once created

  narrative_record:
    required_fields:
      - id
      - title
      - definition
      - confirmationState
    optional_fields:
      - keywords
    invariants:
      - narrative records belong to exactly one sector through the containing taxonomy overlay
      - confirmationState must be one of the admitted confirmation_states
      - confirmed narratives require a non-empty definition

  core_variable_record:
    required_fields:
      - id
      - title
      - definition
      - confirmationState
    optional_fields:
      - keywords
    invariants:
      - core-variable records belong to exactly one sector through the containing taxonomy overlay
      - confirmationState must be one of the admitted confirmation_states
      - confirmed core variables require a non-empty definition

  imported_event_record:
    required_fields:
      - id
      - sectorId
      - sourceEventId
      - sourceUrl
      - title
      - cachedEventPayload
      - staleState
      - createdAt
      - updatedAt
    optional_fields:
      - lastValidatedAt
      - staleReason
    invariants:
      - imported event belongs to exactly one custom sector
      - sourceEventId must remain stable once admitted
      - cachedEventPayload is a local cache, not a replacement for upstream truth

  analysis_snapshot:
    required_fields:
      - id
      - sectorSlug
      - sectorLabel
      - window
      - createdAt
      - headline
      - summary
      - messageId
    optional_fields: []
    invariants:
      - window must be one of the admitted signal windows
      - analysis snapshots are lightweight bookmarks to assistant answers rather than full trace records

  sector_chat_state:
    required_fields:
      - threadId
      - title
      - draftText
      - createdAt
      - updatedAt
      - messages
      - isStreaming
      - error
    optional_fields:
      - draftProposal
    invariants:
      - one chat state is stored per sector
      - sector chat state is sector-bound only in the current app

  confirmation_states:
    - proposed
    - confirmed

  proposal_actions:
    - create
    - update
    - deactivate

  source_types:
    - polymarket_tag
    - custom
