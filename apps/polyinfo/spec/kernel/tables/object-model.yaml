# Polyinfo — Object Model
# Authoritative source for current active objects, relationships, and invariants.

object_model:
  current_active_objects:
    - Sector
    - Narrative
    - CoreVariable
    - ImportedEvent
    - SignalSnapshot
    - DiscussionThread

  sector:
    upstream_source: official_or_custom_v1
    required_fields:
      - id
      - title
      - sourceType
      - createdAt
      - updatedAt
    optional_fields:
      - sourceTagId
      - description
      - aliasGroup
      - overlayMetadata
    invariants:
      - sourceType must be one of the admitted source_types
      - official sectors must carry a stable sourceTagId
      - custom sectors must not require a sourceTagId

  narrative:
    required_fields:
      - id
      - sectorId
      - title
      - definition
      - confirmationState
      - createdAt
      - updatedAt
    optional_fields:
      - provenance
    invariants:
      - narrative belongs to exactly one sector
      - confirmed narratives require a non-empty definition

  core_variable:
    required_fields:
      - id
      - sectorId
      - title
      - definition
      - confirmationState
      - createdAt
      - updatedAt
    optional_fields:
      - provenance
    invariants:
      - core variable belongs to exactly one sector
      - confirmed core variables require a non-empty definition

  imported_event:
    required_fields:
      - id
      - sectorId
      - sourceEventId
      - sourceUrl
      - title
      - cachedEventPayload
      - staleState
      - createdAt
      - updatedAt
    optional_fields:
      - lastValidatedAt
      - staleReason
    invariants:
      - imported event belongs to exactly one custom sector
      - sourceEventId must remain stable once admitted
      - cachedEventPayload is a local cache, not a replacement for upstream truth

  signal_snapshot:
    required_fields:
      - id
      - sectorId
      - window
      - outputType
      - evaluatedAt
      - taxonomyVersion
      - includedMarketIds
      - analystConclusion
      - analystProfileVersion
    optional_fields:
      - includedEventIds
      - narrativeIds
      - coreVariableIds
      - explanationTrace
    invariants:
      - window must be one of the admitted signal windows
      - outputType must be one of the admitted signal outputs

  discussion_thread:
    required_fields:
      - id
      - sectorId
      - contextType
      - createdAt
      - updatedAt
    optional_fields:
      - narrativeId
      - coreVariableId
      - signalSnapshotId
      - analystProfileVersion
    invariants:
      - every thread belongs to exactly one sector
      - thread contextType must match its bound optional references

  confirmation_states:
    - proposed
    - confirmed
    - retired

  discussion_context_types:
    - sector
    - narrative
    - core_variable
    - signal_snapshot

  source_types:
    - polymarket_tag
    - custom
