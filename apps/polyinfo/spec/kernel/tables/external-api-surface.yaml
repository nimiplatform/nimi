# Polyinfo — External API Surface
# Authoritative source for upstream Polymarket API usage admitted by this spec.

surfaces:
  - name: frontend-homepage-html
    kind: rest
    provider: polymarket
    endpoint: GET https://polymarket.com/
    purpose: Read Polymarket front-end root taxonomy candidates from the homepage navigation

  - name: frontend-filtered-tags-by-slug
    kind: rest
    provider: polymarket
    endpoint: GET https://polymarket.com/api/tags/filteredBySlug
    purpose: Read left-rail front-end child categories for a selected root taxonomy slug

  - name: gamma-events-keyset-by-tag-slug
    kind: rest
    provider: polymarket
    endpoint: GET /events/keyset
    purpose: Reconstruct the full front-end category event set through keyset pagination

  - name: gamma-event-by-slug
    kind: rest
    provider: polymarket
    endpoint: GET /events/slug/{slug}
    purpose: Resolve and cache one imported custom-sector event by its Polymarket slug

  - name: batch-price-history
    kind: rest
    provider: polymarket
    endpoint: POST /batch-prices-history
    purpose: Reconstruct canonical historical windows for multiple related markets

  - name: market-websocket
    kind: websocket
    provider: polymarket
    endpoint: wss://ws-subscriptions-clob.polymarket.com/ws/market
    purpose: Receive realtime market updates for subscribed asset ids
    protocol_notes:
      - subscription identity uses asset ids
      - keepalive is required
      - reconnect must preserve explicit stale state
