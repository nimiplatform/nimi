# Polyinfo — Route Table
# Authoritative source for all application routes.

routes:
  - path: /
    feature: workspace-entry
    component: IndexRedirect
    lazy: false
    description: Restore the last active sector workspace or fall back to the first official sector, then `/runtime` if nothing is available

  - path: /sectors
    feature: legacy-sector-entry
    component: LegacySectorRedirect
    lazy: false
    description: Compatibility redirect into the current workspace-first flow

  - path: /sectors/:sectorId
    feature: sector-workspace
    component: SectorWorkspacePage
    lazy: true
    description: Sector workspace with taxonomy editing, market board, explicit price loading, and sector analyst chat

  - path: /sectors/:rootSlug/:sectorId
    feature: legacy-nested-sector-entry
    component: NestedSectorRedirect
    lazy: false
    description: Compatibility redirect from the older nested sector URL shape

  - path: /signals
    feature: signal-history
    component: SignalHistoryPage
    lazy: true
    description: Review recent lightweight analysis snapshots saved from sector analyst answers

  - path: /runtime
    feature: runtime
    component: RuntimePage
    lazy: true
    description: Configure analyst routing, local / cloud execution source, and runtime health controls

  - path: /settings
    feature: settings
    component: SettingsPage
    lazy: true
    description: Account session management, current runtime summary, and app-local storage summary
