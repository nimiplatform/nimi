<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__PAGE_TITLE__</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: __BODY_BACKGROUND__;
        }
        .container {
            text-align: center;
            padding: 56px 48px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            max-width: 460px;
            width: 90%;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo_wrapper {
            margin-bottom: 32px;
            animation: __LOGO_ANIMATION_NAME__ __LOGO_ANIMATION_DURATION__ ease-in-out __LOGO_ANIMATION_REPEAT__;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .logo {
            width: 140px;
            height: 140px;
            filter: __LOGO_FILTER__;
        }
        .status_wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .success_icon,
        .error_icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success_icon {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            animation: __SUCCESS_ICON_ANIMATION__;
        }
        .error_icon {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            animation: __ERROR_ICON_ANIMATION__;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0); }
            to { opacity: 1; transform: scale(1); }
        }
        .checkmark,
        .x_mark {
            width: 16px;
            height: 16px;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        h1 {
            color: #1f2937;
            font-size: 26px;
            font-weight: 700;
            animation: __HEADING_ANIMATION__;
        }
        p {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 8px;
            animation: __MESSAGE_ANIMATION__;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auto_close {
            margin-top: 24px;
            padding: 14px 24px;
            background: #f3f4f6;
            color: #9ca3af;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            animation: __ACTION_ANIMATION__;
        }
        .dots {
            display: inline-flex;
            gap: 4px;
        }
        .dot {
            width: 4px;
            height: 4px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite both;
        }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .retry_btn {
            margin-top: 28px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            animation: __ACTION_ANIMATION__;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .retry_btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>

        __MESSAGE_SECONDARY_BLOCK__

</html>
