version: 1
scopes:
  - scope: AGENT_CORE
    source_rule: K-MEM-002
    owner_kind: agent
    direct_app_access: false
    public_bank_create_allowed: false
    canonical_agent_scope: true
    description: Canonical public/shared agent continuity memory.
  - scope: AGENT_DYADIC
    source_rule: K-MEM-002
    owner_kind: agent
    direct_app_access: false
    public_bank_create_allowed: false
    canonical_agent_scope: true
    description: Canonical `(agentId, userId)` continuity memory with strict dyadic isolation.
  - scope: WORLD_SHARED
    source_rule: K-MEM-002
    owner_kind: world
    direct_app_access: false
    public_bank_create_allowed: false
    canonical_agent_scope: true
    description: World scoped shared continuity memory; not keyed by account.
  - scope: APP_PRIVATE
    source_rule: K-MEM-002
    owner_kind: app
    direct_app_access: true
    public_bank_create_allowed: true
    canonical_agent_scope: false
    description: App-owned private memory bank accessible through RuntimeMemoryService.
  - scope: WORKSPACE_PRIVATE
    source_rule: K-MEM-002
    owner_kind: workspace
    direct_app_access: true
    public_bank_create_allowed: true
    canonical_agent_scope: false
    description: Workspace-owned private memory bank accessible through RuntimeMemoryService.
