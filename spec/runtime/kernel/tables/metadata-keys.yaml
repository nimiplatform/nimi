version: 1
keys:
  - key: x-nimi-key-source
    allowed_values: [inline, managed]
    required_when: inline routing or explicit managed override (managed requires connector_id)
    source_rule: K-KEYSRC-003
  - key: x-nimi-provider-type
    required_when: inline
    source_rule: K-KEYSRC-003
  - key: x-nimi-provider-endpoint
    required_when: inline provider has no default endpoint
    source_rule: K-KEYSRC-003
  - key: x-nimi-provider-api-key
    required_when: inline
    source_rule: K-KEYSRC-003
  - key: x-nimi-app-id
    required_when: ConnectorService RPC
    source_rule: K-KEYSRC-003
  - key: x-nimi-client-id
    required_when: optional audit context
    source_rule: K-KEYSRC-003
  - key: x-nimi-idempotency-key
    required_when: optional dedup context
    source_rule: K-DAEMON-006
  - key: authorization
    required_when: authenticated runtime call (optional for anonymous)
    source_rule: K-AUTHN-001
  - key: x-nimi-runtime-version
    required_when: always (response header metadata)
    source_rule: K-DAEMON-011
