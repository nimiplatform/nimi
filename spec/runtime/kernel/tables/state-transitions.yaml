version: 1
machines:
  - machine: connector_status
    states: [ACTIVE, DISABLED]
    transitions:
      - from: ACTIVE
        to: DISABLED
        trigger: UpdateConnector(status=DISABLED)
        source_rule: K-RPC-011
      - from: DISABLED
        to: ACTIVE
        trigger: UpdateConnector(status=ACTIVE)
        source_rule: K-RPC-011
  - machine: remote_connector_delete_flow
    states: [PRESENT, DELETE_PENDING, DELETED]
    transitions:
      - from: PRESENT
        to: DELETE_PENDING
        trigger: DeleteConnector_step1_mark_pending
        source_rule: K-RPC-011
      - from: DELETE_PENDING
        to: DELETE_PENDING
        trigger: DeleteConnector_retry_or_startup_rescan
        source_rule: K-RPC-011
      - from: DELETE_PENDING
        to: DELETED
        trigger: credential_cleanup_and_registry_delete
        source_rule: K-RPC-011
  - machine: scenario_job
    states: [SUBMITTED, QUEUED, RUNNING, COMPLETED, FAILED, CANCELED, TIMEOUT]
    transitions:
      - from: SUBMITTED
        to: QUEUED
        trigger: accepted_into_queue
        source_rule: K-JOB-002
      - from: SUBMITTED
        to: RUNNING
        trigger: provider_accepts_job
        source_rule: K-JOB-002
      - from: SUBMITTED
        to: FAILED
        trigger: terminal_error_before_run
        source_rule: K-JOB-002
      - from: SUBMITTED
        to: CANCELED
        trigger: user_cancel
        source_rule: K-JOB-002
      - from: SUBMITTED
        to: TIMEOUT
        trigger: job_timeout
        source_rule: K-JOB-002
      - from: QUEUED
        to: RUNNING
        trigger: provider_accepts_job
        source_rule: K-JOB-002
      - from: QUEUED
        to: FAILED
        trigger: terminal_error_before_run
        source_rule: K-JOB-002
      - from: QUEUED
        to: CANCELED
        trigger: user_cancel
        source_rule: K-JOB-002
      - from: QUEUED
        to: TIMEOUT
        trigger: job_timeout
        source_rule: K-JOB-002
      - from: RUNNING
        to: COMPLETED
        trigger: provider_success
        source_rule: K-JOB-002
      - from: RUNNING
        to: FAILED
        trigger: provider_or_runtime_failure
        source_rule: K-JOB-002
      - from: RUNNING
        to: CANCELED
        trigger: user_cancel
        source_rule: K-JOB-002
      - from: RUNNING
        to: TIMEOUT
        trigger: job_timeout
        source_rule: K-JOB-002
    note: ScenarioJob 与 workflow 是并行但不相同的状态机；ScenarioJob 以 SUBMITTED 起步且不产生 SKIPPED，Workflow 以 ACCEPTED 起步并支持 branch-driven SKIPPED。对照见 tables/workflow-states.yaml 与 K-WF-003~007。
  - machine: local_model_lifecycle
    states: [INSTALLED, ACTIVE, UNHEALTHY, REMOVED]
    transitions:
      - from: INSTALLED
        to: ACTIVE
        trigger: warm_or_minimal_execution_passed
        source_rule: K-LOCAL-005
      - from: INSTALLED
        to: UNHEALTHY
        trigger: warm_or_runtime_failure
        source_rule: K-LOCAL-005
      - from: ACTIVE
        to: UNHEALTHY
        trigger: readiness_or_runtime_failure
        source_rule: K-LOCAL-005
      - from: UNHEALTHY
        to: ACTIVE
        trigger: recovery_validation_passed
        source_rule: K-LOCAL-005
      - from: ACTIVE
        to: REMOVED
        trigger: remove_model
        source_rule: K-LOCAL-005
      - from: UNHEALTHY
        to: REMOVED
        trigger: force_remove_model
        source_rule: K-LOCAL-005
      - from: ACTIVE
        to: INSTALLED
        trigger: maintenance_stop
        source_rule: K-LOCAL-005
      - from: UNHEALTHY
        to: INSTALLED
        trigger: maintenance_stop_from_unhealthy
        source_rule: K-LOCAL-005
      - from: INSTALLED
        to: REMOVED
        trigger: remove_model_from_installed
        source_rule: K-LOCAL-005
    note: local_model_lifecycle 只表达 availability truth。residency / warmth 由 LocalWarmState 并行承载；ACTIVE 可与 warm_state=COLD 组合，表示模型可路由但当前未驻留。未加载或当前未命中 resident worker 不得单独触发 UNHEALTHY。
  - machine: local_service_lifecycle
    states: [INSTALLED, ACTIVE, UNHEALTHY, REMOVED]
    transitions:
      - from: INSTALLED
        to: ACTIVE
        trigger: spawn_and_probe_ok
        source_rule: K-LOCAL-005
      - from: ACTIVE
        to: UNHEALTHY
        trigger: health_probe_failed
        source_rule: K-LOCAL-005
      - from: UNHEALTHY
        to: ACTIVE
        trigger: restart_and_probe_ok
        source_rule: K-LOCAL-005
      - from: ACTIVE
        to: REMOVED
        trigger: stop_and_cleanup
        source_rule: K-LOCAL-005
      - from: UNHEALTHY
        to: REMOVED
        trigger: force_stop_and_cleanup
        source_rule: K-LOCAL-005
      - from: ACTIVE
        to: INSTALLED
        trigger: stop_service
        source_rule: K-LOCAL-005
      - from: UNHEALTHY
        to: INSTALLED
        trigger: stop_service_from_unhealthy
        source_rule: K-LOCAL-005
      - from: INSTALLED
        to: REMOVED
        trigger: remove_service_from_installed
        source_rule: K-LOCAL-005
    note: local_service_lifecycle 表达底层 service / engine process truth，不承载单个 model 的 residency；单个 llama model 是否当前 resident 必须由 LocalWarmState 或 runtime-private residency detail 表达。
  - machine: model_status
    states: [INSTALLED, PULLING, FAILED, REMOVED]
    transitions:
      - from: INSTALLED
        to: PULLING
        trigger: pull_model_update
        source_rule: K-MODEL-008
      - from: PULLING
        to: INSTALLED
        trigger: pull_success
        source_rule: K-MODEL-008
      - from: PULLING
        to: FAILED
        trigger: pull_error
        source_rule: K-MODEL-008
      - from: INSTALLED
        to: REMOVED
        trigger: remove_model
        source_rule: K-MODEL-008
      - from: FAILED
        to: PULLING
        trigger: retry_pull
        source_rule: K-MODEL-008
      - from: FAILED
        to: REMOVED
        trigger: remove_failed_model
        source_rule: K-MODEL-008
