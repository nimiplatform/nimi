version: 1

entries:
  - entry_id: macos-apple-silicon-stablediffusion-ggml
    host_match:
      os: darwin
      arch: arm64
      gpu_vendor: apple
    backend_family: stablediffusion-ggml
    package_format: oci_payload
    install_dir_name: metal-stablediffusion-ggml
    image_ref: quay.io/go-skynet/local-ai-backends:latest-metal-darwin-arm64-stablediffusion-ggml
    product_state: supported

  - entry_id: windows-x64-nvidia-stablediffusion-ggml
    host_match:
      os: windows
      arch: amd64
      gpu_vendor: nvidia
      cuda_ready: true
    backend_family: stablediffusion-ggml
    package_format: direct_archive
    install_dir_name: sd-win-cuda12-x64-stablediffusion-ggml
    image_ref: ""
    archive_url: https://github.com/leejet/stable-diffusion.cpp/releases/download/master-552-87ecb95/sd-master-87ecb95-bin-win-cuda12-x64.zip
    archive_sha256: 011643ec700d6097b9537f0f75ffb26856cc56a5ce765ffe9a32f2b47844e080
    supplemental_archives:
      - url: https://github.com/leejet/stable-diffusion.cpp/releases/download/master-552-87ecb95/cudart-sd-bin-win-cu12-x64.zip
        sha256: fe20366827d357c00797eebb58244dddab7fd9a348d70090c3871004c320f38d
    executable_candidates: [sd.exe, sd-cli.exe]
    launch_mode: runtime_wrapper
    wrapper_driver: stable-diffusion.cpp
    product_state: supported

  - entry_id: linux-x64-nvidia-stablediffusion-ggml
    host_match:
      os: linux
      arch: amd64
      gpu_vendor: nvidia
      cuda_ready: true
    backend_family: stablediffusion-ggml
    package_format: none
    install_dir_name: ""
    image_ref: ""
    product_state: unsupported
    detail: >-
      No published runtime-owned managed image backend package is currently
      available for this host tuple.
