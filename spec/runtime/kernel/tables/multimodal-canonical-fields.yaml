    field: mask
    required: false
    description: optional inpaint mask source
    source_rule: K-MMPROV-002
  - modality: video
    field: mode
    required: true
    description: video generation mode selector (t2v or i2v variants)
    source_rule: K-MMPROV-024
  - modality: video
    field: content[].type
    required: true
    description: content item type (text or image_url)
    source_rule: K-MMPROV-024
  - modality: video
    field: content[].role
    required: true
    description: content role (prompt/first_frame/last_frame/reference_image) constrained by mode
    source_rule: K-MMPROV-024
