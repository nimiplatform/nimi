version: 1
fields:
  - modality: common
    field: app_id
    required: true
    description: caller application identity
    source_rule: K-MMPROV-001
  - modality: common
    field: model_id
    required: true
    description: model selector
    source_rule: K-MMPROV-001
  - modality: image
    field: prompt
    required: true
    description: image prompt text
    source_rule: K-MMPROV-002
