version: 1
machines:
  - machine: workflow
    states:
      - state: ACCEPTED
        enum_value: 1
      - state: QUEUED
        enum_value: 2
      - state: RUNNING
        enum_value: 3
      - state: COMPLETED
        enum_value: 4
      - state: FAILED
        enum_value: 5
      - state: CANCELED
        enum_value: 6
      - state: SKIPPED
        enum_value: 7
    transitions:
      - from: ACCEPTED
        to: QUEUED
        trigger: enqueue
        source_rule: K-WF-003
      - from: ACCEPTED
        to: FAILED
        trigger: resource_exhausted_before_enqueue
        source_rule: K-WF-003
      - from: QUEUED
        to: RUNNING
        trigger: executor_picks_up
        source_rule: K-WF-003
      - from: QUEUED
        to: CANCELED
        trigger: user_cancel
        source_rule: K-WF-007
      - from: RUNNING
        to: COMPLETED
        trigger: all_nodes_completed
        source_rule: K-WF-003
      - from: RUNNING
        to: FAILED
        trigger: node_failure_no_retry
        source_rule: K-WF-003
      - from: RUNNING
        to: CANCELED
        trigger: user_cancel
        source_rule: K-WF-007
      - from: RUNNING
        to: SKIPPED
        trigger: branch_condition_false
        source_rule: K-WF-003
