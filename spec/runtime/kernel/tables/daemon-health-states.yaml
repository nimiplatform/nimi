version: 1
machines:
  - machine: runtime_health
    states: [STOPPED, STARTING, READY, DEGRADED, STOPPING]
    transitions:
      - from: STOPPED
        to: STARTING
        trigger: daemon_boot
        source_rule: K-DAEMON-001
      - from: STARTING
        to: READY
        trigger: servers_listening_and_health_ok
        source_rule: K-DAEMON-002
      - from: STARTING
        to: STOPPED
        trigger: startup_failure
        source_rule: K-DAEMON-002
      - from: READY
        to: DEGRADED
        trigger: provider_all_unhealthy
        source_rule: K-PROV-003
      - from: DEGRADED
        to: READY
        trigger: provider_recovered
        source_rule: K-PROV-003
      - from: READY
        to: STOPPING
        trigger: shutdown_signal
        source_rule: K-DAEMON-003
      - from: DEGRADED
        to: STOPPING
        trigger: shutdown_signal
        source_rule: K-DAEMON-003
      - from: STOPPING
        to: STOPPED
        trigger: shutdown_complete
        source_rule: K-DAEMON-003
