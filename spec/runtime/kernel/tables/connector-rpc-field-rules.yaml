version: 1
rules:
  - rpc: CreateConnector
    field: kind
    requirement: must_be_REMOTE_MANAGED
    source: K-RPC-007
  - rpc: CreateConnector
    field: api_key
    requirement: required_non_empty
    source: K-RPC-007
  - rpc: CreateConnector
    field: endpoint
    requirement: empty_uses_provider_default
    source: K-RPC-007
  - rpc: CreateConnector
    field: label
    requirement: empty_uses_default_label
    source: K-RPC-007
  - rpc: CreateConnector
    field: status/created_at/updated_at
    requirement: initialized_to_ACTIVE_and_now
    source: K-RPC-007
  - rpc: UpdateConnector
    field: mutable_fields
    requirement: at_least_one_of_endpoint_label_api_key_status
    source: K-RPC-008
  - rpc: UpdateConnector
    field: update_mask.paths
    requirement: only_label_endpoint_api_key_status_are_allowed
    source: K-CONN-013
  - rpc: UpdateConnector
    field: update_mask
    requirement: empty_mask_infers_paths_from_present_optional_fields_and_status
    source: K-CONN-013
  - rpc: UpdateConnector
    field: update_mask
    requirement: unknown_path_or_missing_optional_value_is_invalid_argument
    source: K-CONN-013
  - rpc: UpdateConnector
    field: patch_semantics
    requirement: unspecified_fields_remain_unchanged
    source: K-CONN-013
  - rpc: UpdateConnector
    field: status
    requirement: UNSPECIFIED_is_invalid
    source: K-RPC-008
  - rpc: UpdateConnector
    field: api_key
    requirement: explicit_empty_string_is_invalid
    source: K-RPC-008
  - rpc: UpdateConnector
    field: label
    requirement: explicit_empty_string_is_invalid
    source: K-RPC-008
  - rpc: UpdateConnector
    field: updated_at
    requirement: refresh_on_any_legal_mutation_request
    source: K-RPC-008
  - rpc: UpdateConnector
    field: catalog_read
    requirement: api_key_or_endpoint_changes_must_not_change_yaml_derived_model_inventory
    source: K-RPC-008
  - rpc: DeleteConnector
    field: credential
    requirement: cascade_delete
    source: K-RPC-009
  - rpc: DeleteConnector
    field: catalog_read
    requirement: delete_must_not_require_remote_model_cache_cleanup
    source: K-RPC-009
  - rpc: DeleteConnector
    field: deletion_flow
    requirement: use_delete_pending_compensation_flow
    source: K-RPC-009
  - rpc: TestConnector
    field: remote_precheck
    requirement: owner_status_credential_must_pass_before_probe
    source: K-RPC-010
  - rpc: ListConnectorModels
    field: remote_catalog_read
    requirement: yaml_snapshot_only_force_refresh_is_noop_and_no_outbound
    source: K-RPC-010
  - rpc: ListConnectorModels
    field: page_size/page_token
    requirement: request_fields_must_be_supported_with_default_50_max_200
    source: K-CONN-014
  - rpc: ListConnectorModels
    field: next_page_token
    requirement: response_must_return_next_page_token_empty_on_last_page
    source: K-CONN-014
