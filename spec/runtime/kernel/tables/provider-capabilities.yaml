version: 1
providers:
  - provider: local
    runtime_plane: local
    execution_module: local-model
    managed_connector_supported: true
    inline_supported: false
    endpoint_requirement: empty_string_only
    source_rules: [CONN-012, CONN-021, LOCAL-001]
  - provider: gemini
    runtime_plane: remote
    execution_module: nimillm
    managed_connector_supported: true
    inline_supported: true
    endpoint_requirement: default_or_explicit
    source_rules: [CONN-040, K-KEYSRC-001, NIMI-001]
  - provider: openai
    runtime_plane: remote
    execution_module: nimillm
    managed_connector_supported: true
    inline_supported: true
    endpoint_requirement: default_or_explicit
    source_rules: [CONN-040, K-KEYSRC-001, NIMI-001]
  - provider: anthropic
    runtime_plane: remote
    execution_module: nimillm
    managed_connector_supported: true
    inline_supported: true
    endpoint_requirement: default_or_explicit
    source_rules: [CONN-040, K-KEYSRC-001, NIMI-001]
  - provider: dashscope
    runtime_plane: remote
    execution_module: nimillm
    managed_connector_supported: true
    inline_supported: true
    endpoint_requirement: default_or_explicit
    source_rules: [CONN-040, K-KEYSRC-001, NIMI-001]
  - provider: volcengine
    runtime_plane: remote
    execution_module: nimillm
    managed_connector_supported: true
    inline_supported: true
    endpoint_requirement: default_or_explicit
    source_rules: [CONN-040, K-KEYSRC-001, NIMI-001]
  - provider: openai_compatible
    runtime_plane: remote
    execution_module: nimillm
    managed_connector_supported: true
    inline_supported: true
    endpoint_requirement: explicit_required
    source_rules: [CONN-040, CONN-042, K-KEYSRC-001, NIMI-001]
