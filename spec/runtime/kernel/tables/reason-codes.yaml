version: 1
numbering_note: |
  值域 7 及 200-212 为 v0 proto 遗留编号（SESSION_EXPIRED=7,
  AI_MODEL_NOT_FOUND=200, AI_PROVIDER_UNAVAILABLE=202,
  AI_STREAM_BROKEN=208, AI_REQUEST_CREDENTIAL_MISSING=211,
  AI_REQUEST_CREDENTIAL_INVALID=212）。新增码使用族对齐范围：
  300+ AUTH, 310+ CONNECTOR, 330+ REQUEST_CREDENTIAL, 340+ APP,
  350+ MODEL, 370+ FINISH, 380+ MODEL_ROUTE, 390+ PROVIDER,
  410+ MEDIA, 420+ VOICE, 430+ MODULE, 500+ APP_AUTH, 510+ GRANT, 520+ PAGE。
  遗留值冻结以保持线格式兼容性，不再分配 200-299 范围的新值。
  消费端指导：客户端应按 reason_code 名称（string）匹配，
  而非按数值比较。遗留编号与新编号语义等价，消费端统一处理即可。
