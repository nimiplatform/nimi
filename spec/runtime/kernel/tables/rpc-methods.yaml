version: 1
services:
  - name: AIService
    methods:
      - name: Generate
        type: unary
      - name: StreamGenerate
        type: server_stream
      - name: Embed
        type: unary
      - name: SubmitMediaJob
        type: unary
      - name: GetMediaJob
        type: unary
      - name: CancelMediaJob
        type: unary
      - name: SubscribeMediaJobEvents
        type: server_stream
      - name: GetMediaResult
        type: unary
      - name: SynthesizeSpeechStream
        type: server_stream
  - name: ConnectorService
    methods:
      - name: CreateConnector
        type: unary
      - name: GetConnector
        type: unary
