version: 2
canonical_public_contract:
  kind: image
  engine: media
  engine_runtime_mode: supervised
  execution_endpoint: local-media
  consume_path: /v1/media/image/generate

# v1 -> v2 migration rules:
#   platforms[]         -> entries[]
#   platform_id         -> entry_id
#   asset_formats       -> artifact_formats
#   availability=supported   -> topology_state=defined + product_state=supported
#   availability=unsupported -> topology_state=defined + product_state=unsupported
#   backend_family / control_plane / execution_plane / detail / support_gate -> same name fields
#   canonical_public_contract -> unchanged
#
# New v2 fields: asset_family, profile_kind, backend_class, topology_state, product_state,
#   supported_capabilities, admission_gate (optional), host_match.min_memory_gb (optional),
#   host_match.min_vram_gb (optional)
#
# supported_capabilities interpretation:
#   product_state=supported  -> supported_capabilities is a closed formal product promise
#   product_state=unsupported or proposed -> empty supported_capabilities means "no public capability promise"
#     (not "capability detection incomplete"); resolver must fail-close on product gate first
#
# admission_gate constraints:
#   Only allowed on product_state=proposed entries
#   Single string token from admission contract names registered in K-LENG-012 prose
#   Current registered gate tokens are documented there; this table only references them
#
# linux/arm64 is listed in local-engine-catalog.yaml as a media supervised supported_platform,
# but no image-specific backend topology is currently defined or supported for linux/arm64.
# This is explicitly declared as a non-target host tuple for the v1 image matrix.
# The media engine may still serve non-image capabilities (e.g. video) on linux/arm64.
linux_arm64_disposition: >-
  linux/arm64 is a non-target host tuple for the v1 image supervised matrix.
  No gguf_image or workflow_safetensors_image topology entry is defined for linux/arm64
  because no image backend binary (stablediffusion-ggml) or pipeline runtime (diffusers)
  has been validated on linux/arm64. The media engine catalog entry for linux/arm64 covers
  non-image capabilities only. If future linux/arm64 image support is needed, a new
  topology entry with explicit product_state and admission_gate must be added.

entries:
  - entry_id: macos-apple-silicon-gguf
    host_match:
      os: darwin
      arch: arm64
      gpu_vendor: apple
    asset_family: gguf_image
    artifact_formats: [gguf]
    profile_kind: single_binary_model
    backend_class: native_binary
    backend_family: stablediffusion-ggml
    control_plane: runtime
    execution_plane: media
    supported_capabilities:
      - image.generate.t2i
      - image.generate.i2i
    topology_state: defined
    product_state: supported

  - entry_id: macos-apple-silicon-workflow-safetensors
    host_match:
      os: darwin
      arch: arm64
      gpu_vendor: apple
      min_memory_gb: 16
      min_vram_gb: 12
    asset_family: workflow_safetensors_image
    artifact_formats: [safetensors, json_config]
    profile_kind: workflow_pipeline
    backend_class: python_pipeline
    backend_family: diffusers
    control_plane: runtime
    execution_plane: media
    supported_capabilities: []
    topology_state: defined
    product_state: proposed
    admission_gate: apple-mps-image-poc
    detail: >-
      recognized topology; becomes supported only after admission contract passes.
      Requires dev/report/apple-mps-image-poc.md evidence and concurrent spec revision
      of K-LENG-* / K-MMPROV-* / K-PROV-* rules.

  - entry_id: windows-x64-nvidia-gguf
    host_match:
      os: windows
      arch: amd64
      gpu_vendor: nvidia
      cuda_ready: true
    asset_family: gguf_image
    artifact_formats: [gguf]
    profile_kind: single_binary_model
    backend_class: native_binary
    backend_family: stablediffusion-ggml
    control_plane: runtime
    execution_plane: media
    supported_capabilities:
      - image.generate.t2i
      - image.generate.i2i
    topology_state: defined
    product_state: supported

  - entry_id: linux-x64-nvidia-gguf
    host_match:
      os: linux
      arch: amd64
      gpu_vendor: nvidia
      cuda_ready: true
    asset_family: gguf_image
    artifact_formats: [gguf]
    profile_kind: single_binary_model
    backend_class: native_binary
    backend_family: stablediffusion-ggml
    control_plane: runtime
    execution_plane: media
    supported_capabilities:
      - image.generate.t2i
      - image.generate.i2i
    topology_state: defined
    product_state: supported

  - entry_id: windows-x64-nvidia-workflow-safetensors
    host_match:
      os: windows
      arch: amd64
      gpu_vendor: nvidia
      cuda_ready: true
      min_memory_gb: 16
      min_vram_gb: 12
    asset_family: workflow_safetensors_image
    artifact_formats: [safetensors, json_config]
    profile_kind: workflow_pipeline
    backend_class: python_pipeline
    backend_family: diffusers
    control_plane: runtime
    execution_plane: media
    supported_capabilities: []
    topology_state: defined
    product_state: unsupported
    detail: >-
      defined topology only; mixed-mode single-host local-media process model
      is not specified in v1.

  - entry_id: linux-x64-nvidia-workflow-safetensors
    host_match:
      os: linux
      arch: amd64
      gpu_vendor: nvidia
      cuda_ready: true
      min_memory_gb: 16
      min_vram_gb: 12
    asset_family: workflow_safetensors_image
    artifact_formats: [safetensors, json_config]
    profile_kind: workflow_pipeline
    backend_class: python_pipeline
    backend_family: diffusers
    control_plane: runtime
    execution_plane: media
    supported_capabilities: []
    topology_state: defined
    product_state: unsupported
    detail: >-
      defined topology only; mixed-mode single-host local-media process model
      is not specified in v1.
