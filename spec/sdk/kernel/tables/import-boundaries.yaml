version: 1
rules:
  - surface: runtime
    allowed:
      - "@nimiplatform/sdk/runtime"
      - "@nimiplatform/sdk/runtime/transports/*"
    forbidden:
      - "@nimiplatform/sdk/runtime/generated/*"
      - "runtime/internal/**"
    source_rules:
      - S-BOUNDARY-001
      - S-BOUNDARY-002
  - surface: ai-provider
    allowed:
      - "@nimiplatform/sdk/ai-provider"
      - "@nimiplatform/sdk/runtime"
    forbidden:
      - "@nimiplatform/sdk/runtime/internal/**"
      - "@nimiplatform/sdk/runtime/generated/*"
      - "runtime/internal/**"
    source_rules:
      - S-BOUNDARY-001
  - surface: realm
    allowed:
      - "@nimiplatform/sdk/realm"
    forbidden:
      - "@nimiplatform/sdk/realm/generated/*"
      - "runtime/internal/**"
    source_rules:
      - S-BOUNDARY-001
      - S-BOUNDARY-002
  - surface: scope
    allowed:
      - "@nimiplatform/sdk/scope"
      - "@nimiplatform/sdk/runtime"
    forbidden:
      - "@nimiplatform/sdk/runtime/internal/**"
      - "@nimiplatform/sdk/realm/internal/**"
      - "runtime/internal/**"
    source_rules:
      - S-BOUNDARY-001
  - surface: mod
    allowed:
      - "@nimiplatform/sdk/mod"
    forbidden:
      - "@nimiplatform/sdk/runtime/internal/**"
      - "@nimiplatform/sdk/realm/internal/**"
    source_rules:
      - S-BOUNDARY-001
      - S-BOUNDARY-003
      - S-BOUNDARY-005
      - S-BOUNDARY-006
  - surface: types
    allowed:
      - "@nimiplatform/sdk/types"
    forbidden:
      - "@nimiplatform/sdk/runtime/internal/**"
      - "@nimiplatform/sdk/realm/internal/**"
      - "runtime/internal/**"
    source_rules:
      - S-BOUNDARY-001
  - surface: legacy-entrypoints
    allowed: []
    forbidden:
      - "createNimiClient"
      - "OpenAPI.BASE"
      - "OpenAPI.TOKEN"
    source_rules:
      - S-BOUNDARY-001
      - S-BOUNDARY-004
