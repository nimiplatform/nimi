version: 1
items:
  - id: allow.webkit_app_region
    pattern_type: inline_style_property
    pattern: WebkitAppRegion
    scope: apps/desktop/src apps/forge/src apps/overtone/src
    reason: Native shell drag regions are transport-level requirements, not visual contract drift.
    source_rule: P-DESIGN-021
  - id: allow.runtime_progress_width
    pattern_type: inline_style_property
    pattern: width
    scope: apps/forge/src/shell/renderer/pages apps/overtone/src/shell/renderer/features/workspace
    reason: Runtime progress bars require measured percentage widths.
    source_rule: P-DESIGN-021
  - id: allow.measured_panel_width
    pattern_type: inline_style_property
    pattern: width
    scope: apps/desktop/src/shell/renderer/features/contacts apps/desktop/src/shell/renderer/features/runtime-config apps/overtone/src/shell/renderer/features/workspace apps/relay/src/renderer/features/sidebar
    reason: User-resizable panel widths are measured runtime layout state.
    source_rule: P-DESIGN-021
  - id: allow.measured_transform_and_position
    pattern_type: inline_style_property
    pattern: transform|animationDelay|left|top|maxHeight|minHeight|padding
    scope: apps/relay/src/renderer apps/overtone/src/shell/renderer
    reason: Runtime animation timing, measured overlay placement, and waveform positioning need bounded runtime values.
    source_rule: P-DESIGN-021
