gates:
  - gate: codegen_e2e
    requirement: description to runnable mod path passes
    source_rule: D-CODEGEN-060
  - gate: governance_trace
    requirement: full governance chain trace exists
    source_rule: D-CODEGEN-061
  - gate: capability_tier
    requirement: t2 reject and t1 consent enforced
    source_rule: D-CODEGEN-062
  - gate: static_scan
    requirement: deny patterns block install
    source_rule: D-CODEGEN-064
  - gate: rollback
    requirement: failed install does not leave enabled state
    source_rule: D-CODEGEN-075
