# Desktop Hook Capability Allowlists per Source Type
# Source: apps/desktop/src/runtime/hook/contracts/capabilities.ts (DEFAULT_SOURCE_ALLOWLIST)

source_types:
  - source_type: core
    allowlist:
      - "*"
    description: Full unrestricted access for core platform code
    source_rule: D-HOOK-007

  - source_type: builtin
    allowlist:
      - "event.publish.*"
      - "event.subscribe.*"
      - "data.query.*"
      - "data.register.*"
      - "turn.register.*"
      - "ui.register.*"
      - "inter-mod.request.*"
      - "inter-mod.provide.*"
      - "runtime.ai.text.generate"
      - "runtime.ai.text.stream"
      - "runtime.ai.embedding.generate"
      - "runtime.media.image.generate"
      - "runtime.media.image.stream"
      - "runtime.media.video.generate"
      - "runtime.media.video.stream"
      - "runtime.media.tts.list.voices"
      - "runtime.media.tts.synthesize"
      - "runtime.media.tts.stream"
      - "runtime.media.stt.transcribe"
      - "runtime.media.jobs.submit"
      - "runtime.media.jobs.get"
      - "runtime.media.jobs.cancel"
      - "runtime.media.jobs.subscribe"
      - "runtime.media.jobs.get.artifacts"
      - "runtime.voice.get.asset"
      - "runtime.voice.list.assets"
      - "runtime.voice.delete.asset"
      - "runtime.voice.list.preset.voices"
      - "runtime.route.list.options"
      - "runtime.route.resolve"
      - "runtime.route.check.health"
      - "runtime.local.artifacts.list"
      - "runtime.local.profiles.list"
      - "runtime.local.profiles.install.request"
      - "runtime.profile.read.agent"
      - "action.discover.*"
      - "action.dry-run.*"
      - "action.verify.*"
      - "action.commit.*"
      - "audit.read.self"
      - "meta.read.self"
      - "meta.read.all"
    description: Default desktop mods loaded via manifest+sideload pipeline
    source_rule: D-HOOK-007

  - source_type: injected
    allowlist:
      - "event.publish.*"
      - "event.subscribe.*"
      - "data.query.*"
      - "data.register.*"
      - "turn.register.pre-model"
      - "turn.register.post-state"
      - "ui.register.*"
      - "inter-mod.request.*"
      - "runtime.ai.text.generate"
      - "runtime.ai.text.stream"
      - "runtime.ai.embedding.generate"
      - "runtime.media.image.generate"
      - "runtime.media.image.stream"
      - "runtime.media.video.generate"
      - "runtime.media.video.stream"
      - "runtime.media.tts.list.voices"
      - "runtime.media.tts.synthesize"
      - "runtime.media.tts.stream"
      - "runtime.media.stt.transcribe"
      - "runtime.media.jobs.submit"
      - "runtime.media.jobs.get"
      - "runtime.media.jobs.cancel"
      - "runtime.media.jobs.subscribe"
      - "runtime.media.jobs.get.artifacts"
      - "runtime.voice.get.asset"
      - "runtime.voice.list.assets"
      - "runtime.voice.delete.asset"
      - "runtime.voice.list.preset.voices"
      - "runtime.route.list.options"
      - "runtime.route.resolve"
      - "runtime.route.check.health"
      - "runtime.local.artifacts.list"
      - "runtime.local.profiles.list"
      - "runtime.local.profiles.install.request"
      - "runtime.profile.read.agent"
      - "action.discover.*"
      - "action.dry-run.*"
      - "action.verify.*"
      - "action.commit.*"
      - "audit.read.self"
      - "meta.read.self"
    description: Third-party injected mods with restricted turn hook access
    source_rule: D-HOOK-007

  - source_type: sideload
    allowlist:
      - "event.publish.*"
      - "data.query.*"
      - "ui.register.*"
      - "inter-mod.request.*"
      - "runtime.ai.text.generate"
      - "runtime.ai.text.stream"
      - "runtime.ai.embedding.generate"
      - "runtime.media.image.generate"
      - "runtime.media.image.stream"
      - "runtime.media.video.generate"
      - "runtime.media.video.stream"
      - "runtime.media.tts.list.voices"
      - "runtime.media.tts.synthesize"
      - "runtime.media.tts.stream"
      - "runtime.media.stt.transcribe"
      - "runtime.media.jobs.submit"
      - "runtime.media.jobs.get"
      - "runtime.media.jobs.cancel"
      - "runtime.media.jobs.subscribe"
      - "runtime.media.jobs.get.artifacts"
      - "runtime.voice.get.asset"
      - "runtime.voice.list.assets"
      - "runtime.voice.delete.asset"
      - "runtime.voice.list.preset.voices"
      - "runtime.route.list.options"
      - "runtime.route.resolve"
      - "runtime.route.check.health"
      - "runtime.local.artifacts.list"
      - "runtime.local.profiles.list"
      - "runtime.local.profiles.install.request"
      - "runtime.profile.read.agent"
      - "action.discover.*"
      - "action.dry-run.*"
      - "action.verify.*"
      - "action.commit.*"
      - "audit.read.self"
      - "meta.read.self"
    description: Locally sideloaded mods with no subscribe/register/provide access
    source_rule: D-HOOK-007

  - source_type: codegen
    allowlist:
      - "runtime.ai.text.generate"
      - "runtime.ai.text.stream"
      - "ui.register.ui-extension.app.*"
      - "data.register.data-api.user-*.*.*"
      - "data.query.data-api.user-*.*.*"
      - "audit.read.self"
      - "meta.read.self"
    description: AI-generated mods with minimal capabilities
    source_rule: D-HOOK-007
