  - command: runtime_mod_get_action_verify_ticket
    module: mod-local
    description: Get mod action verify ticket
    source_rule: D-IPC-007

  - command: runtime_mod_put_action_verify_ticket
    module: mod-local
    description: Put mod action verify ticket
    source_rule: D-IPC-007

  - command: runtime_mod_delete_action_verify_ticket
    module: mod-local
