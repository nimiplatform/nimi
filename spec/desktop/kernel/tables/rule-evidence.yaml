version: 1
evidence_catalog:
  desktop_kernel_consistency:
    type: static_gate
    command: pnpm check:desktop-spec-kernel-consistency
    path: scripts/check-desktop-spec-kernel-consistency.mjs
    description: Kernel rule integrity and source/spec consistency checks for desktop domain.
  desktop_lint_gate:
    type: lint_gate
    command: pnpm --filter @nimiplatform/desktop lint
    path: apps/desktop/package.json
    description: TypeScript/ESLint/Rust compile gates for desktop app implementation.
  desktop_test_gate:
    type: test_gate
    command: pnpm --filter @nimiplatform/desktop test
    path: apps/desktop/package.json
    description: Desktop quality + unit tests for behavior regression coverage.
  desktop_mods_smoke_gate:
    type: smoke_gate
    command: pnpm check:desktop-mods-smoke --all
    path: scripts/check-desktop-mods-smoke.mjs
    description: Desktop hook runtime can discover/build/sync all desktop-loadable first-party mod resources.
  local_chat_e2e_gate:
    type: e2e_gate
    command: pnpm check:local-chat-e2e
    path: nimi-mods/local-chat/test/local-chat-run-text-turn.e2e.test.ts
    description: Deterministic local-chat turn pipeline e2e coverage for planner/fallback semantics.
  local_chat_live_smoke_gate:
    type: live_gate
    command: pnpm check:local-chat-live-smoke
    path: nimi-mods/local-chat/test/local-chat-live-smoke.test.ts
    description: Live local-chat e2e gate for real provider routing and trace continuity.
