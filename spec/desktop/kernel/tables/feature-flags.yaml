  - flag: enableMarketplaceTab
    default_desktop: true
    default_web: false
    description: Show Marketplace tab in quick navigation
    source_rule: D-SHELL-001

  - flag: enableModUi
    default_desktop: true
    default_web: false
    description: Enable mod UI extension rendering
    source_rule: D-SHELL-002

  - flag: enableModWorkspaceTabs
    default_desktop: true
    default_web: false
    description: Enable mod workspace tab management
    source_rule: D-SHELL-002

  - flag: enableSettingsExtensions
    default_desktop: true
    default_web: false
    description: Enable settings panel extension sections
    source_rule: D-SHELL-002

  - flag: enableTitlebarDrag
    default_desktop: true
    default_web: false
