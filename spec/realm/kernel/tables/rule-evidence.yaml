version: 1
evidence_catalog:
  realm_kernel_consistency:
    type: static_gate
    command: pnpm check:realm-spec-kernel-consistency
    path: scripts/check-realm-spec-kernel-consistency.mjs
    description: Kernel rule integrity, vocabulary alignment, creator asset field coverage, economy arithmetic, primitive mapping status, and graduation log checks for Realm domain.
  realm_timeflow_contract_test:
    type: test_gate
    command: cd runtime && go test ./internal/protocol -run TestValidateTimeflowContractAcceptsCanonicalPayload -count=1
    path: runtime/internal/protocol/realm_primitives_contract_test.go
    description: Executable contract test for graduated timeflow primitive mapping.
  realm_economy_contract_test:
    type: test_gate
    command: cd runtime && go test ./internal/protocol -run TestValidateEconomyContractAcceptsCanonicalPayload -count=1
    path: runtime/internal/protocol/realm_primitives_contract_test.go
    description: Executable contract test for graduated economy primitive mapping.
  runtime_compliance_gate:
    type: static_gate
    command: cd runtime && go run ./cmd/runtime-compliance --gate
    path: runtime/cmd/runtime-compliance/main.go
    description: Runtime compliance gate including realm primitive contract coverage checklist.

