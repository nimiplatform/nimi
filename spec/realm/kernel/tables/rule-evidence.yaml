version: 2026-03-23
owner: '@team'
description: Hard-cut rule-to-evidence map for the refactored realm kernel.
profiles:
  truth:
    openapi:
      - GET /api/world/oasis
      - GET /api/world/by-id/{worldId}/rules
      - POST /api/world/by-id/{worldId}/rules
      - GET /api/world/by-id/{worldId}/agents/{agentId}/rules
      - GET /api/world/by-id/{id}
      - GET /api/world/by-id/{id}/worldview
      - GET /api/world/by-id/{id}/lorebooks
    prisma_models: [World, WorldRule, AgentRule, WorldRelease, Worldview, WorldLorebook]
    service_files:
      - nimi-backend/libs/domains/world/src/world-rule.service.ts
      - nimi-backend/libs/domains/world/src/agent-rule.service.ts
      - nimi-backend/libs/domains/world/src/world-release.service.ts
      - nimi-backend/libs/domains/world/src/projection/projection.service.ts
    test_files:
      - nimi-backend/libs/domains/world/src/world-rule.service.spec.ts
      - nimi-backend/libs/domains/world/src/agent-rule.service.spec.ts
      - nimi-backend/libs/domains/world/src/world-release.service.spec.ts
      - tests/arch/world.spec.ts
  world_state:
    openapi:
      - GET /api/worlds/{worldId}/state
      - POST /api/worlds/{worldId}/state/commits
    prisma_models: [WorldStateRecord]
    service_files:
      - nimi-backend/libs/common/src/realm-commit-policy.ts
      - nimi-backend/libs/domains/world/src/world-control.service.ts
      - nimi-backend/libs/domains/world/src/world-truth-validator.service.ts
    test_files:
      - nimi-backend/libs/domains/world/src/world-control.service.unit.spec.ts
      - nimi-backend/libs/domains/world/src/world-truth-validator.service.spec.ts
      - tests/arch/world.spec.ts
  world_history:
    openapi:
      - GET /api/worlds/{worldId}/history
      - POST /api/worlds/{worldId}/history/appends
    prisma_models: [WorldHistoryEvent]
    service_files:
      - nimi-backend/libs/common/src/realm-commit-policy.ts
      - nimi-backend/libs/domains/world/src/world-control.service.ts
    test_files:
      - nimi-backend/libs/domains/world/src/world-control.service.unit.spec.ts
      - tests/arch/world.spec.ts
  agent_memory:
    openapi:
      - GET /api/agent/accounts/{id}/memory/core
      - GET /api/agent/accounts/{id}/memory/dyadic/{userId}
      - POST /api/agent/accounts/{id}/memory/commits
      - DELETE /api/agent/accounts/{id}/memory/dyadic/{userId}/{memoryId}
      - DELETE /api/agent/accounts/{id}/memory/dyadic/{userId}
    prisma_models: [AgentMemory]
    service_files:
      - nimi-backend/libs/common/src/realm-commit-policy.ts
      - nimi-backend/libs/domains/agent/src/domains/agent-memory.service.ts
      - nimi-backend/apps/api/src/modules/agent/agent.controller.ts
    test_files:
      - nimi-backend/libs/domains/agent/src/domains/agent-memory.service.spec.ts
      - nimi-backend/apps/api/src/modules/agent/agent.controller.spec.ts
      - tests/arch/agent.spec.ts
  chat:
    openapi:
      - GET /api/human/chats
      - POST /api/human/chats
      - GET /api/human/chats/{chatId}
      - GET /api/human/chats/{chatId}/messages
      - GET /api/human/chats/{chatId}/sync
      - POST /api/human/chats/{chatId}/messages
      - PATCH /api/human/chats/{chatId}/messages/{messageId}
      - POST /api/human/chats/{chatId}/messages/{messageId}/recall
      - POST /api/human/chats/{chatId}/read
    prisma_models: [Chat, Message]
    service_files:
      - nimi-backend/libs/domains/chat/src/domains/chat.service.ts
      - nimi-backend/apps/api/src/modules/chat/chat.controller.ts
    test_files:
      - nimi-backend/libs/domains/chat/src/domains/chat.service.spec.ts
      - nimi-backend/apps/api/src/modules/chat/chat.controller.spec.ts
      - tests/arch/social.spec.ts
  social:
    openapi:
      - GET /api/human/relationships/me
      - POST /api/human/relationships
    prisma_models: [Friendship]
    service_files:
      - nimi-backend/libs/domains/relationship/src/friendship.service.ts
    test_files:
      - nimi-backend/libs/domains/relationship/src/friendship.service.spec.ts
      - tests/arch/social.spec.ts
  economy:
    openapi:
      - GET /api/economy/subscription
      - POST /api/economy/reviews
    prisma_models: [Subscription, RevenueEvent, SharePlan]
    service_files:
      - nimi-backend/libs/domains/economy/src/revenue-share/revenue-share.service.ts
      - nimi-backend/libs/domains/economy/src/subscription/subscription.service.ts
    test_files:
      - nimi-backend/libs/domains/economy/src/revenue-share/revenue-share.service.spec.ts
      - nimi-backend/libs/domains/economy/src/subscription/subscription.service.spec.ts
      - tests/arch/economy.spec.ts
  asset:
    openapi:
      - GET /api/assets
      - POST /api/assets
    prisma_models: [Asset, AssetReleaseEvent]
    service_files:
      - nimi-backend/libs/domains/asset/src/asset/asset.service.ts
    test_files:
      - nimi-backend/apps/scheduler/src/modules/asset-sync/asset-sync.scheduler.spec.ts
      - nimi-backend/libs/domains/media-asset/src/media-asset.service.spec.ts
  transit:
    openapi:
      - POST /api/world/by-id/{id}/transit
      - POST /api/world/by-id/{id}/return
      - GET /api/world/transit/active/{agentId}
      - POST /api/world/transit/{id}/complete
    prisma_models: [Transit]
    service_files:
      - nimi-backend/libs/domains/world/src/transit.service.ts
    test_files:
      - nimi-backend/libs/domains/world/src/transit.service.spec.ts
      - tests/arch/world.spec.ts
