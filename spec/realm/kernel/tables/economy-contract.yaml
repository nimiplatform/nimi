contract_id: ECONOMY-CONTRACT-001
domain: economy
status: ACTIVE
version: 2026-03-23
owner: '@team'
sources:
  human_spec: ../economy-contract.md
  openapi:
    - ../../nimi-backend/api-nimi.yaml
  prisma: ../../nimi-backend/prisma/schema.prisma
  services:
    - ../../nimi-backend/libs/domains/economy/src/gift/gift.service.ts
    - ../../nimi-backend/libs/domains/economy/src/review/review.service.ts
    - ../../nimi-backend/libs/domains/economy/src/revenue-share/revenue-share.service.ts
    - ../../nimi-backend/libs/domains/economy/src/subscription/subscription.service.ts
rule_id_prefix: R-ECON-
rules:
  - rule_id: R-ECON-001
    level: must
    title: creator-world-economy-is-auditable
    statement: "World creator economy and access economics remain auditable, explicit, and separate from narrative runtime."
  - rule_id: R-ECON-002
    level: must
    title: compute-not-billed-as-realm-truth
    statement: "AI compute route cost is not modeled as Realm core truth or hidden world mutation."
  - rule_id: R-ECON-003
    level: must
    title: revenue-share-is-explicit
    statement: "Revenue and settlement logic use explicit event types, explicit distribution rules, and append-only accounting."
  - rule_id: R-ECON-004
    level: must
    title: no-hidden-cross-domain-economics
    statement: "Apps cannot hide economic state changes inside narrative history or memory commits."
entities:
  - name: Subscription
    prisma_model: Subscription
    required_fields: [id, humanProfileId, tier, status]
    json_fields: []
  - name: GiftTransaction
    prisma_model: GiftTransaction
    required_fields: [id, senderId, receiverId, giftId, status, sparkCost]
    json_fields: []
  - name: Review
    prisma_model: Review
    required_fields: [id, giftTransactionId, reviewerId, revieweeId, rating]
    json_fields: []
  - name: CurrencyTransaction
    prisma_model: CurrencyTransaction
    required_fields: [id, humanProfileId, currencyType, amount, balanceAfter, type]
    json_fields: []
api_surface:
  required_operations:
    - GET /api/economy/subscription
    - GET /api/economy/gifts/received
    - GET /api/economy/gifts/sent
    - POST /api/economy/reviews
    - GET /api/economy/revenue-share/config
    - GET /api/economy/revenue-share/agent-origin/{agentId}
    - POST /api/economy/revenue-share/preview
  secondary_operations:
    - GET /api/economy/balances
    - GET /api/economy/reviews
