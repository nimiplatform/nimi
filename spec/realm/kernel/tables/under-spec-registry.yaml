version: 1
updated_at: 2026-03-26
owner: '@team'
description: Registry of acknowledged under-specified items after the hard-cut realm refactor.
under_spec:
  - id: U1
    rule_id: R-WSTATE-003
    category: under-spec
    status: acknowledged
    summary: World State relation scope shape remains intentionally narrow
    detail: ENTITY and RELATION durable state schemas are intentionally app-specific and will be introduced via explicit schema registry, not via one universal JSON shape.
    impact: medium
    resolution: define schema registry per authorized app integration
    deferred_to: world-state-schema-registry
  - id: U2
    rule_id: R-WHIST-003
    category: under-spec
    status: acknowledged
    summary: canonical happened-fact taxonomy still needs a common event catalog
    detail: provenance envelope is fixed, but the cross-app event taxonomy for canonical world history is intentionally deferred.
    impact: high
    resolution: define shared history event catalog after first world-connected app integrations land
    deferred_to: world-history-event-catalog
  - id: U3
    rule_id: R-RSRC-002
    category: hard-cut-deferral
    status: acknowledged
    summary: VOICE resource type remains intentionally deferred after the Resource cutover
    detail: Voice content continues to ride AUDIO plus metadata during this hard cut. A dedicated VOICE resource type and any entitlement or instance semantics are explicitly outside the active contract.
    impact: medium
    resolution: introduce VOICE only with a dedicated typed storage, delivery, and binding contract instead of overloading the current AUDIO model
    deferred_to: resource-voice-contract
  - id: U4
    rule_id: R-BIND-*
    category: external-blocker
    status: blocked
    summary: Binding contract sync is blocked on upstream authoritative text
    detail: Binding-facing rule catalog rows, enums, alignment maps, and write authorization facts are intentionally not inferred from local artifacts. They must be mirrored only after the upstream R-BIND source text is provided.
    impact: high
    resolution: import upstream binding contract text and regenerate dependent tables in one change
    deferred_to: upstream-realm-binding-contract
