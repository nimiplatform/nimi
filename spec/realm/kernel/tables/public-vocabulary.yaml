version: 1
boundaries:
  - domain: world
    vocabulary:
      - term: World
        description: "世界实体，Nimi OASIS 核心资产"
      - term: Worldview
        description: "世界观，规则根 1:1 绑定 world；coreSystem.rules 使用 ordered rule item array（key/title/value）"
      - term: WorldStateRecord
        description: "世界共享当前状态记录（canonical present state）"
      - term: WorldHistoryEvent
        description: "世界 canonical happened fact 记录"
      - term: WorldAccessControl
        description: "创建/维护/发布权限控制"
      - term: WorldMutation
        description: "World 变更记录；底层保留 mutationType/targetPath/reason，public/detail 额外暴露 title/summary"
      - term: WorldMaintenanceSnapshot
        description: "维护快照"
    lifecycle: "draft -> published -> maintained"
    change_domains: "world/worldview/events/lorebooks/mutations"
    knowledge_delete_semantic: "逻辑归档 (archive)，不承诺物理硬删"
    source_rule: R-BOUND-001

  - domain: agent
    vocabulary:
      - term: AgentProfile
        description: "Agent 身份配置"
      - term: AgentOwnership
        description: "归属类型 (MASTER_OWNED / WORLD_OWNED)"
      - term: AgentWorldBinding
        description: "Agent-World 绑定"
      - term: AgentRule
        description: "Agent truth / identity 边界规则"
      - term: AgentMemoryEntry
        description: "Agent continuity memory entry"
    ownership_model: "MASTER_OWNED (用户直属) / WORLD_OWNED (世界托管)"
    memory_boundary: "public continuity memory boundary only"
    source_rule: R-BOUND-002

  - domain: social
    vocabulary:
      - term: Friendship
        description: "关系原子"
      - term: RelationshipType
        description: "主体关系类型 (HUMAN_HUMAN, HUMAN_AGENT, AGENT_AGENT, AGENT_HUMAN)"
      - term: RelationshipStatus
        description: "关系状态 (ACTIVE | BLOCKED | PENDING)"
      - term: SocialPrecondition
        description: "聊天/互动前置条件判定"
    relationship_lifecycle: "PENDING -> ACTIVE -> BLOCKED (可逆至 ACTIVE)"
    relationship_types: "HUMAN_HUMAN, HUMAN_AGENT, AGENT_AGENT, AGENT_HUMAN"
    source_rule: R-BOUND-003

  - domain: asset
    vocabulary:
      - term: RealmAsset
        description: "Realm 中可发布、可维护的创作者资产"
      - term: AssetOwner
        description: "资产归属主体（creator/self owner）"
      - term: AssetVisibility
        description: "资产可见性（draft/private/public）"
      - term: AssetReleaseEvent
        description: "资产正式发布记录"
      - term: NovelAsset
        description: "书籍级连载小说资产类型"
    lifecycle: "draft -> published -> maintained -> archived"
    change_domains: "metadata/structure/releases/archive"
    ownership_model: "creator-owned personal asset"
    source_rule: R-BOUND-004

  - domain: chat
    vocabulary:
      - term: ChatThread
        description: "Realm canonical human chat thread"
      - term: ChatMessage
        description: "Realm canonical human chat message"
      - term: ChatSyncCursor
        description: "消息同步与增量读取游标"
      - term: ChatAdmission
        description: "由 Social precondition 决定的聊天准入"
    supported_shape: "HUMAN_HUMAN + DIRECT only (v1)"
    excluded_shape: "agent chat, group, channel"
    source_rule: R-BOUND-005
