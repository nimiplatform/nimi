version: 2026-03-28
owner: '@team'
description: >
  Registry of currently registered external backend API modules that are NOT governed by
  active Realm Kernel Spec rules but are required for product functionality. This list
  is a maintained exempt registry for modules observed from the current workspace, not a
  claim of exhaustive backend coverage.

modules:
  - module: ExploreModule
    path: nimi-backend/apps/api/src/modules/explore
    reason: Search/discovery aggregation layer; no domain-specific active realm kernel rules apply
    product_area: discovery

  - module: InvitationModule
    path: nimi-backend/apps/api/src/modules/invitation
    reason: Invitation system for user onboarding; not in kernel scope
    product_area: growth

  - module: AdminApiModule
    path: nimi-backend/apps/api/src/modules/@admin
    reason: Backoffice moderation, user operations, and system audit surfaces; not an active realm kernel domain
    product_area: admin-ops

  - module: AuthModule
    path: nimi-backend/apps/api/src/modules/auth
    reason: Account authentication, OAuth, password login, and session cookies live outside realm kernel contracts
    product_area: identity

  - module: CreatorModule
    path: nimi-backend/apps/api/src/modules/creator
    reason: Creator API keys and creator-scoped agent management are product tooling surfaces, not kernel-governed realm objects
    product_area: creator-tooling

  - module: CreatorSurfaceModule
    path: nimi-backend/apps/api/src/modules/creator-surface
    reason: Creator control-plane routes for mod grants, revocations, and manifest/signature verification are outside active realm kernel scope
